<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Center separator -->
  <line x1="410" y1="20" x2="410" y2="280" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ===== Left: Strict Two-Phase Commit ===== -->
  <text x="205" y="30" fill="#fb7185" font-size="14" font-weight="700" text-anchor="middle">Strict Two-Phase Commit</text>
  <text x="205" y="48" fill="#94a3b8" font-size="11" text-anchor="middle">(同步微批次)</text>

  <rect x="65" y="65" width="280" height="42" rx="6" fill="#0f172a"/>
  <rect x="65" y="65" width="280" height="42" rx="6" fill="rgba(136,19,55,0.35)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="205" y="89" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">Phase 1: 全部 Task 处理完当前 Epoch</text>

  <line x1="205" y1="107" x2="205" y2="135" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>

  <rect x="65" y="140" width="280" height="42" rx="6" fill="#0f172a"/>
  <rect x="65" y="140" width="280" height="42" rx="6" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="205" y="164" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">Phase 2: 持久化全局状态</text>

  <text x="205" y="210" fill="#94a3b8" font-size="10" text-anchor="middle">↓ 问题: Task 利用率低, 等所有 Task 完成</text>
  <text x="205" y="228" fill="#64748b" font-size="10" text-anchor="middle">Drizzle 缓解: chaining 多个 Epoch</text>
  <text x="205" y="255" fill="#475569" font-size="9" text-anchor="middle">完整 epoch 快照, 延迟略高但恢复更快</text>

  <!-- ===== Right: Asynchronous Two-Phase Commit ===== -->
  <text x="615" y="30" fill="#60a5fa" font-size="14" font-weight="700" text-anchor="middle">Asynchronous Two-Phase Commit</text>
  <text x="615" y="48" fill="#94a3b8" font-size="11" text-anchor="middle">(异步快照)</text>

  <rect x="475" y="65" width="280" height="42" rx="6" fill="#0f172a"/>
  <rect x="475" y="65" width="280" height="42" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="615" y="89" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">Unaligned Snapshots</text>

  <text x="615" y="115" fill="#94a3b8" font-size="10" text-anchor="middle">Chandy-Lamport: 插入 Marker</text>
  <text x="615" y="132" fill="#64748b" font-size="10" text-anchor="middle">记录 in-flight events</text>

  <line x1="615" y1="138" x2="615" y2="155" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="475" y="160" width="280" height="42" rx="6" fill="#0f172a"/>
  <rect x="475" y="160" width="280" height="42" rx="6" fill="rgba(59,130,246,0.25)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="615" y="184" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">Aligned Snapshots</text>

  <text x="615" y="220" fill="#94a3b8" font-size="10" text-anchor="middle">阻塞已收到 Marker 的通道</text>
  <text x="615" y="238" fill="#64748b" font-size="10" text-anchor="middle">等所有通道收到 Marker 再传播</text>

  <text x="615" y="265" fill="#60a5fa" font-size="10" text-anchor="middle">→ Flink 的 Epoch Snapshotting</text>
  <text x="615" y="283" fill="#475569" font-size="9" text-anchor="middle">恢复时需重放 in-flight events (fuzzy checkpoint)</text>
</svg>