<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', monospace; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="35" fill="white" font-size="16" font-weight="700">Apache Doris — 架构演进 (2013→2025+)</text>

  <!-- Timeline axis -->
  <line x1="60" y1="100" x2="950" y2="100" stroke="#64748b" stroke-width="2"/>

  <!-- Phase markers on timeline -->
  <!-- Phase 1: Palo -->
  <circle cx="130" cy="100" r="8" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <text x="130" y="85" fill="#22d3ee" font-size="10" font-weight="700" text-anchor="middle">2013</text>
  <text x="130" y="130" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">Palo</text>

  <!-- Phase 2: Doris 0.x -->
  <circle cx="310" cy="100" r="8" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <text x="310" y="85" fill="#34d399" font-size="10" font-weight="700" text-anchor="middle">2017</text>
  <text x="310" y="130" fill="#34d399" font-size="9" font-weight="600" text-anchor="middle">Doris 0.x</text>

  <!-- Phase 3: Doris 1.x~2.x -->
  <circle cx="560" cy="100" r="8" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
  <text x="560" y="85" fill="#fbbf24" font-size="10" font-weight="700" text-anchor="middle">2022</text>
  <text x="560" y="130" fill="#fbbf24" font-size="9" font-weight="600" text-anchor="middle">Doris 1.x~2.x</text>

  <!-- Phase 4: Doris 3.0 -->
  <circle cx="750" cy="100" r="8" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
  <text x="750" y="85" fill="#a78bfa" font-size="10" font-weight="700" text-anchor="middle">2024</text>
  <text x="750" y="130" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">Doris 3.0</text>

  <!-- Phase 5: Doris 4.x -->
  <circle cx="910" cy="100" r="8" fill="#0f172a" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="910" y="85" fill="#fb7185" font-size="10" font-weight="700" text-anchor="middle">2025+</text>
  <text x="910" y="130" fill="#fb7185" font-size="9" font-weight="600" text-anchor="middle">Doris 4.x</text>

  <!-- ===== Phase 1 Details ===== -->
  <rect x="40" y="145" width="220" height="180" rx="10" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="55" y="162" fill="#22d3ee" font-size="10" font-weight="600">Phase 1: 百度内部</text>

  <rect x="55" y="172" width="190" height="24" rx="4" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="150" y="188" fill="white" font-size="8" font-weight="500" text-anchor="middle">C++ 实现</text>

  <rect x="55" y="204" width="190" height="24" rx="4" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="150" y="220" fill="white" font-size="8" font-weight="500" text-anchor="middle">Segment v1 存储格式</text>

  <rect x="55" y="236" width="190" height="24" rx="4" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="150" y="252" fill="white" font-size="8" font-weight="500" text-anchor="middle">解释执行 (无向量化)</text>

  <rect x="55" y="268" width="190" height="24" rx="4" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="150" y="284" fill="white" font-size="8" font-weight="500" text-anchor="middle">仅 Aggregate 模型</text>

  <text x="150" y="312" fill="#94a3b8" font-size="7" text-anchor="middle">验证 MPP+列存 可行性</text>

  <!-- ===== Phase 2 Details ===== -->
  <rect x="280" y="145" width="240" height="180" rx="10" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="295" y="162" fill="#34d399" font-size="10" font-weight="600">Phase 2: 开源孵化</text>

  <rect x="295" y="172" width="210" height="24" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.8"/>
  <text x="400" y="188" fill="white" font-size="8" font-weight="500" text-anchor="middle">Apache 孵化器</text>

  <rect x="295" y="204" width="210" height="24" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.8"/>
  <text x="400" y="220" fill="white" font-size="8" font-weight="500" text-anchor="middle">FE 多Master (BDB-JE)</text>

  <rect x="295" y="236" width="210" height="24" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.8"/>
  <text x="400" y="252" fill="white" font-size="8" font-weight="500" text-anchor="middle">Segment v2 + 向量化</text>

  <rect x="295" y="268" width="210" height="24" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.8"/>
  <text x="400" y="284" fill="white" font-size="8" font-weight="500" text-anchor="middle">Routine/Broker Load</text>

  <text x="400" y="312" fill="#94a3b8" font-size="7" text-anchor="middle">性能 5-10x ↑ · 生态起步</text>

  <!-- ===== Phase 3 Details ===== -->
  <rect x="540" y="145" width="240" height="180" rx="10" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="555" y="162" fill="#fbbf24" font-size="10" font-weight="600">Phase 3: 功能爆发</text>

  <rect x="555" y="172" width="210" height="24" rx="4" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="660" y="188" fill="white" font-size="8" font-weight="500" text-anchor="middle">Unique Key MoW 默认</text>

  <rect x="555" y="204" width="210" height="24" rx="4" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="660" y="220" fill="white" font-size="8" font-weight="500" text-anchor="middle">Nereids CBO 优化器</text>

  <rect x="555" y="236" width="210" height="24" rx="4" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="660" y="252" fill="white" font-size="8" font-weight="500" text-anchor="middle">Inverted Index (CLucene)</text>

  <rect x="555" y="268" width="210" height="24" rx="4" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="660" y="284" fill="white" font-size="8" font-weight="500" text-anchor="middle">Multi-Catalog 湖仓</text>

  <text x="660" y="312" fill="#94a3b8" font-size="7" text-anchor="middle">Upsert突破 · 能力爆发</text>

  <!-- ===== Phase 4 Details ===== -->
  <rect x="40" y="345" width="300" height="180" rx="10" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="55" y="362" fill="#a78bfa" font-size="10" font-weight="600">Phase 4: 存算分离 (3.0+)</text>

  <rect x="55" y="372" width="270" height="24" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="190" y="388" fill="white" font-size="8" font-weight="500" text-anchor="middle">Compute-Storage Separation</text>

  <rect x="55" y="404" width="270" height="24" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="190" y="420" fill="white" font-size="8" font-weight="500" text-anchor="middle">Remote Storage (S3/HDFS/MinIO)</text>

  <rect x="55" y="436" width="270" height="24" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="190" y="452" fill="white" font-size="8" font-weight="500" text-anchor="middle">File Cache 保证延迟</text>

  <rect x="55" y="468" width="270" height="24" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="190" y="484" fill="white" font-size="8" font-weight="500" text-anchor="middle">读写分离 Compute Group</text>

  <text x="190" y="512" fill="#94a3b8" font-size="7" text-anchor="middle">弹性扩缩 · 成本优化</text>

  <!-- ===== Phase 5 Details ===== -->
  <rect x="370" y="345" width="280" height="180" rx="10" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="385" y="362" fill="#fb7185" font-size="10" font-weight="600">Phase 5: 未来 (4.x)</text>

  <rect x="385" y="372" width="250" height="24" rx="4" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="510" y="388" fill="white" font-size="8" font-weight="500" text-anchor="middle">Falcon 新执行引擎</text>

  <rect x="385" y="404" width="250" height="24" rx="4" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="510" y="420" fill="white" font-size="8" font-weight="500" text-anchor="middle">Parquet 原生存储</text>

  <rect x="385" y="436" width="250" height="24" rx="4" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="510" y="452" fill="white" font-size="8" font-weight="500" text-anchor="middle">Streaming SQL (流批一体)</text>

  <rect x="385" y="468" width="250" height="24" rx="4" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="510" y="484" fill="white" font-size="8" font-weight="500" text-anchor="middle">AI/ML 内置推理</text>

  <text x="510" y="512" fill="#94a3b8" font-size="7" text-anchor="middle">湖仓深度整合</text>

  <!-- ===== Architecture comparison ===== -->
  <rect x="680" y="345" width="290" height="180" rx="10" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="695" y="362" fill="#60a5fa" font-size="10" font-weight="600">架构对比</text>

  <rect x="695" y="375" width="260" height="55" rx="5" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="825" y="395" fill="white" font-size="8" font-weight="600" text-anchor="middle">Shared-Nothing (v1.x~2.x)</text>
  <text x="825" y="411" fill="#94a3b8" font-size="7" text-anchor="middle">FE+BDB-JE + BE本地磁盘</text>
  <text x="825" y="423" fill="#94a3b8" font-size="7" text-anchor="middle">扩缩需数据重分布</text>

  <rect x="695" y="440" width="260" height="55" rx="5" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="825" y="460" fill="white" font-size="8" font-weight="600" text-anchor="middle">存算分离 (v3.x+)</text>
  <text x="825" y="476" fill="#94a3b8" font-size="7" text-anchor="middle">MetaService + ObjectStore</text>
  <text x="825" y="488" fill="#94a3b8" font-size="7" text-anchor="middle">计算节点秒级弹性</text>

  <!-- Key decision timeline -->
  <rect x="40" y="540" width="930" height="115" rx="10" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="55" y="557" fill="#fbbf24" font-size="10" font-weight="600">关键决策时间线</text>

  <!-- Decision 1 -->
  <rect x="55" y="570" width="160" height="55" rx="6" fill="#0f172a"/>
  <rect x="55" y="570" width="160" height="55" rx="6" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1"/>
  <text x="135" y="592" fill="white" font-size="8" font-weight="600" text-anchor="middle">2013: C++ 实现BE</text>
  <text x="135" y="608" fill="#94a3b8" font-size="7" text-anchor="middle">极致性能 · 无GC</text>

  <!-- Decision 2 -->
  <rect x="240" y="570" width="160" height="55" rx="6" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1"/>
  <text x="320" y="592" fill="white" font-size="8" font-weight="600" text-anchor="middle">2021: Segment v2</text>
  <text x="320" y="608" fill="#94a3b8" font-size="7" text-anchor="middle">性能超越 Impala</text>

  <!-- Decision 3 -->
  <rect x="425" y="570" width="160" height="55" rx="6" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1"/>
  <text x="505" y="592" fill="white" font-size="8" font-weight="600" text-anchor="middle">2022: MoW 默认</text>
  <text x="505" y="608" fill="#94a3b8" font-size="7" text-anchor="middle">CDC场景突破</text>

  <!-- Decision 4 -->
  <rect x="610" y="570" width="160" height="55" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
  <text x="690" y="592" fill="white" font-size="8" font-weight="600" text-anchor="middle">2023: Nereids CBO</text>
  <text x="690" y="608" fill="#94a3b8" font-size="7" text-anchor="middle">Join优化的重大提升</text>

  <!-- Decision 5 -->
  <rect x="795" y="570" width="160" height="55" rx="6" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1"/>
  <text x="875" y="592" fill="white" font-size="8" font-weight="600" text-anchor="middle">2024: 存算分离</text>
  <text x="875" y="608" fill="#94a3b8" font-size="7" text-anchor="middle">弹性 + 成本优化</text>

  <!-- Legend -->
  <rect x="40" y="670" width="930" height="35" rx="6" fill="none" stroke="#1e293b" stroke-width="1"/>
  <text x="55" y="691" fill="#94a3b8" font-size="8">图例</text>
  <rect x="110" y="682" width="12" height="12" rx="2" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1"/>
  <text x="128" y="693" fill="#94a3b8" font-size="8">Palo</text>
  <rect x="180" y="682" width="12" height="12" rx="2" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1"/>
  <text x="198" y="693" fill="#94a3b8" font-size="8">Doris 0.x</text>
  <rect x="275" y="682" width="12" height="12" rx="2" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1"/>
  <text x="293" y="693" fill="#94a3b8" font-size="8">Doris 1~2.x</text>
  <rect x="385" y="682" width="12" height="12" rx="2" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1"/>
  <text x="403" y="693" fill="#94a3b8" font-size="8">Doris 3.x</text>
  <rect x="475" y="682" width="12" height="12" rx="2" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1"/>
  <text x="493" y="693" fill="#94a3b8" font-size="8">Doris 4.x</text>
  <text x="580" y="693" fill="#94a3b8" font-size="8">从百度内部到Apache顶级项目 · 12年持续演进</text>
</svg>
