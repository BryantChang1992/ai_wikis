  <text x="200" y="484" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">CockroachDB</text>
  <rect x="266" y="464" width="104" height="30" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="318" y="484" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">TiDB</text>
  <rect x="384" y="464" width="104" height="30" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="436" y="484" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">FoundationDB</text>
  <rect x="502" y="464" width="104" height="30" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="554" y="484" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">Aurora</text>
  <rect x="620" y="464" width="104" height="30" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="672" y="484" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">Neon</text>
  <rect x="738" y="464" width="104" height="30" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="790" y="484" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">YugabyteDB</text>
  <g transform="translate(30, 512)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="20" y="12" fill="#6b7280" font-size="10">Txn Models</text>
    <rect x="140" y="0" width="14" height="14" rx="3" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="160" y="12" fill="#6b7280" font-size="10">Event Horizon</text>
    <rect x="280" y="0" width="14" height="14" rx="3" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="300" y="12" fill="#6b7280" font-size="10">S-C Split</text>
    <rect x="420" y="0" width="14" height="14" rx="3" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
    <text x="440" y="12" fill="#6b7280" font-size="10">Consensus</text>
    <rect x="560" y="0" width="14" height="14" rx="3" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
    <text x="580" y="12" fill="#6b7280" font-size="10">Systems</text>
