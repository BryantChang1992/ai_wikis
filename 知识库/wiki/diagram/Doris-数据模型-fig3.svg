<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" width="700" height="250">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
      <marker id="arrow-10b981" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="700" height="250" fill="url(#bg-grad)"/>
  <text x="350" y="16" font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle">Unique 模型 (MoW — Merge-on-Write) 写入流程</text>
  <text x="10" y="38" font-size="12" font-weight="bold" fill="#e2e8f0">写入时:</text>
  <rect x="10" y="48" width="210" height="24" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="115" y="63" font-size="10" fill="#e2e8f0" text-anchor="middle">1. 按 Sort Key 排序内存 Batch</text>
  <line x1="220" y1="60" x2="255" y2="60" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <rect x="260" y="48" width="230" height="24" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="375" y="63" font-size="10" fill="#e2e8f0" text-anchor="middle">2. 逐 Key 查询 Tablet 内是否存在</text>
  <line x1="375" y1="72" x2="375" y2="88" stroke="#10b981" stroke-width="1" marker-end="url(#arrow-10b981)"/>
  <line x1="200" y1="88" x2="550" y2="88" stroke="#10b981" stroke-width="1" marker-end="url(#arrow-10b981)"/>
  <line x1="200" y1="88" x2="200" y2="104" stroke="#10b981" stroke-width="1" marker-end="url(#arrow-10b981)"/>
  <line x1="550" y1="88" x2="550" y2="104" stroke="#10b981" stroke-width="1" marker-end="url(#arrow-10b981)"/>
  <rect x="10" y="104" width="280" height="24" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="150" y="119" font-size="10" fill="#94a3b8">├ 不存在 → 写入 Segment 新数据行</text>
  <rect x="320" y="104" width="370" height="24" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="505" y="119" font-size="10" fill="#94a3b8">└ 存在 → 标记旧行 DELETE_BITMAP + 写入新数据行</text>
  <line x1="150" y1="128" x2="150" y2="152" stroke="#10b981" stroke-width="1" marker-end="url(#arrow-10b981)"/>
  <line x1="150" y1="152" x2="400" y2="152" stroke="#10b981" stroke-width="1" marker-end="url(#arrow-10b981)"/>
  <line x1="400" y1="152" x2="400" y2="170" stroke="#10b981" stroke-width="1" marker-end="url(#arrow-10b981)"/>
  <rect x="230" y="152" width="340" height="24" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="400" y="167" font-size="10" fill="#e2e8f0" text-anchor="middle">3. Segment 写满 (默认 256MB) 后封存</text>
  <line x1="400" y1="176" x2="400" y2="196" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <rect x="280" y="198" width="240" height="24" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="400" y="213" font-size="10" fill="#e2e8f0" text-anchor="middle">4. Rowset 提交 (可见)</text>
  <text x="10" y="240" font-size="12" font-weight="bold" fill="#e2e8f0">查询时:</text>
  <text x="115" y="240" font-size="10" fill="#10b981">直接读最新版本 → 无合并开销</text>
</svg>