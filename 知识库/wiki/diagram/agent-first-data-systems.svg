<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','Courier New','Microsoft YaHei','SimHei',monospace; fill: #e2e8f0; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="960" height="460" fill="url(#bg-grad)"/>
  <text x="480" y="30" font-size="17" font-weight="700" fill="#e2e8f0" text-anchor="middle">Agent-First Data Systems · CIDR 2026</text>
  <text x="480" y="52" font-size="11" fill="#94a3b8" text-anchor="middle">从被动查询 → Probe-Brief 主动引导 · Agentic Speculation 四特性 · 分支事务 + 语义缓存</text>
  <rect x="30" y="68" width="280" height="125" rx="8" fill="#1c1917" stroke="#dc2626" stroke-width="1.5"/>
  <text x="170" y="92" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">传统模型 ❌</text>
  <text x="50" y="116" font-size="10" fill="#94a3b8">├ Human → Keyboard (低并发)</text>
  <text x="50" y="134" font-size="10" fill="#94a3b8">├ Exact Answer (精确结果)</text>
  <text x="50" y="152" font-size="10" fill="#94a3b8">├ Isolated Query (独立查询)</text>
  <text x="50" y="170" font-size="10" fill="#94a3b8">└ Passive: 等用户输入</text>
  <line x1="310" y1="130" x2="345" y2="130" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="350" y="68" width="280" height="125" rx="8" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="490" y="92" font-size="13" font-weight="700" fill="#10b981" text-anchor="middle">Agent-First ✅ → 必须重构</text>
  <text x="370" y="116" font-size="10" fill="#94a3b8">├ Agent → DB (每秒上千 QPS)</text>
  <text x="370" y="134" font-size="10" fill="#94a3b8">├ Satisficing (足够好即可)</text>
  <text x="370" y="152" font-size="10" fill="#94a3b8">├ Highly Redundant (多探针重叠)</text>
  <text x="370" y="170" font-size="10" fill="#94a3b8">└ Active: Probe → Brief 循环</text>
  <rect x="30" y="208" width="450" height="110" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="255" y="232" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle">Agentic Speculation 四特性</text>
  <rect x="50" y="246" width="195" height="28" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="148" y="265" font-size="10" fill="#60a5fa" text-anchor="middle">Scale: 高并发 → Satisficing</text>
  <rect x="260" y="246" width="200" height="28" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="360" y="265" font-size="10" fill="#60a5fa" text-anchor="middle">Heterogeneity: 粗→精混合</text>
  <rect x="50" y="282" width="195" height="28" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="148" y="301" font-size="10" fill="#60a5fa" text-anchor="middle">Redundancy: MQO + 缓存共享</text>
  <rect x="260" y="282" width="200" height="28" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="360" y="301" font-size="10" fill="#60a5fa" text-anchor="middle">Steerability: Sleeper Agent</text>
  <rect x="500" y="208" width="430" height="215" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="715" y="232" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">关键技术</text>
  <rect x="520" y="245" width="390" height="48" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="715" y="264" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle">分支事务 (Branch Transactions)</text>
  <text x="715" y="282" font-size="10" fill="#7c3aed" text-anchor="middle">MVCC Snapshot Fork + 多分支并行探索 → 合并最优路径 Commit</text>
  <rect x="520" y="301" width="390" height="48" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1"/>
  <text x="715" y="320" font-size="11" font-weight="700" fill="#fb923c" text-anchor="middle">语义缓存 (Semantic Cache)</text>
  <text x="715" y="338" font-size="10" fill="#f97316" text-anchor="middle">基于语义相似度匹配 · 非精确 key match</text>
  <rect x="520" y="357" width="390" height="48" rx="6" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="715" y="376" font-size="11" font-weight="700" fill="#34d399" text-anchor="middle">Probe-Brief 交互模型</text>
  <text x="715" y="394" font-size="10" fill="#10b981" text-anchor="middle">Agent 主动探查（Probe）→ DB 简要响应（Brief）→ 引导下一轮</text>
  <rect x="30" y="330" width="450" height="110" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="255" y="354" font-size="12" font-weight="700" fill="#e2e8f0" text-anchor="middle">实证: BIRD Benchmark + Multi-Backend</text>
  <text x="50" y="376" font-size="10" fill="#94a3b8">├ 100 DDL Statements → 25% 子查询重叠 (低基数)</text>
  <text x="50" y="394" font-size="10" fill="#94a3b8">├ Sem-Join: Hash 以外的 similarity-based join</text>
  <text x="50" y="416" font-size="10" fill="#94a3b8">└ 启发: DMBS 需从"被动服务"升级为"主动引导"</text>
</svg>