<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 90" width="600" height="90">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascada Code','Courier New','Microsoft YaHei','SimHei',monospace; }
    .t1 { fill: #e2e8f0; font-size: 12px; }
    .t2 { fill: #94a3b8; font-size: 10px; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="90" fill="url(#bg)"/>
  <rect x="10" y="10" width="580" height="70" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="300" y="30" class="t1" text-anchor="middle" dominant-baseline="middle">提交阶段 (Parallel Commit):</text>
  <text x="25" y="50" class="t2">将 Transaction Record 状态改为 COMMITTED</text>
  <text x="25" y="66" class="t2">参与者并行确认 → 只需等待最慢的写入 | 异步清理 Write Intents</text>
</svg>