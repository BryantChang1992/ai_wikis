<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="480" y="32" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#f1f5f9" text-anchor="middle">流处理系统代际演化 · 三十年三阶段</text>
  <text x="480" y="54" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">1992 Tapestry → 2026 · 3 代 17 个系统 · 首个演化视角综述</text>

  <!-- ====== Generation 1 — Accent / Amber ====== -->
  <rect x="30" y="75" width="290" height="400" rx="10" fill="#0f172a"/>
  <rect x="30" y="75" width="290" height="400" rx="10" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="30" y="75" width="290" height="40" rx="10" fill="rgba(120,53,15,0.4)"/>
  <rect x="30" y="105" width="290" height="10" fill="rgba(120,53,15,0.4)"/>
  <text x="175" y="100" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="15" font-weight="700" fill="#fbbf24" text-anchor="middle">第一代 · 2000s</text>
  <text x="175" y="126" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#d97706" text-anchor="middle">单算子流处理 (Operator Streaming)</text>

  <!-- Design Philosophy -->
  <text x="50" y="150" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" font-weight="700" fill="#fbbf24">设计哲学:</text>
  <text x="50" y="170" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">流 = 单个算子持续处理</text>
  <text x="50" y="190" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#94a3b8">无 DAG · 无并行 · 无状态</text>

  <line x1="50" y1="205" x2="300" y2="205" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>

  <!-- Representative Systems -->
  <text x="50" y="225" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" font-weight="700" fill="#fbbf24">代表系统:</text>
  <text x="50" y="248" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">Tapestry (1992)</text>
  <text x="50" y="268" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">Aurora (2002)</text>
  <text x="50" y="288" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">STREAM (2003)</text>
  <text x="50" y="308" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">Borealis (2005)</text>

  <line x1="50" y1="323" x2="300" y2="323" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>

  <!-- Limitations -->
  <text x="50" y="345" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" font-weight="700" fill="#fb7185">局限:</text>
  <text x="50" y="365" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#fb7185">单节点 · 无水平扩展</text>
  <text x="50" y="385" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#fb7185">无容错 · 无状态管理</text>
  <text x="50" y="405" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#fb7185">处理模型简单</text>

  <text x="175" y="445" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#d97706" text-anchor="middle">窗口、近似、QoS → 奠基</text>

  <!-- ====== Generation 2 — Primary / Cyan ====== -->
  <rect x="335" y="75" width="290" height="400" rx="10" fill="#0f172a"/>
  <rect x="335" y="75" width="290" height="400" rx="10" fill="rgba(8,51,68,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="335" y="75" width="290" height="40" rx="10" fill="rgba(8,51,68,0.4)"/>
  <rect x="335" y="105" width="290" height="10" fill="rgba(8,51,68,0.4)"/>
  <text x="480" y="100" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="15" font-weight="700" fill="#22d3ee" text-anchor="middle">第二代 · 2010s</text>
  <text x="480" y="126" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#67e8f9" text-anchor="middle">DAG 分布式流 (DAG Streaming)</text>

  <!-- Design Philosophy -->
  <text x="355" y="150" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" font-weight="700" fill="#22d3ee">设计哲学:</text>
  <text x="355" y="170" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">流 = DAG 多算子 + 并行执行</text>
  <text x="355" y="190" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#94a3b8">有状态 · 分布式 · Exactly-Once</text>

  <line x1="355" y1="205" x2="605" y2="205" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>

  <!-- Representative Systems -->
  <text x="355" y="225" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" font-weight="700" fill="#22d3ee">代表系统:</text>
  <text x="355" y="248" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">Storm (2011)</text>
  <text x="355" y="268" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">Spark Streaming (2013)</text>
  <text x="355" y="288" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">Flink (2014)</text>
  <text x="355" y="308" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">Heron (2016)</text>
  <text x="355" y="328" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">Samza (2015)</text>

  <line x1="355" y1="345" x2="605" y2="345" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>

  <!-- Breakthroughs -->
  <text x="355" y="368" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" font-weight="700" fill="#34d399">突破:</text>
  <text x="355" y="388" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#34d399">水平扩展 · 容错 · 状态管理</text>
  <text x="355" y="408" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#34d399">Event Time · Watermark</text>

  <text x="480" y="445" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#67e8f9" text-anchor="middle">分布式 + 容错 → 生产级</text>

  <!-- ====== Generation 3 — Secondary / Emerald ====== -->
  <rect x="640" y="75" width="290" height="400" rx="10" fill="#0f172a"/>
  <rect x="640" y="75" width="290" height="400" rx="10" fill="rgba(6,78,59,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="640" y="75" width="290" height="40" rx="10" fill="rgba(6,78,59,0.4)"/>
  <rect x="640" y="105" width="290" height="10" fill="rgba(6,78,59,0.4)"/>
  <text x="785" y="100" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="15" font-weight="700" fill="#34d399" text-anchor="middle">第三代 · 2020s →</text>
  <text x="785" y="126" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">流处理即机制 (SPaaS)</text>

  <!-- Design Philosophy -->
  <text x="660" y="150" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" font-weight="700" fill="#34d399">设计哲学:</text>
  <text x="660" y="170" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">流 = 通用数据处理机制</text>
  <text x="660" y="190" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#94a3b8">弹性计算 · Serverless · 存算分</text>

  <line x1="660" y1="205" x2="910" y2="205" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>

  <!-- Representative Systems -->
  <text x="660" y="225" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" font-weight="700" fill="#34d399">代表系统:</text>
  <text x="660" y="248" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">Stateful Functions (2020)</text>
  <text x="660" y="268" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">Fluss (2026)</text>
  <text x="660" y="288" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">RisingWave (2024)</text>
  <text x="660" y="308" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#e2e8f0">Materialize (2024)</text>

  <line x1="660" y1="323" x2="910" y2="323" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>

  <!-- New Paradigms -->
  <text x="660" y="345" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" font-weight="700" fill="#34d399">新范式:</text>
  <text x="660" y="368" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#34d399">存算分离 · FaaS · 弹性</text>
  <text x="660" y="388" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#34d399">SQL-over-Stream · MV-on-Stream</text>
  <text x="660" y="408" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#34d399">Lakehouse 融合 · 批流一体</text>

  <text x="785" y="445" font-family="'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">存算分离 + 弹性 → 未来</text>
</svg>
