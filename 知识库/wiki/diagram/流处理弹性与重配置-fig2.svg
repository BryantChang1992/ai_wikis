<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 130" width="700" height="130">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','Courier New','Microsoft YaHei','SimHei',monospace; fill: #e2e8f0; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-data" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-back" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#f97316"/>
    </marker>
    <marker id="arrow-credit" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="700" height="130" fill="url(#bg-grad)"/>
  <text x="170" y="22" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">Buffer-based:</text>
  <rect x="30" y="35" width="110" height="32" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="85" y="55" font-size="11" fill="#e2e8f0" text-anchor="middle">Operator A</text>
  <line x1="140" y1="42" x2="185" y2="42" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow-data)"/>
  <text x="163" y="36" font-size="10" fill="#3b82f6" text-anchor="middle">data</text>
  <rect x="190" y="35" width="110" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="245" y="55" font-size="11" fill="#94a3b8" text-anchor="middle">Operator B</text>
  <line x1="190" y1="70" x2="145" y2="70" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-back)"/>
  <text x="168" y="84" font-size="10" fill="#f97316" text-anchor="middle">block</text>
  <text x="170" y="102" font-size="10" fill="#94a3b8" text-anchor="middle">(Buffer full: 暂停上游)</text>
  <line x1="330" y1="15" x2="330" y2="118" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="530" y="22" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">Credit-based:</text>
  <rect x="390" y="35" width="110" height="32" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="445" y="55" font-size="11" fill="#e2e8f0" text-anchor="middle">Operator A</text>
  <line x1="500" y1="42" x2="545" y2="42" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow-data)"/>
  <text x="523" y="36" font-size="10" fill="#3b82f6" text-anchor="middle">data</text>
  <rect x="550" y="35" width="110" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="605" y="55" font-size="11" fill="#94a3b8" text-anchor="middle">Operator B</text>
  <line x1="550" y1="70" x2="505" y2="70" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-credit)"/>
  <text x="528" y="84" font-size="10" fill="#10b981" text-anchor="middle">credit</text>
  <text x="530" y="102" font-size="10" fill="#94a3b8" text-anchor="middle">(发credit: 控制上游发送速率)</text>
</svg>