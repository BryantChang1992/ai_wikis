<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" height="320">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascada Code','Courier New','Microsoft YaHei','SimHei',monospace; }
    .t1 { fill: #e2e8f0; font-size: 13px; font-weight: bold; }
    .t2 { fill: #e2e8f0; font-size: 12px; }
    .t3 { fill: #94a3b8; font-size: 11px; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="ad" markerWidth="6" markerHeight="8" refX="3" refY="7" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 3 8, 6 0" fill="#a855f7"/></marker>
  </defs>
  <rect width="680" height="320" fill="url(#bg)"/>
  <!-- TiDB SQL Layer -->
  <rect x="160" y="5" width="360" height="38" rx="6" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="340" y="27" class="t1" text-anchor="middle" dominant-baseline="middle">TiDB (SQL 层): 解析 → 优化 → 执行计划</text>
  <line x1="340" y1="43" x2="340" y2="63" stroke="#a855f7" stroke-width="1.5" marker-end="url(#ad)"/>
  <!-- TiKV outer -->
  <rect x="80" y="68" width="520" height="240" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="340" y="88" class="t1" text-anchor="middle" dominant-baseline="middle">TiKV (存储 + 事务)</text>
  <!-- Raft -->
  <rect x="100" y="98" width="480" height="32" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="340" y="116" class="t2" text-anchor="middle" dominant-baseline="middle">Raft 层: 多副本一致性</text>
  <!-- Percolator -->
  <rect x="100" y="140" width="480" height="55" rx="4" fill="#0f172a" stroke="#f97316" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="340" y="155" class="t2" text-anchor="middle" dominant-baseline="middle">Percolator 事务层</text>
  <rect x="120" y="162" width="220" height="24" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="230" y="176" class="t3" text-anchor="middle" dominant-baseline="middle">MVCC</text>
  <rect x="360" y="162" width="200" height="24" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="460" y="176" class="t3" text-anchor="middle" dominant-baseline="middle">2PC (客户端)</text>
  <!-- RocksDB -->
  <rect x="100" y="205" width="480" height="32" rx="4" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="340" y="223" class="t2" text-anchor="middle" dominant-baseline="middle">RocksDB (单机 KV 引擎)</text>
</svg>