<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 70" width="600" height="70">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascada Code','Courier New','Microsoft YaHei','SimHei',monospace; }
    .t1 { fill: #e2e8f0; font-size: 11px; }
    .t2 { fill: #94a3b8; font-size: 10px; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
