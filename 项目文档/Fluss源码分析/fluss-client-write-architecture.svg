<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 880">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif; }
    .title { font-size: 20px; font-weight: 700; fill: #111827; }
    .layer-label { font-size: 11px; fill: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
    .node-label { font-size: 14px; fill: #111827; font-weight: 600; }
    .node-sub { font-size: 11px; fill: #6b7280; }
    .node-box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 8; }
    .node-accent { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; rx: 8; }
    .layer-bg { fill: none; stroke: #e5e7eb; stroke-width: 1; stroke-dasharray: 6 4; rx: 8; }
    .legend-text { font-size: 12px; fill: #6b7280; }
  </style>

  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
  </defs>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" class="title">Fluss 客户端写入引擎 — 组件架构图</text>

  <!-- ===== LAYERS ===== -->
  <!-- App -->
  <rect x="30" y="52" width="1040" height="80" class="layer-bg"/>
  <text x="48" y="72" class="layer-label">APPLICATION</text>

  <!-- Table API -->
  <rect x="30" y="142" width="1040" height="100" class="layer-bg"/>
  <text x="48" y="162" class="layer-label">TABLE API</text>

  <!-- Write Engine -->
  <rect x="30" y="252" width="1040" height="300" class="layer-bg"/>
  <text x="48" y="272" class="layer-label">WRITE ENGINE</text>

  <!-- RPC -->
  <rect x="30" y="562" width="1040" height="66" class="layer-bg"/>
  <text x="48" y="582" class="layer-label">RPC TRANSPORT</text>

  <!-- Server -->
  <rect x="30" y="638" width="1040" height="110" class="layer-bg"/>
  <text x="48" y="658" class="layer-label">SERVER SIDE</text>

  <!-- ===== NODES ===== -->
  <!-- Col widths: L=190, C=210, R=190. Gaps: 60. Centers: L@155, C@495, R@825 -->
  <!-- APP LAYER -->
  <rect x="60"  y="68" width="190" height="48" class="node-box"/>
  <text x="155" y="90" text-anchor="middle" class="node-label">User Code</text>
  <text x="155" y="105" text-anchor="middle" class="node-sub">append() · flush()</text>

  <rect x="395" y="68" width="210" height="48" class="node-box"/>
  <text x="500" y="90" text-anchor="middle" class="node-label">Connection</text>
  <text x="500" y="105" text-anchor="middle" class="node-sub">FlussConnection</text>

  <rect x="730" y="68" width="190" height="48" class="node-box"/>
  <text x="825" y="90" text-anchor="middle" class="node-label">ConnectionFactory</text>
  <text x="825" y="105" text-anchor="middle" class="node-sub">bootstrap.servers → RpcClient</text>

  <!-- TABLE API LAYER -->
  <rect x="60"  y="162" width="190" height="64" class="node-box"/>
  <text x="155" y="186" text-anchor="middle" class="node-label">Table</text>
  <text x="155" y="202" text-anchor="middle" class="node-sub">FlussTable</text>
  <text x="155" y="216" text-anchor="middle" class="node-sub">conn.getTable(path)</text>

  <rect x="395" y="162" width="210" height="64" class="node-accent"/>
  <text x="500" y="186" text-anchor="middle" class="node-label">AppendWriterImpl</text>
  <text x="500" y="202" text-anchor="middle" class="node-sub">IndexedRow / Arrow encoder</text>
  <text x="500" y="216" text-anchor="middle" class="node-sub">append(row) → WriteRecord</text>

  <rect x="730" y="162" width="190" height="64" class="node-accent"/>
  <text x="825" y="186" text-anchor="middle" class="node-label">UpsertWriterImpl</text>
  <text x="825" y="202" text-anchor="middle" class="node-sub">KeyEncoder + RowEncoder</text>
  <text x="825" y="216" text-anchor="middle" class="node-sub">upsert(row, key) → WriteRecord</text>

  <!-- WRITE ENGINE Row 1 -->
  <rect x="395" y="272" width="210" height="60" class="node-accent"/>
  <text x="500" y="296" text-anchor="middle" class="node-label">WriterClient</text>
  <text x="500" y="312" text-anchor="middle" class="node-sub">doSend() · flush() · close()</text>
  <text x="500" y="326" text-anchor="middle" class="node-sub">全局写入协调中枢</text>

  <rect x="730" y="272" width="190" height="60" class="node-accent"/>
  <text x="825" y="296" text-anchor="middle" class="node-label">Sender (IO Thread)</text>
  <text x="825" y="312" text-anchor="middle" class="node-sub">单线程 · runOnce()</text>
  <text x="825" y="326" text-anchor="middle" class="node-sub">ready → drain → send → handle</text>

  <!-- WRITE ENGINE Row 2 -->
  <rect x="60"  y="362" width="190" height="60" class="node-box"/>
  <text x="155" y="386" text-anchor="middle" class="node-label">BucketAssigner</text>
  <text x="155" y="402" text-anchor="middle" class="node-sub">Hash / RoundRobin / Sticky</text>
  <text x="155" y="416" text-anchor="middle" class="node-sub">assignBucket() → bucketId</text>

  <rect x="395" y="362" width="210" height="60" class="node-box"/>
  <text x="500" y="386" text-anchor="middle" class="node-label">RecordAccumulator</text>
  <text x="500" y="402" text-anchor="middle" class="node-sub">Deque&lt;WriteBatch&gt; per bucket</text>
  <text x="500" y="416" text-anchor="middle" class="node-sub">Arrow memory pool · ready() · drain()</text>

  <rect x="730" y="362" width="190" height="60" class="node-box"/>
  <text x="825" y="386" text-anchor="middle" class="node-label">IdempotenceManager</text>
  <text x="825" y="402" text-anchor="middle" class="node-sub">writerId / batchSequence</text>
  <text x="825" y="416" text-anchor="middle" class="node-sub">inflight tracking</text>

  <!-- WRITE ENGINE Row 3 -->
  <rect x="395" y="452" width="210" height="60" class="node-box"/>
  <text x="500" y="476" text-anchor="middle" class="node-label">MetadataUpdater</text>
  <text x="500" y="492" text-anchor="middle" class="node-sub">Cluster · BucketLocation</text>
  <text x="500" y="506" text-anchor="middle" class="node-sub">coordinatorGateway · tabletServerGateway</text>

  <rect x="730" y="452" width="190" height="60" class="node-box"/>
  <text x="825" y="476" text-anchor="middle" class="node-label">DynamicPartitionCreator</text>
  <text x="825" y="492" text-anchor="middle" class="node-sub">checkAndCreatePartitionAsync()</text>
  <text x="825" y="506" text-anchor="middle" class="node-sub">异步分区创建 · inflight 去重</text>

  <!-- RPC TRANSPORT -->
  <rect x="395" y="578" width="210" height="44" class="node-box"/>
  <text x="500" y="598" text-anchor="middle" class="node-label">RpcClient (Netty)</text>
  <text x="500" y="614" text-anchor="middle" class="node-sub">TabletServerGateway · CoordinatorGateway</text>

  <!-- SERVER SIDE -->
  <rect x="395" y="670" width="210" height="56" class="node-accent"/>
  <text x="500" y="694" text-anchor="middle" class="node-label">TabletServer</text>
  <text x="500" y="710" text-anchor="middle" class="node-sub">ProduceLog / PutKv 处理</text>

  <rect x="730" y="670" width="190" height="56" class="node-box"/>
  <text x="825" y="694" text-anchor="middle" class="node-label">Coordinator</text>
  <text x="825" y="710" text-anchor="middle" class="node-sub">InitWriter · Metadata 存储</text>

  <!-- ===== ARROWS ===== -->

  <!-- ConnFactory → Connection -->
  <line x1="730" y1="92" x2="610" y2="92" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="670" y="86" text-anchor="middle" font-size="11" fill="#6b7280">create()</text>

  <!-- Connection → Table: down then left -->
  <path d="M 395 116 L 310 116 L 310 194 L 255 194" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#a1)"/>
  <text x="352" y="148" text-anchor="end" font-size="11" fill="#6b7280">getTable(path)</text>

  <!-- Table → AppendWriter -->
  <path d="M 250 194 L 390 194" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#a1)"/>
  <text x="320" y="188" text-anchor="middle" font-size="11" fill="#6b7280">.newAppend().createWriter()</text>

  <!-- Table → UpsertWriter -->
  <path d="M 250 194 L 725 194" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#a1)"/>
  <text x="488" y="188" text-anchor="middle" font-size="11" fill="#6b7280">.newUpsert().createWriter()</text>

  <!-- AppendWriter → WriterClient: down -->
  <line x1="500" y1="226" x2="500" y2="267" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="508" y="250" font-size="11" fill="#6b7280">send(record, cb)</text>

  <!-- UpsertWriter → WriterClient: down then left -->
  <path d="M 825 226 L 825 248 L 605 248 L 605 267" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#a1)"/>

  <!-- ===== WRITE ENGINE ARROWS ===== -->

  <!-- WriterClient → BucketAssigner: left -->
  <line x1="395" y1="302" x2="255" y2="302" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="325" y="296" text-anchor="middle" font-size="11" fill="#6b7280">assignBucket(key)</text>

  <!-- BucketAssigner → RecordAccumulator (via WriterClient): down-left then down -->
  <path d="M 155 422 L 155 432 L 500 432 L 500 422" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>
  <text x="328" y="426" text-anchor="middle" font-size="11" fill="#6b7280">bucketId used by append()</text>

  <!-- WriterClient → RecordAccumulator: down -->
  <line x1="500" y1="332" x2="500" y2="357" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="508" y="348" font-size="11" fill="#6b7280">append(record, cb, bucketId)</text>

  <!-- RecordAccumulator → Sender: right -->
  <path d="M 605 392 L 725 392 L 725 302" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#a1)"/>
  <text x="665" y="350" text-anchor="start" font-size="11" fill="#6b7280">drain() · batches by node</text>

  <!-- MetadataUpdater → Sender: left-up -->
  <path d="M 605 482 L 700 482 L 700 332" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>
  <text x="656" y="410" text-anchor="start" font-size="11" fill="#6b7280">getCluster()</text>

  <!-- IdempotenceManager → Sender: up -->
  <line x1="825" y1="362" x2="825" y2="337" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="833" y="352" font-size="11" fill="#6b7280">writerId · sequence</text>

  <!-- Sender → RpcClient: down -->
  <path d="M 825 332 L 825 550 L 605 550 L 605 573" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#a1)"/>
  <text x="715" y="565" text-anchor="middle" font-size="11" fill="#6b7280">ProduceLog / PutKv</text>

  <!-- RpcClient → TabletServer: down -->
  <line x1="500" y1="622" x2="500" y2="665" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- RpcClient → Coordinator: right-down -->
  <path d="M 605 600 L 825 600 L 825 665" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>
  <text x="715" y="594" text-anchor="middle" font-size="11" fill="#6b7280">initWriter · metadata query</text>

  <!-- WriterClient → MetadataUpdater: down -->
  <line x1="500" y1="332" x2="500" y2="447" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="508" y="395" font-size="11" fill="#6b7280">updateMetadata()</text>

  <!-- WriterClient → DynamicPartitionCreator: right-down -->
  <path d="M 605 302 L 825 302 L 825 447" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>
  <text x="715" y="378" text-anchor="middle" font-size="11" fill="#6b7280">checkAndCreatePartitionAsync()</text>

  <!-- DynamicPartitionCreator → RpcClient: left-down -->
  <path d="M 730 482 L 500 482 L 500 573" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>
  <text x="615" y="476" text-anchor="middle" font-size="11" fill="#6b7280">admin.createPartition()</text>

  <!-- Sender → WriterClient (async callback): left -->
  <path d="M 730 302 L 610 302" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#a3)"/>
  <text x="670" y="296" text-anchor="middle" font-size="11" fill="#6b7280">callback</text>

  <!-- ===== LEGEND ===== -->
  <rect x="60" y="670" width="210" height="88" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="78" y="694" font-size="12" font-weight="700" fill="#111827">图例</text>
  <line x1="78" y1="714" x2="118" y2="714" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="126" y="718" class="legend-text">数据流</text>
  <line x1="78" y1="738" x2="118" y2="738" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="126" y="742" class="legend-text">控制流 / 元数据</text>
  <line x1="168" y1="738" x2="208" y2="738" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a3)"/>
  <text x="216" y="742" class="legend-text">异步</text>
</svg>