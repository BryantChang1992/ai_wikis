<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
<style>
  text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
</style>
<defs>
  <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f0f1a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
  <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/></marker>
  <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 8 3, 0 6" fill="#10b981"/></marker>
  <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 8 3, 0 6" fill="#a855f7"/></marker>
  <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 8 3, 0 6" fill="#ef4444"/></marker>
  <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 8 3, 0 6" fill="#f97316"/></marker>
</defs>
<rect width="960" height="540" fill="url(#bg-grad)"/>

<text x="480" y="28" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Fluss KV 子系统 · Write-Once Read-Multiple 架构</text>
<text x="480" y="48" font-size="11" fill="#94a3b8" text-anchor="middle">WAL 复用 Changelog LogTablet · Snapshot 全链路 · RowMerger 四种策略</text>

<!-- Top: Management chain -->
<rect x="130" y="68" width="180" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
<text x="220" y="92" font-size="13" font-weight="bold" fill="#60a5fa" text-anchor="middle">KvManager</text>
<line x1="310" y1="87" x2="370" y2="87" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

<rect x="375" y="68" width="180" height="38" rx="6" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
<text x="465" y="92" font-size="13" font-weight="bold" fill="#34d399" text-anchor="middle">KvTablet</text>
<line x1="555" y1="87" x2="615" y2="87" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

<rect x="620" y="68" width="180" height="38" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
<text x="710" y="92" font-size="13" font-weight="bold" fill="#c084fc" text-anchor="middle">RocksDBKv</text>

<!-- WAL Design Panel -->
<rect x="20" y="122" width="920" height="130" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="480" y="146" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">WAL 设计: Write-Once Read-Multiple</text>

<!-- Write path -->
<text x="220" y="176" font-size="11" font-weight="bold" fill="#94a3b8" text-anchor="middle">写入路径</text>
<rect x="50" y="188" width="140" height="34" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
<text x="120" y="210" font-size="11" fill="#e2e8f0" text-anchor="middle">putKv(row)</text>
<line x1="190" y1="205" x2="250" y2="205" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)"/>
<rect x="255" y="188" width="120" height="34" rx="6" fill="#052e16" stroke="#10b981" stroke-width="1"/>
<text x="315" y="210" font-size="11" fill="#10b981" text-anchor="middle">RocksDB SST</text>
<text x="315" y="180" font-size="9" fill="#10b981" text-anchor="middle">+ 同时写入</text>
<text x="120" y="240" font-size="9" fill="#f97316" text-anchor="middle">changelog LogTablet (WAL)</text>

<!-- Recovery path -->
<text x="700" y="176" font-size="11" font-weight="bold" fill="#94a3b8" text-anchor="middle">恢复路径</text>
<rect x="580" y="188" width="120" height="34" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1"/>
<text x="640" y="210" font-size="11" fill="#f97316" text-anchor="middle">故障恢复</text>
<line x1="700" y1="205" x2="750" y2="205" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
<rect x="755" y="188" width="140" height="34" rx="6" fill="#3b0a0a" stroke="#ef4444" stroke-width="1"/>
<text x="825" y="210" font-size="11" fill="#ef4444" text-anchor="middle">重放 LogTablet</text>
<text x="825" y="240" font-size="10" fill="#64748b" text-anchor="middle">非 WAL 文件! 复用 Changelog</text>

<!-- Core Components Panel -->
<rect x="20" y="268" width="450" height="250" rx="6" fill="#052e16" stroke="#059669" stroke-width="1"/>
<text x="245" y="292" font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle">核心组件</text>
<text x="40" y="320" font-size="11" fill="#e2e8f0">├ WalBuilder (3 种格式)</text>
<text x="55" y="338" font-size="10" fill="#94a3b8">Arrow / Compacted / IndexWalBuilder</text>
<text x="40" y="358" font-size="11" fill="#e2e8f0">├ PeriodicSnapshotManager</text>
<text x="55" y="376" font-size="10" fill="#94a3b8">定时触发 → RocksIncrementalSnapshot</text>
<text x="55" y="394" font-size="10" fill="#94a3b8">→ Uploader → Committer</text>
<text x="40" y="414" font-size="11" fill="#e2e8f0">├ RowMerger (4 种策略)</text>
<text x="55" y="432" font-size="10" fill="#94a3b8">Default / FirstRow / Versioned / Aggregate</text>
<text x="40" y="452" font-size="11" fill="#e2e8f0">├ PartialUpdater（部分列更新）</text>
<text x="40" y="472" font-size="11" fill="#e2e8f0">├ AutoIncrementManager（自增 ID）</text>
<text x="40" y="492" font-size="11" fill="#e2e8f0">└ KvPreWriteBuffer（预写缓冲）</text>

<!-- Snapshot Pipeline Panel -->
<rect x="490" y="268" width="450" height="250" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
<text x="715" y="292" font-size="13" font-weight="bold" fill="#60a5fa" text-anchor="middle">Snapshot 全链路 (~30 个类)</text>
<rect x="510" y="308" width="410" height="28" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
<text x="715" y="327" font-size="11" fill="#e2e8f0" text-anchor="middle">① PeriodicSnapshot → 定时触发</text>
<line x1="715" y1="336" x2="715" y2="350" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arr-blue)"/>
<rect x="510" y="354" width="410" height="28" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
<text x="715" y="373" font-size="11" fill="#e2e8f0" text-anchor="middle">② RocksIncrementalSnapshot → SST 增量导出</text>
<line x1="715" y1="382" x2="715" y2="396" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arr-blue)"/>
<rect x="510" y="400" width="410" height="28" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
<text x="715" y="419" font-size="11" fill="#e2e8f0" text-anchor="middle">③ KvSnapshotUploader → S3 / HDFS 上传</text>
<line x1="715" y1="428" x2="715" y2="442" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arr-blue)"/>
<rect x="510" y="446" width="410" height="28" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
<text x="715" y="465" font-size="11" fill="#e2e8f0" text-anchor="middle">④ KvSnapshotCommitter → 全局提交</text>

<text x="715" y="500" font-size="10" fill="#64748b" text-anchor="middle">变更 SST 仅上传一次 · ZK 记录 Snapshot 元数据</text></svg>
