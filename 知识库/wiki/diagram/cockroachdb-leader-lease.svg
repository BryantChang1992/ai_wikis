<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" width="820" height="430">
  <style>
    text { font-family: "Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei","Microsoft JhengHei","SimHei",sans-serif; }
  </style>
  <defs>
    <marker id="a-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="820" height="430" fill="#ffffff"/>
  <text x="30" y="32" fill="#111827" font-size="16" font-weight="700">CockroachDB Leader-Lease Architecture</text>
  <text x="30" y="50" fill="#6b7280" font-size="11">Multi-range scalable lease: 10K+ ranges with efficient leader election</text>
  <text x="30" y="82" fill="#2563eb" font-size="12" font-weight="700">Raft Foundation</text>
  <rect x="30" y="98" width="210" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="135" y="118" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Node A (Leader)</text>
  <text x="135" y="130" fill="#6b7280" font-size="9" text-anchor="middle">propose</text>
  <rect x="270" y="98" width="210" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="375" y="118" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Node B (Follower)</text>
  <text x="375" y="130" fill="#6b7280" font-size="9" text-anchor="middle">replicate</text>
  <rect x="510" y="98" width="210" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="615" y="118" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Node C (Follower)</text>
  <text x="615" y="130" fill="#6b7280" font-size="9" text-anchor="middle">ack</text>
  <text x="30" y="168" fill="#16a34a" font-size="12" font-weight="700">Lease Mechanism</text>
  <rect x="30" y="186" width="370" height="68" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="215" y="208" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Range Lease</text>
  <text x="215" y="228" fill="#6b7280" font-size="9" text-anchor="middle">time-bounded lease for key range</text>
  <rect x="430" y="186" width="370" height="68" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="615" y="208" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Range Gossip</text>
  <text x="615" y="228" fill="#6b7280" font-size="9" text-anchor="middle">lease status via gossip</text>
  <text x="30" y="284" fill="#9333ea" font-size="12" font-weight="700">Multi-range Scaling</text>
  <rect x="30" y="300" width="180" height="44" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="120" y="320" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Range A</text>
  <text x="120" y="338" fill="#6b7280" font-size="9" text-anchor="middle">holder: N1</text>
  <rect x="230" y="300" width="180" height="44" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="320" y="320" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Range B</text>
  <text x="320" y="338" fill="#6b7280" font-size="9" text-anchor="middle">holder: N2</text>
  <rect x="430" y="300" width="180" height="44" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="520" y="320" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Range C</text>
  <text x="520" y="338" fill="#6b7280" font-size="9" text-anchor="middle">holder: N3</text>
  <rect x="630" y="300" width="180" height="44" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="720" y="320" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Range D</text>
  <text x="720" y="338" fill="#6b7280" font-size="9" text-anchor="middle">holder: N1</text>
  <text x="30" y="370" fill="#f97316" font-size="12" font-weight="700">Benefit: Load distribution → each node is leader for ~1/3 of ranges</text>
  <rect x="30" y="384" width="760" height="32" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="410" y="405" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">Query routing to leaseholder avoids multi-hop Raft reads</text>
</svg>
