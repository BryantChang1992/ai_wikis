<svg viewBox="0 0 750 230" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-down" markerWidth="7" markerHeight="10" refX="3.5" refY="9" orient="auto" overflow="visible">
      <polygon points="0 0, 3.5 10, 7 0" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="375" y="24" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">流处理弹性扩缩容决策流程</text>

  <!-- ===== Top row: Process steps ===== -->
  <!-- Step 1 -->
  <rect x="20" y="38" width="118" height="42" rx="8" fill="#0f172a"/>
  <rect x="20" y="38" width="118" height="42" rx="8" fill="rgba(59,130,246,0.35)" stroke="#60a5fa" stroke-width="2"/>
  <text x="79" y="62" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">症状检测</text>

  <!-- Arrow 1→2 -->
  <line x1="138" y1="59" x2="160" y2="59" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Step 2 -->
  <rect x="166" y="38" width="118" height="42" rx="8" fill="#0f172a"/>
  <rect x="166" y="38" width="118" height="42" rx="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
  <text x="225" y="62" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">根因分析</text>

  <!-- Arrow 2→3 -->
  <line x1="284" y1="59" x2="306" y2="59" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Step 3 -->
  <rect x="312" y="38" width="118" height="42" rx="8" fill="#0f172a"/>
  <rect x="312" y="38" width="118" height="42" rx="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
  <text x="371" y="62" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">扩缩容决策</text>

  <!-- Arrow 3→4 -->
  <line x1="430" y1="59" x2="452" y2="59" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Step 4 -->
  <rect x="458" y="38" width="118" height="42" rx="8" fill="#0f172a"/>
  <rect x="458" y="38" width="118" height="42" rx="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
  <text x="517" y="62" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">执行重新分配</text>

  <!-- Arrow 4→5 -->
  <line x1="576" y1="59" x2="598" y2="59" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Step 5 -->
  <rect x="604" y="38" width="118" height="42" rx="8" fill="#0f172a"/>
  <rect x="604" y="38" width="118" height="42" rx="8" fill="rgba(34,211,238,0.3)" stroke="#22d3ee" stroke-width="2"/>
  <text x="663" y="62" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">验证</text>

  <!-- ===== Vertical arrows down ===== -->
  <line x1="79" y1="80" x2="79" y2="108" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-down)"/>
  <line x1="225" y1="80" x2="225" y2="108" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-down)"/>
  <line x1="371" y1="80" x2="371" y2="108" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-down)"/>
  <line x1="517" y1="80" x2="517" y2="108" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-down)"/>
  <line x1="663" y1="80" x2="663" y2="108" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-down)"/>

  <!-- ===== Bottom row: Details ===== -->
  <!-- Detail 1 -->
  <rect x="20" y="112" width="118" height="52" rx="6" fill="#0f172a"/>
  <rect x="20" y="112" width="118" height="52" rx="6" fill="rgba(59,130,246,0.15)" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="79" y="135" fill="#94a3b8" font-size="10" text-anchor="middle">背压信号</text>
  <text x="79" y="151" fill="#64748b" font-size="10" text-anchor="middle">延迟升高</text>

  <!-- Detail 2 -->
  <rect x="166" y="112" width="118" height="52" rx="6" fill="#0f172a"/>
  <rect x="166" y="112" width="118" height="52" rx="6" fill="rgba(59,130,246,0.15)" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="225" y="135" fill="#94a3b8" font-size="10" text-anchor="middle">数据倾斜</text>
  <text x="225" y="151" fill="#64748b" font-size="10" text-anchor="middle">热点识别</text>

  <!-- Detail 3 -->
  <rect x="312" y="112" width="118" height="52" rx="6" fill="#0f172a"/>
  <rect x="312" y="112" width="118" height="52" rx="6" fill="rgba(59,130,246,0.15)" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="371" y="135" fill="#94a3b8" font-size="10" text-anchor="middle">增加 / 减少</text>
  <text x="371" y="151" fill="#64748b" font-size="10" text-anchor="middle">并行度</text>

  <!-- Detail 4 -->
  <rect x="458" y="112" width="118" height="52" rx="6" fill="#0f172a"/>
  <rect x="458" y="112" width="118" height="52" rx="6" fill="rgba(59,130,246,0.15)" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="517" y="135" fill="#94a3b8" font-size="10" text-anchor="middle">状态迁移</text>
  <text x="517" y="151" fill="#64748b" font-size="10" text-anchor="middle">流水线重启</text>

  <!-- Detail 5 -->
  <rect x="604" y="112" width="118" height="52" rx="6" fill="#0f172a"/>
  <rect x="604" y="112" width="118" height="52" rx="6" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="663" y="135" fill="#94a3b8" font-size="10" text-anchor="middle">延迟 / 吞吐</text>
  <text x="663" y="151" fill="#64748b" font-size="10" text-anchor="middle">恢复正常?</text>

  <!-- Legend -->
  <text x="375" y="205" fill="#475569" font-size="9" text-anchor="middle">弹性决策循环 · Elasticity Decision Loop</text>
</svg>