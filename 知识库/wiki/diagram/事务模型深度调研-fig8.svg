<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a6" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto"><path d="M0,0 L3,8 L6,0 Z" fill="currentColor"/></marker>
  </defs>
  <!-- Phase 1 -->
  <rect x="20" y="10" width="620" height="75" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="330" y="32" font-family="sans-serif" font-size="14" font-weight="bold" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Phase 1: Sequencing（排序层）</text>
  <text x="330" y="52" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">所有事务请求汇聚到 Sequencer，分配全局唯一顺序（批处理），广播到所有 Scheduler</text>
  <line x1="330" y1="85" x2="330" y2="105" stroke="currentColor" stroke-width="2" marker-end="url(#a6)"/>
  <!-- Phase 2 -->
  <rect x="20" y="110" width="620" height="75" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="330" y="132" font-family="sans-serif" font-size="14" font-weight="bold" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Phase 2: Scheduling（调度层）</text>
  <text x="330" y="152" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">每个分区独立按全局顺序执行事务。顺序确定 + 代码确定性 → 所有副本产生相同结果</text>
  <text x="330" y="170" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">无需 2PC！多分区事务直接以相同顺序在各分区执行</text>
  <line x1="330" y1="185" x2="330" y2="205" stroke="currentColor" stroke-width="2" marker-end="url(#a6)"/>
  <!-- Phase 3 -->
  <rect x="20" y="210" width="620" height="60" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="330" y="232" font-family="sans-serif" font-size="14" font-weight="bold" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Phase 3: Storage（存储层）</text>
  <text x="330" y="252" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">每个分区的存储节点持久化结果，确定性执行保证多副本一致</text>
</svg>