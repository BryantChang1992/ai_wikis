  <rect x="30" y="424" width="195" height="40" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="128" y="442" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Columnar Storage</text>
  <text x="128" y="456" fill="#94a3b8" font-size="9" text-anchor="middle">Arrow/Parquet</text>
  <rect x="245" y="424" width="195" height="40" rx="8" fill="#0f172a"/>
  <rect x="245" y="424" width="195" height="40" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="343" y="442" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Query Federation</text>
  <text x="343" y="456" fill="#94a3b8" font-size="9" text-anchor="middle">Unified SQL</text>
  <rect x="460" y="424" width="195" height="40" rx="8" fill="#0f172a"/>
  <rect x="460" y="424" width="195" height="40" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="558" y="442" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">S3/Tiered Store</text>
  <text x="558" y="456" fill="#94a3b8" font-size="9" text-anchor="middle">∞ scale</text>
  <rect x="675" y="424" width="195" height="40" rx="8" fill="#0f172a"/>
  <rect x="675" y="424" width="195" height="40" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="773" y="442" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Real-Time</text>
  <text x="773" y="456" fill="#94a3b8" font-size="9" text-anchor="middle">stream/materialize</text>
