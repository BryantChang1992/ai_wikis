<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" width="680" height="280">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascada Code','Courier New','Microsoft YaHei','SimHei',monospace; }
    .t1 { fill: #e2e8f0; font-size: 13px; font-weight: bold; }
    .t2 { fill: #e2e8f0; font-size: 13px; }
    .t3 { fill: #94a3b8; font-size: 11px; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a855f7"/></marker>
    <marker id="ad" markerWidth="6" markerHeight="8" refX="3" refY="7" orient="auto"><polygon points="0 0, 3 8, 6 0" fill="#a855f7"/></marker>
      <marker id="arrow-a855f7" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>
  <rect width="680" height="280" fill="url(#bg)"/>
  <text x="10" y="22" class="t1">生产者流程:</text>
  <!-- Step 1 -->
  <rect x="10" y="32" width="170" height="38" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="95" y="53" class="t2" text-anchor="middle" dominant-baseline="middle">1. 发送半消息</text>
  <line x1="180" y1="51" x2="250" y2="51" stroke="#a855f7" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="260" y="32" width="180" height="38" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="350" y="53" class="t2" text-anchor="middle" dominant-baseline="middle">Broker (消息不可见)</text>
  <!-- Arrow down -->
  <line x1="95" y1="70" x2="95" y2="88" stroke="#a855f7" stroke-width="1.5" marker-end="url(#ad)"/>
  <!-- Step 2 -->
  <rect x="10" y="93" width="170" height="38" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="95" y="114" class="t2" text-anchor="middle" dominant-baseline="middle">2. 执行本地事务</text>
  <!-- Branch -->
  <line x1="95" y1="131" x2="95" y2="145" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-a855f7)"/>
  <line x1="25" y1="145" x2="165" y2="145" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-a855f7)"/>
  <line x1="25" y1="145" x2="25" y2="160" stroke="#10b981" stroke-width="1.5" marker-end="url(#ad)"/>
  <line x1="165" y1="145" x2="165" y2="160" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ad)"/>
  <rect x="-25" y="165" width="100" height="30" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="25" y="182" class="t2" text-anchor="middle" dominant-baseline="middle">Commit</text>
  <rect x="135" y="165" width="80" height="30" rx="6" fill="#1c1917" stroke="#dc2626" stroke-width="1.5"/>
  <text x="175" y="182" class="t2" text-anchor="middle" dominant-baseline="middle">Rollback</text>
  <line x1="25" y1="195" x2="25" y2="210" stroke="#10b981" stroke-width="1.5" marker-end="url(#ad)"/>
  <line x1="175" y1="195" x2="175" y2="210" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ad)"/>
  <text x="25" y="225" class="t3">消息可见</text>
  <text x="175" y="225" class="t3">消息删除</text>
  <!-- Broker 回查 -->
  <rect x="240" y="180" width="220" height="68" rx="6" fill="#0f172a" stroke="#f97316" stroke-width="1.5"/>
  <text x="350" y="200" class="t2" text-anchor="middle" dominant-baseline="middle">3. Broker 定期回查</text>
  <text x="350" y="218" class="t3" text-anchor="middle" dominant-baseline="middle">→ 调用 Producer check</text>
  <text x="350" y="234" class="t3" text-anchor="middle" dominant-baseline="middle">→ 决定 Commit／Rollback</text>
</svg>