  <text x="106" y="422" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">LSM-Tree</text>
  <rect x="196" y="400" width="152" height="34" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="272" y="422" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">Compaction</text>
  <rect x="362" y="400" width="152" height="34" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="438" y="422" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">RUM Conjecture</text>
  <rect x="528" y="400" width="152" height="34" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="604" y="422" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">Write Amp</text>
  <rect x="694" y="400" width="152" height="34" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="770" y="422" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">Auto-Tune</text>
  <rect x="30" y="442" width="152" height="34" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="106" y="464" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">Silo</text>
  <rect x="196" y="442" width="152" height="34" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="272" y="464" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">Fluss WAL</text>
  <rect x="362" y="442" width="152" height="34" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="438" y="464" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">RocksDB</text>
  <rect x="528" y="442" width="152" height="34" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="604" y="464" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">Index</text>
  <rect x="694" y="442" width="152" height="34" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="770" y="464" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">HW Adapt</text>
  <g transform="translate(30, 492)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
