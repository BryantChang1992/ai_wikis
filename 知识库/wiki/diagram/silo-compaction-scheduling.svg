<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" width="820" height="470">
  <style>
    text { font-family: "Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei","Microsoft JhengHei","SimHei",sans-serif; }
  </style>
  <defs>
    <marker id="a-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="a-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="820" height="470" fill="#ffffff"/>
  <text x="30" y="32" fill="#111827" font-size="16" font-weight="700">Silo — Distributed LSM Compaction Scheduler (FAST 2026)</text>
  <text x="30" y="50" fill="#6b7280" font-size="11">From per-node independent compaction to global scheduling with SST migration</text>
  <text x="30" y="82" fill="#dc2626" font-size="12" font-weight="700">Problem: Per-Node Compaction</text>
  <rect x="30" y="96" width="220" height="40" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="140" y="116" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Node N</text>
  <text x="140" y="128" fill="#6b7280" font-size="9" text-anchor="middle">hot spot</text>
  <rect x="280" y="96" width="220" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="390" y="116" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Node M</text>
  <text x="390" y="128" fill="#6b7280" font-size="9" text-anchor="middle">idle</text>
  <rect x="530" y="96" width="220" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="640" y="116" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Node K</text>
  <text x="640" y="128" fill="#6b7280" font-size="9" text-anchor="middle">light load</text>
  <line x1="410" y1="138" x2="410" y2="166" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <text x="420" y="160" fill="#2563eb" font-size="9">central scheduling</text>
  <text x="30" y="186" fill="#2563eb" font-size="12" font-weight="700">Silo Architecture</text>
  <rect x="30" y="204" width="180" height="72" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="120" y="224" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Global Planner</text>
  <text x="120" y="244" fill="#6b7280" font-size="8" text-anchor="middle">tracks all LSM trees</text>
  <text x="120" y="258" fill="#6b7280" font-size="8" text-anchor="middle">priority scheduling</text>
  <rect x="230" y="204" width="180" height="72" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="320" y="224" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">SST Migration</text>
  <text x="320" y="244" fill="#6b7280" font-size="8" text-anchor="middle">migrate SSTs to</text>
  <text x="320" y="258" fill="#6b7280" font-size="8" text-anchor="middle">target merge node</text>
  <rect x="430" y="204" width="180" height="72" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="520" y="224" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Anti-Hog</text>
  <text x="520" y="244" fill="#6b7280" font-size="8" text-anchor="middle">detect hog nodes</text>
  <text x="520" y="258" fill="#6b7280" font-size="8" text-anchor="middle">rate-limit compaction</text>
  <rect x="630" y="204" width="180" height="72" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="720" y="224" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Pro-Hog</text>
  <text x="720" y="244" fill="#6b7280" font-size="8" text-anchor="middle">proactive compact</text>
  <text x="720" y="258" fill="#6b7280" font-size="8" text-anchor="middle">write-heavy nodes</text>
  <text x="30" y="318" fill="#16a34a" font-size="12" font-weight="700">Key Results</text>
  <rect x="30" y="336" width="180" height="44" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="120" y="358" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Write Amp ↓</text>
  <text x="120" y="372" fill="#6b7280" font-size="9" text-anchor="middle">~30%</text>
  <rect x="230" y="336" width="180" height="44" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="320" y="358" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Throughput ↑</text>
  <text x="320" y="372" fill="#6b7280" font-size="9" text-anchor="middle">~2× on skew</text>
  <rect x="430" y="336" width="180" height="44" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="520" y="358" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Tail Lat ↓</text>
  <text x="520" y="372" fill="#6b7280" font-size="9" text-anchor="middle">P99 drop</text>
  <rect x="630" y="336" width="180" height="44" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="720" y="358" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Balance</text>
  <text x="720" y="372" fill="#6b7280" font-size="9" text-anchor="middle">CPU even</text>
  <text x="30" y="410" fill="#9333ea" font-size="12" font-weight="700">Integration: Lease-based HA for coordinator failover</text>
  <rect x="30" y="424" width="760" height="32" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="410" y="445" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">Lease protocol → central coordinator fails over without data loss</text>
</svg>
