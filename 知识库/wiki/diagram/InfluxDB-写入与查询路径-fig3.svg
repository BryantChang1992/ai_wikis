  <text x="125" y="56" font-size="12" fill="#a855f7" text-anchor="middle" dominant-baseline="central">InfluxQL / Flux Query</text>
  <!-- Arrow -->
  <line x1="230" y1="56" x2="258" y2="56" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <!-- Steps -->
  <text x="268" y="56" font-size="12" fill="#e2e8f0" dominant-baseline="central">├──</text>
  <rect x="288" y="43" width="280" height="22" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="428" y="54" font-size="11" fill="#c4b5fd" text-anchor="middle" dominant-baseline="central">① Parse &amp; Validate → AST</text>
  <line x1="272" y1="68" x2="272" y2="82" stroke="#334155" stroke-width="1"/>
  <text x="268" y="82" font-size="12" fill="#e2e8f0" dominant-baseline="central">├──</text>
  <rect x="288" y="69" width="440" height="22" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="508" y="80" font-size="11" fill="#c4b5fd" text-anchor="middle" dominant-baseline="central">② TSI Index Lookup: Measurement+Tag → Series IDs → Shards</text>
  <line x1="272" y1="94" x2="272" y2="108" stroke="#334155" stroke-width="1"/>
  <text x="268" y="108" font-size="12" fill="#e2e8f0" dominant-baseline="central">└──</text>
  <rect x="288" y="95" width="470" height="22" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="523" y="106" font-size="11" fill="#c4b5fd" text-anchor="middle" dominant-baseline="central">③ TSM File Scan (Merge from Cache + WAL + TSM Files)</text>
