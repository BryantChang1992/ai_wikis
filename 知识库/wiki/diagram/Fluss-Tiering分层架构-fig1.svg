<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 170" width="680" height="170">
<defs>
  <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f0f1a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
  <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/></marker>
</defs>
<style>text{font-family:'SF Mono','Fira Code','Cascadia Code','Courier New','Microsoft YaHei','SimHei',monospace}</style>
<rect width="680" height="170" fill="url(#bg-grad)"/>
<text x="10" y="18" font-size="13" fill="#e2e8f0" font-weight="bold">Fluss 数据生命周期:</text>
<rect x="20" y="26" width="200" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
<text x="120" y="47" font-size="12" fill="#60a5fa" text-anchor="middle">实时写入 (ms 级)</text>
<line x1="220" y1="42" x2="248" y2="42" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="252" y="18" width="240" height="36" rx="6" fill="#052e16" stroke="#10b981" stroke-width="1"/>
<text x="372" y="31" font-size="11" fill="#34d399" text-anchor="middle">Fluss Tablet</text>
<text x="372" y="47" font-size="9" fill="#10b981" text-anchor="middle">(本地 Log+KV, ms 级读写, OLTP 级)</text>
<line x1="120" y1="58" x2="120" y2="76" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="20" y="80" width="270" height="30" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1"/>
<text x="155" y="100" font-size="11" fill="#c084fc" text-anchor="middle">Tiering 作业（分钟级异步分层）</text>
<line x1="290" y1="95" x2="320" y2="95" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="324" y="76" width="220" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
<text x="434" y="90" font-size="11" fill="#60a5fa" text-anchor="middle">Lakehouse</text>
<text x="434" y="106" font-size="9" fill="#94a3b8" text-anchor="middle">(Parquet/Arrow, OLAP 级)</text>
<line x1="372" y1="114" x2="372" y2="132" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="180" y="136" width="260" height="24" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="0.8"/>
<text x="310" y="153" font-size="10" fill="#64748b" text-anchor="middle">本地 segment 可被 GC（释放磁盘空间）</text>
</svg>