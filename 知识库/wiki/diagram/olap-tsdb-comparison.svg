  <text x="660" y="176" fill="#94a3b8" font-size="9" text-anchor="middle">time-ordered append</text>
  <rect x="470" y="192" width="380" height="40" rx="8" fill="#0f172a"/>
  <rect x="470" y="192" width="380" height="40" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
