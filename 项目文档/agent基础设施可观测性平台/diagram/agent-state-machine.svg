<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 680">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="38" fill="white" font-size="16" font-weight="700">Agent 任务状态机</text>

  <!-- Pending state -->
  <rect x="260" y="70" width="220" height="60" rx="10" fill="#0f172a"/>
  <rect x="260" y="70" width="220" height="60" rx="10" fill="rgba(59,130,246,0.2)" stroke="#60a5fa" stroke-width="2"/>
  <text x="370" y="97" fill="white" font-size="14" font-weight="600" text-anchor="middle">pending</text>
  <text x="370" y="115" fill="#94a3b8" font-size="9" text-anchor="middle">等待开始</text>

  <!-- In Progress state -->
  <rect x="260" y="200" width="220" height="70" rx="10" fill="#0f172a"/>
  <rect x="260" y="200" width="220" height="70" rx="10" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="2"/>
  <text x="370" y="227" fill="#22d3ee" font-size="14" font-weight="600" text-anchor="middle">in_progress</text>
  <text x="370" y="247" fill="#94a3b8" font-size="9" text-anchor="middle">执行中</text>
  <text x="370" y="261" fill="#64748b" font-size="8" text-anchor="middle">Agent 自主上报 · Supervisor 监控</text>

  <!-- Arrow: pending → in_progress -->
  <line x1="370" y1="130" x2="370" y2="198" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="382" y="160" fill="#60a5fa" font-size="8">start</text>

  <!-- Done state -->
  <rect x="80" y="370" width="180" height="60" rx="10" fill="#0f172a"/>
  <rect x="80" y="370" width="180" height="60" rx="10" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="2"/>
  <text x="170" y="397" fill="#34d399" font-size="14" font-weight="600" text-anchor="middle">done</text>
  <text x="170" y="415" fill="#94a3b8" font-size="9" text-anchor="middle">完成 · 终态</text>

  <!-- Failed state -->
  <rect x="490" y="370" width="180" height="60" rx="10" fill="#0f172a"/>
  <rect x="490" y="370" width="180" height="60" rx="10" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="2"/>
  <text x="580" y="397" fill="#fb7185" font-size="14" font-weight="600" text-anchor="middle">failed</text>
  <text x="580" y="415" fill="#94a3b8" font-size="9" text-anchor="middle">失败</text>

  <!-- Blocked state -->
  <rect x="260" y="370" width="220" height="60" rx="10" fill="#0f172a"/>
  <rect x="260" y="370" width="220" height="60" rx="10" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>
  <text x="370" y="397" fill="#fbbf24" font-size="14" font-weight="600" text-anchor="middle">blocked</text>
  <text x="370" y="415" fill="#94a3b8" font-size="9" text-anchor="middle">阻塞 · 需外部输入</text>

  <!-- Arrow: in_progress → done -->
  <path d="M 260,230 L 130,230 L 130,368" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="132" y="295" fill="#34d399" font-size="8">success</text>

  <!-- Arrow: in_progress → failed -->
  <path d="M 480,230 L 610,230 L 610,368" fill="none" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="612" y="295" fill="#fb7185" font-size="8">error</text>

  <!-- Arrow: in_progress → blocked -->
  <line x1="370" y1="270" x2="370" y2="368" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="382" y="315" fill="#fbbf24" font-size="8">block</text>

  <!-- Arrow: blocked → in_progress -->
  <path d="M 480,400 L 530,400 L 530,235 L 482,235" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <text x="532" y="320" fill="#22d3ee" font-size="8">resume</text>

  <!-- Arrow: failed → pending (retry) -->
  <path d="M 490,390 L 30,390 L 30,100 L 258,100" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <text x="32" y="245" fill="#60a5fa" font-size="8">retry（用户触发）</text>

  <!-- Cancelled state (smaller) -->
  <rect x="80" y="500" width="140" height="45" rx="8" fill="#0f172a"/>
  <rect x="80" y="500" width="140" height="45" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="150" y="520" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle">cancelled</text>
  <text x="150" y="536" fill="#64748b" font-size="8" text-anchor="middle">取消</text>

  <!-- Arrow: pending → cancelled -->
  <path d="M 260,100 L 160,100 L 160,498" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-slate)"/>
  <!-- Arrow: blocked → cancelled -->
  <line x1="260" y1="522" x2="222" y2="522" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-slate)"/>

  <!-- Stale / Stuck area (detected by Supervisor) -->
  <rect x="370" y="500" width="340" height="45" rx="8" fill="rgba(136,19,55,0.1)" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="540" y="520" fill="#fb7185" font-size="10" font-weight="500" text-anchor="middle">stuck / stale — Supervisor 对账发现</text>
  <text x="540" y="536" fill="#94a3b8" font-size="8" text-anchor="middle">30min 无 tool call · 上报与事实不符</text>

  <!-- Arrow: stuck → done -->
  <line x1="370" y1="522" x2="262" y2="522" stroke="#34d399" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- Arrow: stuck → failed -->
  <path d="M 540,500 L 540,460 L 540,432" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>

  <!-- Initial state -->
  <circle cx="370" cy="58" r="8" fill="#60a5fa"/>
  <line x1="370" y1="66" x2="370" y2="68" stroke="#60a5fa" stroke-width="2"/>

  <!-- Legend -->
  <rect x="20" y="590" width="720" height="70" rx="8" fill="rgba(30,41,59,0.5)"/>
  <text x="40" y="612" fill="white" font-size="11" font-weight="600">图例</text>

  <rect x="40" y="625" width="12" height="12" rx="2" fill="rgba(59,130,246,0.2)" stroke="#60a5fa" stroke-width="1"/>
  <text x="58" y="635" fill="#94a3b8" font-size="9">pending</text>

  <rect x="140" y="625" width="12" height="12" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="158" y="635" fill="#94a3b8" font-size="9">执行中</text>

  <rect x="240" y="625" width="12" height="12" rx="2" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1"/>
  <text x="258" y="635" fill="#94a3b8" font-size="9">终态</text>

  <rect x="320" y="625" width="12" height="12" rx="2" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="338" y="635" fill="#94a3b8" font-size="9">异常</text>

  <rect x="400" y="625" width="12" height="12" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="418" y="635" fill="#94a3b8" font-size="9">阻塞</text>

  <line x1="500" y1="631" x2="540" y2="631" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <text x="548" y="635" fill="#94a3b8" font-size="9">正常流转</text>

  <line x1="640" y1="631" x2="680" y2="631" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="688" y="635" fill="#94a3b8" font-size="9">Supervisor 纠正 / 重试</text>
</svg>