  <text x="440" y="158" fill="#9333ea" font-size="9">extend to distributed</text>
  <text x="30" y="188" fill="#9333ea" font-size="12" font-weight="700">02 // DISTRIBUTED EXTENSIONS</text>
  <text x="30" y="212" fill="#dc2626" font-size="12" font-weight="700">Silo (FAST 2026) — Global Compaction Scheduler</text>
