<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500">
<style>
  text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
</style>
<defs>
  <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0f0f1a"/>
    <stop offset="100%" stop-color="#1a1a2e"/>
  </linearGradient>
  <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/></marker>
  <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 8 3, 0 6" fill="#10b981"/></marker>
  <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 8 3, 0 6" fill="#a855f7"/></marker>
  <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 8 3, 0 6" fill="#f97316"/></marker>

  </defs>
<rect width="960" height="500" fill="url(#bg-grad)"/>

<!-- Title -->
<text x="480" y="30" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Fluss CoordinatorServer · 分布式协调架构</text>
<text x="480" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">事件驱动 + 双状态机 · 16 种事件类型 · 内建 Rebalance / AutoPartition / LakeTiering</text>

<!-- Left Panel: Architecture -->
<rect x="20" y="68" width="580" height="415" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="310" y="92" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">CoordinatorServer 架构</text>

<!-- Top Flow: ZK -> EventManager -> Processor -->
<rect x="40" y="108" width="150" height="32" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
<text x="115" y="129" font-size="12" fill="#94a3b8" text-anchor="middle">ZooKeeper</text>
<line x1="190" y1="124" x2="230" y2="124" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

<rect x="235" y="108" width="150" height="32" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
<text x="310" y="129" font-size="12" fill="#a855f7" text-anchor="middle">EventManager</text>
<line x1="385" y1="124" x2="425" y2="124" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

<rect x="430" y="108" width="140" height="32" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
<text x="500" y="129" font-size="12" fill="#a855f7" text-anchor="middle">EventProcessor</text>

<!-- State Machines -->
<line x1="270" y1="140" x2="270" y2="160" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)"/>

<rect x="40" y="165" width="250" height="98" rx="6" fill="#052e16" stroke="#059669" stroke-width="1"/>
<text x="165" y="185" font-size="12" font-weight="bold" fill="#10b981" text-anchor="middle">ReplicaStateMachine</text>
<text x="55" y="205" font-size="10" fill="#94a3b8">NonExistent → New → Online / Offline</text>
<text x="55" y="222" font-size="10" fill="#94a3b8">→ MigrationStarted → DeletionStarted</text>
<text x="55" y="239" font-size="10" fill="#94a3b8">→ ReplicaDeletionSuccessful</text>
<text x="55" y="256" font-size="9" fill="#64748b">6 种状态 · 标准 CRUD 初始化流程</text>

<rect x="310" y="165" width="270" height="98" rx="6" fill="#052e16" stroke="#059669" stroke-width="1"/>
<text x="445" y="185" font-size="12" font-weight="bold" fill="#10b981" text-anchor="middle">TableBucketStateMachine</text>
<text x="325" y="205" font-size="10" fill="#94a3b8">NonExistent → New → Online / Offline</text>
<text x="325" y="222" font-size="10" fill="#94a3b8">DefaultLeaderElection: AR[0] ∈ ISR</text>
<text x="325" y="239" font-size="10" fill="#94a3b8">→ DeletionStarted → Deleted</text>
<text x="325" y="256" font-size="9" fill="#64748b">5 种状态 · ISR 维护 / Leader 选举</text>

<!-- Rebalance -->
<rect x="40" y="278" width="540" height="78" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
<text x="310" y="298" font-size="12" font-weight="bold" fill="#a855f7" text-anchor="middle">RebalanceManager + GoalOptimizer（内建，非外挂）</text>
<text x="55" y="320" font-size="10" fill="#94a3b8">├ BalancedCapacityGoal（均衡存储容量）</text>
<text x="55" y="336" font-size="10" fill="#94a3b8">├ ReplicaCountGoal（均衡副本数量分布）</text>
<text x="55" y="352" font-size="10" fill="#94a3b8">└ RackAwareGoal（跨机架分布）</text>

<rect x="40" y="370" width="540" height="100" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1"/>
<text x="310" y="390" font-size="12" font-weight="bold" fill="#f97316" text-anchor="middle">Fluss 独有 Manager（Kafka 无对应）</text>
<text x="55" y="412" font-size="10" fill="#94a3b8">├ AutoPartitionManager（自动分片）· LakeTableTieringManager · LeaseManager</text>
<text x="55" y="430" font-size="10" fill="#94a3b8">├ SchemaManager · AclManager · MetaDataManager</text>
<text x="55" y="448" font-size="10" fill="#94a3b8">├ ElectedLeaderTracker（ISR 感知的 Leader 选举）</text>
<text x="55" y="464" font-size="9" fill="#64748b">└ Kafka 需 Cruise Control + Schema Registry 外挂 → Fluss 内核集成</text>

<!-- Right Panel: Comparison -->
<rect x="620" y="68" width="320" height="415" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="780" y="92" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Fluss vs Kafka 协调对比</text>

<text x="640" y="120" font-size="12" font-weight="bold" fill="#f97316">Fluss Coordinator</text>
<rect x="640" y="132" width="280" height="22" rx="4" fill="#1c1917" stroke="#ea580c" stroke-width="0.5"/>
<text x="650" y="147" font-size="10" fill="#e2e8f0">Java · Protobuf RPC · 事件队列驱动</text>
<rect x="640" y="158" width="280" height="22" rx="4" fill="#1c1917" stroke="#ea580c" stroke-width="0.5"/>
<text x="650" y="173" font-size="10" fill="#e2e8f0">16 种事件类型 · Curator LeaderLatch</text>
<rect x="640" y="184" width="280" height="22" rx="4" fill="#1c1917" stroke="#ea580c" stroke-width="0.5"/>
<text x="650" y="199" font-size="10" fill="#10b981">✓ 内建 Rebalance / AutoPartition</text>
<rect x="640" y="210" width="280" height="22" rx="4" fill="#1c1917" stroke="#ea580c" stroke-width="0.5"/>
<text x="650" y="225" font-size="10" fill="#10b981">✓ Lake 分层 / Schema / ACL 管理</text>
<rect x="640" y="236" width="280" height="22" rx="4" fill="#1c1917" stroke="#ea580c" stroke-width="0.5"/>
<text x="650" y="251" font-size="10" fill="#10b981">✓ ISR 感知的 Leader 选举</text>

  <line x1="640" y1="278" x2="920" y2="278" stroke="#334155" stroke-width="1"/>

<text x="640" y="302" font-size="12" font-weight="bold" fill="#64748b">Kafka Controller 2.7.2</text>
<rect x="640" y="314" width="280" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
<text x="650" y="329" font-size="10" fill="#94a3b8">Scala · Kafka 二进制协议 · switch-case</text>
<rect x="640" y="340" width="280" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
<text x="650" y="355" font-size="10" fill="#94a3b8">ZK 临时节点竞争</text>
<rect x="640" y="366" width="280" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
<text x="650" y="381" font-size="10" fill="#64748b">✗ Rebalance: 需 Cruise Control 外挂</text>
<rect x="640" y="392" width="280" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
<text x="650" y="407" font-size="10" fill="#64748b">✗ Schema: 需 Schema Registry 外挂</text>
<rect x="640" y="418" width="280" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
<text x="650" y="433" font-size="10" fill="#64748b">✗ 无 ISR 感知的 Leader 选举</text>

<!-- Bottom Insight -->
<rect x="640" y="448" width="280" height="26" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="0.5"/>
<text x="780" y="466" font-size="10" fill="#a855f7" text-anchor="middle">Fluss Coordinator 全面对标 Superior</text>
</svg>