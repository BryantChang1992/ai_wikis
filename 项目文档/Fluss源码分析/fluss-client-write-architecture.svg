<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif; }
    .title { font-size: 18px; font-weight: 600; fill: #111827; }
    .layer-label { font-size: 12px; fill: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .node-label { font-size: 14px; fill: #111827; font-weight: 600; }
    .node-sublabel { font-size: 11px; fill: #6b7280; }
    .node-box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .node-box-accent { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.5; }
    .layer-box { fill: none; stroke: #e5e7eb; stroke-width: 1; stroke-dasharray: 6 3; }
    .legend-text { font-size: 12px; fill: #6b7280; }
  </style>

  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-data" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-control" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-async" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" class="title">Fluss 客户端写入引擎 — 核心组件架构图</text>

  <!-- Layer backgrounds -->
  <rect x="20" y="50" width="920" height="90" rx="6" class="layer-box"/>
  <text x="32" y="68" class="layer-label">APPLICATION LAYER</text>

  <rect x="20" y="150" width="920" height="120" rx="6" class="layer-box"/>
  <text x="32" y="168" class="layer-label">TABLE API LAYER</text>

  <rect x="20" y="280" width="920" height="300" rx="6" class="layer-box"/>
  <text x="32" y="298" class="layer-label">WRITE ENGINE LAYER</text>

  <rect x="20" y="590" width="920" height="60" rx="6" class="layer-box"/>
  <text x="32" y="608" class="layer-label">RPC TRANSPORT</text>

  <rect x="20" y="660" width="920" height="100" rx="6" class="layer-box"/>
  <text x="32" y="678" class="layer-label">SERVER SIDE</text>

  <!-- APPLICATION LAYER -->
  <!-- User Code -->
  <rect x="80" y="75" width="160" height="46" rx="8" class="node-box"/>
  <text x="160" y="95" text-anchor="middle" class="node-label">User Code</text>
  <text x="160" y="111" text-anchor="middle" class="node-sublabel">.append() / .flush()</text>

  <!-- Connection -->
  <rect x="360" y="75" width="160" height="46" rx="8" class="node-box"/>
  <text x="440" y="95" text-anchor="middle" class="node-label">Connection</text>
  <text x="440" y="111" text-anchor="middle" class="node-sublabel">FlussConnection</text>

  <!-- Bootstrap -->
  <rect x="620" y="75" width="160" height="46" rx="8" class="node-box"/>
  <text x="700" y="95" text-anchor="middle" class="node-label">ConnectionFactory</text>
  <text x="700" y="111" text-anchor="middle" class="node-sublabel">bootstrap.servers</text>

  <!-- TABLE API LAYER -->
  <!-- Table (FlussTable) -->
  <rect x="80" y="185" width="160" height="56" rx="8" class="node-box"/>
  <text x="160" y="207" text-anchor="middle" class="node-label">Table</text>
  <text x="160" y="223" text-anchor="middle" class="node-sublabel">FlussTable</text>
  <text x="160" y="235" text-anchor="middle" class="node-sublabel">AutoCloseable</text>

  <!-- AppendWriterImpl -->
  <rect x="340" y="185" width="170" height="56" rx="8" class="node-box-accent"/>
  <text x="425" y="207" text-anchor="middle" class="node-label">AppendWriter</text>
  <text x="425" y="223" text-anchor="middle" class="node-sublabel">AppendWriterImpl</text>
  <text x="425" y="235" text-anchor="middle" class="node-sublabel">IndexedRowEncoder</text>

  <!-- UpsertWriterImpl -->
  <rect x="610" y="185" width="170" height="56" rx="8" class="node-box-accent"/>
  <text x="695" y="207" text-anchor="middle" class="node-label">UpsertWriter</text>
  <text x="695" y="223" text-anchor="middle" class="node-sublabel">UpsertWriterImpl</text>
  <text x="695" y="235" text-anchor="middle" class="node-sublabel">KeyEncoder</text>

  <!-- WRITE ENGINE LAYER -->
  <!-- WriterClient (central) -->
  <rect x="330" y="315" width="190" height="56" rx="8" class="node-box-accent"/>
  <text x="425" y="337" text-anchor="middle" class="node-label">WriterClient</text>
  <text x="425" y="353" text-anchor="middle" class="node-sublabel">doSend() · flush() · close()</text>

  <!-- BucketAssigner (left) -->
  <rect x="50" y="370" width="190" height="50" rx="8" class="node-box"/>
  <text x="145" y="390" text-anchor="middle" class="node-label">BucketAssigner</text>
  <text x="145" y="407" text-anchor="middle" class="node-sublabel">Hash · RoundRobin · Sticky</text>

  <!-- RecordAccumulator (left-bottom) -->
  <rect x="50" y="455" width="190" height="56" rx="8" class="node-box"/>
  <text x="145" y="477" text-anchor="middle" class="node-label">RecordAccumulator</text>
  <text x="145" y="493" text-anchor="middle" class="node-sublabel">Batch buffer · Arrow memory pool</text>
  <text x="145" y="505" text-anchor="middle" class="node-sublabel">ready() / drain() / append()</text>

  <!-- Sender (right) -->
  <rect x="620" y="315" width="190" height="56" rx="8" class="node-box-accent"/>
  <text x="715" y="337" text-anchor="middle" class="node-label">Sender</text>
  <text x="715" y="353" text-anchor="middle" class="node-sublabel">IO 单线程 · runOnce()</text>

  <!-- IdempotenceManager (right-bottom) -->
  <rect x="620" y="400" width="190" height="50" rx="8" class="node-box"/>
  <text x="715" y="420" text-anchor="middle" class="node-label">IdempotenceManager</text>
  <text x="715" y="437" text-anchor="middle" class="node-sublabel">writerId · sequence · inflight</text>

  <!-- MetadataUpdater (center-bottom) -->
  <rect x="330" y="455" width="190" height="56" rx="8" class="node-box"/>
  <text x="425" y="477" text-anchor="middle" class="node-label">MetadataUpdater</text>
  <text x="425" y="493" text-anchor="middle" class="node-sublabel">Cluster · BucketLocation</text>
  <text x="425" y="505" text-anchor="middle" class="node-sublabel">updatePhysicalTableMetadata()</text>

  <!-- DynamicPartitionCreator (bottom-right) -->
  <rect x="620" y="540" width="190" height="40" rx="8" class="node-box"/>
  <text x="715" y="558" text-anchor="middle" class="node-label">DynamicPartitionCreator</text>
  <text x="715" y="573" text-anchor="middle" class="node-sublabel">checkAndCreatePartitionAsync()</text>

  <!-- RPC TRANSPORT LAYER -->
  <!-- RpcClient (Netty) -->
  <rect x="330" y="605" width="190" height="40" rx="8" class="node-box"/>
  <text x="425" y="623" text-anchor="middle" class="node-label">RpcClient (Netty)</text>
  <text x="425" y="638" text-anchor="middle" class="node-sublabel">TabletServerGateway · CoordinatorGateway</text>

  <!-- SERVER SIDE LAYER -->
  <!-- TabletServer -->
  <rect x="280" y="690" width="190" height="50" rx="8" class="node-box-accent"/>
  <text x="375" y="710" text-anchor="middle" class="node-label">TabletServer</text>
  <text x="375" y="727" text-anchor="middle" class="node-sublabel">ProduceLog · PutKv handler</text>

  <!-- Coordinator -->
  <rect x="550" y="690" width="190" height="50" rx="8" class="node-box"/>
  <text x="645" y="710" text-anchor="middle" class="node-label">Coordinator</text>
  <text x="645" y="727" text-anchor="middle" class="node-sublabel">InitWriter · Metadata store</text>

  <!-- ARROWS -->

  <!-- ConnFactory → Connection -->
  <line x1="620" y1="98" x2="530" y2="98" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-data)"/>
  <text x="575" y="92" text-anchor="middle" class="node-sublabel">create()</text>

  <!-- Connection → Table -->
  <line x1="440" y1="121" x2="240" y2="180" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-data)"/>
  <text x="310" y="145" text-anchor="middle" class="node-sublabel">getTable()</text>

  <!-- Table → AppendWriter -->
  <line x1="240" y1="213" x2="335" y2="213" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-data)"/>
  <text x="288" y="207" text-anchor="middle" class="node-sublabel">newAppend()</text>

  <!-- Table → UpsertWriter -->
  <line x1="240" y1="213" x2="605" y2="213" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-data)"/>

  <!-- AppendWriter → WriterClient -->
  <line x1="425" y1="241" x2="425" y2="310" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-data)"/>
  <text x="435" y="280" text-anchor="start" class="node-sublabel">send(record, cb)</text>

  <!-- UpsertWriter → WriterClient -->
  <line x1="695" y1="241" x2="695" y2="275" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="695" y1="275" x2="520" y2="310" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-data)"/>

  <!-- WriterClient → BucketAssigner -->
  <line x1="330" y1="370" x2="245" y2="370" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-control)"/>
  <text x="288" y="364" text-anchor="middle" class="node-sublabel">assignBucket()</text>

  <!-- BucketAssigner → RecordAccumulator (via WriterClient path) -->
  <path d="M 145 420 L 145 450" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-control)"/>

  <!-- WriterClient → RecordAccumulator -->
  <line x1="330" y1="470" x2="245" y2="470" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-control)"/>
  <text x="288" y="464" text-anchor="middle" class="node-sublabel">append()</text>

  <!-- RecordAccumulator → Sender -->
  <line x1="240" y1="480" x2="615" y2="370" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-data)"/>
  <text x="440" y="420" text-anchor="middle" class="node-sublabel">drain() batches</text>

  <!-- Sender → WriterClient (wake-up / callback) -->
  <line x1="620" y1="343" x2="525" y2="343" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-async)"/>
  <text x="573" y="337" text-anchor="middle" class="node-sublabel">callback</text>

  <!-- Sender → RpcClient (ProduceLog/PutKv) -->
  <line x1="715" y1="371" x2="715" y2="435" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="715" y1="435" x2="520" y2="605" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-data)"/>
  <text x="640" y="525" text-anchor="middle" class="node-sublabel">ProduceLog / PutKv</text>

  <!-- RpcClient → TabletServer -->
  <line x1="375" y1="645" x2="375" y2="685" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-data)"/>

  <!-- RpcClient → Coordinator -->
  <line x1="475" y1="645" x2="645" y2="685" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-control)"/>
  <text x="570" y="668" text-anchor="middle" class="node-sublabel">initWriter / metadata</text>

  <!-- MetadataUpdater → Sender -->
  <line x1="520" y1="470" x2="615" y2="398" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-control)"/>
  <text x="575" y="432" text-anchor="middle" class="node-sublabel">getCluster()</text>

  <!-- IdempotenceManager → Sender -->
  <line x1="620" y1="425" x2="715" y2="371" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-control)"/>
  <text x="675" y="400" text-anchor="middle" class="node-sublabel">sequence</text>

  <!-- WriterClient → MetadataUpdater -->
  <line x1="425" y1="371" x2="425" y2="450" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-control)"/>

  <!-- Sender → DynamicPartitionCreator -->
  <path d="M 715 371 L 715 535" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-control)"/>

  <!-- DynamicPartitionCreator → WriterClient (async callback) -->
  <line x1="620" y1="560" x2="525" y2="560" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-async)"/>

  <!-- DynamicPartitionCreator → RpcClient -->
  <line x1="715" y1="580" x2="715" y2="600" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="715" y1="600" x2="525" y2="605" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-control)"/>
  <text x="630" y="575" text-anchor="middle" class="node-sublabel">createPartition()</text>

  <!-- Legend -->
  <rect x="770" y="290" width="170" height="100" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="785" y="312" class="node-label" font-size="12">图例</text>
  <line x1="785" y1="330" x2="820" y2="330" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-data)"/>
  <text x="828" y="334" class="legend-text">数据流</text>
  <line x1="785" y1="352" x2="820" y2="352" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-control)"/>
  <text x="828" y="356" class="legend-text">控制流</text>
  <line x1="785" y1="374" x2="820" y2="374" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-async)"/>
  <text x="828" y="378" class="legend-text">异步/回调</text>
</svg>