<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 45" width="500" height="45">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="500" height="45" fill="url(#bg-grad)"/>
  <text x="10" y="16" font-size="12" font-weight="bold" fill="#3b82f6">Duplicate 模型</text>
  <rect x="110" y="6" width="70" height="20" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="145" y="18" font-size="10" fill="#e2e8f0" text-anchor="middle">写入</text>
  <line x1="180" y1="16" x2="210" y2="16" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <text x="215" y="16" font-size="10" fill="#e2e8f0">追加新行 (无去重, 无聚合)</text>
  <text x="110" y="36" font-size="10" fill="#94a3b8">查询 → 直接读取原始行</text>
</svg>