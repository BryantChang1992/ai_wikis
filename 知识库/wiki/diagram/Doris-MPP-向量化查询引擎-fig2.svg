<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 100" width="650" height="100">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-blue-r" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="8 0, 0 3, 8 6" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="650" height="100" fill="url(#bg-grad)"/>
  <text x="325" y="14" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Plan Fragment 调度流程</text>
  <rect x="10" y="22" width="170" height="22" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="95" y="35" font-size="10" fill="#e2e8f0" text-anchor="middle">Fragment 0 (Coordinator)</text>
  <line x1="180" y1="33" x2="205" y2="33" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <text x="202" y="28" font-size="9" fill="#94a3b8">Result Sink</text>
  <line x1="210" y1="33" x2="235" y2="33" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <text x="228" y="28" font-size="9" fill="#94a3b8">Merge</text>
  <line x1="240" y1="33" x2="260" y2="33" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <text x="252" y="28" font-size="9" fill="#94a3b8">Client</text>
  <rect x="10" y="52" width="170" height="22" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="95" y="65" font-size="10" fill="#e2e8f0" text-anchor="middle">Fragment 1 (Agg BE)</text>
  <line x1="180" y1="63" x2="205" y2="63" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <text x="202" y="58" font-size="9" fill="#94a3b8">Final Agg</text>
  <line x1="210" y1="63" x2="235" y2="63" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue-r)"/>
  <rect x="242" y="54" width="80" height="18" rx="3" fill="#0f172a" stroke="#ea580c" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="282" y="65" font-size="9" fill="#f97316" text-anchor="middle">EXCHANGE</text>
  <rect x="10" y="80" width="170" height="22" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="95" y="93" font-size="10" fill="#e2e8f0" text-anchor="middle">Fragment 2 (Scan BE)</text>
  <line x1="180" y1="91" x2="205" y2="91" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <text x="202" y="86" font-size="9" fill="#94a3b8">Pre Agg</text>
  <line x1="210" y1="91" x2="235" y2="91" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <rect x="242" y="82" width="80" height="18" rx="3" fill="#0f172a" stroke="#ea580c" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="282" y="93" font-size="9" fill="#f97316" text-anchor="middle">EXCHANGE</text>
</svg>