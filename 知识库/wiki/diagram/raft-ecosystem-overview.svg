<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="960" height="640" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="34" fill="#111827" font-size="18" font-weight="700" text-anchor="middle">Raft 共识协议体系全景</text>
  <text x="480" y="56" fill="#6b7280" font-size="12" text-anchor="middle">基于 Diego Ongaro 博士论文 (Stanford 2014) · 五维拆解 + 工程组件 + 工业实践</text>

  <!-- ====== Row 1: From Paxos to Raft Core ====== -->
  <rect x="20" y="75" width="920" height="145" rx="8" fill="none" stroke="#d1d5db" stroke-width="1"/>

  <!-- Paxos -->
  <rect x="35" y="95" width="160" height="110" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="115" y="123" fill="#dc2626" font-size="13" font-weight="700" text-anchor="middle">Single-Decree Paxos</text>
  <text x="115" y="148" fill="#6b7280" font-size="10" text-anchor="middle">仅决定单值</text>
  <text x="115" y="166" fill="#6b7280" font-size="10" text-anchor="middle">无系统蓝图</text>
  <text x="115" y="184" fill="#9ca3af" font-size="10" text-anchor="middle">四大组件缺失</text>
  <text x="115" y="200" fill="#9ca3af" font-size="9" text-anchor="middle">实现者各自魔改</text>

  <!-- Arrow Paxos → Raft -->
  <line x1="195" y1="150" x2="265" y2="150" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="230" y="142" fill="#dc2626" font-size="10" text-anchor="middle">问题驱动</text>
  <text x="230" y="168" fill="#6b7280" font-size="9" text-anchor="middle">设计演进</text>

  <!-- Raft Core - three sub-boxes -->
  <rect x="275" y="95" width="650" height="110" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="295" y="120" fill="#2563eb" font-size="14" font-weight="700">Raft 核心协议 (Ch 5-7)</text>

  <!-- Leader Election -->
  <rect x="295" y="135" width="190" height="55" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="390" y="158" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Leader Election</text>
  <text x="390" y="178" fill="#6b7280" font-size="10" text-anchor="middle">三态 · Term · 随机超时</text>

  <!-- Log Replication -->
  <rect x="505" y="135" width="190" height="55" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="600" y="158" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Log Replication</text>
  <text x="600" y="178" fill="#6b7280" font-size="10" text-anchor="middle">强 Leader · AppendEntries</text>

  <!-- Safety -->
  <rect x="715" y="135" width="190" height="55" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="810" y="158" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Safety</text>
  <text x="810" y="178" fill="#6b7280" font-size="10" text-anchor="middle">Election Restr · Commit Prev</text>

  <!-- Arrow down -->
  <line x1="480" y1="220" x2="480" y2="248" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- ====== Row 2: Engineering Components ====== -->
  <rect x="20" y="250" width="920" height="120" rx="8" fill="none" stroke="#d1d5db" stroke-width="1"/>

  <text x="45" y="278" fill="#16a34a" font-size="13" font-weight="700">工程组件 (完整系统蓝图)</text>

  <!-- Cluster Membership -->
  <rect x="45" y="295" width="195" height="60" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="142" y="318" fill="#16a34a" font-size="12" font-weight="700" text-anchor="middle">集群成员变更</text>
  <text x="142" y="338" fill="#6b7280" font-size="10" text-anchor="middle">Joint Consensus</text>
  <text x="142" y="352" fill="#9ca3af" font-size="9" text-anchor="middle">Cold → Cold,new → Cnew</text>

  <!-- Log Compaction -->
  <rect x="260" y="295" width="195" height="60" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="357" y="318" fill="#16a34a" font-size="12" font-weight="700" text-anchor="middle">日志压缩</text>
  <text x="357" y="338" fill="#6b7280" font-size="10" text-anchor="middle">Snapshot 机制</text>
  <text x="357" y="352" fill="#9ca3af" font-size="9" text-anchor="middle">InstallSnapshot RPC</text>

  <!-- Client Interaction -->
  <rect x="475" y="295" width="195" height="60" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="572" y="318" fill="#16a34a" font-size="12" font-weight="700" text-anchor="middle">客户端交互</text>
  <text x="572" y="338" fill="#6b7280" font-size="10" text-anchor="middle">Linearizability</text>
  <text x="572" y="352" fill="#9ca3af" font-size="9" text-anchor="middle">Read Index · Lease Read</text>

  <!-- Formal Verification -->
  <rect x="690" y="295" width="230" height="60" rx="6" fill="#faf5ff" stroke="#ede9fe" stroke-width="1.5"/>
  <text x="805" y="318" fill="#9333ea" font-size="12" font-weight="700" text-anchor="middle">形式化验证</text>
  <text x="805" y="338" fill="#6b7280" font-size="10" text-anchor="middle">TLA+ Specification · ~500 行</text>
  <text x="805" y="352" fill="#9ca3af" font-size="9" text-anchor="middle">机械验证 Safety 属性</text>

  <!-- Arrow down -->
  <line x1="480" y1="370" x2="480" y2="398" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ====== Row 3: Industrial Adoptions ====== -->
  <rect x="20" y="400" width="920" height="105" rx="8" fill="none" stroke="#d1d5db" stroke-width="1"/>

  <text x="45" y="428" fill="#9333ea" font-size="13" font-weight="700">工业采纳 (被引 15000+)</text>

  <!-- etcd -->
  <rect x="45" y="445" width="120" height="48" rx="6" fill="#faf5ff" stroke="#ede9fe" stroke-width="1"/>
  <text x="105" y="467" fill="#9333ea" font-size="12" font-weight="700" text-anchor="middle">etcd</text>
  <text x="105" y="486" fill="#6b7280" font-size="9" text-anchor="middle">Kubernetes 核心</text>

  <!-- TiKV -->
  <rect x="180" y="445" width="120" height="48" rx="6" fill="#faf5ff" stroke="#ede9fe" stroke-width="1"/>
  <text x="240" y="467" fill="#9333ea" font-size="12" font-weight="700" text-anchor="middle">TiKV</text>
  <text x="240" y="486" fill="#6b7280" font-size="9" text-anchor="middle">TiDB NewSQL</text>

  <!-- CockroachDB -->
  <rect x="315" y="445" width="140" height="48" rx="6" fill="#faf5ff" stroke="#ede9fe" stroke-width="1"/>
  <text x="385" y="467" fill="#9333ea" font-size="12" font-weight="700" text-anchor="middle">CockroachDB</text>
  <text x="385" y="486" fill="#6b7280" font-size="9" text-anchor="middle">全球分布式 DB</text>

  <!-- Kafka -->
  <rect x="470" y="445" width="120" height="48" rx="6" fill="#faf5ff" stroke="#ede9fe" stroke-width="1"/>
  <text x="530" y="467" fill="#9333ea" font-size="12" font-weight="700" text-anchor="middle">Kafka KRaft</text>
  <text x="530" y="486" fill="#6b7280" font-size="9" text-anchor="middle">ZooKeeper-less</text>

  <!-- Consul -->
  <rect x="605" y="445" width="120" height="48" rx="6" fill="#faf5ff" stroke="#ede9fe" stroke-width="1"/>
  <text x="665" y="467" fill="#9333ea" font-size="12" font-weight="700" text-anchor="middle">Consul</text>
  <text x="665" y="486" fill="#6b7280" font-size="9" text-anchor="middle">服务发现 KV</text>

  <!-- NATS -->
  <rect x="740" y="445" width="180" height="48" rx="6" fill="#faf5ff" stroke="#ede9fe" stroke-width="1"/>
  <text x="830" y="467" fill="#9333ea" font-size="12" font-weight="700" text-anchor="middle">NATS JetStream</text>
  <text x="830" y="486" fill="#6b7280" font-size="9" text-anchor="middle">轻量级流消息</text>

  <!-- Arrow down -->
  <line x1="480" y1="505" x2="480" y2="533" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ====== Row 4: KB Cross-References ====== -->
  <rect x="20" y="535" width="920" height="90" rx="8" fill="none" stroke="#d1d5db" stroke-width="1"/>

  <text x="45" y="563" fill="#111827" font-size="13" font-weight="700">知识库交叉关联</text>

  <rect x="45" y="575" width="270" height="40" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="180" y="596" fill="#ea580c" font-size="11" font-weight="600" text-anchor="middle">分布式数据系统一致性体系</text>
  <text x="180" y="610" fill="#6b7280" font-size="9" text-anchor="middle">事务层 / 副本层 / 会话层</text>

  <rect x="335" y="575" width="270" height="40" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="470" y="596" fill="#ea580c" font-size="11" font-weight="600" text-anchor="middle">CockroachDB Leader Leases</text>
  <text x="470" y="610" fill="#6b7280" font-size="9" text-anchor="middle">Lease ← Fortification → CPU 85%+</text>

  <rect x="625" y="575" width="295" height="40" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="772" y="596" fill="#ea580c" font-size="11" font-weight="600" text-anchor="middle">Rosé / Event-Horizon</text>
  <text x="772" y="610" fill="#6b7280" font-size="9" text-anchor="middle">异步复制 · 非对称依赖 · 灵活替换</text>

  <!-- Timeline footer -->
  <text x="480" y="636" fill="#9ca3af" font-size="9" text-anchor="middle">1989 Paxos → 1990 VR → 2014 Raft Dissertation → 2014 etcd → 2015 CockroachDB → 2016 TiKV → 2022 Kafka KRaft</text>
</svg>