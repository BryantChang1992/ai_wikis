<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','Courier New','Microsoft YaHei','SimHei',monospace; fill: #e2e8f0; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a855f7"/>
    </marker>
      <marker id="arrow-3b82f6" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-10b981" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrow-a855f7" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="960" height="520" fill="url(#bg-grad)"/>
  <text x="480" y="32" font-size="18" font-weight="700" fill="#e2e8f0" text-anchor="middle">LSM-Tree 核心架构</text>
  <text x="480" y="54" font-size="11" fill="#94a3b8" text-anchor="middle">写入路径 · 合并策略 · 核心优化 · RUM 猜想定位</text>
  <rect x="30" y="70" width="900" height="120" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="480" y="95" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">写入路径</text>
  <rect x="60" y="115" width="90" height="34" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="105" y="137" font-size="11" fill="#e2e8f0" text-anchor="middle">Write</text>
  <line x1="150" y1="132" x2="165" y2="132" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-3b82f6)"/>
  <rect x="165" y="115" width="110" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="220" y="137" font-size="11" fill="#e2e8f0" text-anchor="middle">WAL (顺序写)</text>
  <line x1="275" y1="132" x2="290" y2="132" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-3b82f6)"/>
  <rect x="290" y="115" width="130" height="34" rx="6" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="355" y="137" font-size="11" fill="#e2e8f0" text-anchor="middle">MemTable (全内存)</text>
  <line x1="420" y1="132" x2="435" y2="132" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrow-10b981)"/>
  <rect x="435" y="115" width="140" height="34" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="505" y="137" font-size="11" fill="#e2e8f0" text-anchor="middle">Immutable MemTable</text>
  <line x1="575" y1="132" x2="590" y2="132" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arrow-a855f7)"/>
  <rect x="590" y="115" width="130" height="34" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1"/>
  <text x="655" y="137" font-size="11" fill="#e2e8f0" text-anchor="middle">SST Files (磁盘)</text>
  <text x="480" y="172" font-size="10" fill="#94a3b8" text-anchor="middle">WAL → MemTable → flush → SST Table → compaction → 下一层 SST</text>
  <rect x="30" y="205" width="440" height="115" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="250" y="228" font-size="13" font-weight="700" fill="#10b981" text-anchor="middle">Leveling Strategy</text>
  <rect x="50" y="243" width="180" height="28" rx="5" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="140" y="262" font-size="11" fill="#34d399" text-anchor="middle">L0: 无序 (SST 可重叠)</text>
  <line x1="140" y1="271" x2="140" y2="280" stroke="#10b981" stroke-width="1" marker-end="url(#arrow-10b981)"/>
  <rect x="50" y="282" width="180" height="28" rx="5" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="140" y="301" font-size="11" fill="#34d399" text-anchor="middle">L1: 10 MB 有序</text>
  <rect x="250" y="243" width="195" height="67" rx="5" fill="#1c1917" stroke="#f97316" stroke-width="1"/>
  <text x="348" y="262" font-size="10" fill="#fb923c" text-anchor="middle">L0→L1: 合并 L0 全部</text>
  <text x="348" y="278" font-size="10" fill="#fb923c" text-anchor="middle">L1→L2: 挑一个 SST</text>
  <text x="348" y="294" font-size="10" fill="#f97316" text-anchor="middle">写放大: 大 · 读: 快</text>
  <text x="140" y="325" font-size="10" fill="#94a3b8" text-anchor="middle">每层容量 ×10 (L1=10MB, L2=100MB...)</text>
  <rect x="490" y="205" width="440" height="115" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="710" y="228" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle">Tiering Strategy</text>
  <rect x="510" y="243" width="180" height="28" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="600" y="262" font-size="11" fill="#60a5fa" text-anchor="middle">L0-T: 多层 SST</text>
  <rect x="710" y="243" width="195" height="67" rx="5" fill="#1c1917" stroke="#f97316" stroke-width="1"/>
  <text x="808" y="262" font-size="10" fill="#fb923c" text-anchor="middle">每层可多个 SST</text>
  <text x="808" y="278" font-size="10" fill="#fb923c" text-anchor="middle">≥2 SST 跨层合并</text>
  <text x="808" y="294" font-size="10" fill="#f97316" text-anchor="middle">写放大: 小 · 读: 慢</text>
  <text x="600" y="325" font-size="10" fill="#94a3b8" text-anchor="middle">RocksDB 混合: L0 Leveling + L1+ Tiering</text>
  <rect x="30" y="335" width="900" height="165" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="480" y="358" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">RUM 猜想 + 2026 最新优化</text>
  <rect x="50" y="374" width="270" height="46" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="185" y="392" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle">RUM 猜想</text>
  <text x="185" y="410" font-size="10" fill="#94a3b8" text-anchor="middle">Read-Write-Space 三选二理论框架</text>
  <rect x="340" y="374" width="270" height="46" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="475" y="392" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Monkey (2026)</text>
  <text x="475" y="410" font-size="10" fill="#60a5fa" text-anchor="middle">BF 分配优化 · 读延迟 → 0</text>
  <rect x="630" y="374" width="280" height="46" rx="6" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="770" y="392" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Dostoevsky (2026)</text>
  <text x="770" y="410" font-size="10" fill="#34d399" text-anchor="middle">Lazy Leveling 自适应混合</text>
  <rect x="50" y="430" width="270" height="46" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="185" y="448" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Silo (2026)</text>
  <text x="185" y="466" font-size="10" fill="#a78bfa" text-anchor="middle">分布式 Compaction 全局调度</text>
  <rect x="340" y="430" width="280" height="46" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1"/>
  <text x="480" y="448" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">硬件适配</text>
  <text x="480" y="466" font-size="10" fill="#fb923c" text-anchor="middle">大内存 · NVMe · NVM · 多核</text>
  <rect x="640" y="430" width="270" height="46" rx="6" fill="#1e3a5f" stroke="#6366f1" stroke-width="1"/>
  <text x="775" y="448" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">二级索引</text>
  <text x="775" y="466" font-size="10" fill="#818cf8" text-anchor="middle">Diff-Index · 主键索引方案</text>
</svg>