<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 80" width="500" height="80">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascada Code','Courier New','Microsoft YaHei','SimHei',monospace; }
    .t1 { fill: #e2e8f0; font-size: 13px; font-weight: bold; }
    .t2 { fill: #94a3b8; font-size: 11px; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="80" fill="url(#bg)"/>
  <rect x="10" y="10" width="480" height="60" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="250" y="30" class="t1" text-anchor="middle" dominant-baseline="middle">3. Broker 定期回查（未决事务）</text>
  <text x="250" y="50" class="t2" text-anchor="middle" dominant-baseline="middle">→ 调用 Producer 的 check  → 决定 Commit 或 Rollback</text>
</svg>