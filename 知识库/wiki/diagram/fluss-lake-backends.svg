<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" width="960" height="580">
<style>
  text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
</style>
<defs>
  <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f0f1a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
  <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/></marker>
  <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#10b981"/></marker>
  <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a855f7"/></marker>

  </defs>
<rect width="960" height="580" fill="url(#bg-grad)"/>

<text x="480" y="28" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Fluss Lake 层 · 四种后端插件架构</text>
<text x="480" y="48" font-size="11" fill="#94a3b8" text-anchor="middle">Streaming Table → Lakehouse Table 一体化转换引擎 · 与 Kafka KIP-405 本质不同</text>

<!-- SPI Layer -->
<rect x="180" y="66" width="600" height="42" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
<text x="480" y="92" font-size="14" font-weight="bold" fill="#c084fc" text-anchor="middle">LakeStoragePlugin (SPI)</text>

<!-- Arrows down -->
<line x1="220" y1="108" x2="220" y2="140" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr-blue)"/>
<line x1="480" y1="108" x2="480" y2="140" stroke="#10b981" stroke-width="1.8" marker-end="url(#arr-green)"/>
<line x1="740" y1="108" x2="740" y2="140" stroke="#a855f7" stroke-width="1.8" marker-end="url(#arr-purple)"/>

<!-- Iceberg -->
<rect x="25" y="145" width="290" height="240" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
<rect x="25" y="145" width="290" height="36" rx="6" fill="#1e3a5f"/><rect x="25" y="169" width="290" height="12" fill="#1e3a5f"/>
<text x="170" y="169" font-size="13" font-weight="bold" fill="#60a5fa" text-anchor="middle">Iceberg ★★★★★</text>
<rect x="45" y="195" width="250" height="28" rx="4" fill="#1a1a2e" stroke="#334155" stroke-width="0.5"/>
<text x="170" y="214" font-size="11" fill="#94a3b8" text-anchor="middle">IcebergLakeCatalog</text>
<text x="45" y="248" font-size="10" fill="#e2e8f0">├ IcebergLakeWriter</text>
<text x="55" y="264" font-size="9" fill="#94a3b8">AppendOnly · Delta · Aggregate</text>
<text x="45" y="282" font-size="10" fill="#e2e8f0">├ IcebergLakeCommitter</text>
<text x="55" y="298" font-size="9" fill="#94a3b8">Snapshot 提交 → Expiration</text>
<text x="45" y="316" font-size="10" fill="#e2e8f0">├ IcebergLakeSource</text>
<text x="55" y="332" font-size="9" fill="#94a3b8">Split 规划 + Parquet 读取</text>
<text x="45" y="350" font-size="10" fill="#e2e8f0">└ RewriteDataFiles (Compaction)</text>

<!-- Paimon -->
<rect x="335" y="145" width="290" height="240" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
<rect x="335" y="145" width="290" height="36" rx="6" fill="#052e16"/><rect x="335" y="169" width="290" height="12" fill="#052e16"/>
<text x="480" y="169" font-size="13" font-weight="bold" fill="#34d399" text-anchor="middle">Paimon ★★★★★</text>
<rect x="355" y="195" width="250" height="28" rx="4" fill="#1a1a2e" stroke="#334155" stroke-width="0.5"/>
<text x="480" y="214" font-size="11" fill="#94a3b8" text-anchor="middle">PaimonLakeCatalog</text>
<text x="355" y="248" font-size="10" fill="#e2e8f0">├ MergeTreeWriter (LSM 写入)</text>
<text x="365" y="264" font-size="9" fill="#94a3b8">PK 表 + Merge Engine 支持</text>
<text x="355" y="282" font-size="10" fill="#e2e8f0">├ DV Table (增量删除)</text>
<text x="355" y="300" font-size="10" fill="#e2e8f0">├ SortedRecordReader</text>
<text x="365" y="316" font-size="9" fill="#94a3b8">按 PK 排序 · Merge-on-Read</text>
<text x="355" y="334" font-size="10" fill="#e2e8f0">└ AppendOnlyWriter</text>
<text x="365" y="350" font-size="9" fill="#94a3b8">Arrow 列式零拷贝直接写入</text>

<!-- Hudi -->
<rect x="645" y="145" width="290" height="130" rx="6" fill="#0f172a" stroke="#ea580c" stroke-width="1"/>
<rect x="645" y="145" width="290" height="36" rx="6" fill="#1c1917"/><rect x="645" y="169" width="290" height="12" fill="#1c1917"/>
<text x="790" y="169" font-size="13" font-weight="bold" fill="#f97316" text-anchor="middle">Hudi ★★☆☆☆</text>
<text x="665" y="208" font-size="10" fill="#e2e8f0">├ HudiLakeCatalog</text>
<text x="665" y="226" font-size="10" fill="#e2e8f0">├ COW (Copy-on-Write) 写入</text>
<text x="665" y="244" font-size="10" fill="#e2e8f0">└ HudiLakeSource</text>
<text x="665" y="262" font-size="9" fill="#64748b">基础集成 · 约 7 文件</text>

<!-- Lance -->
<rect x="645" y="290" width="290" height="95" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="1"/>
<rect x="645" y="290" width="290" height="36" rx="6" fill="#1e1b4b"/><rect x="645" y="314" width="290" height="12" fill="#1e1b4b"/>
<text x="790" y="314" font-size="13" font-weight="bold" fill="#c084fc" text-anchor="middle">Lance ★★★☆☆</text>
<text x="665" y="355" font-size="10" fill="#e2e8f0">├ Arrow-Native 零拷贝写入</text>
<text x="675" y="372" font-size="9" fill="#94a3b8">ShadedArrowBatchWriter · 约 12 文件</text>

<!-- Bottom Comparison -->
<rect x="20" y="405" width="920" height="158" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="480" y="428" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Fluss Lake vs Kafka KIP-405: 本质区别</text>

<text x="45" y="456" font-size="11" font-weight="bold" fill="#f97316">Fluss Lake</text>
<text x="45" y="476" font-size="10" fill="#e2e8f0">目标: 数据湖一体化 (Stream → Lakehouse)</text>
<text x="45" y="494" font-size="10" fill="#e2e8f0">格式: Parquet / Arrow / Paimon (列式)</text>
<text x="45" y="512" font-size="10" fill="#e2e8f0">可查: Trino / Spark / Flink 直接查询</text>
<text x="45" y="530" font-size="10" fill="#e2e8f0">Schema: Lake Catalog + Schema Evolution</text>

  <line x1="450" y1="432" x2="450" y2="545" stroke="#334155" stroke-width="1"/>

<text x="470" y="456" font-size="11" font-weight="bold" fill="#64748b">Kafka KIP-405</text>
<text x="470" y="476" font-size="10" fill="#94a3b8">目标: 释放本地磁盘 (Log Offload)</text>
<text x="470" y="494" font-size="10" fill="#94a3b8">格式: 原始 .log Segment (二进制相同)</text>
<text x="470" y="512" font-size="10" fill="#94a3b8">不可查: 仅内部 Broker 读取</text>
<text x="470" y="530" font-size="10" fill="#94a3b8">无 Schema: 无 Schema 管理能力</text>

<rect x="700" y="436" width="230" height="80" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
<text x="815" y="458" font-size="12" font-weight="bold" fill="#60a5fa" text-anchor="middle">Fluss = Stream + Lake</text>
<text x="815" y="478" font-size="10" fill="#94a3b8" text-anchor="middle">ms 级实时写入 OLTP Table</text>
<text x="815" y="494" font-size="10" fill="#94a3b8" text-anchor="middle">↓ async Tiering (分钟级)</text>
<text x="815" y="510" font-size="10" fill="#94a3b8" text-anchor="middle">Lakehouse OLAP Table</text></svg>
