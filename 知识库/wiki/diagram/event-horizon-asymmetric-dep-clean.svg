<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500">
  <defs>
    <marker id="arr-eh-x" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-eh-comm" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arr-eh-order" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <filter id="shadow-eh" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="500" fill="#ffffff"/>

  <text x="480" y="32" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#111827" text-anchor="middle">Event Horizon  Semi-Linearizability</text>
  <text x="480" y="54" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">CIDR 2026    </text>

  <!-- ====== Top: 3 operation levels ====== -->
  <rect x="30" y="75" width="285" height="110" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow-eh)"/>
  <text x="172" y="100" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">Commutative ()</text>
  <rect x="95" y="110" width="155" height="26" rx="13" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="172" y="128" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#15803d" text-anchor="middle">OP  OP</text>
  <text x="172" y="158" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">    </text>
  <text x="172" y="176" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">: new_bid  new_bid</text>

  <rect x="338" y="75" width="285" height="110" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow-eh)"/>
  <text x="480" y="100" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#9a3412" text-anchor="middle">Eventually Ordered ()</text>
  <rect x="400" y="110" width="160" height="26" rx="13" fill="#ffedd5" stroke="#fcd34d" stroke-width="1"/>
  <text x="480" y="128" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#d97706" text-anchor="middle">OP  OP</text>
  <text x="480" y="158" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">OP "" OP  </text>
  <text x="480" y="176" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">: close_auction  new_bid</text>

  <rect x="645" y="75" width="285" height="110" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" filter="url(#shadow-eh)"/>
  <text x="787" y="100" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#991b1b" text-anchor="middle">Strictly Ordered ()</text>
  <rect x="710" y="110" width="155" height="26" rx="13" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="787" y="128" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#dc2626" text-anchor="middle">OP  OP</text>
  <text x="787" y="158" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">    Paxos / Raft</text>
  <text x="787" y="176" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">: 2PC / Atomic Commit</text>

  <!-- ====== Middle: Auction example with directed edges ====== -->
  <rect x="30" y="205" width="900" height="150" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow-eh)"/>

  <text x="480" y="228" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#374151" text-anchor="middle">: </text>

  <!-- new_bid boxes -->
  <rect x="80" y="245" width="150" height="40" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="155" y="271" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#166534" text-anchor="middle">new_bid ()</text>

  <rect x="400" y="245" width="150" height="40" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="475" y="271" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#166534" text-anchor="middle">new_bid ()</text>

  <!-- close_auction -->
  <rect x="740" y="245" width="160" height="40" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="820" y="271" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" fill="#dc2626" text-anchor="middle">close_auction ()</text>

  <!-- Commutative edge between bid boxes -->
  <line x1="230" y1="260" x2="390" y2="260" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="310" y="252" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#16a34a" text-anchor="middle">commutative</text>

  <!-- Eventually ordered: bid  close -->
  <path d="M 550,255 Q 645,240 730,255" fill="none" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arr-eh-order)"/>
  <text x="640" y="236" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#ea580c" text-anchor="middle">eventually ordered</text>

  <!-- No dep: close --x bid (dashed, no arrow) -->
  <path d="M 740,280 Q 645,305 550,285" fill="none" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="640" y="320" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">no dependency  !</text>

  <!-- ====== Bottom: Comparison table ====== -->
  <rect x="30" y="375" width="900" height="105" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>

  <text x="480" y="398" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#374151" text-anchor="middle">SL </text>

  <!-- Headers -->
  <rect x="50" y="408" width="150" height="24" rx="4" fill="#e5e7eb"/>
  <text x="125" y="424" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#374151" text-anchor="middle"></text>
  <rect x="205" y="408" width="170" height="24" rx="4" fill="#e5e7eb"/>
  <text x="290" y="424" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#374151" text-anchor="middle"></text>
  <rect x="380" y="408" width="170" height="24" rx="4" fill="#e5e7eb"/>
  <text x="465" y="424" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#374151" text-anchor="middle"></text>
  <rect x="555" y="408" width="170" height="24" rx="4" fill="#e5e7eb"/>
  <text x="640" y="424" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#374151" text-anchor="middle"></text>
  <rect x="730" y="408" width="185" height="24" rx="4" fill="#e5e7eb"/>
  <text x="822" y="424" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#374151" text-anchor="middle"></text>

  <!-- Rows -->
  <text x="68" y="446" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#dc2626" text-anchor="start"></text>
  <text x="220" y="446" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#374151" text-anchor="start"></text>
  <text x="395" y="446" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#374151" text-anchor="start">N/A</text>
  <text x="570" y="446" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#374151" text-anchor="start"> (Paxos)</text>
  <text x="745" y="446" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#dc2626" text-anchor="start"> 245ms</text>

  <text x="68" y="466" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#d97706" text-anchor="start">RedBlue  PoR</text>
  <text x="220" y="466" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#374151" text-anchor="start">()</text>
  <text x="395" y="466" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#374151" text-anchor="start"></text>
  <text x="570" y="466" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#d97706" text-anchor="start">: </text>
  <text x="745" y="466" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#d97706" text-anchor="start">371ms</text>

  <text x="68" y="486" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#16a34a" text-anchor="start">SL (DeMon)</text>
  <text x="220" y="486" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#166534" text-anchor="start"></text>
  <text x="395" y="486" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#16a34a" text-anchor="start">!</text>
  <text x="570" y="486" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#166534" text-anchor="start"></text>
  <text x="745" y="486" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" font-weight="bold" fill="#16a34a" text-anchor="start">~245ms () + ms ()</text>
</svg>
