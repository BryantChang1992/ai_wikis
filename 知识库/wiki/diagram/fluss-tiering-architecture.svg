<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470">
  <defs>
    <marker id="arr-tier-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-tier-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arr-tier-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9333ea"/>
    </marker>
    <filter id="shadow-tier" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="470" fill="#ffffff"/>

  <text x="480" y="32" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#111827" text-anchor="middle">Fluss Tiering · 实时存储 → Lakehouse 分层架构</text>
  <text x="480" y="54" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">独立 Flink 作业 · Source → Writer → Committer 流水线 · ms 级写入 → 分钟级物化</text>

  <!-- ====== Data Lifecycle ====== -->
  <rect x="30" y="75" width="900" height="170" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow-tier)"/>
  <text x="480" y="100" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#374151" text-anchor="middle">数据生命周期</text>

  <!-- Step 1: Real-time write -->
  <rect x="60" y="118" width="220" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="170" y="136" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">① 实时写入 (ms 级)</text>
  <text x="170" y="152" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">appendRecords / putKv</text>

  <line x1="280" y1="138" x2="320" y2="138" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr-tier-blue)"/>

  <!-- Step 2: Fluss Tablet -->
  <rect x="325" y="118" width="220" height="40" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="435" y="136" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">② Fluss Tablet</text>
  <text x="435" y="152" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">本地 Log + KV · OLTP 级</text>

  <line x1="545" y1="138" x2="585" y2="138" stroke="#9333ea" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr-tier-purple)"/>

  <!-- Step 3: Tiering -->
  <rect x="590" y="118" width="220" height="40" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="700" y="136" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#6b21a8" text-anchor="middle">③ Tiering 作业 (分钟级)</text>
  <text x="700" y="152" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#9333ea" text-anchor="middle">异步分层 · 独立 Flink 作业</text>

  <line x1="700" y1="158" x2="700" y2="180" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arr-tier-green)"/>

  <!-- Step 4: Lakehouse -->
  <rect x="590" y="185" width="220" height="40" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="700" y="203" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">④ Lakehouse</text>
  <text x="700" y="219" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#16a34a" text-anchor="middle">Parquet/Arrow · OLAP 级</text>

  <line x1="590" y1="205" x2="555" y2="205" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="573" y="218" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="#16a34a" text-anchor="middle">GC</text>

  <!-- ====== Tiering Pipeline Detail ====== -->
  <rect x="30" y="260" width="900" height="188" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1" filter="url(#shadow-tier)"/>
  <text x="480" y="285" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#6b21a8" text-anchor="middle">Tiering 工作流 (独立 Flink 作业)</text>

  <!-- Coordinator -->
  <rect x="60" y="300" width="180" height="34" rx="6" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="150" y="322" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#6b21a8" text-anchor="middle">CoordinatorServer</text>

  <line x1="240" y1="317" x2="275" y2="317" stroke="#9333ea" stroke-width="1.2" marker-end="url(#arr-tier-purple)"/>

  <rect x="280" y="300" width="210" height="34" rx="6" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="385" y="322" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#6b21a8" text-anchor="middle">LakeTableTieringManager</text>

  <line x1="490" y1="317" x2="525" y2="317" stroke="#9333ea" stroke-width="1.2" marker-end="url(#arr-tier-purple)"/>

  <rect x="530" y="300" width="180" height="34" rx="6" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="620" y="322" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#6b21a8" text-anchor="middle">TieringSource (Flink)</text>

  <line x1="710" y1="317" x2="745" y2="317" stroke="#9333ea" stroke-width="1.2" marker-end="url(#arr-tier-purple)"/>

  <rect x="750" y="300" width="150" height="34" rx="6" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="825" y="322" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#6b21a8" text-anchor="middle">LakeWriter</text>

  <!-- Down arrows for remaining steps -->
  <line x1="825" y1="334" x2="825" y2="358" stroke="#9333ea" stroke-width="1" marker-end="url(#arr-tier-purple)"/>

  <rect x="750" y="361" width="150" height="30" rx="6" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="825" y="381" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#6b21a8" text-anchor="middle">TieringCommitter</text>

  <line x1="825" y1="391" x2="825" y2="410" stroke="#9333ea" stroke-width="1" marker-end="url(#arr-tier-purple)"/>

  <rect x="710" y="413" width="230" height="30" rx="6" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="825" y="433" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#6b21a8" text-anchor="middle">commitLakeTableSnapshot</text>

  <!-- Details below -->
  <text x="480" y="452" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">TabletServer.notifyLakeTableOffset → 本地 LogManager 删除已分层 Segment</text>
</svg>
