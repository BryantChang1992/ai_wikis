<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 120" xmlns="http://www.w3.org/2000/svg" style="max-width:100%">
  <defs>
    <marker id="arrow-data" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="currentColor"/>
    </marker>
    <marker id="arrow-block" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="currentColor"/>
    </marker>
    <marker id="arrow-credit" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="currentColor"/>
    </marker>
  </defs>
  <!-- Buffer-based section -->
  <text x="170" y="18" font-family="sans-serif" font-size="13" fill="currentColor" text-anchor="middle" font-weight="bold">Buffer-based:</text>
  <!-- Operator A box -->
  <rect x="50" y="30" width="100" height="30" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="100" y="47" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Operator A</text>
  <!-- data arrow A->B -->
  <line x1="150" y1="37" x2="195" y2="37" stroke="currentColor" stroke-width="2" marker-end="url(#arrow-data)"/>
  <text x="170" y="30" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="middle">data</text>
  <!-- Operator B box -->
  <rect x="195" y="30" width="100" height="30" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="245" y="47" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Operator B</text>
  <!-- block arrow B->A -->
  <line x1="195" y1="65" x2="150" y2="65" stroke="currentColor" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-block)"/>
  <text x="170" y="80" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="middle">block</text>
  <!-- note -->
  <text x="170" y="98" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="middle">(Buffer full: 暂停上游)</text>

  <!-- Credit-based section -->
  <text x="530" y="18" font-family="sans-serif" font-size="13" fill="currentColor" text-anchor="middle" font-weight="bold">Credit-based:</text>
  <!-- Operator A box -->
  <rect x="410" y="30" width="100" height="30" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="460" y="47" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Operator A</text>
  <!-- data arrow A->B -->
  <line x1="510" y1="37" x2="555" y2="37" stroke="currentColor" stroke-width="2" marker-end="url(#arrow-data)"/>
  <text x="530" y="30" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="middle">data</text>
  <!-- Operator B box -->
  <rect x="555" y="30" width="100" height="30" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="605" y="47" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Operator B</text>
  <!-- credit arrow B->A -->
  <line x1="555" y1="65" x2="510" y2="65" stroke="currentColor" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-credit)"/>
  <text x="530" y="80" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="middle">credit</text>
  <!-- note -->
  <text x="530" y="98" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="middle">(发credit: 控制上游发送速率)</text>
</svg>