    <rect x="140" y="0" width="14" height="14" rx="3" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="160" y="12" fill="#6b7280" font-size="10">Silo</text>
    <rect x="280" y="0" width="14" height="14" rx="3" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
    <text x="300" y="12" fill="#6b7280" font-size="10">Fluss</text>
    <rect x="420" y="0" width="14" height="14" rx="3" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="440" y="12" fill="#6b7280" font-size="10">Wiki Cards</text>
