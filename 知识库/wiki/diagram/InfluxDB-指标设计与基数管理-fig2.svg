<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 80">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
  </defs>
  <style>
    text { font-family: "SF Mono","Fira Code","Cascadia Code","Courier New","Microsoft YaHei","SimHei",monospace; }
  </style>
  <rect width="740" height="80" fill="url(#bg-grad)"/>
  <!-- Raw -->
  <rect x="14" y="10" width="130" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="79" y="30" font-size="12" fill="#60a5fa" text-anchor="middle" dominant-baseline="central">Raw (10s)</text>
  <text x="79" y="46" font-size="10" fill="#94a3b8" text-anchor="middle" dominant-baseline="central" font-style="italic">RP: 7d</text>
  <line x1="144" y1="35" x2="184" y2="35" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="164" y="28" font-size="10" fill="#f97316" text-anchor="middle" dominant-baseline="central">Task</text>
  <!-- Hourly -->
  <rect x="190" y="10" width="150" height="50" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="265" y="30" font-size="12" fill="#c4b5fd" text-anchor="middle" dominant-baseline="central">Hourly Agg (1h)</text>
  <text x="265" y="46" font-size="10" fill="#94a3b8" text-anchor="middle" dominant-baseline="central" font-style="italic">RP: 90d</text>
  <line x1="340" y1="35" x2="380" y2="35" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="360" y="28" font-size="10" fill="#f97316" text-anchor="middle" dominant-baseline="central">Task</text>
  <!-- Daily -->
  <rect x="386" y="10" width="150" height="50" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="461" y="30" font-size="12" fill="#10b981" text-anchor="middle" dominant-baseline="central">Daily Agg (1d)</text>
  <text x="461" y="46" font-size="10" fill="#94a3b8" text-anchor="middle" dominant-baseline="central" font-style="italic">RP: 365d</text>
  <line x1="536" y1="35" x2="576" y2="35" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="556" y="28" font-size="10" fill="#f97316" text-anchor="middle" dominant-baseline="central">Task</text>
  <!-- Archive -->
  <rect x="582" y="10" width="100" height="50" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="632" y="30" font-size="12" fill="#f97316" text-anchor="middle" dominant-baseline="central">Archive</text>
  <text x="632" y="46" font-size="10" fill="#94a3b8" text-anchor="middle" dominant-baseline="central" font-style="italic">Parquet (v3)</text>
</svg>