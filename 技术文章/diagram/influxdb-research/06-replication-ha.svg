<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 780">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="36" fill="#f8fafc" font-size="16" font-weight="700">InfluxDB 3 数据复制与高可用 — 多副本写入 &amp; Crash Recovery</text>
  <text x="30" y="54" fill="#94a3b8" font-size="10" font-weight="400">Router Replication → Ingester WAL ×2+ → Object Store (3 AZ) → Crash Recovery Pipeline</text>

  <!-- ===== Layer 1: Router Replication ===== -->
  <rect x="20" y="75" width="1010" height="170" rx="10" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="32" y="95" fill="#22d3ee" font-size="11" font-weight="600">Layer 1: Ingest Router — 双副本写入</text>

  <!-- Client -->
  <rect x="50" y="115" width="180" height="48" rx="6" fill="#0f172a"/>
  <rect x="50" y="115" width="180" height="48" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="140" y="136" fill="white" font-size="10" font-weight="600" text-anchor="middle">Write Client</text>
  <text x="140" y="152" fill="#94a3b8" font-size="8" text-anchor="middle">Line Protocol Batch</text>

  <!-- Ingest Router -->
  <rect x="380" y="115" width="280" height="48" rx="6" fill="#0f172a"/>
  <rect x="380" y="115" width="280" height="48" rx="6" fill="rgba(59,130,246,0.2)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="520" y="136" fill="white" font-size="10" font-weight="600" text-anchor="middle">Ingest Router</text>
  <text x="520" y="152" fill="#94a3b8" font-size="8" text-anchor="middle">Parse · Consistent Hash · Replicate</text>

  <line x1="230" y1="139" x2="378" y2="139" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Replication to 2 Ingesters -->
  <path d="M 660 115 L 720 115 L 720 90 L 880 90" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <path d="M 660 163 L 720 163 L 720 188 L 880 188" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <rect x="380" y="72" width="280" height="20" rx="4" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="0.5"/>
  <text x="520" y="86" fill="#22d3ee" font-size="8" font-weight="600" text-anchor="middle">✦ Router replicates to 2+ Ingesters BEFORE ack to client</text>

  <!-- Ingester A -->
  <rect x="880" y="70" width="135" height="40" rx="6" fill="#0f172a"/>
  <rect x="880" y="70" width="135" height="40" rx="6" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1"/>
  <text x="947" y="88" fill="#34d399" font-size="9" font-weight="600" text-anchor="middle">Ingester A</text>
  <text x="947" y="102" fill="#94a3b8" font-size="7" text-anchor="middle">WAL + Process</text>

  <!-- Ingester B -->
  <rect x="880" y="168" width="135" height="40" rx="6" fill="#0f172a"/>
  <rect x="880" y="168" width="135" height="40" rx="6" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1"/>
  <text x="947" y="186" fill="#34d399" font-size="9" font-weight="600" text-anchor="middle">Ingester B</text>
  <text x="947" y="200" fill="#94a3b8" font-size="7" text-anchor="middle">WAL + Process</text>

  <!-- Ack back -->
  <path d="M 880 90 L 840 90 L 840 110 L 660 110" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M 880 188 L 840 188 L 840 210 L 660 210" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="770" y="225" fill="#a78bfa" font-size="7">Ack → Client 收到写入确认</text>

  <!-- ===== Layer 2: WAL & Ingester Durability ===== -->
  <rect x="20" y="260" width="1010" height="180" rx="10" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="32" y="280" fill="#fbbf24" font-size="11" font-weight="600">Layer 2: Ingester WAL — 本地崩溃恢复</text>

  <!-- Ingester Internals -->
  <rect x="50" y="300" width="230" height="55" rx="6" fill="#0f172a"/>
  <rect x="50" y="300" width="230" height="55" rx="6" fill="rgba(59,130,246,0.2)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="165" y="322" fill="white" font-size="10" font-weight="600" text-anchor="middle">WAL (EBS / Local SSD)</text>
  <text x="165" y="338" fill="#94a3b8" font-size="8" text-anchor="middle">Append-Only · Ingester Local</text>
  <text x="165" y="350" fill="#94a3b8" font-size="8" text-anchor="middle">Each Ingester has its own WAL</text>

  <rect x="310" y="300" width="230" height="55" rx="6" fill="#0f172a"/>
  <rect x="310" y="300" width="230" height="55" rx="6" fill="rgba(6,78,59,0.2)" stroke="#34d399" stroke-width="1"/>
  <text x="425" y="322" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">In-Memory Buffer</text>
  <text x="425" y="338" fill="#94a3b8" font-size="8" text-anchor="middle">Sort · Dedup · Partition</text>
  <text x="425" y="350" fill="#94a3b8" font-size="8" text-anchor="middle">Pending → Parquet</text>

  <rect x="570" y="300" width="230" height="55" rx="6" fill="#0f172a"/>
  <rect x="570" y="300" width="230" height="55" rx="6" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="685" y="322" fill="white" font-size="10" font-weight="600" text-anchor="middle">WAL → Parquet Persist</text>
  <text x="685" y="338" fill="#94a3b8" font-size="8" text-anchor="middle">Flush to Object Store</text>
  <text x="685" y="350" fill="#94a3b8" font-size="8" text-anchor="middle">Then Truncate WAL</text>

  <rect x="830" y="300" width="185" height="55" rx="6" fill="#0f172a"/>
  <rect x="830" y="300" width="185" height="55" rx="6" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="922" y="322" fill="white" font-size="10" font-weight="600" text-anchor="middle">Queryable!</text>
  <text x="922" y="338" fill="#94a3b8" font-size="8" text-anchor="middle">Catalog Updated</text>
  <text x="922" y="350" fill="#94a3b8" font-size="8" text-anchor="middle">Querier Visible</text>

  <line x1="280" y1="327" x2="308" y2="327" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="540" y1="327" x2="568" y2="327" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <line x1="800" y1="327" x2="828" y2="327" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Crash recovery detail -->
  <rect x="50" y="375" width="425" height="50" rx="6" fill="rgba(136,19,55,0.1)" stroke="#fb7185" stroke-width="0.5"/>
  <text x="262" y="393" fill="#fb7185" font-size="9" font-weight="600" text-anchor="middle">⚠ Ingester Crash → 新 Ingester 启动 → 重放 WAL 恢复未持久化数据</text>
  <text x="262" y="410" fill="#94a3b8" font-size="8" text-anchor="middle">Graceful Shutdown: 先 flush WAL → Parquet 再停止</text>

  <rect x="500" y="375" width="510" height="50" rx="6" fill="rgba(34,211,238,0.08)" stroke="#22d3ee" stroke-width="0.5"/>
  <text x="755" y="393" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">✦ WAL 仅用于 Crash Recovery，不参与查询路径</text>
  <text x="755" y="410" fill="#94a3b8" font-size="8" text-anchor="middle">v3 WAL 语义与 v1/v2 完全不同 — 数据持久化 = Object Store 上的 Parquet 文件</text>

  <!-- ===== Layer 3: Object Store Replication ===== -->
  <rect x="20" y="455" width="1010" height="150" rx="10" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="32" y="475" fill="#a78bfa" font-size="11" font-weight="600">Layer 3: Object Store — 存储层 3 AZ 冗余</text>

  <!-- S3 AZ Layout -->
  <rect x="50" y="495" width="290" height="95" rx="6" fill="#0f172a"/>
  <rect x="50" y="495" width="290" height="95" rx="6" fill="rgba(76,29,149,0.15)" stroke="#a78bfa" stroke-width="1"/>
  <text x="195" y="515" fill="white" font-size="10" font-weight="600" text-anchor="middle">Availability Zone A</text>
  <rect x="75" y="530" width="115" height="35" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="132" y="553" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">Parquet Replica 1</text>
  <rect x="205" y="530" width="115" height="35" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="262" y="553" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">Catalog Backup</text>

  <rect x="380" y="495" width="290" height="95" rx="6" fill="#0f172a"/>
  <rect x="380" y="495" width="290" height="95" rx="6" fill="rgba(76,29,149,0.15)" stroke="#a78bfa" stroke-width="1"/>
  <text x="525" y="515" fill="white" font-size="10" font-weight="600" text-anchor="middle">Availability Zone B</text>
  <rect x="405" y="530" width="115" height="35" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="462" y="553" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">Parquet Replica 2</text>
  <rect x="535" y="530" width="115" height="35" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="592" y="553" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">WAL Snapshot</text>

  <rect x="710" y="495" width="290" height="95" rx="6" fill="#0f172a"/>
  <rect x="710" y="495" width="290" height="95" rx="6" fill="rgba(76,29,149,0.15)" stroke="#a78bfa" stroke-width="1"/>
  <text x="855" y="515" fill="white" font-size="10" font-weight="600" text-anchor="middle">Availability Zone C</text>
  <rect x="735" y="530" width="115" height="35" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="792" y="553" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">Parquet Replica 3</text>
  <rect x="865" y="530" width="115" height="35" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="922" y="553" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">Tx Log</text>

  <!-- ===== Summary Table ===== -->
  <rect x="20" y="625" width="1010" height="140" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>

  <text x="525" y="648" fill="#f8fafc" font-size="11" font-weight="700" text-anchor="middle">逐层数据持久化保障</text>

  <rect x="40" y="660" width="230" height="90" rx="6" fill="rgba(8,51,68,0.06)" stroke="#22d3ee" stroke-width="0.5"/>
  <text x="155" y="678" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">① Router 层</text>
  <text x="155" y="696" fill="#94a3b8" font-size="8" text-anchor="middle">双副本写入到</text>
  <text x="155" y="712" fill="#94a3b8" font-size="8" text-anchor="middle">2+ 个 Ingester</text>
  <text x="155" y="730" fill="#94a3b8" font-size="8" text-anchor="middle">写入即确认</text>

  <rect x="290" y="660" width="230" height="90" rx="6" fill="rgba(59,130,246,0.06)" stroke="#60a5fa" stroke-width="0.5"/>
  <text x="405" y="678" fill="#60a5fa" font-size="9" font-weight="600" text-anchor="middle">② Ingester 层</text>
  <text x="405" y="696" fill="#94a3b8" font-size="8" text-anchor="middle">WAL 本地持久化</text>
  <text x="405" y="712" fill="#94a3b8" font-size="8" text-anchor="middle">Crash Recovery</text>
  <text x="405" y="730" fill="#94a3b8" font-size="8" text-anchor="middle">Graceful Flush</text>

  <rect x="540" y="660" width="230" height="90" rx="6" fill="rgba(76,29,149,0.06)" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="655" y="678" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">③ Object Store 层</text>
  <text x="655" y="696" fill="#94a3b8" font-size="8" text-anchor="middle">3 AZ 冗余存储</text>
  <text x="655" y="712" fill="#94a3b8" font-size="8" text-anchor="middle">Parquet 不可变</text>
  <text x="655" y="730" fill="#94a3b8" font-size="8" text-anchor="middle">100 天延迟删除</text>

  <rect x="790" y="660" width="220" height="90" rx="6" fill="rgba(6,78,59,0.06)" stroke="#34d399" stroke-width="0.5"/>
  <text x="900" y="678" fill="#34d399" font-size="9" font-weight="600" text-anchor="middle">④ 恢复能力</text>
  <text x="900" y="696" fill="#94a3b8" font-size="8" text-anchor="middle">Ingester WAL Replay</text>
  <text x="900" y="712" fill="#94a3b8" font-size="8" text-anchor="middle">Catalog Daily Backup</text>
  <text x="900" y="730" fill="#94a3b8" font-size="8" text-anchor="middle">Object Store SLA</text>

</svg>
