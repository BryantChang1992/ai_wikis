    <rect x="100" y="0" width="14" height="14" rx="3" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
    <text x="120" y="12" fill="#94a3b8" font-size="10">Coordinator</text>
    <rect x="200" y="0" width="14" height="14" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
    <text x="220" y="12" fill="#94a3b8" font-size="10">Storage</text>
    <rect x="300" y="0" width="14" height="14" rx="3" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
    <text x="320" y="12" fill="#94a3b8" font-size="10">Lakehouse</text>
