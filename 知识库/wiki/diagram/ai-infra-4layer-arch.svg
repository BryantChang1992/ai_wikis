<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif; }
    .title { font-size: 18px; font-weight: 600; fill: #111827; }
    .label { font-size: 13px; font-weight: 600; fill: #111827; }
    .sublabel { font-size: 11px; fill: #6b7280; }
    .small { font-size: 10px; fill: #6b7280; }
  </style>

  <!-- Background -->
  <rect width="960" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" class="title">AI Infra — Agent 基础设施四层体系</text>

  <!-- Layer containers with labels -->
  <!-- L-1: 状态层 (Memory) -->
  <rect x="30" y="530" width="900" height="145" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <rect x="30" y="530" width="900" height="28" rx="8" fill="#dcfce7"/>
  <rect x="30" y="550" width="900" height="8" fill="#dcfce7"/>
  <text x="50" y="549" class="label">L-1: 状态层 — Agent Memory</text>

  <!-- L0: 控制面 -->
  <rect x="30" y="370" width="900" height="145" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <rect x="30" y="370" width="900" height="28" rx="8" fill="#ede9fe"/>
  <rect x="30" y="390" width="900" height="8" fill="#ede9fe"/>
  <text x="50" y="389" class="label">L0: 控制面 — Cost &amp; Vendor Strategy</text>

  <!-- L1: Harness 层 -->
  <rect x="30" y="210" width="900" height="145" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="30" y="210" width="900" height="28" rx="8" fill="#dbeafe"/>
  <rect x="30" y="230" width="900" height="8" fill="#dbeafe"/>
  <text x="50" y="229" class="label">L1: Harness 层 — Agent 执行引擎</text>

  <!-- L2: 安全层 -->
  <rect x="30" y="50" width="900" height="145" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <rect x="30" y="50" width="900" height="28" rx="8" fill="#fee2e2"/>
  <rect x="30" y="70" width="900" height="8" fill="#fee2e2"/>
  <text x="50" y="69" class="label">L2: 安全层 — Triple Defense-in-Depth</text>

  <!-- L4: 进化层 (side panel) -->
  <rect x="700" y="310" width="230" height="45" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="338" class="label">L4: 进化层</text>
  <text x="880" y="338" text-anchor="end" class="sublabel">Hill Climbing</text>

  <!-- Memory nodes -->
  <rect x="60" y="575" width="200" height="45" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="594" text-anchor="middle" class="label">Agent Memory Survey</text>
  <text x="160" y="610" text-anchor="middle" class="sublabel">五大机制家族 · 三维分类</text>

  <rect x="290" y="575" width="200" height="45" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="594" text-anchor="middle" class="label">Agentic Memory 语义缓存</text>
  <text x="390" y="610" text-anchor="middle" class="sublabel">向量检索 · 探针复用</text>

  <rect x="520" y="575" width="180" height="45" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="594" text-anchor="middle" class="label">Agent-First Data</text>
  <text x="610" y="610" text-anchor="middle" class="sublabel">分支事务 · 语义缓存</text>

  <!-- Control plane nodes -->
  <rect x="60" y="415" width="220" height="45" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="434" text-anchor="middle" class="label">Gateway 成本控制</text>
  <text x="170" y="450" text-anchor="middle" class="sublabel">四维预算 · 分钟级可观测性</text>

  <rect x="310" y="415" width="220" height="45" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="420" y="434" text-anchor="middle" class="label">模型中立与反锁定</text>
  <text x="420" y="450" text-anchor="middle" class="sublabel">Per-Request 模型切换</text>

  <!-- Harness nodes -->
  <rect x="60" y="255" width="190" height="45" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="155" y="274" text-anchor="middle" class="label">Middleware 架构</text>
  <text x="155" y="290" text-anchor="middle" class="sublabel">四杠杆 · 六个钩子</text>

  <rect x="275" y="255" width="190" height="45" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="274" text-anchor="middle" class="label">Loop Engineering</text>
  <text x="370" y="290" text-anchor="middle" class="sublabel">四层循环 · 自我进化</text>

  <rect x="490" y="255" width="190" height="45" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="585" y="274" text-anchor="middle" class="label">Fault Tolerance</text>
  <text x="585" y="290" text-anchor="middle" class="sublabel">Retry · Timeout · SAGA</text>

  <!-- Security nodes -->
  <rect x="60" y="95" width="200" height="45" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="114" text-anchor="middle" class="label">Sandbox 安全沙箱</text>
  <text x="160" y="130" text-anchor="middle" class="sublabel">Lethal Trifecta · 五要素</text>

  <rect x="290" y="95" width="200" height="45" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="114" text-anchor="middle" class="label">Anthropic 容器化</text>
  <text x="390" y="130" text-anchor="middle" class="sublabel">三种隔离模式 · 审批疲劳</text>

  <rect x="520" y="95" width="200" height="45" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="114" text-anchor="middle" class="label">Parallax 架构分离</text>
  <text x="620" y="130" text-anchor="middle" class="sublabel">Think-Act 分离 · 98.9%</text>

  <!-- Vertical arrows: Memory → Control -->
  <line x1="160" y1="575" x2="170" y2="460" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="130" y="520" class="small">memory state</text>

  <line x1="420" y1="575" x2="420" y2="460" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Vertical arrows: Control → Harness -->
  <line x1="170" y1="415" x2="155" y2="300" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="135" y="360" class="small">cost-aware routing</text>

  <line x1="420" y1="415" x2="370" y2="300" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="390" y="360" class="small">model selection</text>

  <!-- Vertical arrows: Harness → Security -->
  <line x1="160" y1="255" x2="160" y2="140" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="118" y="200" class="small">tool execution</text>

  <line x1="585" y1="255" x2="620" y2="140" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Horizontal links within Security layer -->
  <line x1="260" y1="118" x2="290" y2="118" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="490" y1="118" x2="520" y2="118" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Hill Climbing loop feedback -->
  <path d="M 700 332 L 640 332 L 640 500 L 420 500 L 420 540" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="455" y="520" class="small">trace analysis</text>

  <!-- Legend -->
  <rect x="30" y="687" width="900" height="1" fill="#e5e7eb"/>
  <rect x="560" y="530" width="180" height="80" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="578" y="550" class="label" font-size="11">Legend</text>
  <line x1="578" y1="563" x2="618" y2="563" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="625" y="567" class="small">Data Flow / Execution</text>
  <line x1="578" y1="578" x2="618" y2="578" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="625" y="582" class="small">Cross-Reference / Link</text>
  <line x1="578" y1="593" x2="618" y2="593" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="625" y="597" class="small">Feedback / Optimization</text>

</svg>