<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="480" y="32" fill="white" font-size="16" font-weight="700" text-anchor="middle">CockroachDB Leader Leases 三层解耦</text>
  <text x="480" y="54" fill="#94a3b8" font-size="11" text-anchor="middle">SIGMOD 2026 · Lease ← Fortification ← Liveness Fabric · CPU 节省 85%+</text>

  <!-- Outer container -->
  <rect x="30" y="80" width="900" height="310" rx="10" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- L1: Leader Lease (Primary - cyan) -->
  <rect x="60" y="100" width="840" height="85" rx="8" fill="#0f172a"/>
  <rect x="60" y="100" width="840" height="85" rx="8" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="80" y="125" fill="#22d3ee" font-size="14" font-weight="700" text-anchor="middle">L1: Leader Lease (租约)</text>

  <text x="250" y="128" fill="#cbd5e1" font-size="10">├ 基于时间的 Leader 授权 · 任期内无需心跳确认</text>
  <text x="250" y="148" fill="#cbd5e1" font-size="10">├ 替代传统 Raft heartbeat 的巨大改进: Leader 无需每次操作都等 quorum</text>
  <text x="250" y="168" fill="#94a3b8" font-size="10">└ 关键: Lease 的有效期由 Fortification 保证</text>

  <!-- Arrow L1 → L2 -->
  <line x1="480" y1="185" x2="480" y2="193" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- L2: Leader Fortification (Secondary - emerald) -->
  <rect x="60" y="195" width="840" height="85" rx="8" fill="#0f172a"/>
  <rect x="60" y="195" width="840" height="85" rx="8" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="80" y="220" fill="#34d399" font-size="14" font-weight="700" text-anchor="middle">L2: Leader Fortification (领导强化)</text>

  <text x="285" y="223" fill="#cbd5e1" font-size="10">├ MsgFortifyLeader: 确定性承诺替代心跳超时推测</text>
  <text x="285" y="243" fill="#cbd5e1" font-size="10">├ Raft 增强: Leader 获得 Majority 的显式"我不挑战你"承诺</text>
  <text x="285" y="263" fill="#94a3b8" font-size="10">└ 与心跳超时的本质区别: 心跳是"假设没出事"→ Fortification 是"确认没出事"</text>

  <!-- Arrow L2 → L3 -->
  <line x1="480" y1="280" x2="480" y2="288" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- L3: Liveness Fabric (Tertiary - violet) -->
  <rect x="60" y="290" width="840" height="85" rx="8" fill="#0f172a"/>
  <rect x="60" y="290" width="840" height="85" rx="8" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="80" y="315" fill="#a78bfa" font-size="14" font-weight="700" text-anchor="middle">L3: Liveness Fabric (故障检测层)</text>

  <text x="282" y="318" fill="#cbd5e1" font-size="10">├ 去中心化集群故障检测: 每个节点维护有向 support 关系 (epoch, expiration)</text>
  <text x="282" y="338" fill="#cbd5e1" font-size="10">├ 复杂度 O(N_nodes²): 每对节点独立维护双向 support graph</text>
  <text x="282" y="358" fill="#94a3b8" font-size="10">└ 输出: 上层 Fortification 可据此判断"多少节点还活着"→ Lease 是否有效</text>

  <!-- Bottom impact summary (Alert - rose accent) -->
  <rect x="120" y="385" width="720" height="26" rx="6" fill="#0f172a"/>
  <rect x="120" y="385" width="720" height="26" rx="6" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="480" y="403" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">核心影响: CPU 节省 85%+ · Leader Lease 消除每次操作的心跳等待 · 延迟降低 · 吞吐提升</text>
</svg>