  <rect x="245" y="372" width="195" height="48" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="343" y="392" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Paxos</text>
  <text x="343" y="408" fill="#6b7280" font-size="10" text-anchor="middle">majority quorum</text>
  <rect x="460" y="372" width="195" height="48" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="558" y="392" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">TrueTime</text>
  <text x="558" y="408" fill="#6b7280" font-size="10" text-anchor="middle">Google Spanner</text>
  <rect x="675" y="372" width="195" height="48" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="773" y="392" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Hybrid LC</text>
  <text x="773" y="408" fill="#6b7280" font-size="10" text-anchor="middle">HLC/HLClock</text>
