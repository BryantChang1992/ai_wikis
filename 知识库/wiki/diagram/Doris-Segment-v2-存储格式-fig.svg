<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ar4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M0,0 L8,3 L0,6 Z" fill="currentColor"/>
    </marker>
      <marker id="arrow-6b7280" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
