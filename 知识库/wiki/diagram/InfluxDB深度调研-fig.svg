<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 230">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: "SF Mono","Fira Code","Cascadia Code","Courier New","Microsoft YaHei","SimHei",monospace; }
  </style>
  <rect width="720" height="230" fill="url(#bg-grad)"/>
  <!-- Root -->
  <rect x="260" y="10" width="200" height="28" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="360" y="24" font-size="13" fill="#a855f7" text-anchor="middle" dominant-baseline="central" font-weight="700">InfluxDB 概念体系</text>
  <!-- Lines from root down -->
  <line x1="360" y1="38" x2="360" y2="52" stroke="#334155" stroke-width="1.2"/>
  <line x1="55" y1="52" x2="690" y2="52" stroke="#334155" stroke-width="1.2"/>
  <!-- 7 vertical drops -->
  <line x1="55" y1="52" x2="55" y2="68" stroke="#334155" stroke-width="1.2"/>
  <line x1="150" y1="52" x2="150" y2="68" stroke="#334155" stroke-width="1.2"/>
  <line x1="240" y1="52" x2="240" y2="68" stroke="#334155" stroke-width="1.2"/>
  <line x1="340" y1="52" x2="340" y2="68" stroke="#334155" stroke-width="1.2"/>
  <line x1="445" y1="52" x2="445" y2="68" stroke="#334155" stroke-width="1.2"/>
  <line x1="525" y1="52" x2="525" y2="68" stroke="#334155" stroke-width="1.2"/>
  <line x1="625" y1="52" x2="625" y2="68" stroke="#334155" stroke-width="1.2"/>
  <!-- Column 1: 数据模型 -->
  <text x="14" y="84" font-size="12" fill="#e2e8f0" font-weight="700">[[数据模型]]</text>
  <text x="14" y="102" font-size="10" fill="#94a3b8" font-style="italic">Measurement / Tag</text>
  <text x="14" y="116" font-size="10" fill="#94a3b8" font-style="italic">Field / Timestamp</text>
  <text x="14" y="130" font-size="10" fill="#94a3b8" font-style="italic">Series / Cardinality</text>
  <!-- Column 2: TSM存储引擎 -->
  <text x="108" y="84" font-size="12" fill="#e2e8f0" font-weight="700">[[TSM存储引擎]]</text>
  <text x="108" y="102" font-size="10" fill="#94a3b8" font-style="italic">TSM 引擎 + TSI 倒排索引</text>
  <text x="108" y="116" font-size="10" fill="#94a3b8" font-style="italic">WAL + Cache + Compaction</text>
  <!-- Column 3: v3 列存引擎 -->
  <text x="200" y="84" font-size="12" fill="#e2e8f0" font-weight="700">[[v3 列存引擎]]</text>
  <text x="200" y="102" font-size="10" fill="#94a3b8" font-style="italic">Parquet / Arrow</text>
  <text x="200" y="116" font-size="10" fill="#94a3b8" font-style="italic">DataFusion / 存算分离</text>
  <text x="200" y="130" font-size="10" fill="#94a3b8" font-style="italic">无索引剪枝</text>
  <!-- Column 4: 写入与查询路径 -->
  <text x="294" y="84" font-size="12" fill="#e2e8f0" font-weight="700">[[写入与查询]]</text>
  <text x="294" y="102" font-size="10" fill="#94a3b8" font-style="italic">v1/v2 Iterator 模式</text>
  <text x="294" y="116" font-size="10" fill="#94a3b8" font-style="italic">v3 DataFusion 向量化</text>
  <text x="294" y="130" font-size="10" fill="#94a3b8" font-style="italic">Object Store 扫描</text>
  <!-- Column 5: 指标设计与基数 -->
  <text x="400" y="84" font-size="12" fill="#e2e8f0" font-weight="700">[[指标设计]]</text>
  <text x="400" y="102" font-size="10" fill="#94a3b8" font-style="italic">Tag/Field 决策</text>
  <text x="400" y="116" font-size="10" fill="#94a3b8" font-style="italic">基数计算</text>
  <text x="400" y="130" font-size="10" fill="#94a3b8" font-style="italic">五大实践</text>
  <!-- Column 6: 多副本与高可用 -->
  <text x="484" y="84" font-size="12" fill="#e2e8f0" font-weight="700">[[多副本&amp;高可用]]</text>
  <text x="484" y="102" font-size="10" fill="#94a3b8" font-style="italic">Router 双副本</text>
  <text x="484" y="116" font-size="10" fill="#94a3b8" font-style="italic">WAL 崩溃恢复</text>
  <text x="484" y="130" font-size="10" fill="#94a3b8" font-style="italic">Object Store 3 AZ</text>
  <!-- Column 7: Catalog元数据 -->
  <text x="582" y="84" font-size="12" fill="#e2e8f0" font-weight="700">[[Catalog元数据]]</text>
  <text x="582" y="102" font-size="10" fill="#94a3b8" font-style="italic">PostgreSQL RDBMS</text>
  <text x="582" y="116" font-size="10" fill="#94a3b8" font-style="italic">BoltDB vs 独立服务</text>
</svg>