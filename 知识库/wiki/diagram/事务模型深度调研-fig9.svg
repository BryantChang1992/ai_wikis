<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" width="680" height="340">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascada Code','Courier New','Microsoft YaHei','SimHei',monospace; }
    .t1 { fill: #e2e8f0; font-size: 14px; font-weight: bold; }
    .t2 { fill: #e2e8f0; font-size: 12px; }
    .t3 { fill: #94a3b8; font-size: 11px; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="ad" markerWidth="6" markerHeight="8" refX="3" refY="7" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 3 8, 6 0" fill="#a855f7"/></marker>
  </defs>
  <rect width="680" height="340" fill="url(#bg)"/>
  <!-- Server Layer -->
  <rect x="160" y="5" width="360" height="38" rx="6" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="340" y="27" class="t1" text-anchor="middle" dominant-baseline="middle">Server Layer: SQL Parser → Optimizer</text>
  <line x1="340" y1="43" x2="340" y2="63" stroke="#a855f7" stroke-width="1.5" marker-end="url(#ad)"/>
  <!-- InnoDB outer -->
  <rect x="140" y="68" width="400" height="258" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="340" y="88" class="t1" text-anchor="middle" dominant-baseline="middle">InnoDB Engine</text>
  <!-- Buffer Pool -->
  <rect x="155" y="98" width="370" height="60" rx="4" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="340" y="113" class="t2" text-anchor="middle" dominant-baseline="middle">Buffer Pool (内存)</text>
  <rect x="175" y="120" width="155" height="28" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="252" y="136" class="t2" text-anchor="middle" dominant-baseline="middle">Pages</text>
  <rect x="350" y="120" width="155" height="28" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="427" y="136" class="t2" text-anchor="middle" dominant-baseline="middle">Undo Log</text>
  <!-- Redo Log Buffer -->
  <line x1="340" y1="158" x2="340" y2="175" stroke="#a855f7" stroke-width="1.5" marker-end="url(#ad)"/>
  <rect x="155" y="180" width="370" height="32" rx="4" fill="#0f172a" stroke="#f97316" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="340" y="198" class="t2" text-anchor="middle" dominant-baseline="middle">Redo Log Buffer</text>
  <!-- ib_logfile -->
  <line x1="340" y1="212" x2="340" y2="230" stroke="#a855f7" stroke-width="1.5" marker-end="url(#ad)"/>
  <rect x="180" y="235" width="320" height="36" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="340" y="255" class="t2" text-anchor="middle" dominant-baseline="middle">ib_logfile (磁盘)</text>
</svg>