<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 410" width="800" height="410">
  <style>
    text { font-family: "Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei","Microsoft JhengHei","SimHei",sans-serif; }
  </style>
  <defs>
    <marker id="a-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="a-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="800" height="410" fill="#ffffff"/>
  <text x="30" y="32" fill="#111827" font-size="16" font-weight="700">Log-as-the-Database Pattern</text>
  <text x="30" y="50" fill="#6b7280" font-size="11">Immutable append-only log as source of truth, materialized views for reads</text>
  <text x="30" y="82" fill="#dc2626" font-size="12" font-weight="700">Traditional DB</text>
  <text x="430" y="82" fill="#16a34a" font-size="12" font-weight="700">Log-as-DB</text>
  <rect x="30" y="96" width="340" height="44" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="200" y="116" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Write → Pages</text>
  <text x="200" y="132" fill="#6b7280" font-size="9" text-anchor="middle">random writes</text>
  <rect x="30" y="148" width="340" height="44" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="200" y="168" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Buffer Pool</text>
  <text x="200" y="184" fill="#6b7280" font-size="9" text-anchor="middle">dirty pages</text>
  <rect x="30" y="200" width="340" height="44" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="200" y="220" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">WAL</text>
  <text x="200" y="236" fill="#6b7280" font-size="9" text-anchor="middle">crash recovery</text>
  <rect x="430" y="96" width="340" height="44" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="600" y="116" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Log → Compaction</text>
  <text x="600" y="132" fill="#6b7280" font-size="9" text-anchor="middle">merge by key</text>
  <rect x="430" y="148" width="340" height="44" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="600" y="168" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Log → MV</text>
  <text x="600" y="184" fill="#6b7280" font-size="9" text-anchor="middle">materialized view</text>
  <rect x="430" y="200" width="340" height="44" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="600" y="220" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">MV Query</text>
  <text x="600" y="236" fill="#6b7280" font-size="9" text-anchor="middle">point read</text>
  <line x1="375" y1="200" x2="422" y2="200" stroke="#9333ea" stroke-width="1.5" marker-end="url(#a-purple)"/>
  <text x="30" y="280" fill="#9333ea" font-size="12" font-weight="700">Systems Using This Pattern</text>
  <rect x="30" y="298" width="140" height="44" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="100" y="318" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Kafka</text>
  <text x="100" y="334" fill="#6b7280" font-size="9" text-anchor="middle">event sourcing</text>
  <rect x="185" y="298" width="140" height="44" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="255" y="318" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Flink</text>
  <text x="255" y="334" fill="#6b7280" font-size="9" text-anchor="middle">changelog</text>
  <rect x="340" y="298" width="140" height="44" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="410" y="318" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Materialize</text>
  <text x="410" y="334" fill="#6b7280" font-size="9" text-anchor="middle">SQL MV</text>
  <rect x="495" y="298" width="140" height="44" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="565" y="318" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">RisingWave</text>
  <text x="565" y="334" fill="#6b7280" font-size="9" text-anchor="middle">streaming DB</text>
  <rect x="650" y="298" width="140" height="44" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="720" y="318" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Fluss</text>
  <text x="720" y="334" fill="#6b7280" font-size="9" text-anchor="middle">Arrow Lake</text>
  <g transform="translate(30,380)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="20" y="12" fill="#6b7280" font-size="10">Traditional</text>
    <rect x="140" y="0" width="14" height="14" rx="3" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="160" y="12" fill="#6b7280" font-size="10">Log-as-DB</text>
    <rect x="280" y="0" width="14" height="14" rx="3" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="300" y="12" fill="#6b7280" font-size="10">Systems</text>
  </g>
</svg>
