  <text x="125" y="330" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">LogSegment</text>
  <text x="125" y="346" fill="#6b7280" font-size="9" text-anchor="middle">KV dispatcher</text>
  <rect x="240" y="310" width="190" height="48" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="335" y="330" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">RocksDB WAL</text>
  <text x="335" y="346" fill="#6b7280" font-size="9" text-anchor="middle">durability</text>
  <rect x="450" y="310" width="190" height="48" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="545" y="330" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Tiered Compact</text>
  <text x="545" y="346" fill="#6b7280" font-size="9" text-anchor="middle">L0→S3</text>
  <rect x="660" y="310" width="190" height="48" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="755" y="330" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Arrow Batch</text>
  <text x="755" y="346" fill="#6b7280" font-size="9" text-anchor="middle">col. read</text>
  <text x="30" y="386" fill="#16a34a" font-size="12" font-weight="700">03 // WIKI CARD COVERAGE — 10 cards</text>
