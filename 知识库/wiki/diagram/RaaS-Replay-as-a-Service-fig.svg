<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260">
  <defs>
    <marker id="arrow-raas1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="currentColor"/>
    </marker>
    <marker id="arrow-raas2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="currentColor"/>
    </marker>
    <marker id="arrow-raas3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="currentColor"/>
    </marker>
    <marker id="arrow-raas4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="currentColor"/>
    </marker>
  </defs>
  <!-- Top row -->
  <rect x="10" y="5" width="120" height="28" rx="5" fill="transparent" stroke="currentColor" stroke-width="1.2"/>
  <text x="70" y="19" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Compute Layer</text>
  <line x1="130" y1="19" x2="210" y2="19" stroke="currentColor" stroke-width="1.2" marker-end="url(#arrow-raas1)"/>
  <text x="160" y="13" font-family="sans-serif" font-size="10" fill="currentColor" text-anchor="middle" dominant-baseline="middle">redo log</text>
  <rect x="213" y="5" width="120" height="28" rx="5" fill="transparent" stroke="currentColor" stroke-width="1.2"/>
  <text x="273" y="19" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Log Store</text>
  <line x1="333" y1="19" x2="413" y2="19" stroke="currentColor" stroke-width="1.2" marker-end="url(#arrow-raas2)"/>
  <text x="363" y="13" font-family="sans-serif" font-size="10" fill="currentColor" text-anchor="middle" dominant-baseline="middle">redo log</text>
  <rect x="416" y="5" width="120" height="28" rx="5" fill="transparent" stroke="currentColor" stroke-width="1.2"/>
  <text x="476" y="19" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Storage Layer</text>

  <!-- Down arrow from Storage Layer -->
  <line x1="476" y1="33" x2="476" y2="65" stroke="currentColor" stroke-width="1.5"/>
  <text x="500" y="50" font-family="sans-serif" font-size="10" fill="currentColor" text-anchor="start" dominant-baseline="middle" font-style="italic">① offload task</text>
  <line x1="476" y1="65" x2="476" y2="70" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow-raas3)"/>

  <!-- Control Coordinator -->
  <rect x="380" y="73" width="190" height="28" rx="5" fill="transparent" stroke="currentColor" stroke-width="1.2"/>
  <text x="475" y="87" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Control Coordinator</text>

  <!-- Coordinator sub-items -->
  <line x1="475" y1="101" x2="475" y2="110" stroke="currentColor" stroke-width="1"/>
  <text x="390" y="120" font-family="sans-serif" font-size="10" fill="currentColor" text-anchor="start" dominant-baseline="middle">├─ Monitor</text>
  <text x="390" y="138" font-family="sans-serif" font-size="10" fill="currentColor" text-anchor="start" dominant-baseline="middle">├─ Scheduler</text>
  <text x="440" y="156" font-family="sans-serif" font-size="10" fill="currentColor" text-anchor="start" dominant-baseline="middle">└─ Dispatcher</text>

  <!-- Arrow down from Coordinator -->
  <line x1="475" y1="84" x2="570" y2="84" stroke="currentColor" stroke-width="1.2"/>
  <line x1="570" y1="84" x2="570" y2="135" stroke="currentColor" stroke-width="1.2" marker-end="url(#arrow-raas4)"/>

  <!-- RSA -->
  <rect x="450" y="138" width="240" height="40" rx="5" fill="transparent" stroke="currentColor" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="570" y="152" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">RSA (Replay Service Agent)</text>
  <text x="570" y="170" font-family="sans-serif" font-size="10" fill="currentColor" text-anchor="middle" dominant-baseline="middle" font-style="italic">on idle storage/compute nodes</text>

  <!-- Down arrow from RSA -->
  <line x1="570" y1="178" x2="570" y2="195" stroke="currentColor" stroke-width="1.2"/>
  <text x="590" y="200" font-family="sans-serif" font-size="10" fill="currentColor" text-anchor="start" dominant-baseline="middle" font-style="italic">② fetch/write</text>
  <line x1="570" y1="195" x2="570" y2="210" stroke="currentColor" stroke-width="1.2"/>

  <!-- AWS S3 -->
  <rect x="460" y="212" width="220" height="28" rx="5" fill="transparent" stroke="currentColor" stroke-width="1.2"/>
  <text x="570" y="226" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">AWS S3</text>
</svg>