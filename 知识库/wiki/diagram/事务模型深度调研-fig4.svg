<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="currentColor"/></marker>
    <marker id="a4d" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto"><path d="M0,0 L3,8 L6,0 Z" fill="currentColor"/></marker>
  </defs>
  <text x="10" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="currentColor">生产者流程:</text>
  <!-- Step 1 -->
  <rect x="10" y="30" width="160" height="36" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="90" y="50" font-family="sans-serif" font-size="13" fill="currentColor" text-anchor="middle" dominant-baseline="middle">1. 发送半消息</text>
  <line x1="170" y1="48" x2="240" y2="48" stroke="currentColor" stroke-width="2" marker-end="url(#a4)"/>
  <rect x="250" y="30" width="160" height="36" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="330" y="50" font-family="sans-serif" font-size="13" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Broker (消息不可见)</text>
  <!-- Arrow down -->
  <line x1="90" y1="66" x2="90" y2="85" stroke="currentColor" stroke-width="2" marker-end="url(#a4d)"/>
  <!-- Step 2 -->
  <rect x="10" y="90" width="160" height="36" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="90" y="110" font-family="sans-serif" font-size="13" fill="currentColor" text-anchor="middle" dominant-baseline="middle">2. 执行本地事务</text>
  <!-- Branch -->
  <line x1="90" y1="126" x2="90" y2="140" stroke="currentColor" stroke-width="2"/>
  <line x1="20" y1="140" x2="160" y2="140" stroke="currentColor" stroke-width="2"/>
  <line x1="20" y1="140" x2="20" y2="155" stroke="currentColor" stroke-width="2" marker-end="url(#a4d)"/>
  <line x1="160" y1="140" x2="160" y2="155" stroke="currentColor" stroke-width="2" marker-end="url(#a4d)"/>
  <rect x="-30" y="160" width="100" height="30" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="20" y="177" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Commit</text>
  <rect x="140" y="160" width="70" height="30" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="175" y="177" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">Rollback</text>
  <line x1="20" y1="190" x2="20" y2="205" stroke="currentColor" stroke-width="2" marker-end="url(#a4d)"/>
  <line x1="175" y1="190" x2="175" y2="205" stroke="currentColor" stroke-width="2" marker-end="url(#a4d)"/>
  <text x="20" y="220" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">消息可见</text>
  <text x="175" y="220" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">消息删除</text>
  <!-- Broker 回查 -->
  <rect x="230" y="170" width="200" height="68" rx="6" fill="transparent" stroke="currentColor" stroke-width="2"/>
  <text x="330" y="192" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="middle" dominant-baseline="middle">3. Broker 定期回查（未决事务）</text>
  <text x="330" y="210" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="middle" dominant-baseline="middle">→ 调用 Producer 的 check</text>
  <text x="330" y="226" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="middle" dominant-baseline="middle">→ 决定 Commit 或 Rollback</text>
</svg>