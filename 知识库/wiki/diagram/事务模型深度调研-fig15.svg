<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 90" xmlns="http://www.w3.org/2000/svg">
<rect x="10" y="10" width="580" height="70" rx="4" fill="transparent" stroke="currentColor" stroke-width="1.5"/>
<text x="300" y="30" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="middle" dominant-baseline="middle">读路径:</text>
<text x="25" y="50" font-family="sans-serif" font-size="10" fill="currentColor" text-anchor="start" dominant-baseline="middle">遇到 Write Intent → 查找 Transaction Record</text>
<text x="25" y="68" font-family="sans-serif" font-size="10" fill="currentColor" text-anchor="start" dominant-baseline="middle">COMMITTED → 读取该值 | PENDING → 等待或推入 STAGING | ABORTED → 忽略，读旧版本</text>
</svg>