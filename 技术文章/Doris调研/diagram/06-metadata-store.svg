<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="monospace, 'Courier New', 'Noto Sans SC'">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <!-- Glow filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowViolet" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowViolet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fb923c"/>
    </marker>
    <marker id="arrowGrey" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="720" fill="#0f172a"/>
  <rect width="1000" height="720" fill="url(#grid)"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" fill="#22d3ee" font-size="16" font-weight="bold">Apache Doris — 元数据存储结构演进</text>
  <line x1="260" y1="38" x2="740" y2="38" stroke="#22d3ee" stroke-width="0.5" opacity="0.4"/>

  <!-- ===== SECTION 1: BDB-JE (top, y: 52 - 235) ===== -->
  <rect x="8" y="52" width="984" height="180" rx="6" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.3"/>
  <text x="20" y="72" fill="#22d3ee" font-size="12" font-weight="bold">Section 1: BDB-JE 元数据存储 (v0.x ~ v2.x)</text>

  <!-- FE Master box -->
  <rect x="30" y="88" width="180" height="60" rx="5" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="120" y="112" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold">FE Master</text>
  <text x="120" y="130" text-anchor="middle" fill="#94a3b8" font-size="9">BDB-JE 嵌入式</text>
  <text x="120" y="143" text-anchor="middle" fill="#94a3b8" font-size="9">(单点写入)</text>

  <!-- BDB-JE storage icon -->
  <rect x="230" y="88" width="120" height="60" rx="5" fill="#22d3ee" fill-opacity="0.06" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="290" y="108" text-anchor="middle" fill="#22d3ee" font-size="9" font-weight="bold">BDB-JE KV</text>
  <text x="290" y="122" text-anchor="middle" fill="#94a3b8" font-size="8">本地磁盘</text>
  <text x="290" y="136" text-anchor="middle" fill="#94a3b8" font-size="8">单机 HA (BDB)</text>

  <!-- Arrow: Master → BDB-JE -->
  <line x1="210" y1="118" x2="228" y2="118" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrowCyan)"/>

  <!-- FE Followers -->
  <rect x="30" y="168" width="130" height="44" rx="5" fill="#22d3ee" fill-opacity="0.08" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="95" y="188" text-anchor="middle" fill="#22d3ee" font-size="10">FE Follower 1</text>
  <text x="95" y="202" text-anchor="middle" fill="#94a3b8" font-size="8">(只读元数据)</text>

  <rect x="180" y="168" width="130" height="44" rx="5" fill="#22d3ee" fill-opacity="0.08" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="245" y="188" text-anchor="middle" fill="#22d3ee" font-size="10">FE Follower 2</text>
  <text x="245" y="202" text-anchor="middle" fill="#94a3b8" font-size="8">(只读元数据)</text>

  <!-- EditLog arrows to followers -->
  <line x1="120" y1="148" x2="95" y2="166" stroke="#fbbf24" stroke-width="1" marker-end="url(#arrowAmber)" stroke-dasharray="4,2"/>
  <line x1="120" y1="148" x2="245" y2="166" stroke="#fbbf24" stroke-width="1" marker-end="url(#arrowAmber)" stroke-dasharray="4,2"/>

  <!-- File layout tree -->
  <rect x="380" y="82" width="270" height="134" rx="5" fill="#1e293b" fill-opacity="0.6" stroke="#334155" stroke-width="0.8"/>
  <text x="515" y="100" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="bold">BDB-JE 文件布局 (fe/meta/bdb/)</text>
  <line x1="395" y1="106" x2="635" y2="106" stroke="#334155" stroke-width="0.5"/>
  <rect x="395" y="112" width="240" height="18" rx="3" fill="#22d3ee" fill-opacity="0.08"/>
  <text x="405" y="125" fill="#22d3ee" font-size="9">bdb/</text>
  <rect x="435" y="112" width="25" height="18" rx="3" fill="#1e293b"/>
  <text x="447" y="125" text-anchor="middle" fill="#94a3b8" font-size="9">JE</text>
  <rect x="468" y="112" width="55" height="18" rx="3" fill="#1e293b"/>
  <text x="495" y="125" text-anchor="middle" fill="#94a3b8" font-size="8">00000000.jdb</text>
  <rect x="531" y="112" width="55" height="18" rx="3" fill="#1e293b"/>
  <text x="558" y="125" text-anchor="middle" fill="#94a3b8" font-size="8">*.jdb (log)</text>
  <rect x="395" y="134" width="240" height="18" rx="3" fill="#22d3ee" fill-opacity="0.08"/>
  <text x="405" y="147" fill="#22d3ee" font-size="9">image/</text>
  <rect x="460" y="134" width="60" height="18" rx="3" fill="#1e293b"/>
  <text x="490" y="147" text-anchor="middle" fill="#94a3b8" font-size="8">image.xxx</text>
  <rect x="530" y="134" width="55" height="18" rx="3" fill="#1e293b"/>
  <text x="557" y="147" text-anchor="middle" fill="#94a3b8" font-size="8">(快照)</text>
  <rect x="395" y="156" width="240" height="18" rx="3" fill="#22d3ee" fill-opacity="0.08"/>
  <text x="405" y="169" fill="#22d3ee" font-size="9">edit_log/</text>
  <rect x="480" y="156" width="70" height="18" rx="3" fill="#1e293b"/>
  <text x="515" y="169" text-anchor="middle" fill="#fbbf24" font-size="8">edits.xxx</text>
  <rect x="555" y="156" width="60" height="18" rx="3" fill="#1e293b"/>
  <text x="585" y="169" text-anchor="middle" fill="#94a3b8" font-size="8">(增量日志)</text>
  <text x="515" y="197" text-anchor="middle" fill="#fbbf24" font-size="9">EditLog → BRPC 广播 → Followers 回放</text>
  <line x1="372" y1="158" x2="393" y2="138" stroke="#22d3ee" stroke-width="0.6" stroke-dasharray="2,2" opacity="0.5"/>
  <line x1="372" y1="188" x2="393" y2="188" stroke="#fbbf24" stroke-width="0.6" stroke-dasharray="2,2" opacity="0.5"/>

  <!-- Section 1 notes -->
  <text x="680" y="112" fill="#94a3b8" font-size="8">• 基于 Berkeley DB Java Edition</text>
  <text x="680" y="127" fill="#94a3b8" font-size="8">• Master 单点写入, Follower 回放</text>
  <text x="680" y="142" fill="#94a3b8" font-size="8">• EditLog 增量 + Image 全量快照</text>
  <text x="680" y="157" fill="#94a3b8" font-size="8">• 存算耦合, 扩缩容困难</text>
  <text x="680" y="172" fill="#94a3b8" font-size="8">• 元数据大小受限于单机 BDB</text>

  <!-- ===== SECTION 2: Evolution Arrow (y: 240 - 285) ===== -->
  <rect x="150" y="242" width="700" height="36" rx="8" fill="#fbbf24" fill-opacity="0.1" stroke="#fbbf24" stroke-width="1"/>
  <text x="500" y="265" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">→ 3.0 存算分离架构变革 →</text>

  <!-- ===== SECTION 3: Meta Service (bottom-left, y: 290 - 525) ===== -->
  <rect x="8" y="290" width="498" height="235" rx="6" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
  <text x="20" y="310" fill="#a78bfa" font-size="12" font-weight="bold">Section 3: Meta Service 存算分离 (v3.0+)</text>

  <!-- FE nodes -->
  <rect x="30" y="325" width="80" height="36" rx="4" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-width="1"/>
  <text x="70" y="346" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="bold">FE 1</text>

  <rect x="30" y="375" width="80" height="36" rx="4" fill="#22d3ee" fill-opacity="0.08" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="70" y="396" text-anchor="middle" fill="#22d3ee" font-size="9">FE 2</text>

  <rect x="30" y="425" width="80" height="36" rx="4" fill="#22d3ee" fill-opacity="0.08" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="70" y="446" text-anchor="middle" fill="#22d3ee" font-size="9">FE 3</text>

  <!-- Meta Service box -->
  <rect x="155" y="335" width="170" height="90" rx="6" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="240" y="358" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">Meta Service</text>
  <line x1="170" y1="366" x2="310" y2="366" stroke="#a78bfa" stroke-width="0.4" opacity="0.4"/>
  <text x="240" y="383" text-anchor="middle" fill="#a78bfa" font-size="9">FDB / RAFT KV</text>
  <text x="240" y="398" text-anchor="middle" fill="#94a3b8" font-size="8">分布式强一致性</text>
  <text x="240" y="415" text-anchor="middle" fill="#94a3b8" font-size="7">多活写入 · 弹性扩展</text>

  <!-- Arrows from FEs to Meta Service -->
  <line x1="110" y1="343" x2="153" y2="355" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrowViolet)"/>
  <line x1="110" y1="393" x2="153" y2="380" stroke="#a78bfa" stroke-width="1" marker-end="url(#arrowViolet)"/>
  <line x1="110" y1="443" x2="153" y2="405" stroke="#a78bfa" stroke-width="1" marker-end="url(#arrowViolet)"/>

  <!-- Object Store -->
  <rect x="155" y="440" width="170" height="42" rx="5" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="1"/>
  <text x="240" y="458" text-anchor="middle" fill="#34d399" font-size="10" font-weight="bold">Object Store</text>
  <text x="240" y="473" text-anchor="middle" fill="#94a3b8" font-size="8">S3 / HDFS</text>
  
  <!-- Arrow from Meta Service to Object Store -->
  <line x1="240" y1="425" x2="240" y2="438" stroke="#34d399" stroke-width="1" marker-end="url(#arrowGreen)"/>

  <!-- Key design features -->
  <rect x="355" y="322" width="138" height="38" rx="3" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="0.6"/>
  <text x="424" y="339" text-anchor="middle" fill="#34d399" font-size="8">多客户端并发写</text>
  <text x="424" y="353" text-anchor="middle" fill="#94a3b8" font-size="7">No single writer</text>

  <rect x="355" y="368" width="138" height="38" rx="3" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="0.6"/>
  <text x="424" y="385" text-anchor="middle" fill="#34d399" font-size="8">弹性恢复</text>
  <text x="424" y="399" text-anchor="middle" fill="#94a3b8" font-size="7">Image Replay</text>

  <rect x="355" y="414" width="138" height="38" rx="3" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="0.6"/>
  <text x="424" y="431" text-anchor="middle" fill="#34d399" font-size="8">存算分离</text>
  <text x="424" y="445" text-anchor="middle" fill="#94a3b8" font-size="7">独立扩缩</text>

  <!-- Namespace tree preview -->
  <rect x="30" y="474" width="460" height="46" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.6"/>
  <text x="42" y="490" fill="#94a3b8" font-size="9" font-weight="bold">MetaService Namespace 层级 (预览)</text>
  <text x="42" y="507" fill="#22d3ee" font-size="8">/<cluster_id>/db/<db_id>/table/<table_id>/partition/<part_id>/</text>
  <text x="55" y="518" fill="#94a3b8" font-size="7">index/<idx_id>/tablet/<tablet_id> ──► RowsetMeta, Schema, PartitionInfo</text>

  <!-- ===== SECTION 4: FE ImageCache (bottom-right, y: 290 - 525) ===== -->
  <rect x="514" y="290" width="478" height="235" rx="6" fill="none" stroke="#fb923c" stroke-width="0.8" opacity="0.3"/>
  <text x="526" y="310" fill="#fb923c" font-size="12" font-weight="bold">Section 4: FE ImageCache (v3.0+)</text>

  <!-- LRU Cache Chain -->
  <text x="650" y="336" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="bold">LRU 缓存链</text>

  <!-- LRU entries -->
  <rect x="540" y="348" width="195" height="22" rx="3" fill="#fb923c" fill-opacity="0.1" stroke="#fb923c" stroke-width="0.6"/>
  <text x="550" y="363" fill="#fb923c" font-size="8">Head</text>
  <text x="590" y="363" fill="#94a3b8" font-size="8">← table_t1 →</text>

  <rect x="540" y="374" width="195" height="22" rx="3" fill="#fb923c" fill-opacity="0.07" stroke="#fb923c" stroke-width="0.5"/>
  <text x="590" y="389" text-anchor="middle" fill="#94a3b8" font-size="8">← table_t2 →</text>

  <rect x="540" y="400" width="195" height="22" rx="3" fill="#fb923c" fill-opacity="0.04" stroke="#fb923c" stroke-width="0.4"/>
  <text x="590" y="415" text-anchor="middle" fill="#94a3b8" font-size="8">← table_t3 →</text>

  <rect x="540" y="426" width="195" height="22" rx="3" fill="#fb923c" fill-opacity="0.02" stroke="#fb923c" stroke-width="0.3"/>
  <text x="590" y="441" text-anchor="middle" fill="#64748b" font-size="8">← table_tN →</text>
  <text x="638" y="477" fill="#64748b" font-size="7">... Tail</text>

  <!-- LRU arrow -->
  <line x1="735" y1="359" x2="735" y2="445" stroke="#fb923c" stroke-width="0.8" marker-end="url(#arrowOrange)" stroke-dasharray="4,3"/>

  <!-- Logic boxes on the right -->
  <rect x="748" y="325" width="230" height="48" rx="4" fill="#fb923c" fill-opacity="0.07" stroke="#fb923c" stroke-width="0.8"/>
  <text x="863" y="343" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="bold">版本校验 (Version Check)</text>
  <text x="863" y="359" text-anchor="middle" fill="#94a3b8" font-size="8">Cache.version == MetaService.version?</text>
  <text x="863" y="371" text-anchor="middle" fill="#64748b" font-size="7">miss → 从 MetaService 重新读取</text>

  <rect x="748" y="382" width="230" height="48" rx="4" fill="#fb923c" fill-opacity="0.07" stroke="#fb923c" stroke-width="0.8"/>
  <text x="863" y="400" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="bold">Pinned 热表固定</text>
  <text x="863" y="416" text-anchor="middle" fill="#94a3b8" font-size="8">高频访问表 → 固定在 Head</text>
  <text x="863" y="428" text-anchor="middle" fill="#64748b" font-size="7">避免被 LRU 淘汰</text>

  <rect x="748" y="439" width="230" height="38" rx="4" fill="#fb923c" fill-opacity="0.05" stroke="#fb923c" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="863" y="455" text-anchor="middle" fill="#94a3b8" font-size="8">刷新策略</text>
  <text x="863" y="470" text-anchor="middle" fill="#64748b" font-size="7">定时 Poll · 主动 Invalidate · 版本号驱动</text>

  <!-- Cache notes -->
  <text x="530" y="505" fill="#94a3b8" font-size="7">• FE 本地内存缓存元数据, 减少 Meta Service 访问延迟</text>
  <text x="530" y="517" fill="#94a3b8" font-size="7">• LRU 淘汰冷表 · Pinned 保护热表</text>

  <!-- ===== LEGEND (y: 540 - 680) ===== -->
  <rect x="8" y="540" width="984" height="60" rx="6" fill="#1e293b" fill-opacity="0.5" stroke="#334155" stroke-width="0.6"/>
  <text x="20" y="560" fill="#94a3b8" font-size="10" font-weight="bold">图例</text>

  <rect x="20" y="570" width="14" height="14" rx="2" fill="#22d3ee" fill-opacity="0.3" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="40" y="582" fill="#94a3b8" font-size="9">FE (Frontend)</text>

  <rect x="170" y="570" width="14" height="14" rx="2" fill="#a78bfa" fill-opacity="0.3" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="190" y="582" fill="#94a3b8" font-size="9">Meta Service (FDB/RAFT KV)</text>

  <rect x="400" y="570" width="14" height="14" rx="2" fill="#34d399" fill-opacity="0.3" stroke="#34d399" stroke-width="0.8"/>
  <text x="420" y="582" fill="#94a3b8" font-size="9">Store (S3/HDFS)</text>

  <rect x="580" y="570" width="14" height="14" rx="2" fill="#fbbf24" fill-opacity="0.3" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="600" y="582" fill="#94a3b8" font-size="9">EditLog / 过渡</text>

  <rect x="760" y="570" width="14" height="14" rx="2" fill="#fb923c" fill-opacity="0.3" stroke="#fb923c" stroke-width="0.8"/>
  <text x="780" y="582" fill="#94a3b8" font-size="9">ImageCache</text>

  <!-- Footer -->
  <text x="500" y="625" text-anchor="middle" fill="#475569" font-size="8">Apache Doris Metadata Store Evolution — BDB-JE to Meta Service (v0.x → v3.0+)</text>

  <!-- Decorative corner elements -->
  <circle cx="20" cy="20" r="2" fill="#22d3ee" opacity="0.3"/>
  <circle cx="980" cy="20" r="2" fill="#22d3ee" opacity="0.3"/>
</svg>