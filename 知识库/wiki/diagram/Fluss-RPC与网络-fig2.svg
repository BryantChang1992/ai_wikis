<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 110" width="650" height="110">
<defs><linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f0f1a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient></defs>
<style>text{font-family:'SF Mono','Fira Code','Cascadia Code','Courier New','Microsoft YaHei','SimHei',monospace}</style>
<rect width="650" height="110" fill="url(#bg-grad)"/>
<text x="10" y="16" font-size="11" fill="#c084fc">invoke(proxy, method, args):</text>
<text x="30" y="36" font-size="10" fill="#e2e8f0">1. ApiManager.forMethodName() → 查找 ApiKeys 匹配</text>
<text x="30" y="54" font-size="10" fill="#e2e8f0">2. apiMethod.serializeRequest() → Protobuf 序列化</text>
<text x="30" y="72" font-size="10" fill="#e2e8f0">3. nettyClient.send(serverAddr, request) → Netty 异步发送</text>
<text x="30" y="90" font-size="10" fill="#e2e8f0">4. apiMethod.deserializeResponse() → 反序列化返回结果</text>
</svg>