<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <style>
    text { font-family: "Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei","Microsoft JhengHei","SimHei",sans-serif; }
  </style>
  <defs>
  </defs>
  <rect width="760" height="480" fill="#ffffff"/>
  <text x="30" y="32" fill="#111827" font-size="16" font-weight="700">LSM-Tree RUM Conjecture</text>
  <text x="30" y="50" fill="#6b7280" font-size="11">Read · Update · Memory — optimize two, at the cost of the third</text>
  <rect x="280" y="90" width="200" height="60" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="380" y="116" fill="#111827" font-size="16" font-weight="600" text-anchor="middle">Read</text>
  <text x="380" y="136" fill="#6b7280" font-size="10" text-anchor="middle">Bloom Filter · Fence Pointers</text>
  <rect x="60" y="350" width="200" height="60" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="160" y="376" fill="#111827" font-size="16" font-weight="600" text-anchor="middle">Update (Write)</text>
  <text x="160" y="396" fill="#6b7280" font-size="10" text-anchor="middle">Batch Write · Sequential</text>
  <rect x="500" y="350" width="200" height="60" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="600" y="376" fill="#111827" font-size="16" font-weight="600" text-anchor="middle">Memory (Space)</text>
  <text x="600" y="396" fill="#6b7280" font-size="10" text-anchor="middle">Compression · SST Bloat</text>
  <line x1="380" y1="150" x2="160" y2="350" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="240" y="260" fill="#6b7280" font-size="10" text-anchor="middle">Bloom Filter tradeoff</text>
  <line x1="380" y1="150" x2="600" y2="350" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="530" y="260" fill="#6b7280" font-size="10" text-anchor="middle">Fence Pointer tradeoff</text>
  <line x1="160" y1="350" x2="500" y2="350" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="330" y="340" fill="#6b7280" font-size="10" text-anchor="middle">Compression Ratio tradeoff</text>
  <text x="30" y="435" fill="#9333ea" font-size="12" font-weight="700">Design Points</text>
  <rect x="30" y="448" width="165" height="24" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="112" y="463" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">RocksDB: read-write</text>
  <rect x="215" y="448" width="165" height="24" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="297" y="463" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">LevelDB: read-space</text>
  <rect x="400" y="448" width="165" height="24" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="482" y="463" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">Cassandra: write-space</text>
  <rect x="585" y="448" width="165" height="24" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="667" y="463" fill="#374151" font-size="10" font-weight="500" text-anchor="middle">WiscKey: KV separation</text>
