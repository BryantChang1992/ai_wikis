<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 510">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="30" fill="#f1f5f9" font-size="16" font-weight="700">Silo — Distributed LSM Compaction Scheduler (FAST 2026)</text>
  <text x="30" y="48" fill="#94a3b8" font-size="11">From per-node independent compaction to global scheduling with SST migration</text>

  <!-- Problem Section -->
  <text x="30" y="82" fill="#fb7185" font-size="12" font-weight="700">Problem: Per-Node Compaction</text>
  <!-- Node N (hot spot) - alert -->
  <rect x="30" y="96" width="220" height="40" rx="8" fill="#0f172a"/>
  <rect x="30" y="96" width="220" height="40" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="140" y="116" fill="#f1f5f9" font-size="12" font-weight="600" text-anchor="middle">Node N</text>
  <text x="140" y="128" fill="#fb7185" font-size="9" text-anchor="middle">hot spot</text>
  <!-- Node M (idle) -->
  <rect x="280" y="96" width="220" height="40" rx="8" fill="#0f172a"/>
  <rect x="280" y="96" width="220" height="40" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="390" y="116" fill="#f1f5f9" font-size="12" font-weight="600" text-anchor="middle">Node M</text>
  <text x="390" y="128" fill="#34d399" font-size="9" text-anchor="middle">idle</text>
  <!-- Node K (light load) -->
  <rect x="530" y="96" width="220" height="40" rx="8" fill="#0f172a"/>
  <rect x="530" y="96" width="220" height="40" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="640" y="116" fill="#f1f5f9" font-size="12" font-weight="600" text-anchor="middle">Node K</text>
  <text x="640" y="128" fill="#34d399" font-size="9" text-anchor="middle">light load</text>
  <!-- Arrow between problem and solution -->
  <line x1="410" y1="138" x2="410" y2="166" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="420" y="160" fill="#22d3ee" font-size="9">central scheduling</text>

  <!-- Silo Architecture Section -->
  <text x="30" y="186" fill="#22d3ee" font-size="12" font-weight="700">Silo Architecture</text>
  <!-- Global Planner -->
  <rect x="30" y="204" width="180" height="72" rx="8" fill="#0f172a"/>
  <rect x="30" y="204" width="180" height="72" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="120" y="224" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Global Planner</text>
  <text x="120" y="244" fill="#94a3b8" font-size="8" text-anchor="middle">tracks all LSM trees</text>
  <text x="120" y="258" fill="#94a3b8" font-size="8" text-anchor="middle">priority scheduling</text>
  <!-- SST Migration -->
  <rect x="230" y="204" width="180" height="72" rx="8" fill="#0f172a"/>
  <rect x="230" y="204" width="180" height="72" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="320" y="224" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">SST Migration</text>
  <text x="320" y="244" fill="#94a3b8" font-size="8" text-anchor="middle">migrate SSTs to</text>
  <text x="320" y="258" fill="#94a3b8" font-size="8" text-anchor="middle">target merge node</text>
  <!-- Anti-Hog -->
  <rect x="430" y="204" width="180" height="72" rx="8" fill="#0f172a"/>
  <rect x="430" y="204" width="180" height="72" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="520" y="224" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Anti-Hog</text>
  <text x="520" y="244" fill="#94a3b8" font-size="8" text-anchor="middle">detect hog nodes</text>
  <text x="520" y="258" fill="#94a3b8" font-size="8" text-anchor="middle">rate-limit compaction</text>
  <!-- Pro-Hog -->
  <rect x="630" y="204" width="180" height="72" rx="8" fill="#0f172a"/>
  <rect x="630" y="204" width="180" height="72" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="720" y="224" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Pro-Hog</text>
  <text x="720" y="244" fill="#94a3b8" font-size="8" text-anchor="middle">proactive compact</text>
  <text x="720" y="258" fill="#94a3b8" font-size="8" text-anchor="middle">write-heavy nodes</text>

  <!-- Key Results Section -->
  <text x="30" y="318" fill="#34d399" font-size="12" font-weight="700">Key Results</text>
  <!-- Write Amp -->
  <rect x="30" y="336" width="180" height="44" rx="8" fill="#0f172a"/>
  <rect x="30" y="336" width="180" height="44" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="120" y="358" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Write Amp ↓</text>
  <text x="120" y="372" fill="#34d399" font-size="9" text-anchor="middle">~30%</text>
  <!-- Throughput -->
  <rect x="230" y="336" width="180" height="44" rx="8" fill="#0f172a"/>
  <rect x="230" y="336" width="180" height="44" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="320" y="358" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Throughput ↑</text>
  <text x="320" y="372" fill="#34d399" font-size="9" text-anchor="middle">~2× on skew</text>
  <!-- Tail Lat -->
  <rect x="430" y="336" width="180" height="44" rx="8" fill="#0f172a"/>
  <rect x="430" y="336" width="180" height="44" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="520" y="358" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Tail Lat ↓</text>
  <text x="520" y="372" fill="#34d399" font-size="9" text-anchor="middle">P99 drop</text>
  <!-- Balance -->
  <rect x="630" y="336" width="180" height="44" rx="8" fill="#0f172a"/>
  <rect x="630" y="336" width="180" height="44" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="720" y="358" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Balance</text>
  <text x="720" y="372" fill="#34d399" font-size="9" text-anchor="middle">CPU even</text>

  <!-- Integration Section -->
  <text x="30" y="426" fill="#a78bfa" font-size="12" font-weight="700">Integration: Lease-based HA for coordinator failover</text>
  <rect x="30" y="440" width="760" height="32" rx="8" fill="#0f172a"/>
  <rect x="30" y="440" width="760" height="32" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="410" y="461" fill="#e2e8f0" font-size="10" font-weight="500" text-anchor="middle">Lease protocol → central coordinator fails over without data loss</text>
</svg>
