<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>

  <rect width="700" height="280" fill="#ffffff"/>

  <text x="350" y="28" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">ByteHouse 统一表引擎 · Document/Chunk 两级抽象</text>

  <!-- Table box -->
  <rect x="250" y="55" width="200" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="350" y="80" fill="#2563eb" font-size="14" font-weight="700" text-anchor="middle">Table</text>

  <!-- Connector line -->
  <line x1="350" y1="95" x2="350" y2="120" stroke="#2563eb" stroke-width="2"/>

  <!-- Document box -->
  <rect x="200" y="120" width="300" height="45" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="350" y="140" fill="#16a34a" font-size="13" font-weight="700" text-anchor="middle">Document</text>
  <text x="350" y="157" fill="#475569" font-size="10" text-anchor="middle">逻辑实体：一篇文章/图片/视频 (document_id)</text>

  <!-- 3 branches -->
  <line x1="233" y1="165" x2="145" y2="200" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="350" y1="165" x2="350" y2="200" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="467" y1="165" x2="555" y2="200" stroke="#16a34a" stroke-width="1.5"/>

  <!-- 3 Chunk boxes -->
  <rect x="70" y="200" width="150" height="40" rx="6" fill="#faf5ff" stroke="#9333ea" stroke-width="1"/>
  <text x="145" y="220" fill="#9333ea" font-size="12" font-weight="700" text-anchor="middle">Chunk</text>
  <text x="145" y="235" fill="#6b7280" font-size="9" text-anchor="middle">chunk_id = 1</text>

  <rect x="275" y="200" width="150" height="40" rx="6" fill="#faf5ff" stroke="#9333ea" stroke-width="1"/>
  <text x="350" y="220" fill="#9333ea" font-size="12" font-weight="700" text-anchor="middle">Chunk</text>
  <text x="350" y="235" fill="#6b7280" font-size="9" text-anchor="middle">chunk_id = 2</text>

  <rect x="480" y="200" width="150" height="40" rx="6" fill="#faf5ff" stroke="#9333ea" stroke-width="1"/>
  <text x="555" y="220" fill="#9333ea" font-size="12" font-weight="700" text-anchor="middle">Chunk</text>
  <text x="555" y="235" fill="#6b7280" font-size="9" text-anchor="middle">chunk_id = 3</text>

  <text x="350" y="268" fill="#6b7280" font-size="9" text-anchor="middle">Chunk 是 embedding 的最小单元 · 一对多关系：1 Document → N Chunks</text>
</svg>