<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
<style>
  text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
</style>
<defs>
  <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f0f1a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
  <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/></marker>
  <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#10b981"/></marker>
  <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a855f7"/></marker>
</defs>
<rect width="960" height="480" fill="url(#bg-grad)"/>

<text x="480" y="28" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Fluss Tiering · 实时存储 → Lakehouse 分层架构</text>
<text x="480" y="48" font-size="11" fill="#94a3b8" text-anchor="middle">独立 Flink 作业 · Source → Writer → Committer 流水线 · ms 级写入 → 分钟级物化</text>

<!-- Data Lifecycle -->
<rect x="20" y="66" width="920" height="155" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="480" y="90" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">数据生命周期</text>

<rect x="40" y="106" width="190" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
<text x="135" y="123" font-size="11" font-weight="bold" fill="#60a5fa" text-anchor="middle">① 实时写入 (ms 级)</text>
<text x="135" y="139" font-size="9" fill="#3b82f6" text-anchor="middle">appendRecords / putKv</text>
<line x1="230" y1="126" x2="270" y2="126" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr-blue)"/>

<rect x="275" y="106" width="190" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
<text x="370" y="123" font-size="11" font-weight="bold" fill="#60a5fa" text-anchor="middle">② Fluss Tablet</text>
<text x="370" y="139" font-size="9" fill="#3b82f6" text-anchor="middle">本地 Log + KV · OLTP 级</text>
<line x1="465" y1="126" x2="505" y2="126" stroke="#a855f7" stroke-width="1.8" marker-end="url(#arr-purple)" stroke-dasharray="6,3"/>

<rect x="510" y="106" width="190" height="40" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="0.8"/>
<text x="605" y="123" font-size="11" font-weight="bold" fill="#c084fc" text-anchor="middle">③ Tiering 作业 (分钟级)</text>
<text x="605" y="139" font-size="9" fill="#a855f7" text-anchor="middle">异步分层 · 独立 Flink 作业</text>
<line x1="605" y1="146" x2="605" y2="168" stroke="#10b981" stroke-width="1.8" marker-end="url(#arr-green)"/>

<rect x="510" y="173" width="190" height="40" rx="6" fill="#052e16" stroke="#10b981" stroke-width="0.8"/>
<text x="605" y="190" font-size="11" font-weight="bold" fill="#34d399" text-anchor="middle">④ Lakehouse</text>
<text x="605" y="206" font-size="9" fill="#10b981" text-anchor="middle">Parquet/Arrow · OLAP 级</text>
<line x1="510" y1="193" x2="480" y2="193" stroke="#10b981" stroke-width="1.2" stroke-dasharray="3,3"/>
<text x="495" y="203" font-size="8" fill="#10b981" text-anchor="middle">GC</text>

<!-- Tiering Pipeline Detail -->
<rect x="20" y="235" width="920" height="225" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
<text x="480" y="258" font-size="13" font-weight="bold" fill="#c084fc" text-anchor="middle">Tiering 工作流 (独立 Flink 作业)</text>

<rect x="40" y="272" width="160" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="120" y="293" font-size="11" fill="#e2e8f0" text-anchor="middle">CoordinatorServer</text>
<line x1="200" y1="288" x2="240" y2="288" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arr-purple)"/>

<rect x="245" y="272" width="200" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="345" y="293" font-size="10" fill="#e2e8f0" text-anchor="middle">LakeTableTieringManager</text>
<line x1="445" y1="288" x2="485" y2="288" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arr-purple)"/>

<rect x="490" y="272" width="170" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="575" y="293" font-size="10" fill="#e2e8f0" text-anchor="middle">TieringSource (Flink)</text>
<line x1="660" y1="288" x2="700" y2="288" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arr-purple)"/>

<rect x="705" y="272" width="140" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="775" y="293" font-size="11" fill="#e2e8f0" text-anchor="middle">LakeWriter</text>

<line x1="775" y1="304" x2="775" y2="325" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arr-purple)"/>

<rect x="705" y="330" width="140" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="775" y="349" font-size="11" fill="#e2e8f0" text-anchor="middle">TieringCommitter</text>

<line x1="775" y1="358" x2="775" y2="380" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arr-purple)"/>

<rect x="640" y="384" width="270" height="28" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
<text x="775" y="403" font-size="10" fill="#e2e8f0" text-anchor="middle">commitLakeTableSnapshot</text>

<text x="120" y="340" font-size="10" fill="#94a3b8">调度 tiering 任务</text>
<text x="245" y="340" font-size="9" fill="#64748b">决定哪些 Table 需 tiering</text>
<text x="490" y="340" font-size="9" fill="#64748b">从 TabletServer 读本地数据</text>
<text x="705" y="340" font-size="9" fill="#64748b">Lake Storage 写入</text>

<text x="480" y="440" font-size="10" fill="#64748b" text-anchor="middle">TabletServer.notifyLakeTableOffset → 本地 LogManager 删除已分层 Segment</text></svg>
