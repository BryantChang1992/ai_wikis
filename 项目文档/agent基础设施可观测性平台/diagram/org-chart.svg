<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="38" fill="white" font-size="16" font-weight="700">CHANG_AI_TEAM · 组织架构</text>
  <text x="30" y="56" fill="#64748b" font-size="10">Organization Chart — CTO Sub-tree Expanded</text>

  <!-- Level label: CEO -->
  <rect x="90" y="72" width="60" height="18" rx="3" fill="#fbbf24" fill-opacity="0.15"/>
  <text x="120" y="85" fill="#fbbf24" font-size="7" font-weight="600" text-anchor="middle">CEO</text>

  <!-- ===== CEO ===== -->
  <rect x="340" y="72" width="280" height="60" rx="8" fill="#0f172a"/>
  <rect x="340" y="72" width="280" height="60" rx="8" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="2"/>
  <text x="480" y="98" fill="white" font-size="13" font-weight="700" text-anchor="middle">🤖 CEO · Claw</text>
  <text x="480" y="116" fill="#fbbf24" font-size="9" text-anchor="middle">Final Decision Maker</text>

  <!-- Level label: VP -->
  <rect x="90" y="148" width="60" height="18" rx="3" fill="#fbbf24" fill-opacity="0.15"/>
  <text x="120" y="161" fill="#fbbf24" font-size="7" font-weight="600" text-anchor="middle">VP</text>

  <!-- CEO → VP lines -->
  <line x1="480" y1="132" x2="480" y2="144" stroke="#475569" stroke-width="1.5"/>
  <!-- Horizontal branch -->
  <line x1="150" y1="144" x2="810" y2="144" stroke="#475569" stroke-width="1"/>
  <!-- Down to each VP -->
  <line x1="150" y1="144" x2="150" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="144" x2="370" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="590" y1="144" x2="590" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="810" y1="144" x2="810" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== CFO ===== -->
  <rect x="60" y="165" width="180" height="55" rx="8" fill="#0f172a"/>
  <rect x="60" y="165" width="180" height="55" rx="8" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1.2"/>
  <text x="150" y="190" fill="white" font-size="11" font-weight="600" text-anchor="middle">💰 CFO</text>
  <text x="150" y="208" fill="#94a3b8" font-size="8" text-anchor="middle">成本 &amp; 财务决策</text>

  <!-- ===== COO ===== -->
  <rect x="280" y="165" width="180" height="55" rx="8" fill="#0f172a"/>
  <rect x="280" y="165" width="180" height="55" rx="8" fill="rgba(59,130,246,0.2)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="370" y="190" fill="white" font-size="11" font-weight="600" text-anchor="middle">📋 COO</text>
  <text x="370" y="208" fill="#94a3b8" font-size="8" text-anchor="middle">运营 &amp; 流程</text>

  <!-- ===== CPO ===== -->
  <rect x="500" y="165" width="180" height="55" rx="8" fill="#0f172a"/>
  <rect x="500" y="165" width="180" height="55" rx="8" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.2"/>
  <text x="590" y="190" fill="white" font-size="11" font-weight="600" text-anchor="middle">🎨 CPO</text>
  <text x="590" y="208" fill="#94a3b8" font-size="8" text-anchor="middle">产品 &amp; 用户体验</text>

  <!-- ===== CTO (same row, highlighted) ===== -->
  <rect x="720" y="165" width="180" height="55" rx="8" fill="#0f172a"/>
  <rect x="720" y="165" width="180" height="55" rx="8" fill="rgba(34,211,238,0.2)" stroke="#22d3ee" stroke-width="2"/>
  <text x="810" y="190" fill="white" font-size="11" font-weight="700" text-anchor="middle">⚙️ CTO</text>
  <text x="810" y="208" fill="#22d3ee" font-size="8" text-anchor="middle">技术决策</text>

  <!-- ===== CTO tree expands below ===== -->
  <!-- Level label: Expert -->
  <rect x="90" y="260" width="120" height="18" rx="3" fill="#a78bfa" fill-opacity="0.15"/>
  <text x="150" y="273" fill="#a78bfa" font-size="7" font-weight="600" text-anchor="middle">专家层 · Expert</text>

  <!-- CTO → Expert (down from CTO box) -->
  <line x1="810" y1="220" x2="810" y2="240" stroke="#475569" stroke-width="1.5"/>
  <!-- Horizontal branch -->
  <line x1="600" y1="240" x2="890" y2="240" stroke="#475569" stroke-width="1"/>
  <!-- Down to each Expert -->
  <line x1="600" y1="240" x2="600" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="745" y1="240" x2="745" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="890" y1="240" x2="890" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Infra Expert ===== -->
  <rect x="500" y="265" width="200" height="50" rx="6" fill="#0f172a"/>
  <rect x="500" y="265" width="200" height="50" rx="6" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1"/>
  <text x="600" y="288" fill="white" font-size="10" font-weight="600" text-anchor="middle">Infra 专家</text>
  <text x="600" y="304" fill="#64748b" font-size="8" text-anchor="middle">基础设施技术决策</text>

  <!-- ===== Perf Expert ===== -->
  <rect x="645" y="265" width="200" height="50" rx="6" fill="#0f172a"/>
  <rect x="645" y="265" width="200" height="50" rx="6" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1"/>
  <text x="745" y="288" fill="white" font-size="10" font-weight="600" text-anchor="middle">Perf 专家</text>
  <text x="745" y="304" fill="#64748b" font-size="8" text-anchor="middle">性能优化</text>

  <!-- ===== SRE Expert ===== -->
  <rect x="790" y="265" width="200" height="50" rx="6" fill="#0f172a"/>
  <rect x="790" y="265" width="200" height="50" rx="6" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1"/>
  <text x="890" y="288" fill="white" font-size="10" font-weight="600" text-anchor="middle">SRE 专家</text>
  <text x="890" y="304" fill="#64748b" font-size="8" text-anchor="middle">可靠性 &amp; 监控</text>

  <!-- Level label: Worker -->
  <rect x="90" y="360" width="120" height="18" rx="3" fill="#64748b" fill-opacity="0.15"/>
  <text x="150" y="373" fill="#94a3b8" font-size="7" font-weight="600" text-anchor="middle">执行层 · Worker</text>

  <!-- Expert → Worker -->
  <path d="M 600 315 L 600 345 L 515 345 L 515 370" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 745 315 L 745 345 L 695 345 L 695 370" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 890 315 L 890 345 L 875 345 L 875 370" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Worker boxes ===== -->
  <!-- RD (under Infra) -->
  <rect x="440" y="377" width="150" height="50" rx="6" fill="#0f172a"/>
  <rect x="440" y="377" width="150" height="50" rx="6" fill="rgba(100,116,139,0.12)" stroke="#64748b" stroke-width="1" stroke-opacity="0.6"/>
  <text x="515" y="399" fill="white" font-size="10" font-weight="500" text-anchor="middle">🛠️ RD</text>
  <text x="515" y="416" fill="#64748b" font-size="7" text-anchor="middle">开发执行</text>

  <!-- SRE Worker (under Perf + SRE) -->
  <rect x="620" y="377" width="150" height="50" rx="6" fill="#0f172a"/>
  <rect x="620" y="377" width="150" height="50" rx="6" fill="rgba(100,116,139,0.12)" stroke="#64748b" stroke-width="1" stroke-opacity="0.6"/>
  <text x="695" y="399" fill="white" font-size="10" font-weight="500" text-anchor="middle">🔧 SRE</text>
  <text x="695" y="416" fill="#64748b" font-size="7" text-anchor="middle">运维执行</text>

  <!-- QA (under SRE) -->
  <rect x="800" y="377" width="150" height="50" rx="6" fill="#0f172a"/>
  <rect x="800" y="377" width="150" height="50" rx="6" fill="rgba(100,116,139,0.12)" stroke="#64748b" stroke-width="1" stroke-opacity="0.6"/>
  <text x="875" y="399" fill="white" font-size="10" font-weight="500" text-anchor="middle">✅ QA</text>
  <text x="875" y="416" fill="#64748b" font-size="7" text-anchor="middle">测试验证</text>

  <!-- ===== Left side: CFO/COO/CPO trees (collapsed / to-be-defined) ===== -->
  <!-- CFO tree stub -->
  <line x1="150" y1="220" x2="150" y2="377" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,6" stroke-opacity="0.3"/>
  <rect x="80" y="377" width="140" height="40" rx="5" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3" stroke-opacity="0.3"/>
  <text x="150" y="400" fill="#475569" font-size="8" text-anchor="middle" opacity="0.5">(待扩展)</text>

  <!-- COO tree stub -->
  <line x1="370" y1="220" x2="370" y2="377" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,6" stroke-opacity="0.3"/>
  <rect x="300" y="377" width="140" height="40" rx="5" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3" stroke-opacity="0.3"/>
  <text x="370" y="400" fill="#475569" font-size="8" text-anchor="middle" opacity="0.5">(待扩展)</text>

  <!-- CPO tree stub -->
  <line x1="590" y1="220" x2="590" y2="377" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,6" stroke-opacity="0.3"/>
  <rect x="520" y="377" width="140" height="40" rx="5" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3" stroke-opacity="0.3"/>
  <text x="590" y="400" fill="#475569" font-size="8" text-anchor="middle" opacity="0.5">(待扩展)</text>

  <!-- Subtle separator between VP tree area and CTO tree area -->
  <line x1="460" y1="148" x2="460" y2="432" stroke="#1e293b" stroke-width="1" stroke-dasharray="12,6"/>

  <!-- Legend -->
  <rect x="30" y="470" width="900" height="90" rx="4" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Color legend row -->
  <rect x="50" y="482" width="12" height="12" rx="2" fill="#fbbf24"/>
  <text x="68" y="492" fill="#94a3b8" font-size="8">CEO</text>
  <rect x="130" y="482" width="12" height="12" rx="2" fill="#fb7185"/>
  <text x="148" y="492" fill="#94a3b8" font-size="8">CFO</text>
  <rect x="200" y="482" width="12" height="12" rx="2" fill="#60a5fa"/>
  <text x="218" y="492" fill="#94a3b8" font-size="8">COO</text>
  <rect x="270" y="482" width="12" height="12" rx="2" fill="#34d399"/>
  <text x="288" y="492" fill="#94a3b8" font-size="8">CPO</text>
  <rect x="340" y="482" width="12" height="12" rx="2" fill="#22d3ee"/>
  <text x="358" y="492" fill="#94a3b8" font-size="8">CTO (展开)</text>
  <rect x="450" y="482" width="12" height="12" rx="2" fill="#a78bfa"/>
  <text x="468" y="492" fill="#94a3b8" font-size="8">专家层</text>
  <rect x="540" y="482" width="12" height="12" rx="2" fill="#64748b"/>
  <text x="558" y="492" fill="#94a3b8" font-size="8">执行层</text>

  <!-- Notes -->
  <text x="50" y="518" fill="#475569" font-size="8">▶ CFO / COO / CPO 与 CTO 平级，均向 CEO 汇报。CTO 子树已展开，其余 VP 子树待扩展。</text>
  <text x="50" y="536" fill="#475569" font-size="8">▶ 专家层负责技术决策，可委托任务给执行层 Worker。</text>
  <text x="50" y="554" fill="#475569" font-size="8">▶ 虚线竖线表示层级归属，虚线框表示待扩展区域。</text>
</svg>
