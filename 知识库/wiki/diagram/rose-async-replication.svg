<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 510">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="480" y="32" fill="white" font-size="16" font-weight="700" text-anchor="middle">Rosé 异步复制协议 · 三件套设计</text>
  <text x="480" y="54" fill="#94a3b8" font-size="11" text-anchor="middle">CIDR 2026 · 异步主备 · 单调前缀一致性跨分区 · Backpressure + Coordinated Apply + Global Snapshot</text>

  <!-- Top: Primary → Standby Region -->
  <rect x="30" y="75" width="900" height="110" rx="10" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Primary (cyan) -->
  <rect x="60" y="115" width="380" height="58" rx="8" fill="#0f172a"/>
  <rect x="60" y="115" width="380" height="58" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="250" y="138" fill="white" font-size="12" font-weight="600" text-anchor="middle">Primary (主集群 · 处理写入)</text>
  <text x="250" y="158" fill="#67e8f9" font-size="10" text-anchor="middle">分区式: P1, P2, P3 独立写入</text>

  <!-- Async arrow Primary → Standby -->
  <text x="455" y="150" fill="#94a3b8" font-size="16" text-anchor="middle">→</text>
  <text x="455" y="166" fill="#64748b" font-size="8" text-anchor="middle">async</text>
  <line x1="440" y1="144" x2="495" y2="144" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-slate)"/>

  <!-- Standby (emerald) -->
  <rect x="500" y="115" width="400" height="58" rx="8" fill="#0f172a"/>
  <rect x="500" y="115" width="400" height="58" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="700" y="138" fill="white" font-size="12" font-weight="600" text-anchor="middle">Standby (备集群 · 异步追赶)</text>
  <text x="700" y="158" fill="#6ee7b7" font-size="10" text-anchor="middle">每 Partition 独立复制 · 跨分区事务需全局一致</text>

  <!-- Section label -->
  <text x="480" y="195" fill="#64748b" font-size="10" font-weight="500" text-anchor="middle">└ 三件套设计 ┘</text>

  <!-- Three Pillars -->
  <!-- ① Global Snapshot (Primary - cyan) -->
  <rect x="30" y="210" width="290" height="250" rx="10" fill="#0f172a"/>
  <rect x="30" y="210" width="290" height="250" rx="10" fill="rgba(8,51,68,0.2)" stroke="#22d3ee" stroke-width="1"/>
  <path d="M30 246 L320 246" stroke="#22d3ee" stroke-width="1"/>
  <text x="175" y="235" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">① 全局快照 → 单调前缀</text>

  <text x="50" y="272" fill="#cbd5e1" font-size="10" font-weight="500">Snapshot Epoch = min(eᵢ)</text>
  <text x="50" y="296" fill="#94a3b8" font-size="9">P1: e₁=105 · P2: e₂=102 · P3: e₃=98</text>
  <text x="50" y="320" fill="#fb7185" font-size="9" font-weight="600">→ 对外可见 epoch = 98</text>

  <rect x="50" y="336" width="250" height="1" fill="#334155"/>
  <text x="50" y="358" fill="#cbd5e1" font-size="10">单调递增: min(eᵢ) 只增不减</text>
  <text x="50" y="378" fill="#94a3b8" font-size="9">任何时刻暴露的都是</text>
  <text x="50" y="398" fill="#94a3b8" font-size="9">一致的全局快照</text>

  <!-- ② Coordinated Apply (Secondary - emerald) -->
  <rect x="335" y="210" width="290" height="250" rx="10" fill="#0f172a"/>
  <rect x="335" y="210" width="290" height="250" rx="10" fill="rgba(6,78,59,0.2)" stroke="#34d399" stroke-width="1"/>
  <path d="M335 246 L625 246" stroke="#34d399" stroke-width="1"/>
  <text x="480" y="235" fill="#34d399" font-size="12" font-weight="600" text-anchor="middle">② Coordinated Apply</text>

  <text x="355" y="272" fill="#cbd5e1" font-size="10" font-weight="500">WAL/KV 持久化解耦</text>
  <text x="355" y="296" fill="#94a3b8" font-size="9">Write Path → Log Apply</text>
  <text x="355" y="316" fill="#94a3b8" font-size="9">Storage Apply → 原子可见</text>

  <rect x="355" y="336" width="250" height="1" fill="#334155"/>
  <text x="355" y="358" fill="#cbd5e1" font-size="10">与传统异步复制区别:</text>
  <text x="355" y="378" fill="#94a3b8" font-size="9">不是"收到即应用"</text>
  <text x="355" y="398" fill="#94a3b8" font-size="9">而是"达成一致后再原子可见"</text>

  <!-- ③ Backpressure (Accent - amber) -->
  <rect x="640" y="210" width="290" height="250" rx="10" fill="#0f172a"/>
  <rect x="640" y="210" width="290" height="250" rx="10" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1"/>
  <path d="M640 246 L930 246" stroke="#fbbf24" stroke-width="1"/>
  <text x="785" y="235" fill="#fbbf24" font-size="12" font-weight="600" text-anchor="middle">③ Backpressure (回压)</text>

  <text x="660" y="272" fill="#cbd5e1" font-size="10" font-weight="500">限制 Lag: 主备差距可控</text>
  <text x="660" y="296" fill="#94a3b8" font-size="9">如果 Standby 落后太多:</text>
  <text x="660" y="316" fill="#94a3b8" font-size="9">→ Primary 减速写入</text>
  <text x="660" y="336" fill="#94a3b8" font-size="9">→ 保证故障时丢数据量有上界</text>

  <rect x="660" y="352" width="250" height="1" fill="#334155"/>
  <text x="660" y="374" fill="#cbd5e1" font-size="10" font-weight="500">Lag 控制: 时间 or 日志量</text>
  <text x="660" y="394" fill="#94a3b8" font-size="9">例: 最多落后 100ms 或 1MB</text>

  <!-- Bottom summary (Neutral - slate) -->
  <rect x="30" y="468" width="900" height="32" rx="8" fill="#0f172a"/>
  <rect x="30" y="468" width="900" height="32" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="480" y="490" fill="#cbd5e1" font-size="10" text-anchor="middle">利用已有全局快照基础设施 (HLC/epoch) · 无需新一致协议 · 跨分区异步复制三件套闭环</text>
</svg>