  <rect x="195" y="94" width="148" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="269" y="120" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">MemTable</text>
  <rect x="360" y="94" width="148" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="434" y="120" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">L0→L1...LK</text>
  <rect x="525" y="94" width="148" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="599" y="120" fill="#111827" font-size="11" font-weight="600" text-anchor="middle">Compaction</text>
