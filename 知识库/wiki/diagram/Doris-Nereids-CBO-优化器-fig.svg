<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 145" width="680" height="145">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
  </defs>
  <rect width="680" height="145" fill="url(#bg-grad)"/>
  <text x="340" y="16" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Runtime Filter / Bloom Filter 优化 (Nereids CBO)</text>
  <text x="10" y="36" font-size="11" font-weight="bold" fill="#a855f7">Step 1</text>
  <rect x="60" y="24" width="200" height="24" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="160" y="39" font-size="11" fill="#e2e8f0" text-anchor="middle">小表 Build Hash Table</text>
  <line x1="260" y1="36" x2="300" y2="36" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <rect x="306" y="24" width="180" height="24" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="396" y="39" font-size="11" fill="#e2e8f0" text-anchor="middle">同时生成 Bloom Filter</text>
  <line x1="396" y1="48" x2="396" y2="64" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="10" y="78" font-size="11" font-weight="bold" fill="#a855f7">Step 2</text>
  <rect x="160" y="66" width="200" height="24" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="260" y="81" font-size="11" fill="#e2e8f0" text-anchor="middle">Bloom Filter 广播到左表 Scan Node</text>
  <line x1="260" y1="90" x2="260" y2="106" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="10" y="120" font-size="11" font-weight="bold" fill="#a855f7">Step 3</text>
  <rect x="60" y="108" width="460" height="24" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="290" y="123" font-size="11" fill="#e2e8f0" text-anchor="middle">Scan Node 利用 Bloom Filter 提前过滤 → 大幅减少 Shuffle 数据量</text>
</svg>