<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascada Code','Courier New','Microsoft YaHei','SimHei',monospace; }
    .t1 { fill: #e2e8f0; font-size: 13px; font-weight: bold; }
    .t2 { fill: #94a3b8; font-size: 11px; }
    .t3 { fill: #f97316; font-size: 11px; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="520" height="120" fill="url(#bg)"/>
  <text x="10" y="20" class="t1">表元组（Heap Tuple）:</text>
  <rect x="10" y="30" width="500" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="25" y="50" class="t2">xmin: 插入/创建该元组的事务 ID</text>
  <text x="25" y="68" class="t2">xmax: 删除/更新该元组的事务 ID</text>
  <text x="25" y="86" class="t2">ctid: 指向新版本的指针（更新时） · infomask: 标志位</text>
</svg>