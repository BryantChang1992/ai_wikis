  <text x="128" y="316" fill="#6b7280" font-size="10" text-anchor="middle">Aurora/Neon</text>
  <rect x="245" y="280" width="195" height="48" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="343" y="300" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Shared-Nothing</text>
  <text x="343" y="316" fill="#6b7280" font-size="10" text-anchor="middle">FoundationDB</text>
  <rect x="460" y="280" width="195" height="48" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="558" y="300" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Disagg Mem</text>
  <text x="558" y="316" fill="#6b7280" font-size="10" text-anchor="middle">RDMA pool</text>
