<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','Courier New','Microsoft YaHei','SimHei',monospace; fill: #e2e8f0; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-comm" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/>
    </marker>
    <marker id="arr-order" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f97316"/>
    </marker>
    <filter id="glow-green" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="500" fill="url(#bg-grad)"/>
  <text x="480" y="32" font-size="17" font-weight="700" fill="#e2e8f0" text-anchor="middle">Event Horizon · 半线性化（Semi-Linearizability）</text>
  <text x="480" y="54" font-size="11" fill="#94a3b8" text-anchor="middle">CIDR 2026 · 非对称依赖有向图替代对称冲突图 · 事件视界收束弱操作</text>
  <rect x="30" y="75" width="285" height="110" rx="8" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="172" y="98" font-size="13" font-weight="700" fill="#10b981" text-anchor="middle">Commutative (可交换)</text>
  <rect x="95" y="108" width="155" height="26" rx="13" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="172" y="126" font-size="12" fill="#34d399" text-anchor="middle">OP₁ ∥ OP₂</text>
  <text x="172" y="152" font-size="10" fill="#94a3b8" text-anchor="middle">任意顺序执行 · 无协调 · 因果广播</text>
  <text x="172" y="170" font-size="10" fill="#475569" text-anchor="middle">例: new_bid ↔ new_bid</text>
  <rect x="338" y="75" width="285" height="110" rx="8" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="480" y="98" font-size="13" font-weight="700" fill="#f97316" text-anchor="middle">Eventually Ordered (最终有序)</text>
  <rect x="400" y="108" width="160" height="26" rx="13" fill="#431407" stroke="#f97316" stroke-width="1"/>
  <text x="480" y="126" font-size="12" fill="#fb923c" text-anchor="middle">OP₁ ⇝ OP₂</text>
  <text x="480" y="152" font-size="10" fill="#94a3b8" text-anchor="middle">OP₂ 可见时需"知道" OP₁ · 少量协调</text>
  <text x="480" y="170" font-size="10" fill="#475569" text-anchor="middle">例: close_auction ⇝ new_bid</text>
  <rect x="645" y="75" width="285" height="110" rx="8" fill="#1c1917" stroke="#dc2626" stroke-width="1.5"/>
  <text x="787" y="98" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">Strictly Ordered (严格有序)</text>
  <rect x="710" y="108" width="155" height="26" rx="13" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="787" y="126" font-size="12" fill="#f87171" text-anchor="middle">OP₁ → OP₂</text>
  <text x="787" y="152" font-size="10" fill="#94a3b8" text-anchor="middle">全局全序 · 需共识 · Paxos / Raft</text>
  <text x="787" y="170" font-size="10" fill="#475569" text-anchor="middle">例: 2PC / Atomic Commit</text>
  <rect x="30" y="205" width="900" height="140" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="480" y="228" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">拍卖场景: 非对称依赖图</text>
  <rect x="80" y="243" width="150" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="155" y="268" font-size="12" fill="#e2e8f0" text-anchor="middle">new_bid (弱操作)</text>
  <rect x="400" y="243" width="150" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="475" y="268" font-size="12" fill="#e2e8f0" text-anchor="middle">new_bid (弱操作)</text>
  <rect x="730" y="243" width="170" height="40" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="815" y="268" font-size="12" fill="#e2e8f0" text-anchor="middle">close_auction (强)</text>
  <line x1="230" y1="258" x2="390" y2="258" stroke="#10b981" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="310" y="250" font-size="10" fill="#10b981" text-anchor="middle">commutative</text>
  <path d="M 550,253 Q 645,238 720,253" fill="none" stroke="#f97316" stroke-width="1.8" marker-end="url(#arr-order)"/>
  <text x="635" y="234" font-size="10" fill="#f97316" text-anchor="middle">eventually ordered</text>
  <path d="M 730,278 Q 645,300 550,283" fill="none" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="635" y="316" font-size="10" fill="#475569" text-anchor="middle">no dependency ← 非对称!</text>
  <rect x="30" y="365" width="900" height="115" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="480" y="388" font-size="12" font-weight="700" fill="#e2e8f0" text-anchor="middle">SL 对比现有模型</text>
  <rect x="50" y="398" width="155" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="127" y="414" font-size="10" fill="#94a3b8" text-anchor="middle">模型</text>
  <rect x="205" y="398" width="175" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="292" y="414" font-size="10" fill="#94a3b8" text-anchor="middle">依赖建模</text>
  <rect x="380" y="398" width="175" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="467" y="414" font-size="10" fill="#94a3b8" text-anchor="middle">弱操作延迟</text>
  <rect x="555" y="398" width="175" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="642" y="414" font-size="10" fill="#94a3b8" text-anchor="middle">强操作协调开销</text>
  <rect x="730" y="398" width="185" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="822" y="414" font-size="10" fill="#94a3b8" text-anchor="middle">跨地域延迟</text>
  <text x="68" y="440" font-size="10" fill="#ef4444" text-anchor="start">严格可串行化</text>
  <text x="220" y="440" font-size="10" fill="#ef4444" text-anchor="start">全局全序</text>
  <text x="395" y="440" font-size="10" fill="#ef4444" text-anchor="start">N/A</text>
  <text x="570" y="440" font-size="10" fill="#ef4444" text-anchor="start">全部操作全序 (Paxos)</text>
  <text x="745" y="440" font-size="10" fill="#ef4444" text-anchor="start">≥ 245ms</text>
  <text x="68" y="460" font-size="10" fill="#f97316" text-anchor="start">RedBlue · PoR</text>
  <text x="220" y="460" font-size="10" fill="#f97316" text-anchor="start">对称冲突(无向图)</text>
  <text x="395" y="460" font-size="10" fill="#f97316" text-anchor="start">毫秒级</text>
  <text x="570" y="460" font-size="10" fill="#f97316" text-anchor="start">过度协调: 全序冗余操作</text>
  <text x="745" y="460" font-size="10" fill="#f97316" text-anchor="start">371ms</text>
  <text x="68" y="480" font-size="10" fill="#10b981" font-weight="700" text-anchor="start">SL (DeMon)</text>
  <text x="220" y="480" font-size="10" fill="#10b981" font-weight="700" text-anchor="start">非对称有向图</text>
  <text x="395" y="480" font-size="10" fill="#10b981" font-weight="700" text-anchor="start">微秒级!</text>
  <text x="570" y="480" font-size="10" fill="#10b981" font-weight="700" text-anchor="start">仅共识强操作本身</text>
  <text x="745" y="480" font-size="10" fill="#10b981" font-weight="700" text-anchor="start">~245ms (强) + 亚ms (弱)</text>
</svg>