<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
      <marker id="arrow-94a3b8" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-a78bfa" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-34d399" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-22d3ee" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- ===== Generation Title Bands ===== -->
  <!-- Gen 1 -->
  <rect x="10" y="12" width="240" height="26" rx="5" fill="#0f172a"/>
  <rect x="10" y="12" width="240" height="26" rx="5" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="130" y="29" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">1st Gen: From DBs to DSMS</text>

  <!-- Gen 2 -->
  <rect x="255" y="12" width="240" height="26" rx="5" fill="#0f172a"/>
  <rect x="255" y="12" width="240" height="26" rx="5" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
  <text x="375" y="29" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">2nd Gen: Scale-Out Data Streaming</text>

  <!-- Gen 3 -->
  <rect x="500" y="12" width="240" height="26" rx="5" fill="#0f172a"/>
  <rect x="500" y="12" width="240" height="26" rx="5" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="620" y="29" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">3rd Gen: Next-Gen Streaming</text>

  <!-- Gen separators -->
  <line x1="252" y1="18" x2="252" y2="400" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="497" y1="18" x2="497" y2="400" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ===== Timeline Axis ===== -->
  <line x1="15" y1="52" x2="745" y2="52" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-94a3b8)"/>

  <!-- Year tick marks -->
  <line x1="45" y1="48" x2="45" y2="56" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-a78bfa)"/>
  <text x="45" y="70" fill="#a78bfa" font-size="10" text-anchor="middle">'92–'00</text>

  <line x1="145" y1="48" x2="145" y2="56" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-a78bfa)"/>
  <text x="145" y="70" fill="#a78bfa" font-size="10" text-anchor="middle">'00–'03</text>

  <line x1="235" y1="48" x2="235" y2="56" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-a78bfa)"/>
  <text x="235" y="70" fill="#a78bfa" font-size="10" text-anchor="middle">'04</text>

  <line x1="330" y1="48" x2="330" y2="56" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-34d399)"/>
  <text x="330" y="70" fill="#34d399" font-size="10" text-anchor="middle">'10–'12</text>

  <line x1="430" y1="48" x2="430" y2="56" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-34d399)"/>
  <text x="430" y="70" fill="#34d399" font-size="10" text-anchor="middle">'13–'17</text>

  <line x1="535" y1="48" x2="535" y2="56" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-22d3ee)"/>
  <text x="535" y="70" fill="#22d3ee" font-size="10" text-anchor="middle">'18–</text>

  <line x1="660" y1="48" x2="660" y2="56" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-22d3ee)"/>
  <text x="660" y="70" fill="#22d3ee" font-size="10" text-anchor="middle">'22–</text>

  <!-- ===== Systems ===== -->
  <!-- Gen 1 Systems -->
  <text x="130" y="98" fill="#e2e8f0" font-size="11" font-weight="500" text-anchor="middle">Tapestry</text>
  <text x="130" y="116" fill="#94a3b8" font-size="10" text-anchor="middle">NiagaraCQ</text>
  <text x="130" y="134" fill="#e2e8f0" font-size="11" font-weight="500" text-anchor="middle">Aurora</text>
  <text x="130" y="152" fill="#e2e8f0" font-size="11" font-weight="500" text-anchor="middle">STREAM</text>
  <text x="130" y="170" fill="#94a3b8" font-size="10" text-anchor="middle">TelegraphCQ</text>
  <text x="130" y="188" fill="#94a3b8" font-size="10" text-anchor="middle">Borealis</text>
  <text x="130" y="206" fill="#94a3b8" font-size="10" text-anchor="middle">Gigascope</text>
  <text x="130" y="224" fill="#94a3b8" font-size="10" text-anchor="middle">IBM System S</text>
  <text x="130" y="242" fill="#94a3b8" font-size="10" text-anchor="middle">Oracle CQL</text>

  <!-- Gen 2 Systems -->
  <text x="375" y="98" fill="#e2e8f0" font-size="11" font-weight="500" text-anchor="middle">Storm</text>
  <text x="375" y="116" fill="#94a3b8" font-size="10" text-anchor="middle">S4</text>
  <text x="375" y="134" fill="#e2e8f0" font-size="11" font-weight="500" text-anchor="middle">Spark Streaming</text>
  <text x="375" y="152" fill="#e2e8f0" font-size="11" font-weight="500" text-anchor="middle">Flink / Beam</text>
  <text x="375" y="170" fill="#94a3b8" font-size="10" text-anchor="middle">Naiad</text>
  <text x="375" y="188" fill="#94a3b8" font-size="10" text-anchor="middle">Millwheel</text>
  <text x="375" y="206" fill="#94a3b8" font-size="10" text-anchor="middle">Kafka Streams</text>
  <text x="375" y="224" fill="#94a3b8" font-size="10" text-anchor="middle">Samza</text>

  <!-- Gen 3 Systems -->
  <text x="620" y="98" fill="#e2e8f0" font-size="11" font-weight="500" text-anchor="middle">Ray</text>
  <text x="620" y="116" fill="#94a3b8" font-size="10" text-anchor="middle">Neptune</text>
  <text x="620" y="134" fill="#94a3b8" font-size="10" text-anchor="middle">Arcon</text>
  <text x="620" y="158" fill="#e2e8f0" font-size="11" font-weight="500" text-anchor="middle">Stateful Functions</text>
  <text x="620" y="176" fill="#94a3b8" font-size="10" text-anchor="middle">Ambrosia</text>

  <!-- ===== Evolution Arrow ===== -->
  <line x1="15" y1="275" x2="740" y2="275" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <text x="380" y="298" fill="#64748b" font-size="10" text-anchor="middle">技术演进方向</text>

  <!-- Separator -->
  <line x1="15" y1="310" x2="740" y2="310" stroke="#334155" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- ===== Innovations Row ===== -->
  <text x="380" y="330" fill="#475569" font-size="10" font-weight="600" text-anchor="middle">关键创新</text>

  <!-- Gen 1 Innovations -->
  <text x="70" y="350" fill="#a78bfa" font-size="10" font-weight="600" text-anchor="middle">Continuous Queries</text>
  <text x="70" y="366" fill="#94a3b8" font-size="9" text-anchor="middle">Inverted DBs</text>

  <text x="170" y="350" fill="#a78bfa" font-size="10" font-weight="600" text-anchor="middle">Sliding Windows</text>
  <text x="170" y="366" fill="#94a3b8" font-size="9" text-anchor="middle">Synopses</text>

  <text x="240" y="350" fill="#a78bfa" font-size="10" font-weight="600" text-anchor="middle">CEP</text>
  <text x="240" y="366" fill="#94a3b8" font-size="9" text-anchor="middle">Commercialization</text>

  <!-- Gen 2 Innovations -->
  <text x="330" y="350" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">Out-of-Order</text>
  <text x="330" y="366" fill="#94a3b8" font-size="9" text-anchor="middle">Processing</text>
  <text x="330" y="382" fill="#94a3b8" font-size="9" text-anchor="middle">Guarantees</text>

  <text x="430" y="350" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">State Mgmt</text>
  <text x="430" y="366" fill="#94a3b8" font-size="9" text-anchor="middle">SQL Stream</text>
  <text x="430" y="382" fill="#94a3b8" font-size="9" text-anchor="middle">Reconfig</text>

  <!-- Gen 3 Innovations -->
  <text x="555" y="350" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">Fixpoint Comp.</text>
  <text x="555" y="366" fill="#94a3b8" font-size="9" text-anchor="middle">Iterative DSP</text>

  <text x="660" y="350" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">Cloud Apps</text>
  <text x="660" y="366" fill="#94a3b8" font-size="9" text-anchor="middle">Microservices</text>
  <text x="660" y="382" fill="#94a3b8" font-size="9" text-anchor="middle">Transaction</text>
  <text x="660" y="398" fill="#94a3b8" font-size="9" text-anchor="middle">HW Acceleration</text>
</svg>