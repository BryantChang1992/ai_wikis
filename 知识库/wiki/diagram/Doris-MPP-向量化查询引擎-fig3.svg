  <text x="260" y="24" font-size="11" fill="#e2e8f0" text-anchor="middle">Agg</text>
  <rect x="290" y="10" width="42" height="24" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="311" y="24" font-size="11" fill="#e2e8f0" text-anchor="middle">Sort</text>
  <rect x="342" y="10" width="42" height="24" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="363" y="24" font-size="11" fill="#e2e8f0" text-anchor="middle">Sink</text>
  <line x1="58" y1="22" x2="66" y2="22" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="116" y1="22" x2="124" y2="22" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="178" y1="22" x2="186" y2="22" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="230" y1="22" x2="238" y2="22" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="280" y1="22" x2="288" y2="22" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="332" y1="22" x2="340" y2="22" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
