<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 780 240" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto">
  <defs>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="currentColor"/>
    </marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    text { font-family: sans-serif; font-size: 13px; fill: currentColor; dominant-baseline: middle; text-anchor: middle; }
  </style>

  <!-- Left side: Strict Two-Phase Commit -->
  <text x="195" y="18" font-weight="bold">Strict Two-Phase Commit</text>
  <text x="195" y="35" font-size="12">(同步微批次)</text>

  <rect x="70" y="55" width="250" height="36" rx="4" fill="transparent" stroke="currentColor"/>
  <text x="195" y="73" font-size="12">Phase 1: 全部Task处理完当前epoch</text>

  <line x1="195" y1="91" x2="195" y2="115" stroke="currentColor" stroke-width="1.5" marker-end="url(#a3)"/>

  <rect x="70" y="120" width="250" height="36" rx="4" fill="transparent" stroke="currentColor"/>
  <text x="195" y="138" font-size="12">Phase 2: 持久化全局状态</text>

  <text x="195" y="185" font-size="11" opacity="0.7">↓ 问题: Task利用率低，等所有Task完成</text>
  <text x="195" y="200" font-size="11" opacity="0.7">Drizzle缓解: chaining多个epoch</text>

  <!-- Separator -->
  <line x1="390" y1="10" x2="390" y2="230" stroke="currentColor" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Right side: Asynchronous Two-Phase Commit -->
  <text x="585" y="18" font-weight="bold">Asynchronous Two-Phase Commit</text>
  <text x="585" y="35" font-size="12">(异步快照)</text>

  <rect x="460" y="55" width="250" height="36" rx="4" fill="transparent" stroke="currentColor"/>
  <text x="585" y="73" font-size="12">Unaligned Snapshots</text>

  <text x="585" y="100" font-size="11">Chandy-Lamport: 插入marker,</text>
  <text x="585" y="115" font-size="11">记录in-flight events</text>

  <rect x="460" y="130" width="250" height="36" rx="4" fill="transparent" stroke="currentColor"/>
  <text x="585" y="148" font-size="12">Aligned Snapshots</text>

  <text x="585" y="175" font-size="11">阻塞已收到marker的通道,</text>
  <text x="585" y="190" font-size="11">等所有通道收到marker再传播</text>

  <text x="585" y="215" font-size="11" opacity="0.7">→ Flink的epoch snapshotting</text>

  <!-- Bottom details across both -->
  <text x="585" y="230" font-size="11" opacity="0.7">恢复时需重放in-flight events (fuzzy checkpoint)</text>
  <text x="195" y="230" font-size="11" opacity="0.7">完整epoch快照，延迟略高但恢复更快</text>

  <!-- Arrow from Unaligned to Aligned -->
  <line x1="585" y1="128" x2="585" y2="130" stroke="currentColor" stroke-width="1.5" marker-end="url(#a4)"/>
</svg>