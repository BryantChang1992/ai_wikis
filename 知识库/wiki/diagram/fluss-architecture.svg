<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="30" y="32" fill="#111827" font-size="16" font-weight="700">Fluss — Next-Gen Streaming Platform</text>
  <text x="30" y="50" fill="#6b7280" font-size="11">Kafka-compatible protocol + rebuilt storage kernel with Arrow/Parquet lakehouse layer</text>
  <text x="30" y="80" fill="#2563eb" font-size="12" font-weight="700">01 // CLIENT &amp; PROTOCOL</text>
  <rect x="80" y="94" width="172" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="166" y="120" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Kafka Client</text>
  <rect x="280" y="94" width="172" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="366" y="120" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Flink Connector</text>
  <rect x="480" y="94" width="172" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="566" y="120" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Flink SQL</text>
  <rect x="680" y="94" width="172" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="766" y="120" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">REST Proxy</text>
  <line x1="450" y1="134" x2="450" y2="158" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="30" y="178" fill="#16a34a" font-size="12" font-weight="700">02 // COORDINATOR</text>
  <rect x="80" y="192" width="172" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="166" y="218" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Metadata Mgr</text>
  <rect x="280" y="192" width="172" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="366" y="218" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">ISR Controller</text>
  <rect x="480" y="192" width="172" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="566" y="218" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Leader Election</text>
  <rect x="680" y="192" width="172" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="766" y="218" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Topic Admin</text>
  <line x1="450" y1="232" x2="450" y2="258" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="30" y="278" fill="#9333ea" font-size="12" font-weight="700">03 // STORAGE KERNEL</text>
  <rect x="30" y="292" width="195" height="48" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="128" y="312" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">LogSegment</text>
  <text x="128" y="328" fill="#6b7280" font-size="10" text-anchor="middle">KV dispatcher</text>
  <rect x="245" y="292" width="195" height="48" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="343" y="312" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Arrow Format</text>
  <text x="343" y="328" fill="#6b7280" font-size="10" text-anchor="middle">columnar batch</text>
  <rect x="460" y="292" width="195" height="48" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="558" y="312" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">RocksDB Local</text>
  <text x="558" y="328" fill="#6b7280" font-size="10" text-anchor="middle">key lookup</text>
  <rect x="675" y="292" width="195" height="48" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="773" y="312" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">TieredStorage</text>
  <text x="773" y="328" fill="#6b7280" font-size="10" text-anchor="middle">S3/OSS</text>
  <line x1="450" y1="340" x2="450" y2="368" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="30" y="388" fill="#f97316" font-size="12" font-weight="700">04 // LAKEHOUSE &amp; OBSERVABILITY</text>
  <rect x="30" y="402" width="195" height="48" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="128" y="422" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Parquet Lake</text>
  <text x="128" y="438" fill="#6b7280" font-size="10" text-anchor="middle">data export</text>
  <rect x="245" y="402" width="195" height="48" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="343" y="422" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Iceberg</text>
  <text x="343" y="438" fill="#6b7280" font-size="10" text-anchor="middle">table format</text>
  <rect x="460" y="402" width="195" height="48" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="558" y="422" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Metrics</text>
  <text x="558" y="438" fill="#6b7280" font-size="10" text-anchor="middle">Prometheus</text>
  <rect x="675" y="402" width="195" height="48" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="773" y="422" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Coordinator HA</text>
  <text x="773" y="438" fill="#6b7280" font-size="10" text-anchor="middle">ZooKeeper</text>
  <g transform="translate(30, 478)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="20" y="12" fill="#6b7280" font-size="10">Client</text>
    <rect x="100" y="0" width="14" height="14" rx="3" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="120" y="12" fill="#6b7280" font-size="10">Coordinator</text>
    <rect x="200" y="0" width="14" height="14" rx="3" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="220" y="12" fill="#6b7280" font-size="10">Storage</text>
    <rect x="300" y="0" width="14" height="14" rx="3" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
    <text x="320" y="12" fill="#6b7280" font-size="10">Lakehouse</text>
  </g>
</svg>
