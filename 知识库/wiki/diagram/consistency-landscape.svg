  <rect width="880" height="530" fill="#ffffff"/>
  <text x="30" y="32" fill="#111827" font-size="16" font-weight="700">Distributed Data Systems — Consistency Landscape</text>
  <text x="30" y="50" fill="#6b7280" font-size="11">Three pillars: Transaction Models · Event Horizon · Storage-Compute Separation</text>
  <text x="30" y="82" fill="#2563eb" font-size="12" font-weight="700">01 // TRANSACTION MODELS</text>
  <rect x="30" y="96" width="195" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="128" y="116" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">ACID</text>
  <text x="128" y="132" fill="#6b7280" font-size="10" text-anchor="middle">2PC/Paxos</text>
  <rect x="245" y="96" width="195" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="343" y="116" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Snapshot Iso.</text>
  <text x="343" y="132" fill="#6b7280" font-size="10" text-anchor="middle">MVCC/Truetime</text>
  <rect x="460" y="96" width="195" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="558" y="116" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Serializable</text>
  <text x="558" y="132" fill="#6b7280" font-size="10" text-anchor="middle">Calvin/OCC</text>
  <rect x="675" y="96" width="195" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="773" y="116" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Read Committed</text>
  <text x="773" y="132" fill="#6b7280" font-size="10" text-anchor="middle">lock-based</text>
  <text x="30" y="174" fill="#16a34a" font-size="12" font-weight="700">02 // EVENT HORIZON — Asymmetric Dependencies</text>
  <rect x="30" y="188" width="195" height="48" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="128" y="208" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Causal Order</text>
  <text x="128" y="224" fill="#6b7280" font-size="10" text-anchor="middle">Lamport clock</text>
  <rect x="245" y="188" width="195" height="48" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="343" y="208" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Global Barriers</text>
