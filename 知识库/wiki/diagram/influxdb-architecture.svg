<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#ffffff"/>
  <text x="30" y="32" fill="#111827" font-size="16" font-weight="700">InfluxDB Architecture Evolution — v1→v2→v3.0</text>
  <text x="30" y="50" fill="#6b7280" font-size="11">From self-built TSM engine (v1/v2) to columnar cloud-native Parquet/Arrow/DataFusion (v3.0)</text>
  <text x="30" y="80" fill="#2563eb" font-size="12" font-weight="700">v1 / v2 — Self-built Engine</text>
  <rect x="30" y="94" width="380" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="220" y="114" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Line Protocol</text>
  <text x="220" y="130" fill="#6b7280" font-size="10" text-anchor="middle">write API</text>
  <rect x="30" y="152" width="380" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="220" y="172" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">WAL</text>
  <text x="220" y="188" fill="#6b7280" font-size="10" text-anchor="middle">durability</text>
  <rect x="30" y="210" width="380" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="220" y="230" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">TSM Engine</text>
  <text x="220" y="246" fill="#6b7280" font-size="10" text-anchor="middle">col. compr.</text>
  <rect x="30" y="268" width="380" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="220" y="288" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">TSI Index</text>
  <text x="220" y="304" fill="#6b7280" font-size="10" text-anchor="middle">tag lookup</text>
  <rect x="30" y="326" width="380" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="220" y="346" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Shard/Retention</text>
  <text x="220" y="362" fill="#6b7280" font-size="10" text-anchor="middle">TTL policy</text>
  <text x="470" y="80" fill="#16a34a" font-size="12" font-weight="700">v3.0 — Cloud-Native</text>
  <rect x="470" y="94" width="380" height="48" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="660" y="114" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Parquet Writer</text>
  <text x="660" y="130" fill="#6b7280" font-size="10" text-anchor="middle">open format</text>
  <rect x="470" y="152" width="380" height="48" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="660" y="172" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Arrow Flight</text>
  <text x="660" y="188" fill="#6b7280" font-size="10" text-anchor="middle">columnar I/O</text>
  <rect x="470" y="210" width="380" height="48" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="660" y="230" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">DataFusion</text>
  <text x="660" y="246" fill="#6b7280" font-size="10" text-anchor="middle">query engine</text>
  <rect x="470" y="268" width="380" height="48" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="660" y="288" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Catalog/Iceberg</text>
  <text x="660" y="304" fill="#6b7280" font-size="10" text-anchor="middle">table mgmt</text>
  <rect x="470" y="326" width="380" height="48" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="660" y="346" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Compactor</text>
  <text x="660" y="362" fill="#6b7280" font-size="10" text-anchor="middle">merge-on-read</text>
  <line x1="420" y1="260" x2="460" y2="260" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="440" y="252" fill="#9333ea" font-size="9" text-anchor="middle">arch</text>
  <text x="440" y="274" fill="#9333ea" font-size="9" text-anchor="middle">shift</text>
  <text x="30" y="410" fill="#9333ea" font-size="12" font-weight="700">Shared Infrastructure — Object Storage + Ingester + Query Router</text>
  <rect x="30" y="424" width="195" height="48" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="128" y="444" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Ingester</text>
  <text x="128" y="460" fill="#6b7280" font-size="10" text-anchor="middle">write fan-in</text>
  <rect x="245" y="424" width="195" height="48" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="343" y="444" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Object Store</text>
  <text x="343" y="460" fill="#6b7280" font-size="10" text-anchor="middle">S3/compat</text>
  <rect x="460" y="424" width="195" height="48" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="558" y="444" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Querier</text>
  <text x="558" y="460" fill="#6b7280" font-size="10" text-anchor="middle">query fan-out</text>
  <rect x="675" y="424" width="195" height="48" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="773" y="444" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Router</text>
  <text x="773" y="460" fill="#6b7280" font-size="10" text-anchor="middle">load balance</text>
  <g transform="translate(30, 496)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="20" y="12" fill="#6b7280" font-size="10">v1/v2 TSM</text>
    <rect x="150" y="0" width="14" height="14" rx="3" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="170" y="12" fill="#6b7280" font-size="10">v3.0 Cloud</text>
    <rect x="300" y="0" width="14" height="14" rx="3" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="320" y="12" fill="#6b7280" font-size="10">Shared</text>
  </g>
</svg>
