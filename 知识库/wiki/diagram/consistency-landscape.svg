  <rect x="460" y="188" width="195" height="48" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="558" y="208" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Write-Skew</text>
  <text x="558" y="224" fill="#6b7280" font-size="10" text-anchor="middle">serializable check</text>
  <rect x="675" y="188" width="195" height="48" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="773" y="208" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Prior/After</text>
  <text x="773" y="224" fill="#6b7280" font-size="10" text-anchor="middle">event graph</text>
