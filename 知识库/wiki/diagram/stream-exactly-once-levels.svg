<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 610">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="480" y="34" fill="white" font-size="18" font-weight="700" text-anchor="middle">流处理 Exactly-Once 四级语义</text>
  <text x="480" y="54" fill="#94a3b8" font-size="10" text-anchor="middle">At-Most-Once → At-Least-Once → Exactly-Once on State → Exactly-Once on Output</text>

  <!-- ====== Layer 2: Connection Lines (none for this diagram) ====== -->

  <!-- ====== Layer 3: Opaque Masking Rects ====== -->
  <rect x="20" y="75" width="920" height="72" rx="10" fill="#0f172a"/>
  <rect x="20" y="155" width="920" height="72" rx="10" fill="#0f172a"/>
  <rect x="20" y="235" width="920" height="72" rx="10" fill="#0f172a"/>
  <rect x="20" y="315" width="920" height="72" rx="10" fill="#0f172a"/>

  <rect x="20" y="458" width="217" height="120" rx="8" fill="#0f172a"/>
  <rect x="250" y="458" width="217" height="120" rx="8" fill="#0f172a"/>
  <rect x="480" y="458" width="217" height="120" rx="8" fill="#0f172a"/>
  <rect x="710" y="458" width="230" height="120" rx="8" fill="#0f172a"/>

  <!-- ====== Layer 4: Component Boxes ====== -->

  <!-- Level 1: At-Most-Once (Alert / Rose - deprecated) -->
  <rect x="20" y="75" width="920" height="72" rx="10" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="20" y="75" width="115" height="72" rx="10" fill="rgba(30,41,59,0.6)"/>
  <rect x="125" y="75" width="10" height="72" fill="rgba(30,41,59,0.6)"/>
  <text x="77" y="103" fill="#94a3b8" font-size="12" font-weight="700" text-anchor="middle">At-Most-Once</text>
  <text x="77" y="122" fill="#64748b" font-size="9" text-anchor="middle">不保证送达</text>
  <text x="155" y="103" fill="#94a3b8" font-size="11">Input → Process → 可能丢数据</text>
  <text x="155" y="122" fill="#64748b" font-size="9">已过时 · 现代系统不再使用</text>
  <rect x="810" y="90" width="110" height="42" rx="6" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="865" y="108" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">⚠ 已淘汰</text>
  <text x="865" y="123" fill="#fb7185" font-size="8" text-anchor="middle">状态 / 输出 均无保证</text>

  <!-- Level 2: At-Least-Once (Accent / Amber) -->
  <rect x="20" y="155" width="920" height="72" rx="10" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>
  <rect x="20" y="155" width="115" height="72" rx="10" fill="rgba(120,53,15,0.4)"/>
  <rect x="125" y="155" width="10" height="72" fill="rgba(120,53,15,0.4)"/>
  <text x="77" y="183" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">At-Least-Once</text>
  <text x="77" y="202" fill="#fbbf24" font-size="9" text-anchor="middle">保证送达</text>
  <text x="155" y="183" fill="#e2e8f0" font-size="11">Input → Backpressure + Ack 机制 → Sink</text>
  <text x="155" y="202" fill="#94a3b8" font-size="9">Storm Acker · 可能重复输出 · 状态无一致性保证</text>
  <rect x="810" y="170" width="110" height="42" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="865" y="188" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">⚠ 需要幂等 Sink</text>
  <text x="865" y="203" fill="#fbbf24" font-size="8" text-anchor="middle">输出可能重复</text>

  <!-- Level 3: Exactly-Once on State (Secondary / Emerald) -->
  <rect x="20" y="235" width="920" height="72" rx="10" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>
  <rect x="20" y="235" width="115" height="72" rx="10" fill="rgba(6,78,59,0.4)"/>
  <rect x="125" y="235" width="10" height="72" fill="rgba(6,78,59,0.4)"/>
  <text x="77" y="263" fill="#34d399" font-size="12" font-weight="700" text-anchor="middle">Exactly-Once</text>
  <text x="77" y="282" fill="#34d399" font-size="9" text-anchor="middle">on State</text>
  <text x="155" y="263" fill="#e2e8f0" font-size="11">Input → Epoch Snapshot (Chandy-Lamport) → State ✓ · Output ✗</text>
  <text x="155" y="282" fill="#94a3b8" font-size="9">Flink · Samza · Spark · Beam 主流方案 · Output Commit Problem 仍需处理</text>
  <rect x="810" y="250" width="110" height="42" rx="6" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1"/>
  <text x="865" y="268" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">✅ 系统内正确</text>
  <text x="865" y="283" fill="#34d399" font-size="8" text-anchor="middle">外部输出可能重复</text>

  <!-- Level 4: Exactly-Once on Output (Tertiary / Violet) -->
  <rect x="20" y="315" width="920" height="72" rx="10" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>
  <rect x="20" y="315" width="115" height="72" rx="10" fill="rgba(76,29,149,0.4)"/>
  <rect x="125" y="315" width="10" height="72" fill="rgba(76,29,149,0.4)"/>
  <text x="77" y="343" fill="#a78bfa" font-size="12" font-weight="700" text-anchor="middle">Exactly-Once</text>
  <text x="77" y="362" fill="#a78bfa" font-size="9" text-anchor="middle">on Output</text>
  <text x="155" y="343" fill="#e2e8f0" font-size="11">Input → Atomic Checkpoint + 事务 Sink → State ✓ · Output ✓</text>
  <text x="155" y="362" fill="#94a3b8" font-size="9">Millwheel &gt; S-Store · 需事务 Sink 或 Idempotent Sink 配合</text>
  <rect x="810" y="330" width="110" height="42" rx="6" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1"/>
  <text x="865" y="348" fill="#a78bfa" font-size="10" font-weight="600" text-anchor="middle">🌟 终极目标</text>
  <text x="865" y="363" fill="#a78bfa" font-size="8" text-anchor="middle">极少数系统实现</text>

  <!-- Divider -->
  <line x1="40" y1="410" x2="920" y2="410" stroke="#334155" stroke-width="1"/>

  <!-- Section Title -->
  <text x="480" y="438" fill="white" font-size="15" font-weight="700" text-anchor="middle">容错四个维度 (Table 4)</text>

  <!-- Dim 1: Processing Semantics -->
  <rect x="20" y="458" width="217" height="120" rx="8" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1"/>
  <text x="128" y="482" fill="white" font-size="11" font-weight="600" text-anchor="middle">1. Processing Semantics</text>
  <text x="38" y="504" fill="#94a3b8" font-size="10">At-Most-Once / At-Least-Once</text>
  <text x="38" y="522" fill="#94a3b8" font-size="10">Exactly-Once on State</text>
  <text x="38" y="540" fill="#94a3b8" font-size="10">Exactly-Once on Output</text>
  <text x="38" y="558" fill="#a78bfa" font-size="10">→ 18 系统全量对比</text>

  <!-- Dim 2: Replication -->
  <rect x="250" y="458" width="217" height="120" rx="8" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1"/>
  <text x="358" y="482" fill="white" font-size="11" font-weight="600" text-anchor="middle">2. Replication</text>
  <text x="268" y="504" fill="#94a3b8" font-size="10">Active: 主备同步执行 (2× 资源)</text>
  <text x="268" y="522" fill="#94a3b8" font-size="10">Passive: Checkpoint → Standby</text>
  <text x="268" y="540" fill="#94a3b8" font-size="10">None: 从上游 Replay 重放</text>
  <text x="268" y="558" fill="#a78bfa" font-size="10">→ Borealis / Flink / Storm</text>

  <!-- Dim 3: Recovery Data -->
  <rect x="480" y="458" width="217" height="120" rx="8" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1"/>
  <text x="588" y="482" fill="white" font-size="11" font-weight="600" text-anchor="middle">3. Recovery Data</text>
  <text x="498" y="504" fill="#94a3b8" font-size="10">State Snapshots (一致性快照)</text>
  <text x="498" y="522" fill="#94a3b8" font-size="10">Output Buffers (未确认输出)</text>
  <text x="498" y="540" fill="#94a3b8" font-size="10">State Changelog (增量变更日志)</text>
  <text x="498" y="558" fill="#a78bfa" font-size="10">→ Flink / Samza / TimeStream</text>

  <!-- Dim 4: Storage Medium -->
  <rect x="710" y="458" width="230" height="120" rx="8" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1"/>
  <text x="825" y="482" fill="white" font-size="11" font-weight="600" text-anchor="middle">4. Storage Medium</text>
  <text x="728" y="504" fill="#94a3b8" font-size="10">Local Resilient: SSD + RocksDB</text>
  <text x="728" y="522" fill="#94a3b8" font-size="10">Remote: HDFS / S3 / GCS</text>
  <text x="728" y="540" fill="#94a3b8" font-size="10">In-Memory: 仅限 Active Rep.</text>
  <text x="728" y="558" fill="#a78bfa" font-size="10">→ Flink / Spark / Borealis</text>
</svg>