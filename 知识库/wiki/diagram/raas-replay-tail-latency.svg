<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" width="960" height="380">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','Courier New','Microsoft YaHei','SimHei',monospace; fill: #e2e8f0; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="960" height="380" fill="url(#bg-grad)"/>
  <text x="480" y="32" font-size="17" font-weight="700" fill="#e2e8f0" text-anchor="middle">RaaS: Replay-as-a-Service · 消除 Tail Latency</text>
  <text x="480" y="54" font-size="11" fill="#94a3b8" text-anchor="middle">SIGMOD 2026 · 存储计算分离场景下 Replay 请求到热副本 · 消除日志链长度差异导致的 Tail Latency</text>
  <rect x="30" y="70" width="440" height="130" rx="8" fill="#1c1917" stroke="#dc2626" stroke-width="1.5"/>
  <text x="250" y="94" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">问题: 日志链长度差异 → Tail Latency</text>
  <text x="50" y="118" font-size="10" fill="#94a3b8">├ Compute Node A: 本地日志链长 (缓存热) → 快 (ms)</text>
  <text x="50" y="136" font-size="10" fill="#94a3b8">├ Compute Node B: 日志链短 (缓存冷) → 慢 (s)</text>
  <text x="50" y="154" font-size="10" fill="#94a3b8">├ Root Cause: 存储计算分离 → 无数据亲和性</text>
  <text x="50" y="176" font-size="10" fill="#ef4444">└ 传统解法: Caching / Preloading → 治标不治本</text>
  <rect x="490" y="70" width="440" height="130" rx="8" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="710" y="94" font-size="13" font-weight="700" fill="#10b981" text-anchor="middle">RaaS 解决方案</text>
  <text x="510" y="118" font-size="10" fill="#94a3b8">├ Replay Request 到热副本 (缓存节点)</text>
  <text x="510" y="136" font-size="10" fill="#94a3b8">├ 热节点: 本地重放 log → 快路径响应</text>
  <text x="510" y="154" font-size="10" fill="#10b981">├ ✓ 消除日志链长度带来的缓存依赖</text>
  <text x="510" y="176" font-size="10" fill="#10b981">└ ✓ 利用已有热副本 · 零额外开销</text>
  <rect x="30" y="215" width="900" height="145" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="480" y="238" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">RaaS 架构</text>
  <rect x="60" y="255" width="110" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="115" y="275" font-size="11" fill="#e2e8f0" text-anchor="middle">Client</text>
  <line x1="170" y1="271" x2="205" y2="271" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <rect x="210" y="252" width="175" height="38" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="298" y="268" font-size="10" fill="#f87171" text-anchor="middle">Node B (冷: 日志链短)</text>
  <text x="298" y="282" font-size="9" fill="#ef4444" text-anchor="middle">响应: 2.3s ⚠</text>
  <path d="M 298,290 Q 298,330 480,330 Q 662,330 662,290" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-green)"/>
  <text x="480" y="350" font-size="10" fill="#10b981" text-anchor="middle">Replay Request → 热副本</text>
  <rect x="575" y="252" width="175" height="38" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="663" y="268" font-size="10" fill="#34d399" text-anchor="middle">Node A (热: 日志链长)</text>
  <text x="663" y="282" font-size="9" fill="#10b981" text-anchor="middle">响应: 12ms ✅</text>
  <line x1="750" y1="271" x2="785" y2="271" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="790" y="255" width="120" height="32" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="850" y="275" font-size="10" fill="#10b981" text-anchor="middle">12ms → Client</text>
  <text x="480" y="370" font-size="10" fill="#475569" text-anchor="middle">核心洞察: 在存储计算分离架构下, Replay 比 Caching/Preloading 更具确定性地消除 Tail Latency</text>
</svg>