<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 140">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-gold" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 8 3, 0 6" fill="#eab308"/>
    </marker>
    <marker id="arr-dash-left" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="8 0, 0 3, 8 6" fill="#94a3b8"/>
    </marker>
  </defs>
  <style>
    text { font-family: "SF Mono","Fira Code","Cascadia Code","Courier New","Microsoft YaHei","SimHei",monospace; }
  </style>
  <rect width="660" height="140" fill="url(#bg-grad)"/>
  <!-- Write Client -->
  <rect x="14" y="34" width="100" height="36" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="64" y="52" font-size="12" fill="#60a5fa" text-anchor="middle" dominant-baseline="central">Write Client</text>
  <!-- Arrow to Router -->
  <line x1="114" y1="52" x2="162" y2="52" stroke="#eab308" stroke-width="2" marker-end="url(#arr-gold)"/>
  <!-- Ingest Router -->
  <rect x="166" y="32" width="120" height="40" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="226" y="52" font-size="12" fill="#f97316" text-anchor="middle" dominant-baseline="central">Ingest Router</text>
  <text x="226" y="68" font-size="9" fill="#94a3b8" text-anchor="middle" dominant-baseline="central">Consistent Hash</text>
  <!-- Fork point -->
  <circle cx="304" cy="52" r="5" fill="#ea580c"/>
  <!-- Upper arrow to Ingester A -->
  <line x1="308" y1="48" x2="358" y2="34" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-gold)"/>
  <!-- Lower arrow to Ingester B -->
  <line x1="308" y1="56" x2="358" y2="70" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-gold)"/>
  <!-- Ingester A -->
  <rect x="364" y="14" width="140" height="36" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="434" y="34" font-size="11" fill="#10b981" text-anchor="middle" dominant-baseline="central">Ingester A</text>
  <text x="434" y="46" font-size="9" fill="#6ee7b7" text-anchor="middle" dominant-baseline="central">(WAL + Process)</text>
  <!-- Ingester B -->
  <rect x="364" y="54" width="140" height="36" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="434" y="74" font-size="11" fill="#10b981" text-anchor="middle" dominant-baseline="central">Ingester B</text>
  <text x="434" y="86" font-size="9" fill="#6ee7b7" text-anchor="middle" dominant-baseline="central">(WAL + Process)</text>
  <!-- Ack arrow back -->
  <line x1="364" y1="108" x2="64" y2="108" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash-left)"/>
  <text x="226" y="124" font-size="11" fill="#94a3b8" text-anchor="middle" dominant-baseline="central">Ack (双副本确认后才返回客户端)</text>
</svg>