<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="960" height="540" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="34" fill="#111827" font-size="17" font-weight="600" text-anchor="middle">Raft 共识算法协议核心 · 三态模型</text>
  <text x="480" y="54" fill="#6b7280" font-size="12" text-anchor="middle">Follower ⇄ Candidate ⇄ Leader 角色转换与 Leader Election 机制</text>

  <!-- ====== Three States Row ====== -->
  <!-- Follower Box -->
  <rect x="50" y="80" width="250" height="110" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="65" y="90" width="36" height="36" rx="6" fill="#eff6ff"/>
  <text x="83" y="114" fill="#2563eb" font-size="16" font-weight="600" text-anchor="middle">F</text>
  <text x="120" y="108" fill="#111827" font-size="15" font-weight="600">FOLLOWER</text>
  <text x="120" y="127" fill="#6b7280" font-size="11">接收 Leader 心跳和 Log Entries</text>
  <text x="120" y="145" fill="#6b7280" font-size="11">超时升级为 Candidate</text>
  <text x="120" y="163" fill="#6b7280" font-size="11">被动响应 RequestVote RPC</text>
  <text x="120" y="181" fill="#9ca3af" font-size="9">初始状态 · 不发起通信 · 只响应</text>

  <!-- Candidate Box -->
  <rect x="355" y="80" width="250" height="110" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="370" y="90" width="36" height="36" rx="6" fill="#faf5ff"/>
  <text x="388" y="114" fill="#9333ea" font-size="16" font-weight="600" text-anchor="middle">C</text>
  <text x="425" y="108" fill="#111827" font-size="15" font-weight="600">CANDIDATE</text>
  <text x="425" y="127" fill="#6b7280" font-size="11">发起 RequestVote RPC 选举</text>
  <text x="425" y="145" fill="#6b7280" font-size="11">收集多数票 → Leader</text>
  <text x="425" y="163" fill="#6b7280" font-size="11">发现更高 Term → Follower</text>
  <text x="425" y="181" fill="#9ca3af" font-size="9">临时状态 · 递增当前 Term · 自投票</text>

  <!-- Leader Box -->
  <rect x="660" y="80" width="250" height="110" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="675" y="90" width="36" height="36" rx="6" fill="#f0fdf4"/>
  <text x="693" y="114" fill="#16a34a" font-size="16" font-weight="600" text-anchor="middle">L</text>
  <text x="730" y="108" fill="#111827" font-size="15" font-weight="600">LEADER</text>
  <text x="730" y="127" fill="#6b7280" font-size="11">发送心跳 AppendEntries</text>
  <text x="730" y="145" fill="#6b7280" font-size="11">复制日志到 Followers</text>
  <text x="730" y="163" fill="#6b7280" font-size="11">发现更高 Term → Follower</text>
  <text x="730" y="181" fill="#9ca3af" font-size="9">稳定状态 · 至多一个 · 强 Leader 模型</text>

  <!-- Arrows between states -->
  <line x1="300" y1="120" x2="353" y2="120" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="326" y="114" fill="#2563eb" font-size="10" text-anchor="middle">超时</text>

  <line x1="605" y1="120" x2="658" y2="120" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="632" y="114" fill="#16a34a" font-size="10" text-anchor="middle">赢得选举</text>

  <!-- Degrade arrows (curved above) -->
  <path d="M 780 78 Q 780 55 480 55 Q 180 55 180 78" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow-red)"/>
  <text x="480" y="66" fill="#dc2626" font-size="10" text-anchor="middle">发现更高 Term · 退位为 Follower</text>

  <path d="M 480 78 Q 480 55 300 55" stroke="#9333ea" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="390" y="49" fill="#9333ea" font-size="9" text-anchor="middle">Split Vote / 超时重试</text>

  <!-- ====== Randomized Timeout Section ====== -->
  <rect x="50" y="220" width="860" height="70" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="75" y="248" fill="#111827" font-size="13" font-weight="600">Randomized Election Timeout</text>
  <text x="75" y="268" fill="#6b7280" font-size="11">每节点独立随机: T = 150ms + rand(0, 150)ms · 先超时者发起选举 · 大幅降低 Split Vote 概率</text>

  <!-- Timeout bars -->
  <rect x="75" y="278" width="220" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="75" y="278" width="175" height="8" rx="4" fill="#bfdbfe"/>
  <text x="185" y="275" fill="#2563eb" font-size="9" text-anchor="middle">T₁ = 260ms</text>

  <rect x="370" y="278" width="220" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="370" y="278" width="130" height="8" rx="4" fill="#bfdbfe"/>
  <text x="480" y="275" fill="#2563eb" font-size="9" text-anchor="middle">T₂ = 215ms</text>

  <rect x="665" y="278" width="220" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="665" y="278" width="195" height="8" rx="4" fill="#bfdbfe"/>
  <text x="775" y="275" fill="#2563eb" font-size="9" text-anchor="middle">T₃ = 290ms</text>

  <!-- ====== Log Replication Section ====== -->
  <rect x="50" y="315" width="860" height="195" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="80" y="342" fill="#111827" font-size="14" font-weight="600">Log Replication 流程</text>

  <!-- Leader node -->
  <rect x="80" y="360" width="180" height="52" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="170" y="382" fill="#16a34a" font-size="13" font-weight="600" text-anchor="middle">LEADER</text>
  <text x="170" y="400" fill="#6b7280" font-size="10" text-anchor="middle">AppendEntries RPC →</text>

  <!-- Followers -->
  <rect x="80" y="430" width="180" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="170" y="453" fill="#2563eb" font-size="12" font-weight="600" text-anchor="middle">FOLLOWER 1</text>

  <rect x="80" y="472" width="180" height="36" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="170" y="495" fill="#ea580c" font-size="12" font-weight="600" text-anchor="middle">FOLLOWER 2</text>

  <!-- Arrow from Leader -->
  <line x1="170" y1="412" x2="170" y2="428" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Log visualization panel -->
  <rect x="300" y="355" width="590" height="140" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>

  <text x="320" y="380" fill="#111827" font-size="12" font-weight="600">Leader Log:</text>
  <rect x="430" y="368" width="46" height="22" rx="4" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
  <text x="453" y="383" fill="#16a34a" font-size="10" text-anchor="middle">1:1</text>
  <rect x="482" y="368" width="46" height="22" rx="4" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
  <text x="505" y="383" fill="#16a34a" font-size="10" text-anchor="middle">1:2</text>
  <rect x="534" y="368" width="46" height="22" rx="4" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
  <text x="557" y="383" fill="#16a34a" font-size="10" text-anchor="middle">1:3</text>
  <rect x="586" y="368" width="46" height="22" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="609" y="383" fill="#d97706" font-size="10" text-anchor="middle">2:4</text>
  <text x="650" y="383" fill="#d97706" font-size="10">← Term 2 · 待 Commit</text>

  <text x="320" y="415" fill="#111827" font-size="12" font-weight="600">Follower 1 Log:</text>
  <rect x="430" y="403" width="46" height="22" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="453" y="418" fill="#2563eb" font-size="10" text-anchor="middle">1:1</text>
  <rect x="482" y="403" width="46" height="22" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="505" y="418" fill="#2563eb" font-size="10" text-anchor="middle">1:2</text>
  <rect x="534" y="403" width="46" height="22" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="557" y="418" fill="#d1d5db" font-size="10" text-anchor="middle">...</text>

  <text x="320" y="445" fill="#111827" font-size="12" font-weight="600">Follower 2 Log:</text>
  <rect x="430" y="433" width="46" height="22" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="453" y="448" fill="#ea580c" font-size="10" text-anchor="middle">1:1</text>
  <rect x="482" y="433" width="46" height="22" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="505" y="448" fill="#ea580c" font-size="10" text-anchor="middle">1:2</text>

  <text x="320" y="478" fill="#6b7280" font-size="10" font-style="italic">Log Matching Property: index=i, term=t 相同 → 前缀完全一致</text>

  <!-- Safety badge -->
  <rect x="50" y="520" width="860" height="18" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="0.5"/>
  <text x="480" y="533" fill="#92400e" font-size="10" font-weight="600" text-anchor="middle">Safety: Election Restriction + Commitment of Previous Terms + State Machine Safety</text>
</svg>