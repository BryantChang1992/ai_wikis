<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>
  <style>
    text { font-family: "SF Mono","Fira Code","Cascadia Code","Courier New","Microsoft YaHei","SimHei",monospace; }
  </style>
  <rect width="820" height="200" fill="url(#bg-grad)"/>
  <!-- Title -->
  <text x="20" y="24" font-size="14" fill="#e2e8f0" font-weight="700">InfluxDB v3 写入路径</text>
  <!-- Flow nodes -->
  <rect x="20" y="40" width="210" height="32" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="125" y="56" font-size="12" fill="#f97316" text-anchor="middle" dominant-baseline="central">HTTP /write (Line Protocol)</text>
  <line x1="230" y1="56" x2="265" y2="56" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <rect x="270" y="40" width="180" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="56" font-size="12" fill="#60a5fa" text-anchor="middle" dominant-baseline="central">Ingest Router</text>
  <line x1="450" y1="56" x2="485" y2="56" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <rect x="490" y="40" width="180" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="580" y="56" font-size="12" fill="#60a5fa" text-anchor="middle" dominant-baseline="central">Ingester</text>
  <!-- Descriptions -->
  <text x="20" y="98" font-size="11" fill="#94a3b8" dominant-baseline="central">Ingest Router: Line Protocol Parser → Consistent Hash → Ingester</text>
  <text x="20" y="118" font-size="12" fill="#e2e8f0" font-weight="700" dominant-baseline="central">Ingester Processing:</text>
  <rect x="30" y="128" width="520" height="22" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="40" y="139" font-size="11" fill="#10b981" dominant-baseline="central">① 写入 Object Store (Parquet — Write-Optimized + Recent Write Buffer)</text>
  <rect x="30" y="154" width="560" height="22" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="40" y="165" font-size="11" fill="#10b981" dominant-baseline="central">② 更新 Catalog (PostgreSQL/SQLite: Partition + Parquet File + Tombstone Meta)</text>
  <rect x="30" y="180" width="460" height="22" rx="4" fill="#052e16" stroke="#059669" stroke-width="1"/>
  <text x="40" y="191" font-size="11" fill="#10b981" dominant-baseline="central">③ 异步 Write Buffer Flush → Compaction into Read-Optimized Parquet</text>
</svg>