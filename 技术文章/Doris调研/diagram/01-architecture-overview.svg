<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', monospace; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="35" fill="white" font-size="16" font-weight="700">Apache Doris 3.0 — 整体架构（存算分离模式）</text>

  <!-- ===== Client Layer ===== -->
  <rect x="30" y="55" width="940" height="75" rx="10" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="45" y="72" fill="#fbbf24" font-size="10" font-weight="600">客户端层</text>

  <rect x="60" y="80" width="130" height="38" rx="6" fill="#0f172a"/>
  <rect x="60" y="80" width="130" height="38" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="125" y="97" fill="white" font-size="10" font-weight="600" text-anchor="middle">MySQL Client</text>
  <text x="125" y="111" fill="#94a3b8" font-size="8" text-anchor="middle">标准协议</text>

  <rect x="230" y="80" width="130" height="38" rx="6" fill="#0f172a"/>
  <rect x="230" y="80" width="130" height="38" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="295" y="97" fill="white" font-size="10" font-weight="600" text-anchor="middle">HTTP / JDBC</text>
  <text x="295" y="111" fill="#94a3b8" font-size="8" text-anchor="middle">标准接口</text>

  <rect x="400" y="80" width="130" height="38" rx="6" fill="#0f172a"/>
  <rect x="400" y="80" width="130" height="38" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="465" y="97" fill="white" font-size="10" font-weight="600" text-anchor="middle">Arrow Flight SQL</text>
  <text x="465" y="111" fill="#94a3b8" font-size="8" text-anchor="middle">高速列式</text>

  <rect x="570" y="80" width="130" height="38" rx="6" fill="#0f172a"/>
  <rect x="570" y="80" width="130" height="38" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="635" y="97" fill="white" font-size="10" font-weight="600" text-anchor="middle">Kafka / Flink</text>
  <text x="635" y="111" fill="#94a3b8" font-size="8" text-anchor="middle">实时数据源</text>

  <rect x="740" y="80" width="130" height="38" rx="6" fill="#0f172a"/>
  <rect x="740" y="80" width="130" height="38" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="805" y="97" fill="white" font-size="10" font-weight="600" text-anchor="middle">S3 / HDFS</text>
  <text x="805" y="111" fill="#94a3b8" font-size="8" text-anchor="middle">批量导入</text>

  <!-- Arrows from clients to FE -->
  <line x1="125" y1="118" x2="500" y2="160" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow-cyan)"/>
  <line x1="295" y1="118" x2="500" y2="160" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow-cyan)"/>
  <line x1="465" y1="118" x2="500" y2="160" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow-cyan)"/>

  <!-- ===== FE Layer ===== -->
  <rect x="30" y="150" width="940" height="95" rx="10" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="45" y="167" fill="#22d3ee" font-size="10" font-weight="600">FE 层 (Frontend — Java)</text>

  <rect x="60" y="175" width="180" height="55" rx="6" fill="#0f172a"/>
  <rect x="60" y="175" width="180" height="55" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="150" y="195" fill="white" font-size="10" font-weight="600" text-anchor="middle">SQL Parser</text>
  <text x="150" y="210" fill="#94a3b8" font-size="8" text-anchor="middle">ANSI SQL → AST</text>
  <text x="150" y="222" fill="#94a3b8" font-size="7" text-anchor="middle">MySQL 兼容语法</text>

  <rect x="270" y="175" width="190" height="55" rx="6" fill="#0f172a"/>
  <rect x="270" y="175" width="190" height="55" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="365" y="195" fill="white" font-size="10" font-weight="600" text-anchor="middle">Nereids Optimizer</text>
  <text x="365" y="210" fill="#94a3b8" font-size="8" text-anchor="middle">CBO · 统计信息 · Join Reorder</text>
  <text x="365" y="222" fill="#94a3b8" font-size="7" text-anchor="middle">Runtime Filter 生成</text>

  <rect x="490" y="175" width="180" height="55" rx="6" fill="#0f172a"/>
  <rect x="490" y="175" width="180" height="55" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="580" y="195" fill="white" font-size="10" font-weight="600" text-anchor="middle">Coordinator</text>
  <text x="580" y="210" fill="#94a3b8" font-size="8" text-anchor="middle">MPP Fragment 分发</text>
  <text x="580" y="222" fill="#94a3b8" font-size="7" text-anchor="middle">结果合并返回</text>

  <rect x="700" y="175" width="190" height="55" rx="6" fill="#0f172a"/>
  <rect x="700" y="175" width="190" height="55" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="795" y="195" fill="white" font-size="10" font-weight="600" text-anchor="middle">Catalog Manager</text>
  <text x="795" y="210" fill="#94a3b8" font-size="8" text-anchor="middle">Multi-Catalog 元数据</text>
  <text x="795" y="222" fill="#94a3b8" font-size="7" text-anchor="middle">Iceberg/Hive/Paimon</text>

  <!-- FE → BE arrows -->
  <line x1="365" y1="230" x2="365" y2="280" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow-cyan)"/>
  <line x1="580" y1="230" x2="580" y2="280" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow-cyan)"/>

  <!-- ===== BE Layer (Compute Group) ===== -->
  <rect x="30" y="270" width="940" height="170" rx="10" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="45" y="287" fill="#34d399" font-size="10" font-weight="600">BE 层 (Backend — C++ Compute Group)</text>

  <!-- Write Group -->
  <rect x="55" y="295" width="295" height="130" rx="8" fill="none" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="4,4"/>
  <text x="68" y="312" fill="#fbbf24" font-size="8" font-weight="500">Write Compute Group</text>

  <rect x="70" y="320" width="130" height="45" rx="6" fill="#0f172a"/>
  <rect x="70" y="320" width="130" height="45" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="135" y="340" fill="white" font-size="9" font-weight="600" text-anchor="middle">Routine Load</text>
  <text x="135" y="354" fill="#94a3b8" font-size="7" text-anchor="middle">Kafka 实时消费</text>

  <rect x="210" y="320" width="130" height="45" rx="6" fill="#0f172a"/>
  <rect x="210" y="320" width="130" height="45" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="275" y="340" fill="white" font-size="9" font-weight="600" text-anchor="middle">FlatBatch Writer</text>
  <text x="275" y="354" fill="#94a3b8" font-size="7" text-anchor="middle">MoW Segment 写入</text>

  <!-- Read Group -->
  <rect x="360" y="295" width="295" height="130" rx="8" fill="none" stroke="#60a5fa" stroke-width="0.8" stroke-dasharray="4,4"/>
  <text x="373" y="312" fill="#60a5fa" font-size="8" font-weight="500">Read Compute Group</text>

  <rect x="375" y="320" width="130" height="45" rx="6" fill="#0f172a"/>
  <rect x="375" y="320" width="130" height="45" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="440" y="340" fill="white" font-size="9" font-weight="600" text-anchor="middle">Vectorized Engine</text>
  <text x="440" y="354" fill="#94a3b8" font-size="7" text-anchor="middle">C++ SIMD 执行</text>

  <rect x="515" y="320" width="130" height="45" rx="6" fill="#0f172a"/>
  <rect x="515" y="320" width="130" height="45" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="580" y="340" fill="white" font-size="9" font-weight="600" text-anchor="middle">File Cache</text>
  <text x="580" y="354" fill="#94a3b8" font-size="7" text-anchor="middle">本地 SSD 缓存</text>

  <!-- Compactor (right side) -->
  <rect x="665" y="295" width="280" height="130" rx="8" fill="none" stroke="#fb923c" stroke-width="0.8" stroke-dasharray="4,4"/>
  <text x="678" y="312" fill="#fb923c" font-size="8" font-weight="500">后台服务</text>

  <rect x="680" y="320" width="125" height="45" rx="6" fill="#0f172a"/>
  <rect x="680" y="320" width="125" height="45" rx="6" fill="rgba(251,146,60,0.2)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="742" y="340" fill="white" font-size="9" font-weight="600" text-anchor="middle">Compactor</text>
  <text x="742" y="354" fill="#94a3b8" font-size="7" text-anchor="middle">Cumu./Base/Quick</text>

  <rect x="815" y="320" width="120" height="45" rx="6" fill="#0f172a"/>
  <rect x="815" y="320" width="120" height="45" rx="6" fill="rgba(251,146,60,0.2)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="875" y="340" fill="white" font-size="9" font-weight="600" text-anchor="middle">Index Builder</text>
  <text x="875" y="354" fill="#94a3b8" font-size="7" text-anchor="middle">倒排/Bloom/ZoneMap</text>

  <!-- BE → Storage Layer arrows -->
  <line x1="275" y1="380" x2="500" y2="475" stroke="#34d399" stroke-width="1" marker-end="url(#arrow-emerald)"/>
  <line x1="440" y1="380" x2="500" y2="475" stroke="#60a5fa" stroke-width="1" marker-end="url(#arrow-blue)"/>
  <line x1="742" y1="380" x2="500" y2="475" stroke="#fb923c" stroke-width="1" marker-end="url(#arrow-amber)"/>

  <!-- ===== Storage Layer ===== -->
  <rect x="30" y="465" width="940" height="120" rx="10" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="45" y="482" fill="#a78bfa" font-size="10" font-weight="600">存储层</text>

  <rect x="60" y="495" width="210" height="80" rx="6" fill="#0f172a"/>
  <rect x="60" y="495" width="210" height="80" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="165" y="520" fill="white" font-size="10" font-weight="600" text-anchor="middle">Remote Storage</text>
  <text x="165" y="538" fill="#94a3b8" font-size="8" text-anchor="middle">S3 / HDFS / MinIO</text>
  <text x="165" y="552" fill="#94a3b8" font-size="8" text-anchor="middle">Segment v2 文件持久化</text>
  <text x="165" y="566" fill="#a78bfa" font-size="7" text-anchor="middle">存算分离核心</text>

  <rect x="310" y="495" width="180" height="80" rx="6" fill="#0f172a"/>
  <rect x="310" y="495" width="180" height="80" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="400" y="520" fill="white" font-size="10" font-weight="600" text-anchor="middle">File Cache (SSD)</text>
  <text x="400" y="538" fill="#94a3b8" font-size="8" text-anchor="middle">热数据本地缓存</text>
  <text x="400" y="552" fill="#94a3b8" font-size="8" text-anchor="middle">LRU Eviction</text>
  <text x="400" y="566" fill="#a78bfa" font-size="7" text-anchor="middle">保证查询延迟</text>

  <rect x="530" y="495" width="200" height="80" rx="6" fill="#0f172a"/>
  <rect x="530" y="495" width="200" height="80" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="630" y="520" fill="white" font-size="10" font-weight="600" text-anchor="middle">Meta Store</text>
  <text x="630" y="538" fill="#94a3b8" font-size="8" text-anchor="middle">FoundationDB / MySQL</text>
  <text x="630" y="552" fill="#94a3b8" font-size="8" text-anchor="middle">Tablet 映射 · 元数据</text>
  <text x="630" y="566" fill="#a78bfa" font-size="7" text-anchor="middle">替代 BDB-JE 单机</text>

  <rect x="770" y="495" width="180" height="80" rx="6" fill="#0f172a"/>
  <rect x="770" y="495" width="180" height="80" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="860" y="520" fill="white" font-size="10" font-weight="600" text-anchor="middle">External Catalog</text>
  <text x="860" y="538" fill="#94a3b8" font-size="8" text-anchor="middle">Iceberg · Hive · Paimon</text>
  <text x="860" y="552" fill="#94a3b8" font-size="8" text-anchor="middle">Hudi · ES · JDBC</text>
  <text x="860" y="566" fill="#a78bfa" font-size="7" text-anchor="middle">湖仓联邦查询</text>

  <!-- Legend -->
  <rect x="30" y="600" width="940" height="65" rx="6" fill="none" stroke="#1e293b" stroke-width="1"/>
  <text x="50" y="620" fill="#94a3b8" font-size="9" font-weight="600">图例</text>
  <rect x="130" y="610" width="14" height="14" rx="3" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="150" y="621" fill="#94a3b8" font-size="8">前端 (FE)</text>
  <rect x="230" y="610" width="14" height="14" rx="3" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="250" y="621" fill="#94a3b8" font-size="8">后端 (BE)</text>
  <rect x="330" y="610" width="14" height="14" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="350" y="621" fill="#94a3b8" font-size="8">存储</text>
  <rect x="410" y="610" width="14" height="14" rx="3" fill="rgba(251,146,60,0.2)" stroke="#fb923c" stroke-width="1"/>
  <text x="430" y="621" fill="#94a3b8" font-size="8">后台</text>
  <line x1="500" y1="617" x2="530" y2="617" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow-cyan)"/>
  <text x="540" y="621" fill="#94a3b8" font-size="8">查询流</text>
  <line x1="600" y1="617" x2="630" y2="617" stroke="#34d399" stroke-width="1" marker-end="url(#arrow-emerald)"/>
  <text x="640" y="621" fill="#94a3b8" font-size="8">写入流</text>
  <line x1="700" y1="617" x2="730" y2="617" stroke="#fb923c" stroke-width="1" marker-end="url(#arrow-amber)"/>
  <text x="740" y="621" fill="#94a3b8" font-size="8">后台流</text>
</svg>
