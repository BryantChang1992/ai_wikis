  <text x="220" y="224" fill="#94a3b8" font-size="9" text-anchor="middle">MPP + vectorized + CBO</text>
  <rect x="30" y="240" width="380" height="40" rx="8" fill="#0f172a"/>
  <rect x="30" y="240" width="380" height="40" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
