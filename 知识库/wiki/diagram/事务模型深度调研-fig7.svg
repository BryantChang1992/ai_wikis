<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" width="680" height="220">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascada Code','Courier New','Microsoft YaHei','SimHei',monospace; }
    .t1 { fill: #e2e8f0; font-size: 13px; font-weight: bold; }
    .t2 { fill: #e2e8f0; font-size: 12px; }
    .t3 { fill: #94a3b8; font-size: 11px; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="ad" markerWidth="6" markerHeight="8" refX="3" refY="7" orient="auto"><polygon points="0 0, 3 8, 6 0" fill="#a855f7"/></marker>
  </defs>
  <rect width="680" height="220" fill="url(#bg)"/>
  <!-- TrueTime API -->
  <rect x="200" y="10" width="280" height="36" rx="6" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="340" y="30" class="t1" text-anchor="middle" dominant-baseline="middle">TrueTime API ← GPS + Atomic Clocks</text>
  <line x1="340" y1="46" x2="340" y2="65" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="340" y1="65" x2="120" y2="65" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="340" y1="65" x2="560" y2="65" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="120" y1="65" x2="120" y2="82" stroke="#a855f7" stroke-width="1.5" marker-end="url(#ad)"/>
  <line x1="560" y1="65" x2="560" y2="82" stroke="#a855f7" stroke-width="1.5" marker-end="url(#ad)"/>
  <!-- Zone A -->
  <rect x="10" y="87" width="220" height="55" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="120" y="107" class="t2" text-anchor="middle" dominant-baseline="middle">Zone A (Paxos)</text>
  <text x="120" y="127" class="t3" text-anchor="middle" dominant-baseline="middle">Spanserver...</text>
  <!-- Zone B -->
  <rect x="450" y="87" width="220" height="55" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="560" y="107" class="t2" text-anchor="middle" dominant-baseline="middle">Zone B (Paxos)</text>
  <text x="560" y="127" class="t3" text-anchor="middle" dominant-baseline="middle">Spanserver...</text>
  <!-- 2PC dashed link -->
  <line x1="230" y1="130" x2="450" y2="130" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="340" y="125" class="t2" text-anchor="middle">2PC (跨 Paxos Group 事务)</text>
  <!-- Legend -->
  <rect x="200" y="160" width="280" height="40" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="340" y="184" class="t3" text-anchor="middle" dominant-baseline="middle">TrueTime: now() → [earliest, latest] 区间</text>
</svg>