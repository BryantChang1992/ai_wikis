<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 55" width="600" height="55">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="55" fill="url(#bg-grad)"/>
  <text x="300" y="14" font-size="12" font-weight="bold" fill="#eab308" text-anchor="middle">Unique 模型 (MoR — Merge-on-Read)</text>
  <text x="10" y="32" font-size="11" font-weight="bold" fill="#e2e8f0">写入时:</text>
  <text x="115" y="32" font-size="10" fill="#94a3b8">不验证 Key 是否存在 → 直接追加新版本行</text>
  <text x="10" y="50" font-size="11" font-weight="bold" fill="#e2e8f0">查询时:</text>
  <text x="115" y="50" font-size="10" fill="#f97316">读取同一 Key 的多版本行 → 合并取最新值</text>
</svg>