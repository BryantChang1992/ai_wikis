<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
<defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>


  <rect width="960" height="320" fill="#ffffff"/>

  <text x="480" y="28" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">Paxos vs Raft · 共识问题分解对比</text>
  <text x="480" y="46" fill="#6b7280" font-size="11" text-anchor="middle">Paxos 将共识视为单一耦合问题，Raft 将其拆分为 3 个独立子问题</text>

  <!-- Paxos side -->
  <rect x="40" y="65" width="420" height="235" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="250" y="90" fill="#92400e" font-size="13" font-weight="600" text-anchor="middle">Paxos 的视角</text>

  <rect x="100" y="120" width="300" height="70" rx="6" fill="#ffffff" stroke="#d97706" stroke-width="1"/>
  <text x="250" y="148" fill="#92400e" font-size="13" font-weight="600" text-anchor="middle">一个复杂的、高度耦合的协议</text>
  <text x="250" y="170" fill="#78716c" font-size="10" text-anchor="middle">Single-decree Paxos 没有 leader / membership / reconfiguration</text>

  <text x="250" y="220" fill="#78716c" font-size="10" text-anchor="middle">Multi-Paxos 实现者各自魔改补齐缺失部分</text>
  <text x="250" y="238" fill="#dc2626" font-size="10" text-anchor="middle">→ 6 个知名实现，无一完全相同</text>

  <!-- Arrow between -->
  <line x1="460" y1="182" x2="500" y2="182" stroke="#6b7280" stroke-width="2"/>
  <text x="480" y="175" fill="#6b7280" font-size="9" font-weight="600" text-anchor="middle">分解</text><!-- Raft side -->
  <rect x="500" y="65" width="420" height="235" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="710" y="90" fill="#16a34a" font-size="13" font-weight="600" text-anchor="middle">Raft 的分解视角</text>

  <rect x="560" y="115" width="300" height="40" rx="6" fill="#ffffff" stroke="#86efac" stroke-width="1"/>
  <text x="710" y="134" fill="#16a34a" font-size="12" font-weight="600" text-anchor="middle">Leader Election</text>
  <text x="710" y="149" fill="#475569" font-size="9" text-anchor="middle">独立子问题：Term 逻辑时钟 + RequestVote</text>

  <rect x="560" y="165" width="300" height="40" rx="6" fill="#ffffff" stroke="#86efac" stroke-width="1"/>
  <text x="710" y="184" fill="#16a34a" font-size="12" font-weight="600" text-anchor="middle">Log Replication</text>
  <text x="710" y="199" fill="#475569" font-size="9" text-anchor="middle">独立子问题：AppendEntries + committedIndex</text>

  <rect x="560" y="215" width="300" height="40" rx="6" fill="#ffffff" stroke="#86efac" stroke-width="1"/>
  <text x="710" y="234" fill="#16a34a" font-size="12" font-weight="600" text-anchor="middle">Safety</text>
  <text x="710" y="249" fill="#475569" font-size="9" text-anchor="middle">独立子问题，约束 Leader Election 和 Log Replication</text>

  <text x="710" y="288" fill="#6b7280" font-size="10" text-anchor="middle">Ongaro User Study: 43 名学生 Raft 理解正确率 &gt; Paxos</text>
</svg>