<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 640">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <!-- Single universal arrow: equilateral triangle pointing right; refX at tip.
         orient="auto" will rotate it to follow line direction. -->
    <marker id="arr" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arr-cyan" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arr-amber" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#fbbf24"/>
    </marker>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="38" fill="white" font-size="16" font-weight="700">Agent 基础设施 · 五维度框架</text>
  <text x="30" y="56" fill="#64748b" font-size="10">CHANG_AI_TEAM Infrastructure Platform v0.2</text>
  <line x1="30" y1="66" x2="1030" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== TOP: Brain ===== -->
  <rect x="30" y="80" width="1000" height="170" rx="12" fill="none" stroke="#22d3ee" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="46" y="98" fill="#22d3ee" font-size="9" font-weight="600">Agent 的"大脑"</text>

  <!-- 1. 记忆管理 -->
  <rect x="70" y="112" width="196" height="120" rx="8" fill="#0f172a"/>
  <rect x="70" y="112" width="196" height="120" rx="8" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="110" cy="142" r="14" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1"/>
  <text x="110" y="147" fill="#22d3ee" font-size="13" text-anchor="middle">1</text>
  <text x="134" y="142" fill="white" font-size="12" font-weight="600">记忆管理</text>
  <text x="134" y="158" fill="#94a3b8" font-size="8">Memory Management</text>
  <text x="82" y="178" fill="#cbd5e1" font-size="9">↳ 三层记忆模型</text>
  <text x="82" y="194" fill="#cbd5e1" font-size="9">↳ 分层可见性设计</text>
  <text x="82" y="210" fill="#cbd5e1" font-size="9">↳ 高效检索 &amp; 召回</text>

  <!-- 2. 知识管理 -->
  <rect x="300" y="112" width="196" height="120" rx="8" fill="#0f172a"/>
  <rect x="300" y="112" width="196" height="120" rx="8" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="340" cy="142" r="14" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1"/>
  <text x="340" y="147" fill="#34d399" font-size="13" text-anchor="middle">2</text>
  <text x="364" y="142" fill="white" font-size="12" font-weight="600">知识管理</text>
  <text x="364" y="158" fill="#94a3b8" font-size="8">Knowledge Management</text>
  <text x="312" y="178" fill="#cbd5e1" font-size="9">↳ Obsidian Wiki 组织</text>
  <text x="312" y="194" fill="#cbd5e1" font-size="9">↳ 知识推送机制</text>
  <text x="312" y="210" fill="#cbd5e1" font-size="9">↳ 沉淀闭环 &amp; 新鲜度</text>

  <!-- ===== MIDDLE: 协作 ===== -->
  <rect x="30" y="265" width="1000" height="130" rx="12" fill="none" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="46" y="283" fill="#a78bfa" font-size="9" font-weight="600">Agent 的"协作方式"</text>

  <!-- 3. 工作流自动化 -->
  <rect x="70" y="297" width="930" height="80" rx="8" fill="#0f172a"/>
  <rect x="70" y="297" width="930" height="80" rx="8" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="110" cy="327" r="14" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1"/>
  <text x="110" y="332" fill="#a78bfa" font-size="13" text-anchor="middle">3</text>
  <text x="134" y="327" fill="white" font-size="12" font-weight="600">工作流自动化</text>
  <text x="134" y="343" fill="#94a3b8" font-size="8">Workflow Automation</text>

  <rect x="320" y="308" width="170" height="56" rx="6" fill="rgba(76,29,149,0.15)" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="405" y="332" fill="#cbd5e1" font-size="10" font-weight="500" text-anchor="middle">角色权限矩阵</text>
  <text x="405" y="350" fill="#64748b" font-size="8" text-anchor="middle">RBAC for Agents</text>

  <rect x="510" y="308" width="170" height="56" rx="6" fill="rgba(76,29,149,0.15)" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="595" y="332" fill="#cbd5e1" font-size="10" font-weight="500" text-anchor="middle">通信协议</text>
  <text x="595" y="350" fill="#64748b" font-size="8" text-anchor="middle">spawn / send / fork</text>

  <rect x="700" y="308" width="170" height="56" rx="6" fill="rgba(76,29,149,0.15)" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="785" y="332" fill="#cbd5e1" font-size="10" font-weight="500" text-anchor="middle">任务状态机</text>
  <text x="785" y="350" fill="#64748b" font-size="8" text-anchor="middle">State Machine</text>

  <!-- ===== BOTTOM: 保障 ===== -->
  <rect x="30" y="410" width="1000" height="200" rx="12" fill="none" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="46" y="428" fill="#fbbf24" font-size="9" font-weight="600">Agent 的"保障体系" — 看得见 + 靠得住</text>

  <!-- 4. 可观测性 -->
  <rect x="70" y="442" width="460" height="150" rx="8" fill="#0f172a"/>
  <rect x="70" y="442" width="460" height="150" rx="8" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="110" cy="472" r="14" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1"/>
  <text x="110" y="477" fill="#fbbf24" font-size="13" text-anchor="middle">4</text>
  <text x="134" y="472" fill="white" font-size="12" font-weight="600">可观测性</text>
  <text x="134" y="488" fill="#94a3b8" font-size="8">Observability — 看见</text>

  <rect x="88" y="504" width="132" height="40" rx="5" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="154" y="520" fill="#cbd5e1" font-size="9" font-weight="500" text-anchor="middle">📊 任务看板</text>
  <text x="154" y="535" fill="#64748b" font-size="7" text-anchor="middle">Task Dashboard</text>

  <rect x="235" y="504" width="132" height="40" rx="5" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="301" y="520" fill="#cbd5e1" font-size="9" font-weight="500" text-anchor="middle">💰 成本追踪</text>
  <text x="301" y="535" fill="#64748b" font-size="7" text-anchor="middle">Token Tracking</text>

  <rect x="382" y="504" width="132" height="40" rx="5" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="448" y="520" fill="#cbd5e1" font-size="9" font-weight="500" text-anchor="middle">🔔 异常告警</text>
  <text x="448" y="535" fill="#64748b" font-size="7" text-anchor="middle">Alerting</text>

  <text x="300" y="575" fill="#64748b" font-size="8" text-anchor="middle">Agent 状态 · 任务进度 · Token 消耗 · 工具调用 · 记忆检索 · 知识访问</text>

  <!-- 5. 可靠性 -->
  <rect x="570" y="442" width="430" height="150" rx="8" fill="#0f172a"/>
  <rect x="570" y="442" width="430" height="150" rx="8" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1.5"/>
  <circle cx="610" cy="472" r="14" fill="rgba(251,113,133,0.15)" stroke="#fb7185" stroke-width="1"/>
  <text x="610" y="477" fill="#fb7185" font-size="13" text-anchor="middle">5</text>
  <text x="634" y="472" fill="white" font-size="12" font-weight="600">可靠性</text>
  <text x="634" y="488" fill="#94a3b8" font-size="8">Reliability — 靠得住</text>

  <rect x="588" y="504" width="128" height="40" rx="5" fill="rgba(136,19,55,0.15)" stroke="#fb7185" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="652" y="520" fill="#cbd5e1" font-size="9" font-weight="500" text-anchor="middle">💾 状态持久化</text>
  <text x="652" y="535" fill="#64748b" font-size="7" text-anchor="middle">SQLite + Git</text>

  <rect x="730" y="504" width="128" height="40" rx="5" fill="rgba(136,19,55,0.15)" stroke="#fb7185" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="794" y="520" fill="#cbd5e1" font-size="9" font-weight="500" text-anchor="middle">🧊 冷启动</text>
  <text x="794" y="535" fill="#64748b" font-size="7" text-anchor="middle">Auto Bootstrap</text>

  <rect x="872" y="504" width="112" height="40" rx="5" fill="rgba(136,19,55,0.15)" stroke="#fb7185" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="928" y="520" fill="#cbd5e1" font-size="9" font-weight="500" text-anchor="middle">🔄 对账恢复</text>
  <text x="928" y="535" fill="#64748b" font-size="7" text-anchor="middle">Supervisor</text>

  <text x="785" y="575" fill="#64748b" font-size="8" text-anchor="middle">SQLite WAL · Git Backup · Supervisor 对账 · 超时检测 · 自动重试</text>

  <!-- Horizontal: 记忆 → 知识 -->
  <line x1="266" y1="172" x2="294" y2="172" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr-cyan)"/>

  <!-- Horizontal: 可观测性 → 可靠性 -->
  <line x1="530" y1="517" x2="564" y2="517" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Vertical: Brain → Collab -->
  <line x1="168" y1="232" x2="168" y2="259" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="398" y1="232" x2="398" y2="259" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Vertical: Collab → Ensure -->
  <line x1="300" y1="377" x2="300" y2="404" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="785" y1="377" x2="785" y2="404" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Legend -->
  <line x1="30" y1="618" x2="1030" y2="618" stroke="#1e293b" stroke-width="1"/>
  <text x="30" y="636" fill="#64748b" font-size="8">P0 优先级:</text>
  <rect x="128" y="627" width="8" height="8" rx="2" fill="#22d3ee"/>
  <text x="128" y="636" fill="#94a3b8" font-size="7">记忆</text>
  <rect x="170" y="627" width="8" height="8" rx="2" fill="#34d399"/>
  <text x="170" y="636" fill="#94a3b8" font-size="7">知识</text>
  <rect x="214" y="627" width="8" height="8" rx="2" fill="#a78bfa"/>
  <text x="214" y="636" fill="#94a3b8" font-size="7">协作</text>
  <rect x="258" y="627" width="8" height="8" rx="2" fill="#fbbf24"/>
  <text x="258" y="636" fill="#94a3b8" font-size="7">观测</text>
  <rect x="300" y="627" width="8" height="8" rx="2" fill="#fb7185"/>
  <text x="300" y="636" fill="#94a3b8" font-size="7">可靠</text>
</svg>
