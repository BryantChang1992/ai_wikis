<svg viewBox="0 0 820 310" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Column separators -->
  <line x1="265" y1="30" x2="265" y2="260" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="545" y1="30" x2="545" y2="260" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ===== Column 1: In-Memory State ===== -->
  <text x="140" y="32" fill="#22d3ee" font-size="14" font-weight="700" text-anchor="middle">I. In-Memory State</text>

  <!-- Mask + Box -->
  <rect x="50" y="50" width="180" height="50" rx="6" fill="#0f172a"/>
  <rect x="50" y="50" width="180" height="50" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="140" y="78" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">MemTable (全内存)</text>

  <text x="140" y="130" fill="#94a3b8" font-size="10" text-anchor="middle">纯内存存储, 低延迟</text>
  <text x="140" y="148" fill="#94a3b8" font-size="10" text-anchor="middle">无状态持久化保障</text>
  <text x="140" y="170" fill="#475569" font-size="9" text-anchor="middle">早期 DSMS 方案</text>

  <!-- ===== Column 2: Out-of-Core State ===== -->
  <text x="405" y="32" fill="#34d399" font-size="14" font-weight="700" text-anchor="middle">II. Out-of-Core State</text>

  <rect x="315" y="50" width="180" height="50" rx="6" fill="#0f172a"/>
  <rect x="315" y="50" width="180" height="50" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="405" y="78" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">MemTable (热数据)</text>

  <line x1="405" y1="100" x2="405" y2="135" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="470" y="122" fill="#34d399" font-size="10" text-anchor="start">Flush</text>

  <rect x="315" y="140" width="180" height="50" rx="6" fill="#0f172a"/>
  <rect x="315" y="140" width="180" height="50" rx="6" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="405" y="168" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">LSM-Tree (SSD/磁盘)</text>

  <text x="405" y="215" fill="#94a3b8" font-size="10" text-anchor="middle">内存 + 磁盘分层存储</text>
  <text x="405" y="233" fill="#94a3b8" font-size="10" text-anchor="middle">状态可溢出到磁盘</text>
  <text x="405" y="255" fill="#475569" font-size="9" text-anchor="middle">RocksDB / Flink State Backend</text>

  <!-- ===== Column 3: External State ===== -->
  <text x="680" y="32" fill="#a78bfa" font-size="14" font-weight="700" text-anchor="middle">III. External State</text>

  <rect x="590" y="50" width="180" height="50" rx="6" fill="#0f172a"/>
  <rect x="590" y="50" width="180" height="50" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="680" y="78" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Operator (无状态)</text>

  <line x1="680" y1="100" x2="680" y2="135" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="690" y="122" fill="#a78bfa" font-size="10" text-anchor="start">RPC</text>

  <rect x="590" y="140" width="180" height="50" rx="6" fill="#0f172a"/>
  <rect x="590" y="140" width="180" height="50" rx="6" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="680" y="168" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">BigTable / Spanner</text>

  <text x="680" y="205" fill="#475569" font-size="10" text-anchor="middle">(状态与计算解耦)</text>
  <text x="680" y="225" fill="#94a3b8" font-size="10" text-anchor="middle">状态完全外部化</text>
  <text x="680" y="243" fill="#94a3b8" font-size="10" text-anchor="middle">通过 RPC 访问状态</text>
  <text x="680" y="265" fill="#475569" font-size="9" text-anchor="middle">Millwheel / Dataflow</text>
</svg>