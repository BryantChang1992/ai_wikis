<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arr-blue2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>
  <style>
    text { font-family: "SF Mono","Fira Code","Cascadia Code","Courier New","Microsoft YaHei","SimHei",monospace; }
  </style>
  <rect width="820" height="200" fill="url(#bg-grad)"/>
  <!-- Title -->
  <text x="20" y="24" font-size="14" fill="#e2e8f0" font-weight="700">InfluxDB v3 查询路径</text>
  <!-- Flow nodes -->
  <rect x="20" y="40" width="230" height="32" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="135" y="56" font-size="12" fill="#f97316" text-anchor="middle" dominant-baseline="central">SQL (FlightSQL) / InfluxQL</text>
  <line x1="250" y1="56" x2="285" y2="56" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue2)"/>
  <rect x="290" y="40" width="210" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="395" y="56" font-size="12" fill="#60a5fa" text-anchor="middle" dominant-baseline="central">Query Router → Querier</text>
  <line x1="500" y1="56" x2="535" y2="56" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue2)"/>
  <rect x="540" y="40" width="180" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="630" y="56" font-size="12" fill="#60a5fa" text-anchor="middle" dominant-baseline="central">FlightSQL Server</text>
  <!-- Descriptions -->
  <text x="20" y="98" font-size="12" fill="#e2e8f0" font-weight="700" dominant-baseline="central">Querier 处理步骤:</text>
  <rect x="30" y="108" width="520" height="22" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="40" y="119" font-size="11" fill="#c4b5fd" dominant-baseline="central">① Catalog Cache Sync (Table · Column · Partition Metadata)</text>
  <rect x="30" y="134" width="300" height="22" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="40" y="145" font-size="11" fill="#c4b5fd" dominant-baseline="central">② SQL Parse &amp; Plan</text>
  <rect x="30" y="160" width="560" height="22" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="40" y="171" font-size="11" fill="#c4b5fd" dominant-baseline="central">③ Object Store Scan (Parquet File Pruning via Catalog + Filter Pushdown)</text>
  <rect x="30" y="186" width="460" height="22" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="40" y="197" font-size="11" fill="#c4b5fd" dominant-baseline="central">④ Merge Results → FlightSQL Stream Back to Client</text>
</svg>