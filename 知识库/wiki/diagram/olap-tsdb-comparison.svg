  <rect x="470" y="288" width="380" height="40" rx="8" fill="#0f172a"/>
  <rect x="470" y="288" width="380" height="40" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="660" y="306" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Compression</text>
  <text x="660" y="320" fill="#94a3b8" font-size="9" text-anchor="middle">timestamp delta + Gorilla</text>
  <rect x="470" y="336" width="380" height="40" rx="8" fill="#0f172a"/>
  <rect x="470" y="336" width="380" height="40" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="660" y="354" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Use Case</text>
  <text x="660" y="368" fill="#94a3b8" font-size="9" text-anchor="middle">metrics / monitoring</text>
