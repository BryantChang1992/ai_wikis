  <rect x="30" y="372" width="195" height="48" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="128" y="392" fill="#111827" font-size="12" font-weight="600" text-anchor="middle">Raft</text>
