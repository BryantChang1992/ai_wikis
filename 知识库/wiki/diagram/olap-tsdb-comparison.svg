  <text x="220" y="114" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Semantic Model</text>
  <text x="220" y="128" fill="#94a3b8" font-size="9" text-anchor="middle">star/snowflake schema</text>
  <rect x="30" y="144" width="380" height="40" rx="8" fill="#0f172a"/>
