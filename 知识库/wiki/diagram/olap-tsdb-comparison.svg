  <line x1="415" y1="164" x2="462" y2="164" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="415" y1="212" x2="462" y2="212" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="415" y1="260" x2="462" y2="260" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="415" y1="308" x2="462" y2="308" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="415" y1="356" x2="462" y2="356" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="30" y="410" fill="#a78bfa" font-size="12" font-weight="700">Convergence Trend → Both moving toward columnar + cloud-native</text>
