<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 310" xmlns="http://www.w3.org/2000/svg">
<text x="10" y="18" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="start" dominant-baseline="middle">Phase 1: Prewrite（预写）</text>
<rect x="10" y="28" width="700" height="100" rx="4" fill="transparent" stroke="currentColor" stroke-width="1.5"/>
<text x="25" y="46" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="start" dominant-baseline="middle">1. 从 TSO 获取 start_ts</text>
<text x="25" y="64" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="start" dominant-baseline="middle">2. 选一个 key 作为 primary，其余为 secondary</text>
<text x="25" y="82" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="start" dominant-baseline="middle">3. 对所有 key 检查写写冲突:</text>
<text x="35" y="100" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="start" dominant-baseline="middle">if 存在 write_record.ts &gt; start_ts → 冲突，abort</text>
<text x="25" y="118" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="start" dominant-baseline="middle">4. 对 primary 写 lock 列</text>
<text x="25" y="136" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="start" dominant-baseline="middle">5. 对所有 key 写 data 列（带 start_ts）</text>

<text x="10" y="172" font-family="sans-serif" font-size="12" fill="currentColor" text-anchor="start" dominant-baseline="middle">Phase 2: Commit</text>
<rect x="10" y="182" width="700" height="100" rx="4" fill="transparent" stroke="currentColor" stroke-width="1.5"/>
<text x="25" y="200" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="start" dominant-baseline="middle">1. 从 TSO 获取 commit_ts</text>
<text x="25" y="218" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="start" dominant-baseline="middle">2. 对 primary 写 write 列（commit_ts + start_ts）</text>
<text x="35" y="236" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="start" dominant-baseline="middle">← 此操作成功标志事务提交</text>
<text x="25" y="254" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="start" dominant-baseline="middle">3. 异步删除 primary lock</text>
<text x="25" y="272" font-family="sans-serif" font-size="11" fill="currentColor" text-anchor="start" dominant-baseline="middle">4. 异步清理 secondary 的 lock 和 write</text>
</svg>