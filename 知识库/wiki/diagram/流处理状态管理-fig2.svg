<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 780 70" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto">
  <style>
    text { font-family: sans-serif; font-size: 13px; fill: currentColor; dominant-baseline: middle; text-anchor: middle; }
  </style>
  <defs>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Axis arrow -->
  <line x1="20" y1="35" x2="770" y2="35" stroke="currentColor" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Left label -->
  <text x="20" y="55" font-size="12" text-anchor="start">细粒度</text>
  <text x="770" y="55" font-size="12" text-anchor="end">粗粒度</text>

  <!-- Tick marks and labels -->
  <line x1="100" y1="30" x2="100" y2="40" stroke="currentColor" stroke-width="1"/>
  <text x="100" y="16" font-size="12">Record-Level</text>

  <line x1="280" y1="30" x2="280" y2="40" stroke="currentColor" stroke-width="1"/>
  <text x="280" y="16" font-size="12">Epoch-Level</text>

  <line x1="510" y1="30" x2="510" y2="40" stroke="currentColor" stroke-width="1"/>
  <text x="510" y="16" font-size="12">Batch-Level</text>

  <line x1="700" y1="30" x2="700" y2="40" stroke="currentColor" stroke-width="1"/>
  <text x="700" y="16" font-size="12">No Persistence</text>

  <!-- Sub-labels below -->
  <text x="100" y="68" font-size="11">Millwheel</text>
  <text x="280" y="68" font-size="11">Flink/Samza</text>
  <text x="510" y="68" font-size="11">Spark/Trident</text>
  <text x="700" y="68" font-size="11">Storm/DSMS</text>

  <!-- Detail labels in brackets -->
  <text x="100" y="80" font-size="10" opacity="0.7">每条输出+状态写入事务</text>
  <text x="280" y="80" font-size="10" opacity="0.7">Chandy-Lamport异步快照</text>
  <text x="510" y="80" font-size="10" opacity="0.7">微批次结束时持久化</text>
  <text x="700" y="80" font-size="10" opacity="0.7">无状态保证</text>

  <!-- Ranges -->
  <text x="100" y="92" font-size="10" opacity="0.7">最高正确性 最高延迟</text>
  <text x="280" y="92" font-size="10" opacity="0.7">平衡性能+正确性 标准方案</text>
  <text x="510" y="92" font-size="10" opacity="0.7">高吞吐 混合批流</text>
</svg>