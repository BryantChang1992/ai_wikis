<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="480" y="32" fill="white" font-size="16" font-weight="700" text-anchor="middle">Raft 共识算法协议核心 · 三态模型</text>
  <text x="480" y="52" fill="#94a3b8" font-size="11" text-anchor="middle">Follower / Candidate / Leader 角色转换与 Leader Election 流程</text>

  <!-- Follower Box -->
  <rect x="60" y="85" width="240" height="95" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <text x="180" y="115" fill="#22d3ee" font-size="15" font-weight="700" text-anchor="middle">FOLLOWER</text>
  <text x="180" y="140" fill="#94a3b8" font-size="10" text-anchor="middle">接收 Leader 心跳</text>
  <text x="180" y="157" fill="#94a3b8" font-size="10" text-anchor="middle">接收 Log Entries</text>
  <text x="180" y="174" fill="#64748b" font-size="9" text-anchor="middle">→ 超时升级为 Candidate</text>

  <!-- Candidate Box -->
  <rect x="360" y="85" width="240" height="95" rx="10" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
  <text x="480" y="115" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">CANDIDATE</text>
  <text x="480" y="140" fill="#94a3b8" font-size="10" text-anchor="middle">发起 RequestVote RPC</text>
  <text x="480" y="157" fill="#94a3b8" font-size="10" text-anchor="middle">收集多数票 → Leader</text>
  <text x="480" y="174" fill="#64748b" font-size="9" text-anchor="middle">→ Split Vote / 发现更高 Term</text>

  <!-- Leader Box -->
  <rect x="660" y="85" width="240" height="95" rx="10" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <text x="780" y="115" fill="#34d399" font-size="15" font-weight="700" text-anchor="middle">LEADER</text>
  <text x="780" y="140" fill="#94a3b8" font-size="10" text-anchor="middle">发送心跳 AppendEntries</text>
  <text x="780" y="157" fill="#94a3b8" font-size="10" text-anchor="middle">复制日志到 Followers</text>
  <text x="780" y="174" fill="#64748b" font-size="9" text-anchor="middle">→ 发现更高 Term 退位</text>

  <!-- Transition arrows between boxes -->
  <line x1="300" y1="110" x2="358" y2="110" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="330" y="103" fill="#22d3ee" font-size="9" text-anchor="middle">超时</text>

  <line x1="600" y1="110" x2="658" y2="110" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="630" y="103" fill="#34d399" font-size="9" text-anchor="middle">赢得选举</text>

  <line x1="780" y1="85" x2="780" y2="78" stroke="#fb7185" stroke-width="1.5"/>
  <line x1="780" y1="78" x2="180" y2="78" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="180" y1="78" x2="180" y2="83" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  <text x="480" y="73" fill="#fb7185" font-size="9" text-anchor="middle">发现更高 Term → 退位为 Follower</text>

  <line x1="480" y1="85" x2="480" y2="78" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="180" y1="78" x2="180" y2="76" stroke="#fb7185" stroke-width="1.5"/>

  <line x1="480" y1="95" x2="480" y2="95" stroke="none"/>
  <line x1="300" y1="155" x2="358" y2="155" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="330" y="172" fill="#fbbf24" font-size="9" text-anchor="middle">Split Vote / 超时重试</text>

  <!-- Leader Election Timeline -->
  <rect x="60" y="210" width="840" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="90" y="232" fill="#fbbf24" font-size="13" font-weight="700">Randomized Election Timeout</text>
  
  <!-- Timeline bars -->
  <rect x="90" y="245" width="220" height="8" rx="4" fill="#1e3a5f"/>
  <rect x="90" y="245" width="180" height="8" rx="4" fill="#22d3ee" opacity="0.6"/>
  <text x="200" y="243" fill="#22d3ee" font-size="8" text-anchor="middle">T₁ = 150 + rand(0,150)ms</text>
  
  <rect x="380" y="245" width="220" height="8" rx="4" fill="#1e3a5f"/>
  <rect x="380" y="245" width="120" height="8" rx="4" fill="#34d399" opacity="0.6"/>
  <text x="490" y="243" fill="#34d399" font-size="8" text-anchor="middle">T₂ = 150 + rand(0,150)ms</text>
  
  <rect x="670" y="245" width="220" height="8" rx="4" fill="#1e3a5f"/>
  <rect x="670" y="245" width="200" height="8" rx="4" fill="#a78bfa" opacity="0.6"/>
  <text x="780" y="243" fill="#a78bfa" font-size="8" text-anchor="middle">T₃ = 150 + rand(0,150)ms</text>

  <!-- Log Replication Section -->
  <rect x="60" y="290" width="840" height="195" rx="10" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="100" y="318" fill="white" font-size="14" font-weight="700">Log Replication 流程</text>

  <!-- Server boxes -->
  <rect x="100" y="340" width="180" height="40" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <text x="190" y="365" fill="#34d399" font-size="12" font-weight="600" text-anchor="middle">LEADER</text>

  <rect x="100" y="405" width="180" height="40" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="190" y="430" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">FOLLOWER 1</text>

  <rect x="100" y="445" width="180" height="40" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="190" y="470" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">FOLLOWER 2</text>

  <!-- Arrow from Leader to Followers -->
  <line x1="190" y1="380" x2="190" y2="403" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <line x1="190" y1="380" x2="420" y2="400" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Log entries visualization -->
  <rect x="330" y="330" width="540" height="140" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>

  <!-- Leader log -->
  <text x="350" y="355" fill="#34d399" font-size="10" font-weight="600">Leader Log:</text>
  <rect x="350" y="362" width="42" height="24" rx="3" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
  <text x="371" y="378" fill="#34d399" font-size="9" text-anchor="middle">1:1</text>
  <rect x="398" y="362" width="42" height="24" rx="3" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
  <text x="419" y="378" fill="#34d399" font-size="9" text-anchor="middle">1:2</text>
  <rect x="446" y="362" width="42" height="24" rx="3" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
  <text x="467" y="378" fill="#34d399" font-size="9" text-anchor="middle">1:3</text>
  <rect x="494" y="362" width="42" height="24" rx="3" fill="#04ce3b" stroke="#34d399" stroke-width="1.5"/>
  <text x="515" y="378" fill="#34d399" font-size="9" text-anchor="middle">2:4</text>
  
  <text x="560" y="378" fill="#fbbf24" font-size="9">← 当前 Term 2, 待 Commit</text>

  <!-- Log Matching Property -->
  <text x="350" y="410" fill="#22d3ee" font-size="10" font-weight="600">Follower 1 Log:</text>
  <rect x="350" y="418" width="42" height="24" rx="3" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
  <text x="371" y="434" fill="#22d3ee" font-size="9" text-anchor="middle">1:1</text>
  <rect x="398" y="418" width="42" height="24" rx="3" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
  <text x="419" y="434" fill="#22d3ee" font-size="9" text-anchor="middle">1:2</text>
  <rect x="446" y="418" width="42" height="24" rx="3" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="467" y="434" fill="#fbbf24" font-size="9" text-anchor="middle">···</text>

  <!-- Key Principle -->
  <text x="350" y="460" fill="#94a3b8" font-size="9" font-style="italic">Log Matching Property: 若 index=i, term=t 条目相同 → 前缀完全一致</text>

  <!-- Safety constraints -->
  <rect x="60" y="500" width="840" height="28" rx="6" fill="#0f172a" stroke="#fb7185" stroke-width="1"/>
  <text x="480" y="519" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">Safety: Election Restriction (Candidate 日志必须≥多数节点) + Commitment of Previous Terms (5.4.2 关键约束)</text>
</svg>