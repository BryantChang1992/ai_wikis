<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <!-- Standard downward arrow marker -->
    <marker id="arr-down" markerWidth="7" markerHeight="10" refX="3.5" refY="10" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 7 0, 3.5 10" fill="#475569"/>
    </marker>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="38" fill="white" font-size="16" font-weight="700">CHANG_AI_TEAM · 组织架构</text>
  <text x="30" y="56" fill="#64748b" font-size="10">Organization Chart — CTO Sub-tree Expanded</text>

  <!-- ===== CEO ===== -->
  <rect x="340" y="80" width="280" height="70" rx="8" fill="#0f172a"/>
  <rect x="340" y="80" width="280" height="70" rx="8" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="2"/>
  <text x="480" y="108" fill="white" font-size="13" font-weight="700" text-anchor="middle">🤖 CEO · Claw</text>
  <text x="480" y="128" fill="#fbbf24" font-size="9" text-anchor="middle">Final Decision Maker</text>

  <!-- Level label -->
  <rect x="90" y="165" width="80" height="22" rx="4" fill="#fbbf24" fill-opacity="0.15"/>
  <text x="130" y="180" fill="#fbbf24" font-size="8" font-weight="600" text-anchor="middle">VP 层</text>

  <!-- CEO → CFO (L-shaped: down to y=175, left to x=240, down to y=195) -->
  <path d="M 430 150 L 430 175 L 240 175 L 240 190" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-down)"/>
  <!-- CEO → COO (straight down) -->
  <line x1="480" y1="150" x2="480" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-down)"/>
  <!-- CEO → CPO (L-shaped: down to y=175, right to x=720, down to y=195) -->
  <path d="M 530 150 L 530 175 L 720 175 L 720 190" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-down)"/>

  <!-- ===== CFO ===== -->
  <rect x="140" y="195" width="200" height="65" rx="8" fill="#0f172a"/>
  <rect x="140" y="195" width="200" height="65" rx="8" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1.2"/>
  <text x="240" y="222" fill="white" font-size="11" font-weight="600" text-anchor="middle">💰 CFO</text>
  <text x="240" y="240" fill="#94a3b8" font-size="8" text-anchor="middle">成本 &amp; 财务决策</text>

  <!-- ===== COO ===== -->
  <rect x="380" y="195" width="200" height="65" rx="8" fill="#0f172a"/>
  <rect x="380" y="195" width="200" height="65" rx="8" fill="rgba(59,130,246,0.2)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="480" y="222" fill="white" font-size="11" font-weight="600" text-anchor="middle">📋 COO</text>
  <text x="480" y="240" fill="#94a3b8" font-size="8" text-anchor="middle">运营 &amp; 流程</text>

  <!-- ===== CPO ===== -->
  <rect x="620" y="195" width="200" height="65" rx="8" fill="#0f172a"/>
  <rect x="620" y="195" width="200" height="65" rx="8" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.2"/>
  <text x="720" y="222" fill="white" font-size="11" font-weight="600" text-anchor="middle">🎨 CPO</text>
  <text x="720" y="240" fill="#94a3b8" font-size="8" text-anchor="middle">产品 &amp; 用户体验</text>

  <!-- ===== CTO (highlighted) ===== -->
  <rect x="340" y="290" width="280" height="70" rx="8" fill="#0f172a"/>
  <rect x="340" y="290" width="280" height="70" rx="8" fill="rgba(34,211,238,0.2)" stroke="#22d3ee" stroke-width="2"/>
  <text x="480" y="318" fill="white" font-size="13" font-weight="700" text-anchor="middle">⚙️ CTO</text>
  <text x="480" y="338" fill="#22d3ee" font-size="9" text-anchor="middle">技术决策 ｜ Agent 基建 Owner</text>

  <!-- CEO → CTO (straight down between COO box and this one, bypassing COO) -->
  <line x1="480" y1="260" x2="480" y2="285" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-down)"/>

  <!-- Expert level label -->
  <rect x="90" y="370" width="120" height="22" rx="4" fill="#a78bfa" fill-opacity="0.15"/>
  <text x="150" y="385" fill="#a78bfa" font-size="8" font-weight="600" text-anchor="middle">专家层 · Expert</text>

  <!-- CTO → Infra Expert -->
  <path d="M 430 360 L 430 385 L 230 385 L 230 400" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-down)"/>
  <!-- CTO → Perf Expert (straight down) -->
  <line x1="480" y1="360" x2="480" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-down)"/>
  <!-- CTO → SRE Expert -->
  <path d="M 530 360 L 530 385 L 730 385 L 730 400" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-down)"/>

  <!-- ===== Infra Expert ===== -->
  <rect x="130" y="405" width="200" height="55" rx="6" fill="#0f172a"/>
  <rect x="130" y="405" width="200" height="55" rx="6" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1"/>
  <text x="230" y="428" fill="white" font-size="10" font-weight="600" text-anchor="middle">Infra 专家</text>
  <text x="230" y="446" fill="#64748b" font-size="8" text-anchor="middle">基础设施技术决策</text>

  <!-- ===== Perf Expert ===== -->
  <rect x="380" y="405" width="200" height="55" rx="6" fill="#0f172a"/>
  <rect x="380" y="405" width="200" height="55" rx="6" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1"/>
  <text x="480" y="428" fill="white" font-size="10" font-weight="600" text-anchor="middle">Perf 专家</text>
  <text x="480" y="446" fill="#64748b" font-size="8" text-anchor="middle">性能优化</text>

  <!-- ===== SRE Expert ===== -->
  <rect x="630" y="405" width="200" height="55" rx="6" fill="#0f172a"/>
  <rect x="630" y="405" width="200" height="55" rx="6" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1"/>
  <text x="730" y="428" fill="white" font-size="10" font-weight="600" text-anchor="middle">SRE 专家</text>
  <text x="730" y="446" fill="#64748b" font-size="8" text-anchor="middle">可靠性 &amp; 监控</text>

  <!-- Worker level label -->
  <rect x="90" y="480" width="120" height="22" rx="4" fill="#64748b" fill-opacity="0.15"/>
  <text x="150" y="495" fill="#94a3b8" font-size="8" font-weight="600" text-anchor="middle">执行层 · Worker</text>

  <!-- ===== Worker boxes ===== -->
  <!-- RD -->
  <rect x="50" y="512" width="160" height="50" rx="6" fill="#0f172a"/>
  <rect x="50" y="512" width="160" height="50" rx="6" fill="rgba(100,116,139,0.12)" stroke="#64748b" stroke-width="1" stroke-opacity="0.6"/>
  <text x="130" y="534" fill="white" font-size="10" font-weight="500" text-anchor="middle">🛠️ RD</text>
  <text x="130" y="550" fill="#64748b" font-size="7" text-anchor="middle">开发执行</text>

  <!-- SRE Worker -->
  <rect x="250" y="512" width="160" height="50" rx="6" fill="#0f172a"/>
  <rect x="250" y="512" width="160" height="50" rx="6" fill="rgba(100,116,139,0.12)" stroke="#64748b" stroke-width="1" stroke-opacity="0.6"/>
  <text x="330" y="534" fill="white" font-size="10" font-weight="500" text-anchor="middle">🔧 SRE</text>
  <text x="330" y="550" fill="#64748b" font-size="7" text-anchor="middle">运维执行</text>

  <!-- QA -->
  <rect x="450" y="512" width="160" height="50" rx="6" fill="#0f172a"/>
  <rect x="450" y="512" width="160" height="50" rx="6" fill="rgba(100,116,139,0.12)" stroke="#64748b" stroke-width="1" stroke-opacity="0.6"/>
  <text x="530" y="534" fill="white" font-size="10" font-weight="500" text-anchor="middle">✅ QA</text>
  <text x="530" y="550" fill="#64748b" font-size="7" text-anchor="middle">测试验证</text>

  <!-- Expert → Worker delegation (dashed) -->
  <path d="M 230 460 L 230 480 L 130 480 L 130 507" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.5" marker-end="url(#arr-down)"/>
  <path d="M 480 460 L 480 480 L 330 480 L 330 507" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.5" marker-end="url(#arr-down)"/>
  <path d="M 730 460 L 730 480 L 530 480 L 530 507" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.5" marker-end="url(#arr-down)"/>

  <!-- Legend -->
  <rect x="30" y="580" width="900" height="30" rx="4" fill="none" stroke="#1e293b" stroke-width="1"/>
  <rect x="45" y="588" width="10" height="10" rx="2" fill="#fbbf24"/>
  <text x="60" y="597" fill="#94a3b8" font-size="8">CEO/VP</text>
  <rect x="140" y="588" width="10" height="10" rx="2" fill="#22d3ee"/>
  <text x="155" y="597" fill="#94a3b8" font-size="8">CTO 子树</text>
  <rect x="235" y="588" width="10" height="10" rx="2" fill="#a78bfa"/>
  <text x="250" y="597" fill="#94a3b8" font-size="8">专家层</text>
  <rect x="315" y="588" width="10" height="10" rx="2" fill="#64748b"/>
  <text x="330" y="597" fill="#94a3b8" font-size="8">执行层</text>
  <text x="420" y="597" fill="#475569" font-size="8">━ 直接汇报 ··· 可委托</text>
</svg>
