    </linearGradient>
  </defs>
  <rect width="600" height="70" fill="url(#bg)"/>
  <rect x="10" y="10" width="580" height="50" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="300" y="28" class="t1" text-anchor="middle" dominant-baseline="middle">时钟不确定性处理 (HLC):</text>
  <text x="25" y="48" class="t2">Global Uncertainty Limit = max_offset，若 commit_ts 落在不确定性窗口内则等待</text>
