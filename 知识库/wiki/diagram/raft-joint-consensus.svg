<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" width="960" height="360">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="960" height="360" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="34" fill="#111827" font-size="17" font-weight="600" text-anchor="middle">Raft Joint Consensus · 集群成员变更</text>
  <text x="480" y="54" fill="#6b7280" font-size="12" text-anchor="middle">Cold → Cold,new (双重多数确认) → Cnew · 变更期间集群持续可用</text>

  <!-- Phase 1: Cold -->
  <rect x="40" y="80" width="260" height="100" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="170" y="112" fill="#2563eb" font-size="15" font-weight="700" text-anchor="middle">Phase 1: Cold</text>
  <text x="170" y="136" fill="#6b7280" font-size="11" text-anchor="middle">旧配置: {S₁, S₂, S₃}</text>
  <text x="170" y="156" fill="#6b7280" font-size="11" text-anchor="middle">多数派: ceil(3/2) = 2</text>
  <text x="170" y="176" fill="#9ca3af" font-size="10" text-anchor="middle">正常运作 · 变更前</text>

  <!-- Arrow P1 → P2 -->
  <line x1="300" y1="130" x2="360" y2="130" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="330" y="122" fill="#2563eb" font-size="9" text-anchor="middle">Leader 提交</text>
  <text x="330" y="148" fill="#6b7280" font-size="9" text-anchor="middle">Cold,new 配置</text>

  <!-- Phase 2: Cold,new -->
  <rect x="365" y="80" width="260" height="100" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="495" y="112" fill="#92400e" font-size="15" font-weight="700" text-anchor="middle">Phase 2: Cold,new</text>
  <text x="495" y="136" fill="#6b7280" font-size="11" text-anchor="middle">Joint: {S₁,S₂,S₃} ∪ {S₃,S₄,S₅}</text>
  <text x="495" y="156" fill="#6b7280" font-size="11" text-anchor="middle">双重多数: 2/3 Old + 2/3 New</text>
  <text x="495" y="176" fill="#d97706" font-size="10" text-anchor="middle">消除脑裂窗口</text>

  <!-- Arrow P2 → P3 -->
  <line x1="625" y1="130" x2="685" y2="130" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="655" y="122" fill="#16a34a" font-size="9" text-anchor="middle">Joint 多数</text>
  <text x="655" y="148" fill="#6b7280" font-size="9" text-anchor="middle">确认 → Cnew</text>

  <!-- Phase 3: Cnew -->
  <rect x="690" y="80" width="230" height="100" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="805" y="112" fill="#16a34a" font-size="15" font-weight="700" text-anchor="middle">Phase 3: Cnew</text>
  <text x="805" y="136" fill="#6b7280" font-size="11" text-anchor="middle">新配置: {S₃, S₄, S₅}</text>
  <text x="805" y="156" fill="#6b7280" font-size="11" text-anchor="middle">多数派: ceil(3/2) = 2</text>
  <text x="805" y="176" fill="#9ca3af" font-size="10" text-anchor="middle">变更完成</text>

  <!-- ====== Server Visual ====== -->
  <rect x="40" y="210" width="880" height="75" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Cold servers -->
  <rect x="120" y="228" width="60" height="32" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="150" y="249" fill="#2563eb" font-size="12" font-weight="600" text-anchor="middle">S₁</text>
  <rect x="200" y="228" width="60" height="32" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="230" y="249" fill="#2563eb" font-size="12" font-weight="600" text-anchor="middle">S₂</text>
  <rect x="280" y="228" width="60" height="32" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="310" y="249" fill="#16a34a" font-size="12" font-weight="600" text-anchor="middle">S₃</text>
  <rect x="360" y="228" width="60" height="32" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="390" y="249" fill="#16a34a" font-size="12" font-weight="600" text-anchor="middle">S₄</text>
  <rect x="440" y="228" width="60" height="32" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="470" y="249" fill="#16a34a" font-size="12" font-weight="600" text-anchor="middle">S₅</text>

  <text x="180" y="280" fill="#6b7280" font-size="9" text-anchor="middle">Cold 旧节点</text>
  <text x="310" y="280" fill="#6b7280" font-size="9" text-anchor="middle">重叠节点</text>
  <text x="410" y="280" fill="#6b7280" font-size="9" text-anchor="middle">Cnew 新节点</text>

  <!-- Single-server shortcut -->
  <rect x="560" y="228" width="340" height="48" rx="6" fill="#faf5ff" stroke="#ede9fe" stroke-width="1"/>
  <text x="580" y="248" fill="#9333ea" font-size="12" font-weight="700">Single-Server Change 优化</text>
  <text x="580" y="268" fill="#6b7280" font-size="10">一次仅变一台: 新旧多数派必然重叠 → 跳过 Joint Consensus</text>

  <!-- Availability matrix -->
  <rect x="40" y="305" width="880" height="50" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  <text x="70" y="328" fill="#111827" font-size="11" font-weight="600">变更期间可用性：</text>
  <text x="220" y="328" fill="#16a34a" font-size="11">✓ 读</text>
  <text x="290" y="328" fill="#16a34a" font-size="11">✓ 写</text>
  <text x="360" y="328" fill="#16a34a" font-size="11">✓ Leader Election</text>
  <text x="500" y="328" fill="#6b7280" font-size="11">所有阶段持续可用 · 无停机</text>
</svg>