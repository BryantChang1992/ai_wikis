<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 270" width="780" height="270">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; fill: #e2e8f0; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrow-green-down" markerWidth="6" markerHeight="8" refX="3" refY="7" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 6 0, 3 8" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="780" height="270" fill="url(#bg-grad)"/>
  <text x="20" y="26" fill="#e2e8f0" font-size="14" font-weight="700" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace">WAL &amp; MVCC Data Flow — MySQL InnoDB Write Path</text>
  <rect x="20" y="50" width="140" height="52" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="72" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">User SQL</text>
  <text x="90" y="88" fill="#94a3b8" font-size="9" text-anchor="middle">request</text>
  <line x1="160" y1="76" x2="208" y2="76" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="215" y="50" width="140" height="52" rx="6" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="285" y="72" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">WAL Log</text>
  <text x="285" y="88" fill="#94a3b8" font-size="9" text-anchor="middle">sequential write</text>
  <line x1="355" y1="76" x2="403" y2="76" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="410" y="50" width="140" height="52" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="480" y="72" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">Buffer Pool</text>
  <text x="480" y="88" fill="#94a3b8" font-size="9" text-anchor="middle">in-memory</text>
  <line x1="550" y1="76" x2="598" y2="76" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="605" y="50" width="155" height="52" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="682" y="72" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">Data Pages</text>
  <text x="682" y="88" fill="#94a3b8" font-size="9" text-anchor="middle">async flush</text>
  <line x1="285" y1="102" x2="285" y2="155" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green-down)"/>
  <rect x="180" y="165" width="210" height="52" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="285" y="187" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">Disk Log (ib_logfile)</text>
  <text x="285" y="203" fill="#94a3b8" font-size="9" text-anchor="middle">durable → tx can commit</text>
  <rect x="20" y="240" width="14" height="14" rx="2" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="40" y="251" fill="#94a3b8" font-size="9">Data flow</text>
  <rect x="130" y="240" width="14" height="14" rx="2" fill="#052e16" stroke="#10b981" stroke-width="1"/>
  <text x="150" y="251" fill="#94a3b8" font-size="9">WAL / persistence</text>
</svg>