<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="480" y="32" fill="white" font-size="16" font-weight="700" text-anchor="middle">Aurora Limitless · Router/Shard 解耦架构</text>
  <text x="480" y="54" fill="#94a3b8" font-size="11" text-anchor="middle">SIGMOD 2026 · 透明分布式水平扩展 · 三种表类型 · 查询 Pushdown 优化</text>

  <!-- Client (Primary - cyan) -->
  <rect x="360" y="75" width="240" height="34" rx="8" fill="#0f172a"/>
  <rect x="360" y="75" width="240" height="34" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="480" y="97" fill="white" font-size="12" font-weight="600" text-anchor="middle">Client (PostgreSQL 协议)</text>

  <line x1="480" y1="109" x2="480" y2="128" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- DNS LB (Primary - cyan) -->
  <rect x="330" y="135" width="300" height="30" rx="6" fill="#0f172a"/>
  <rect x="330" y="135" width="300" height="30" rx="6" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1"/>
  <text x="480" y="155" fill="#94a3b8" font-size="10" text-anchor="middle">DNS Load Balancer</text>

  <line x1="480" y1="165" x2="480" y2="183" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Router Layer Region (Primary - cyan) -->
  <rect x="30" y="190" width="900" height="55" rx="10" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="42" y="206" fill="#22d3ee" font-size="9" font-weight="600">Router Layer (无状态)</text>

  <!-- Router boxes -->
  <rect x="50" y="215" width="160" height="24" rx="5" fill="#0f172a"/>
  <rect x="50" y="215" width="160" height="24" rx="5" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="130" y="232" fill="white" font-size="11" font-weight="600" text-anchor="middle">Router-1</text>

  <rect x="270" y="215" width="160" height="24" rx="5" fill="#0f172a"/>
  <rect x="270" y="215" width="160" height="24" rx="5" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="350" y="232" fill="white" font-size="11" font-weight="600" text-anchor="middle">Router-2</text>

  <rect x="570" y="215" width="160" height="24" rx="5" fill="#0f172a"/>
  <rect x="570" y="215" width="160" height="24" rx="5" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="650" y="232" fill="white" font-size="11" font-weight="600" text-anchor="middle">Router-3</text>

  <text x="850" y="232" fill="#94a3b8" font-size="10" text-anchor="middle">Schema + Topology + Shard Map</text>

  <!-- Arrows Router → Shards -->
  <line x1="480" y1="245" x2="480" y2="268" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Shard Layer Region (Secondary - emerald) -->
  <rect x="30" y="275" width="900" height="70" rx="10" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="42" y="291" fill="#34d399" font-size="9" font-weight="600">Shard Layer (有状态 Aurora PG)</text>

  <!-- Shard boxes -->
  <rect x="60" y="298" width="180" height="40" rx="6" fill="#0f172a"/>
  <rect x="60" y="298" width="180" height="40" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="150" y="316" fill="white" font-size="11" font-weight="600" text-anchor="middle">Shard A</text>
  <text x="150" y="330" fill="#6ee7b7" font-size="9" text-anchor="middle">Aurora PG · 有状态</text>

  <rect x="270" y="298" width="180" height="40" rx="6" fill="#0f172a"/>
  <rect x="270" y="298" width="180" height="40" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="360" y="316" fill="white" font-size="11" font-weight="600" text-anchor="middle">Shard B</text>
  <text x="360" y="330" fill="#6ee7b7" font-size="9" text-anchor="middle">Aurora PG · 有状态</text>

  <rect x="490" y="298" width="180" height="40" rx="6" fill="#0f172a"/>
  <rect x="490" y="298" width="180" height="40" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="580" y="316" fill="white" font-size="11" font-weight="600" text-anchor="middle">Shard C</text>
  <text x="580" y="330" fill="#6ee7b7" font-size="9" text-anchor="middle">Aurora PG · 有状态</text>

  <text x="780" y="315" fill="#94a3b8" font-size="9" text-anchor="middle">0-2 Standby per Shard</text>

  <!-- Arrow Shard → Storage -->
  <line x1="480" y1="345" x2="480" y2="368" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- Storage Layer (Tertiary - violet) -->
  <rect x="200" y="375" width="560" height="36" rx="8" fill="#0f172a"/>
  <rect x="200" y="375" width="560" height="36" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="480" y="398" fill="white" font-size="12" font-weight="600" text-anchor="middle">Aurora Storage (3 AZ · 6 Replicas · Quorum Writes)</text>

  <!-- Table Types -->
  <!-- Sharded Table (Primary - cyan) -->
  <rect x="30" y="428" width="290" height="110" rx="10" fill="#0f172a"/>
  <rect x="30" y="428" width="290" height="110" rx="10" fill="rgba(8,51,68,0.25)" stroke="#22d3ee" stroke-width="1"/>
  <text x="175" y="450" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Sharded Table</text>
  <text x="50" y="472" fill="#94a3b8" font-size="9">Hash(shard_key) 水平分区</text>
  <text x="50" y="490" fill="#94a3b8" font-size="9">支持 Co-location · 单 Shard Join</text>
  <text x="50" y="508" fill="#64748b" font-size="8">例: customers, orders</text>

  <!-- Reference Table (Secondary - emerald) -->
  <rect x="335" y="428" width="290" height="110" rx="10" fill="#0f172a"/>
  <rect x="335" y="428" width="290" height="110" rx="10" fill="rgba(6,78,59,0.25)" stroke="#34d399" stroke-width="1"/>
  <text x="480" y="450" fill="#34d399" font-size="12" font-weight="600" text-anchor="middle">Reference Table</text>
  <text x="355" y="472" fill="#94a3b8" font-size="9">全量复制到每个 Shard</text>
  <text x="355" y="490" fill="#94a3b8" font-size="9">支持内连接 / 外连接 Pushdown</text>
  <text x="355" y="508" fill="#64748b" font-size="8">例: tax_rates, lookup 表</text>

  <!-- Standard Table (Accent - amber) -->
  <rect x="640" y="428" width="290" height="110" rx="10" fill="#0f172a"/>
  <rect x="640" y="428" width="290" height="110" rx="10" fill="rgba(120,53,15,0.25)" stroke="#fbbf24" stroke-width="1"/>
  <text x="785" y="450" fill="#fbbf24" font-size="12" font-weight="600" text-anchor="middle">Standard Table</text>
  <text x="660" y="472" fill="#94a3b8" font-size="9">单 Shard 存放</text>
  <text x="660" y="490" fill="#94a3b8" font-size="9">不便分片 · 导入过渡期</text>
  <text x="660" y="508" fill="#64748b" font-size="8">例: 遗留表</text>
</svg>