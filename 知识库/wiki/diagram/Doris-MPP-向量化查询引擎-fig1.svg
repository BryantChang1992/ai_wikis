  <line x1="107" y1="130" x2="115" y2="130" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="165" y1="130" x2="173" y2="130" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="217" y1="130" x2="225" y2="130" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="267" y1="130" x2="275" y2="130" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="319" y1="130" x2="327" y2="130" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="340" y1="142" x2="340" y2="158" stroke="#f97316" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <rect x="220" y="160" width="240" height="24" rx="4" fill="#1c1917" stroke="#ea580c" stroke-width="1"/>
  <text x="340" y="175" font-size="11" fill="#f97316" text-anchor="middle">向量化引擎 (4096行/Batch, SIMD)</text>
