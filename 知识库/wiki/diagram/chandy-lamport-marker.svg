<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
      <marker id="arrow-2563eb" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-16a34a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-9333ea" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
  </defs>

  <rect width="960" height="480" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="34" fill="#111827" font-size="17" font-weight="700" text-anchor="middle">Chandy-Lamport 分布式快照算法 · Marker 传播机制</text>
  <text x="480" y="56" fill="#6b7280" font-size="12" text-anchor="middle">ACM TOCS 1985 · SIGOPS Hall of Fame 2013 · Flink Checkpoint 理论基础</text>

  <!-- ====== Topology / Timeline ====== -->
  <rect x="20" y="75" width="920" height="230" rx="8" fill="none" stroke="#d1d5db" stroke-width="1"/>

  <!-- Process P1 (Initiator) -->
  <text x="45" y="108" fill="#2563eb" font-size="14" font-weight="700">Process P₁ (Initiator)</text>
  <line x1="230" y1="115" x2="920" y2="115" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-2563eb)"/>
  <!-- Snapshot mark -->
  <circle cx="360" cy="115" r="6" fill="#2563eb"/>
  <text x="360" y="104" fill="#2563eb" font-size="10" text-anchor="middle">快照₁</text>

  <!-- Marker P1 → P2 -->
  <line x1="360" y1="115" x2="520" y2="180" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="435" y="140" fill="#ea580c" font-size="10" font-weight="600">marker</text>

  <!-- Marker P1 → P3 -->
  <line x1="360" y1="115" x2="660" y2="260" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="480" y="200" fill="#ea580c" font-size="10" font-weight="600">marker</text>

  <!-- Process P2 -->
  <text x="45" y="175" fill="#16a34a" font-size="14" font-weight="700">Process P₂</text>
  <line x1="230" y1="182" x2="920" y2="182" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-16a34a)"/>
  <!-- Snapshot mark -->
  <circle cx="520" cy="182" r="6" fill="#16a34a"/>
  <text x="520" y="171" fill="#16a34a" font-size="10" text-anchor="middle">快照₂</text>

  <!-- Channel recording for P2 -->
  <line x1="520" y1="188" x2="520" y2="218" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="530" y="208" fill="#9333ea" font-size="9">监听入边</text>

  <!-- Marker P2 → P3 (cascade) -->
  <line x1="520" y1="182" x2="660" y2="260" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="595" y="215" fill="#ea580c" font-size="10" font-weight="600">marker</text>

  <!-- Process P3 -->
  <text x="45" y="257" fill="#9333ea" font-size="14" font-weight="700">Process P₃</text>
  <line x1="230" y1="264" x2="920" y2="264" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-9333ea)"/>
  <!-- Snapshot mark -->
  <circle cx="660" cy="264" r="6" fill="#9333ea"/>
  <text x="660" y="253" fill="#9333ea" font-size="10" text-anchor="middle">快照₃</text>

  <!-- Channel recording for P3 -->
  <line x1="660" y1="270" x2="660" y2="300" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="672" y="290" fill="#9333ea" font-size="9">监听入边</text>

  <!-- ====== Explanation Section ====== -->
  <rect x="20" y="320" width="440" height="70" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="45" y="346" fill="#ea580c" font-size="13" font-weight="700">通道状态记录规则</text>
  <text x="45" y="365" fill="#6b7280" font-size="11">① 快照后，开始监听所有入边通道上的消息</text>
  <text x="45" y="385" fill="#6b7280" font-size="11">② 首次收到 marker 的通道 → 状态为空 (marker 前无消息)</text>

  <rect x="480" y="320" width="460" height="70" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="505" y="346" fill="#16a34a" font-size="13" font-weight="700">一致性定理</text>
  <text x="505" y="365" fill="#6b7280" font-size="11">③ 后续收到 marker 的通道 → 将期间消息序列作为通道状态</text>
  <text x="505" y="385" fill="#6b7280" font-size="11">④ 快照 = 一致性切割 · 无"收未发"因果倒置</text>

  <!-- ====== Flink Mapping ====== -->
  <rect x="20" y="405" width="920" height="70" rx="8" fill="none" stroke="#d1d5db" stroke-width="1"/>
  <text x="45" y="432" fill="#111827" font-size="13" font-weight="700">Chandy-Lamport → Flink Checkpoint 映射</text>

  <rect x="45" y="445" width="195" height="22" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="142" y="460" fill="#2563eb" font-size="11" text-anchor="middle">Marker → Checkpoint Barrier</text>

  <rect x="255" y="445" width="195" height="22" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="352" y="460" fill="#2563eb" font-size="11" text-anchor="middle">进程快照 → Task State</text>

  <rect x="465" y="445" width="195" height="22" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="562" y="460" fill="#2563eb" font-size="11" text-anchor="middle">通道状态 → In-flight Records</text>

  <rect x="675" y="445" width="245" height="22" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="797" y="460" fill="#2563eb" font-size="11" text-anchor="middle">稳定属性 → Exactly-Once 语义</text>
</svg>