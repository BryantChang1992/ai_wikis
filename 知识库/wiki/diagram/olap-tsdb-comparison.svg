    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <text x="30" y="32" fill="#f1f5f9" font-size="16" font-weight="700">OLAP vs. Time-Series Database — Domain Comparison</text>
  <text x="30" y="50" fill="#94a3b8" font-size="11">Doris (OLAP) vs. InfluxDB (TSDB) — different design paradigms, shared columnar trends</text>
  <text x="30" y="82" fill="#22d3ee" font-size="12" font-weight="700">OLAP — MPP Importer-Query Model</text>
