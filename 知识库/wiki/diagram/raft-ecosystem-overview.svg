<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="480" y="35" fill="white" font-size="18" font-weight="700" text-anchor="middle">Raft 共识协议体系全景</text>
  <text x="480" y="58" fill="#94a3b8" font-size="11" text-anchor="middle">基于 Ongaro 博士论文 (Stanford 2014) · 五维拆解 + 工程组件 + 工业实践</text>

  <!-- ====== Row 1: Core Protocol (Paxos → Raft) ====== -->
  <rect x="30" y="80" width="900" height="140" rx="8" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Paxos Box -->
  <rect x="50" y="100" width="200" height="100" rx="8" fill="#0f172a" stroke="#fb7185" stroke-width="1.5"/>
  <text x="150" y="128" fill="#fb7185" font-size="13" font-weight="700" text-anchor="middle">Single-Decree Paxos</text>
  <text x="150" y="150" fill="#94a3b8" font-size="9" text-anchor="middle">仅决定单值</text>
  <text x="150" y="168" fill="#64748b" font-size="9" text-anchor="middle">无系统蓝图</text>
  <text x="150" y="186" fill="#64748b" font-size="9" text-anchor="middle">缺失四大组件</text>

  <!-- Arrow Paxos → Raft -->
  <line x1="250" y1="150" x2="310" y2="150" stroke="#fb7185" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="280" y="143" fill="#fbbf24" font-size="9" text-anchor="middle">问题驱动</text>
  <text x="280" y="168" fill="#64748b" font-size="8" text-anchor="middle">设计演进</text>

  <!-- Raft Core Box -->
  <rect x="320" y="100" width="580" height="100" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>

  <!-- Sub-box: Leader Election -->
  <rect x="340" y="118" width="170" height="68" rx="5" fill="#083344" stroke="#22d3ee" stroke-width="1"/>
  <text x="425" y="142" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">Leader Election</text>
  <text x="425" y="160" fill="#94a3b8" font-size="9" text-anchor="middle">三态: Follower/Candidate/Leader</text>
  <text x="425" y="176" fill="#64748b" font-size="9" text-anchor="middle">Term 逻辑时钟 + 随机超时</text>

  <!-- Sub-box: Log Replication -->
  <rect x="525" y="118" width="170" height="68" rx="5" fill="#083344" stroke="#22d3ee" stroke-width="1"/>
  <text x="610" y="142" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">Log Replication</text>
  <text x="610" y="160" fill="#94a3b8" font-size="9" text-anchor="middle">强 Leader 模型</text>
  <text x="610" y="176" fill="#64748b" font-size="9" text-anchor="middle">Log Matching Property</text>

  <!-- Sub-box: Safety -->
  <rect x="710" y="118" width="170" height="68" rx="5" fill="#083344" stroke="#22d3ee" stroke-width="1"/>
  <text x="795" y="142" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">Safety</text>
  <text x="795" y="160" fill="#94a3b8" font-size="9" text-anchor="middle">Election Restriction</text>
  <text x="795" y="176" fill="#64748b" font-size="9" text-anchor="middle">Commitment of Prev Terms</text>

  <!-- ====== Arrow down to Engineering Components ====== -->
  <line x1="480" y1="220" x2="480" y2="248" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <text x="500" y="238" fill="#22d3ee" font-size="9">核心协议</text>

  <!-- ====== Row 2: Engineering Components ====== -->
  <rect x="30" y="250" width="900" height="140" rx="8" fill="none" stroke="#334155" stroke-width="1"/>
  
  <text x="60" y="280" fill="#34d399" font-size="14" font-weight="700">工程组件 (完整系统蓝图)</text>

  <!-- Cluster Membership -->
  <rect x="60" y="295" width="200" height="80" rx="6" fill="#022c22" stroke="#34d399" stroke-width="1.5"/>
  <text x="160" y="320" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">集群成员变更</text>
  <text x="160" y="340" fill="#94a3b8" font-size="9" text-anchor="middle">Joint Consensus</text>
  <text x="160" y="356" fill="#64748b" font-size="9" text-anchor="middle">Cold → Cold,new → Cnew</text>
  <text x="160" y="370" fill="#64748b" font-size="8" text-anchor="middle">Single-Server 优化</text>

  <!-- Log Compaction -->
  <rect x="280" y="295" width="200" height="80" rx="6" fill="#022c22" stroke="#34d399" stroke-width="1.5"/>
  <text x="380" y="320" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">日志压缩</text>
  <text x="380" y="340" fill="#94a3b8" font-size="9" text-anchor="middle">Snapshot 机制</text>
  <text x="380" y="356" fill="#64748b" font-size="9" text-anchor="middle">InstallSnapshot RPC</text>
  <text x="380" y="370" fill="#64748b" font-size="8" text-anchor="middle">全量 vs 增量权衡</text>

  <!-- Client Interaction -->
  <rect x="500" y="295" width="200" height="80" rx="6" fill="#022c22" stroke="#34d399" stroke-width="1.5"/>
  <text x="600" y="320" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">客户端交互</text>
  <text x="600" y="340" fill="#94a3b8" font-size="9" text-anchor="middle">Linearizability 保证</text>
  <text x="600" y="356" fill="#64748b" font-size="9" text-anchor="middle">Read Index / Lease Read</text>
  <text x="600" y="370" fill="#64748b" font-size="8" text-anchor="middle">幂等操作 (ID, seq)</text>

  <!-- Formal Verification -->
  <rect x="720" y="295" width="190" height="80" rx="6" fill="#022c22" stroke="#34d399" stroke-width="1.5"/>
  <text x="815" y="320" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">形式化验证</text>
  <text x="815" y="340" fill="#94a3b8" font-size="9" text-anchor="middle">TLA+ Specification</text>
  <text x="815" y="356" fill="#64748b" font-size="9" text-anchor="middle">~500 行 TLA+</text>
  <text x="815" y="370" fill="#64748b" font-size="8" text-anchor="middle">机械验证 Safety</text>

  <!-- ====== Arrow down to Ecosystem ====== -->
  <line x1="480" y1="390" x2="480" y2="418" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)"/>
  <text x="500" y="408" fill="#34d399" font-size="9">工程实践</text>

  <!-- ====== Row 3: Ecosystem / Adoptions ====== -->
  <rect x="30" y="420" width="900" height="120" rx="8" fill="none" stroke="#334155" stroke-width="1"/>

  <text x="60" y="450" fill="#a78bfa" font-size="14" font-weight="700">工业采纳 (被引 15000+)</text>

  <!-- etcd -->
  <rect x="60" y="465" width="135" height="60" rx="5" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="127" y="485" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">etcd</text>
  <text x="127" y="505" fill="#94a3b8" font-size="8" text-anchor="middle">Kubernetes 核心</text>
  <text x="127" y="519" fill="#64748b" font-size="8" text-anchor="middle">单 Raft 组 3-5 节点</text>

  <!-- TiKV -->
  <rect x="210" y="465" width="135" height="60" rx="5" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="277" y="485" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">TiKV</text>
  <text x="277" y="505" fill="#94a3b8" font-size="8" text-anchor="middle">TiDB NewSQL</text>
  <text x="277" y="519" fill="#64748b" font-size="8" text-anchor="middle">多 Raft (Region)</text>

  <!-- CockroachDB -->
  <rect x="360" y="465" width="155" height="60" rx="5" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="437" y="485" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">CockroachDB</text>
  <text x="437" y="505" fill="#94a3b8" font-size="8" text-anchor="middle">全球分布式 DB</text>
  <text x="437" y="519" fill="#64748b" font-size="8" text-anchor="middle">Multi-Raft + Leases</text>

  <!-- Kafka KRaft -->
  <rect x="530" y="465" width="135" height="60" rx="5" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="597" y="485" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">Kafka KRaft</text>
  <text x="597" y="505" fill="#94a3b8" font-size="8" text-anchor="middle">ZooKeeper-less</text>
  <text x="597" y="519" fill="#64748b" font-size="8" text-anchor="middle">元数据自治</text>

  <!-- Consul -->
  <rect x="680" y="465" width="110" height="60" rx="5" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="735" y="485" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">Consul</text>
  <text x="735" y="505" fill="#94a3b8" font-size="8" text-anchor="middle">服务发现</text>
  <text x="735" y="519" fill="#64748b" font-size="8" text-anchor="middle">KV + 健康检查</text>

  <!-- NATS JetStream -->
  <rect x="805" y="465" width="110" height="60" rx="5" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="860" y="485" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">NATS</text>
  <text x="860" y="505" fill="#94a3b8" font-size="8" text-anchor="middle">JetStream</text>
  <text x="860" y="519" fill="#64748b" font-size="8" text-anchor="middle">轻量级消息</text>

  <!-- ====== Arrow down to Cross-References ====== -->
  <line x1="480" y1="540" x2="480" y2="568" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-violet)"/>

  <!-- ====== Row 4: Cross References with Knowledge Base ====== -->
  <rect x="30" y="570" width="900" height="135" rx="8" fill="none" stroke="#334155" stroke-width="1"/>

  <text x="60" y="600" fill="#fbbf24" font-size="14" font-weight="700">知识库交叉关联</text>

  <!-- Consistency System -->
  <rect x="60" y="615" width="280" height="75" rx="5" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="200" y="640" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">分布式数据系统一致性体系</text>
  <text x="200" y="660" fill="#94a3b8" font-size="9" text-anchor="middle">事务层 / 副本层 / 会话层</text>
  <text x="200" y="678" fill="#64748b" font-size="8" text-anchor="middle">Raft 是"副本层"核心协议</text>

  <!-- CockroachDB Leases -->
  <rect x="355" y="615" width="280" height="75" rx="5" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="495" y="640" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">CockroachDB Leader Leases</text>
  <text x="495" y="660" fill="#94a3b8" font-size="9" text-anchor="middle">Lease ← Fortification ← Liveness Fabric</text>
  <text x="495" y="678" fill="#64748b" font-size="8" text-anchor="middle">Raft 读优化 → CPU 节省 85%+</text>

  <!-- Event Horizon / Rosé -->
  <rect x="650" y="615" width="260" height="75" rx="5" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="780" y="640" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">Rosé / Event-Horizon</text>
  <text x="780" y="660" fill="#94a3b8" font-size="9" text-anchor="middle">异步复制、非对称依赖</text>
  <text x="780" y="678" fill="#64748b" font-size="8" text-anchor="middle">Raft 同步共识的灵活替代</text>

  <!-- Footer timeline -->
  <rect x="80" y="710" width="800" height="2" fill="#334155"/>
  <text x="480" y="722" fill="#64748b" font-size="9" text-anchor="middle">1989 Paxos → 1990 VR → 2014 Raft Dissertation → 2014 etcd → 2015 CockroachDB → 2016 TiKV → 2022 Kafka KRaft</text>
</svg>