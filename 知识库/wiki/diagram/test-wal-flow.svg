<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 240">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', monospace; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-down" markerWidth="7" markerHeight="10" refX="3.5" refY="9" orient="auto" overflow="visible">
      <polygon points="0 0, 7 0, 3.5 10" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-down-cyan" markerWidth="7" markerHeight="10" refX="3.5" refY="9" orient="auto" overflow="visible">
      <polygon points="0 0, 7 0, 3.5 10" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="20" y="24" fill="white" font-size="14" font-weight="700">WAL &amp; MVCC 数据流 — MySQL InnoDB 写入路径</text>

  <!-- Row 1: Top boxes -->
  <!-- User SQL -->
  <rect x="20" y="50" width="140" height="52" rx="6" fill="#0f172a"/>
  <rect x="20" y="50" width="140" height="52" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="90" y="72" fill="white" font-size="11" font-weight="600" text-anchor="middle">User SQL</text>
  <text x="90" y="88" fill="#94a3b8" font-size="9" text-anchor="middle">请求</text>

  <!-- Arrow -->
  <line x1="160" y1="76" x2="208" y2="76" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- WAL Log -->
  <rect x="215" y="50" width="140" height="52" rx="6" fill="#0f172a"/>
  <rect x="215" y="50" width="140" height="52" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="285" y="72" fill="white" font-size="11" font-weight="600" text-anchor="middle">WAL 日志</text>
  <text x="285" y="88" fill="#94a3b8" font-size="9" text-anchor="middle">顺序写</text>

  <!-- Arrow -->
  <line x1="355" y1="76" x2="403" y2="76" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Buffer Pool -->
  <rect x="410" y="50" width="140" height="52" rx="6" fill="#0f172a"/>
  <rect x="410" y="50" width="140" height="52" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="480" y="72" fill="white" font-size="11" font-weight="600" text-anchor="middle">Buffer Pool</text>
  <text x="480" y="88" fill="#94a3b8" font-size="9" text-anchor="middle">内存</text>

  <!-- Arrow -->
  <line x1="550" y1="76" x2="598" y2="76" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Data Pages -->
  <rect x="605" y="50" width="140" height="52" rx="6" fill="#0f172a"/>
  <rect x="605" y="50" width="140" height="52" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="675" y="72" fill="white" font-size="11" font-weight="600" text-anchor="middle">数据页</text>
  <text x="675" y="88" fill="#94a3b8" font-size="9" text-anchor="middle">异步刷盘</text>

  <!-- Down arrow from WAL to Disk -->
  <line x1="285" y1="102" x2="285" y2="148" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- Disk Log -->
  <rect x="180" y="158" width="210" height="52" rx="6" fill="#0f172a"/>
  <rect x="180" y="158" width="210" height="52" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="285" y="180" fill="white" font-size="11" font-weight="600" text-anchor="middle">磁盘日志 (ib_logfile)</text>
  <text x="285" y="196" fill="#94a3b8" font-size="9" text-anchor="middle">持久化完成 → 事务可提交</text>
</svg>
