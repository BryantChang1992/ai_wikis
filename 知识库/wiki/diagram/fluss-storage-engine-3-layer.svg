<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640">
<style>
  text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
</style>
<defs>
  <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f0f1a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
  <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/></marker>
  <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 8 3, 0 6" fill="#10b981"/></marker>
  <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible"><polygon points="0 0, 8 3, 0 6" fill="#a855f7"/></marker>
</defs>
<rect width="960" height="640" fill="url(#bg-grad)"/>

<text x="480" y="28" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Fluss 三层存储架构</text>
<text x="480" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">ReplicaManager → LogManager · KvManager · RemoteLogManager · 从 append-only 到结构化存储</text>

<!-- ReplicaManager -->
<rect x="330" y="68" width="300" height="42" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
<text x="480" y="94" font-size="14" font-weight="bold" fill="#c084fc" text-anchor="middle">ReplicaManager</text>

<line x1="390" y1="110" x2="390" y2="142" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr-blue)"/>
<line x1="480" y1="110" x2="480" y2="142" stroke="#10b981" stroke-width="1.8" marker-end="url(#arr-green)"/>
<line x1="570" y1="110" x2="570" y2="142" stroke="#a855f7" stroke-width="1.8" marker-end="url(#arr-purple)"/>
<text x="380" y="132" font-size="9" fill="#3b82f6" text-anchor="middle">appendRecords()</text>
<text x="475" y="132" font-size="9" fill="#10b981" text-anchor="middle">putKv()</text>
<text x="565" y="132" font-size="9" fill="#a855f7" text-anchor="middle">tiering</text>

<!-- L1: LogManager -->
<rect x="230" y="148" width="340" height="130" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
<rect x="230" y="148" width="340" height="34" rx="6" fill="#1e3a5f"/><rect x="230" y="170" width="340" height="12" fill="#1e3a5f"/>
<text x="400" y="170" font-size="13" font-weight="bold" fill="#60a5fa" text-anchor="middle">L1: LogManager</text>
<text x="400" y="186" font-size="9" fill="#3b82f6" text-anchor="middle">基于 Kafka Log 改造 · .log Segments · Arrow 列式格式</text>
<rect x="250" y="200" width="130" height="28" rx="4" fill="#1a1a2e" stroke="#334155" stroke-width="0.5"/>
<text x="315" y="219" font-size="11" fill="#e2e8f0" text-anchor="middle">LogTablet</text>
<line x1="380" y1="214" x2="410" y2="214" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arr-blue)"/>
<rect x="415" y="200" width="140" height="28" rx="4" fill="#1a1a2e" stroke="#334155" stroke-width="0.5"/>
<text x="485" y="219" font-size="11" fill="#e2e8f0" text-anchor="middle">LocalLog → Segments</text>
<rect x="250" y="238" width="300" height="24" rx="4" fill="#1c1917" stroke="#ea580c" stroke-width="0.5"/>
<text x="400" y="255" font-size="9" fill="#f97316" text-anchor="middle">vs Kafka: 内存 NavigableMap · 无 .index/.timeindex 文件</text>

<!-- L2: KvManager -->
<rect x="230" y="293" width="340" height="155" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
<rect x="230" y="293" width="340" height="34" rx="6" fill="#052e16"/><rect x="230" y="315" width="340" height="12" fill="#052e16"/>
<text x="400" y="315" font-size="13" font-weight="bold" fill="#34d399" text-anchor="middle">L2: KvManager ⚡ 最大差异化模块</text>
<text x="400" y="332" font-size="9" fill="#10b981" text-anchor="middle">WAL 复用 Changelog LogTablet · 零额外 WAL · Write-Once Read-Multiple</text>
<rect x="250" y="348" width="100" height="26" rx="4" fill="#1a1a2e" stroke="#334155" stroke-width="0.5"/>
<text x="300" y="366" font-size="11" fill="#e2e8f0" text-anchor="middle">KvTablet</text>
<line x1="350" y1="361" x2="380" y2="361" stroke="#10b981" stroke-width="1.2" marker-end="url(#arr-green)"/>
<rect x="385" y="348" width="110" height="26" rx="4" fill="#1a1a2e" stroke="#334155" stroke-width="0.5"/>
<text x="440" y="366" font-size="11" fill="#e2e8f0" text-anchor="middle">RocksDBKv</text>
<text x="250" y="396" font-size="10" fill="#e2e8f0">├ WalBuilder (Arrow / Compacted / Indexed)</text>
<text x="250" y="414" font-size="10" fill="#e2e8f0">├ SnapshotManager → Uploader → Committer</text>
<text x="250" y="432" font-size="10" fill="#e2e8f0">├ RowMerger (Default / FirstRow / Versioned / Aggregate)</text>
<text x="250" y="450" font-size="9" fill="#64748b">└ PartialUpdater · AutoIncrementManager · KvPreWriteBuffer</text>

<!-- L3: RemoteLogManager -->
<rect x="230" y="463" width="340" height="115" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="1"/>
<rect x="230" y="463" width="340" height="34" rx="6" fill="#1e1b4b"/><rect x="230" y="485" width="340" height="12" fill="#1e1b4b"/>
<text x="400" y="485" font-size="13" font-weight="bold" fill="#c084fc" text-anchor="middle">L3: RemoteLogManager</text>
<text x="400" y="502" font-size="9" fill="#a855f7" text-anchor="middle">冷数据分层 · S3 / HDFS / OSS · 原生支持</text>
<rect x="250" y="518" width="140" height="26" rx="4" fill="#1a1a2e" stroke="#334155" stroke-width="0.5"/>
<text x="320" y="536" font-size="11" fill="#e2e8f0" text-anchor="middle">Remote Log Segments</text>
<line x1="390" y1="531" x2="420" y2="531" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arr-purple)"/>
<rect x="425" y="518" width="130" height="26" rx="4" fill="#1a1a2e" stroke="#334155" stroke-width="0.5"/>
<text x="490" y="536" font-size="11" fill="#e2e8f0" text-anchor="middle">S3 / HDFS / OSS</text>
<text x="305" y="565" font-size="9" fill="#64748b" text-anchor="middle">remoteLogStart/EndOffset 内建管理</text>

<!-- Right: Comparison -->
<rect x="600" y="148" width="340" height="270" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1"/>
<text x="770" y="172" font-size="13" font-weight="bold" fill="#f97316" text-anchor="middle">Tablet vs Kafka Partition</text>

<text x="615" y="198" font-size="11" font-weight="bold" fill="#f97316">Fluss Tablet</text>
<line x1="730" y1="196" x2="730" y2="404" stroke="#ea580c" stroke-width="0.8" stroke-dasharray="3,3"/>

<text x="615" y="218" font-size="10" fill="#e2e8f0">物理实体: LogTablet / KvTablet</text>
<text x="615" y="236" font-size="10" fill="#e2e8f0">存储层: Log + KV + Remote 三层</text>
<text x="615" y="254" font-size="10" fill="#e2e8f0">恢复: Log Replay / Snapshot Restore</text>
<text x="615" y="272" font-size="10" fill="#e2e8f0">合并: RowMerger 四种策略</text>
<text x="615" y="290" font-size="10" fill="#e2e8f0">删除: 真正 DELETE (KV 删除)</text>
<text x="615" y="308" font-size="10" fill="#e2e8f0">索引: RocksDB (PK 索引)</text>

<text x="745" y="198" font-size="11" font-weight="bold" fill="#64748b">Kafka Partition</text>
<text x="745" y="218" font-size="10" fill="#94a3b8">仅 Log</text>
<text x="745" y="236" font-size="10" fill="#94a3b8">单层本地 Log</text>
<text x="745" y="254" font-size="10" fill="#94a3b8">仅 Log Replay</text>
<text x="745" y="272" font-size="10" fill="#94a3b8">无合并逻辑</text>
<text x="745" y="290" font-size="10" fill="#94a3b8">Tombstone 标记</text>
<text x="745" y="308" font-size="10" fill="#94a3b8">Offset + Time 索引</text>

<rect x="600" y="435" width="340" height="70" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
<text x="770" y="456" font-size="12" font-weight="bold" fill="#60a5fa" text-anchor="middle">核心洞察</text>
<text x="770" y="476" font-size="10" fill="#94a3b8" text-anchor="middle">Fluss 的创新不是 Log 实现（大量复用 Kafka）</text>
<text x="770" y="492" font-size="10" fill="#94a3b8" text-anchor="middle">而是在 Log 之上加 KV Store，从消息队列进化到实时分析 DB</text></svg>
