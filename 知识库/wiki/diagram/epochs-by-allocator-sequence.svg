<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .lifeline { stroke: #2563eb; stroke-width: 1.5; stroke-dasharray: 6,4; }
    .msg { stroke: #6b7280; stroke-width: 1.5; }
    .msg-label { font-size: 10px; fill: #374151; }
  </style>
  <defs>
    <marker id="arrow-alloc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-back" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
      <marker id="arrow-6b7280" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="800" height="280" fill="#ffffff"/>

  <text x="400" y="25" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">Epochs by Allocator · 协议时序 (2 RTT total)</text>

  <!-- Header boxes -->
  <rect x="100" y="45" width="120" height="28" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="160" y="64" fill="#2563eb" font-size="12" font-weight="700" text-anchor="middle">Proposer</text>

  <rect x="340" y="45" width="120" height="28" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="400" y="64" fill="#ea580c" font-size="12" font-weight="700" text-anchor="middle">Allocator</text>

  <rect x="580" y="45" width="120" height="28" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="640" y="64" fill="#16a34a" font-size="12" font-weight="700" text-anchor="middle">Acceptors</text>

  <!-- Lifelines -->
  <line x1="160" y1="73" x2="160" y2="240" class="lifeline" marker-end="url(#arrow-6b7280)"/>
  <line x1="400" y1="73" x2="400" y2="240" class="lifeline" marker-end="url(#arrow-6b7280)"/>
  <line x1="640" y1="73" x2="640" y2="240" class="lifeline" marker-end="url(#arrow-6b7280)"/>

  <!-- RTT 1: GetEpoch → e_min -->
  <line x1="160" y1="95" x2="385" y2="95" class="msg" stroke="#ea580c" marker-end="url(#arrow-alloc)"/>
  <text x="272" y="88" fill="#ea580c" font-size="10" font-weight="600" text-anchor="middle">GetEpoch()</text>

  <line x1="400" y1="120" x2="175" y2="120" class="msg" stroke="#16a34a" marker-end="url(#arrow-back)"/>
  <text x="288" y="113" fill="#16a34a" font-size="10" font-weight="600" text-anchor="middle">e_min (最小 epoch)</text>

  <!-- RTT 2: Propose → Accept -->
  <line x1="160" y1="155" x2="625" y2="155" class="msg" stroke="#ea580c" marker-end="url(#arrow-alloc)"/>
  <text x="393" y="148" fill="#ea580c" font-size="10" font-weight="600" text-anchor="middle">Propose(e_min, v)</text>

  <line x1="640" y1="180" x2="175" y2="180" class="msg" stroke="#16a34a" marker-end="url(#arrow-back)"/>
  <text x="408" y="173" fill="#16a34a" font-size="10" font-weight="600" text-anchor="middle">Accept(e_min, v)</text>

  <!-- Annotation -->
  <rect x="30" y="210" width="740" height="35" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="400" y="232" fill="#475569" font-size="10" font-weight="600" text-anchor="middle">RTT 1: Proposer → Allocator → Proposer  ·  RTT 2: Proposer → Acceptors → Proposer</text>
  <text x="400" y="245" fill="#6b7280" font-size="9" text-anchor="middle">跳过 Phase-1 (prepare/promise) → 直接进入 Phase-2 (propose/accept) → 比 Classic Paxos 少 1 RTT</text>
</svg>