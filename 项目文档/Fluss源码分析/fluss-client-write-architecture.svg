<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif; }
    .title { font-size: 18px; font-weight: 600; fill: #111827; }
    .layer-label { font-size: 12px; fill: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .node-label { font-size: 14px; fill: #111827; font-weight: 600; }
    .node-sublabel { font-size: 11px; fill: #6b7280; }
    .node-box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .node-box-accent { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.5; }
    .layer-box { fill: none; stroke: #e5e7eb; stroke-width: 1; stroke-dasharray: 6 3; }
    .legend-text { font-size: 12px; fill: #6b7280; }
    .arrow-label { font-size: 11px; fill: #6b7280; }
  </style>

  <defs>
    <marker id="arrow-data" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-control" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-async" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" class="title">Fluss 客户端写入引擎 — 核心组件架构图</text>

  <!-- LAYER BACKGROUNDS -->
  <rect x="20" y="50" width="920" height="90" rx="6" class="layer-box"/>
  <text x="32" y="68" class="layer-label">APPLICATION LAYER</text>

  <rect x="20" y="150" width="920" height="110" rx="6" class="layer-box"/>
  <text x="32" y="168" class="layer-label">TABLE API LAYER</text>

  <rect x="20" y="270" width="920" height="300" rx="6" class="layer-box"/>
  <text x="32" y="288" class="layer-label">WRITE ENGINE LAYER</text>

  <rect x="20" y="580" width="920" height="60" rx="6" class="layer-box"/>
  <text x="32" y="598" class="layer-label">RPC TRANSPORT</text>

  <rect x="20" y="650" width="920" height="110" rx="6" class="layer-box"/>
  <text x="32" y="668" class="layer-label">SERVER SIDE</text>

  <!-- ===== NODES ===== -->

  <!-- APPLICATION LAYER -->
  <rect x="60" y="72" width="170" height="50" rx="8" class="node-box"/>
  <text x="145" y="93" text-anchor="middle" class="node-label">User Code</text>
  <text x="145" y="110" text-anchor="middle" class="node-sublabel">append() · flush() · close()</text>

  <rect x="380" y="72" width="180" height="50" rx="8" class="node-box"/>
  <text x="470" y="93" text-anchor="middle" class="node-label">Connection</text>
  <text x="470" y="110" text-anchor="middle" class="node-sublabel">FlussConnection</text>

  <rect x="700" y="72" width="180" height="50" rx="8" class="node-box"/>
  <text x="790" y="93" text-anchor="middle" class="node-label">ConnectionFactory</text>
  <text x="790" y="110" text-anchor="middle" class="node-sublabel">bootstrap.servers → RpcClient</text>

  <!-- TABLE API LAYER -->
  <rect x="60" y="170" width="170" height="72" rx="8" class="node-box"/>
  <text x="145" y="192" text-anchor="middle" class="node-label">Table</text>
  <text x="145" y="208" text-anchor="middle" class="node-sublabel">FlussTable</text>
  <text x="145" y="224" text-anchor="middle" class="node-sublabel">conn.getTable(path)</text>

  <rect x="380" y="170" width="180" height="72" rx="8" class="node-box-accent"/>
  <text x="470" y="192" text-anchor="middle" class="node-label">AppendWriter</text>
  <text x="470" y="208" text-anchor="middle" class="node-sublabel">AppendWriterImpl</text>
  <text x="470" y="224" text-anchor="middle" class="node-sublabel">IndexedRow / Arrow encoder</text>

  <rect x="700" y="170" width="180" height="72" rx="8" class="node-box-accent"/>
  <text x="790" y="192" text-anchor="middle" class="node-label">UpsertWriter</text>
  <text x="790" y="208" text-anchor="middle" class="node-sublabel">UpsertWriterImpl</text>
  <text x="790" y="224" text-anchor="middle" class="node-sublabel">KeyEncoder + RowEncoder</text>

  <!-- WRITE ENGINE LAYER -->
  <!-- Row 1 -->
  <rect x="60" y="295" width="200" height="56" rx="8" class="node-box"/>
  <text x="160" y="317" text-anchor="middle" class="node-label">BucketAssigner</text>
  <text x="160" y="333" text-anchor="middle" class="node-sublabel">Hash · RoundRobin · Sticky</text>
  <text x="160" y="345" text-anchor="middle" class="node-sublabel">assignBucket(key, cluster) → bucketId</text>

  <rect x="380" y="295" width="200" height="56" rx="8" class="node-box-accent"/>
  <text x="480" y="317" text-anchor="middle" class="node-label">WriterClient</text>
  <text x="480" y="333" text-anchor="middle" class="node-sublabel">doSend() · flush() · close()</text>
  <text x="480" y="345" text-anchor="middle" class="node-sublabel">全局协调枢纽</text>

  <rect x="700" y="295" width="200" height="56" rx="8" class="node-box-accent"/>
  <text x="800" y="317" text-anchor="middle" class="node-label">Sender</text>
  <text x="800" y="333" text-anchor="middle" class="node-sublabel">IO 单线程 · runOnce()</text>
  <text x="800" y="345" text-anchor="middle" class="node-sublabel">ready → drain → send → handle</text>

  <!-- Row 2 -->
  <rect x="60" y="390" width="200" height="56" rx="8" class="node-box"/>
  <text x="160" y="412" text-anchor="middle" class="node-label">RecordAccumulator</text>
  <text x="160" y="428" text-anchor="middle" class="node-sublabel">per-bucket Deque&lt;WriteBatch&gt;</text>
  <text x="160" y="440" text-anchor="middle" class="node-sublabel">Arrow pool / ready() / drain()</text>

  <rect x="380" y="390" width="200" height="56" rx="8" class="node-box"/>
  <text x="480" y="412" text-anchor="middle" class="node-label">MetadataUpdater</text>
  <text x="480" y="428" text-anchor="middle" class="node-sublabel">Cluster · BucketLocation</text>
  <text x="480" y="440" text-anchor="middle" class="node-sublabel">coordinatorGateway</text>

  <rect x="700" y="390" width="200" height="56" rx="8" class="node-box"/>
  <text x="800" y="412" text-anchor="middle" class="node-label">IdempotenceManager</text>
  <text x="800" y="428" text-anchor="middle" class="node-sublabel">writerId · batchSequence</text>
  <text x="800" y="440" text-anchor="middle" class="node-sublabel">inflight tracking · initWriter</text>

  <!-- Row 3 -->
  <rect x="380" y="485" width="200" height="48" rx="8" class="node-box"/>
  <text x="480" y="507" text-anchor="middle" class="node-label">DynamicPartitionCreator</text>
  <text x="480" y="523" text-anchor="middle" class="node-sublabel">checkAndCreatePartitionAsync()</text>

  <!-- RPC TRANSPORT -->
  <rect x="380" y="595" width="200" height="42" rx="8" class="node-box"/>
  <text x="480" y="614" text-anchor="middle" class="node-label">RpcClient (Netty)</text>
  <text x="480" y="629" text-anchor="middle" class="node-sublabel">TabletServerGateway · CoordinatorGateway</text>

  <!-- SERVER SIDE -->
  <rect x="280" y="685" width="200" height="52" rx="8" class="node-box-accent"/>
  <text x="380" y="707" text-anchor="middle" class="node-label">TabletServer</text>
  <text x="380" y="723" text-anchor="middle" class="node-sublabel">ProduceLog / PutKv handler</text>

  <rect x="600" y="685" width="200" height="52" rx="8" class="node-box"/>
  <text x="700" y="707" text-anchor="middle" class="node-label">Coordinator</text>
  <text x="700" y="723" text-anchor="middle" class="node-sublabel">InitWriter · Metadata store</text>

  <!-- ===== ARROWS (all orthogonal paths) ===== -->

  <!-- ConnFactory → Connection -->
  <path d="M 700 97 L 565 97" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="633" y="91" text-anchor="middle" class="arrow-label">create()</text>

  <!-- Connection → Table -->
  <path d="M 380 97 L 280 97 L 280 170 L 235 170" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="280" y="135" text-anchor="start" dx="4" class="arrow-label">getTable(path)</text>

  <!-- Table → AppendWriter -->
  <path d="M 230 206 L 375 206" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="303" y="200" text-anchor="middle" class="arrow-label">.newAppend().createWriter()</text>

  <!-- Table → UpsertWriter -->
  <path d="M 230 206 L 695 206" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="463" y="200" text-anchor="middle" class="arrow-label">.newUpsert().createWriter()</text>

  <!-- AppendWriter → WriterClient: vertical down -->
  <path d="M 470 242 L 470 290" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="480" y="272" class="arrow-label">send(record, cb)</text>

  <!-- UpsertWriter → WriterClient: right→down→left -->
  <path d="M 790 242 L 790 260 L 480 260 L 480 290" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>

  <!-- WriterClient → BucketAssigner: left horizontal -->
  <path d="M 380 323 L 265 323" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-control)"/>
  <text x="323" y="317" text-anchor="middle" class="arrow-label">assignBucket()</text>

  <!-- BucketAssigner → RecordAccumulator: down vertical -->
  <path d="M 160 351 L 160 385" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-control)"/>

  <!-- WriterClient → RecordAccumulator: left horizontal -->
  <path d="M 380 418 L 265 418" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-control)"/>
  <text x="325" y="412" text-anchor="middle" class="arrow-label">append(record, cb)</text>

  <!-- RecordAccumulator → Sender: diagonal bottom-right to top-right -->
  <path d="M 260 418 L 340 418 L 340 323 L 695 323" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="520" y="370" text-anchor="middle" class="arrow-label">drain() → batches by node</text>

  <!-- Sender → RpcClient: vertical down -->
  <path d="M 800 351 L 800 590 L 585 590 L 585 590" stroke="#2563eb" stroke-width="1.5" fill="none"/>
  <path d="M 800 351 L 800 420 L 580 420 L 580 590" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="690" y="505" text-anchor="middle" class="arrow-label">ProduceLog / PutKv RPC</text>

  <!-- RpcClient → TabletServer: vertical down -->
  <path d="M 380 637 L 380 680" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>

  <!-- RpcClient → Coordinator: right-down -->
  <path d="M 580 616 L 700 680" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-control)"/>
  <text x="655" y="652" text-anchor="middle" class="arrow-label">initWriter / metadata</text>

  <!-- MetadataUpdater → Sender: right-up -->
  <path d="M 580 418 L 695 418 L 695 356" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-control)"/>
  <text x="645" y="435" text-anchor="middle" class="arrow-label">getCluster()</text>

  <!-- IdempotenceManager → Sender: up -->
  <path d="M 800 390 L 800 356" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-control)"/>
  <text x="810" y="375" class="arrow-label">sequences</text>

  <!-- Sender → WriterClient (async callback): left -->
  <path d="M 700 323 L 585 323" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow-async)"/>
  <text x="643" y="317" text-anchor="middle" class="arrow-label">callback (async)</text>

  <!-- WriterClient → MetadataUpdater: down vertical -->
  <path d="M 480 351 L 480 385" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-control)"/>
  <text x="490" y="372" class="arrow-label">updateMetadata()</text>

  <!-- WriterClient → DynamicPartitionCreator: down vertical -->
  <path d="M 480 351 L 480 480" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-control)"/>
  <text x="490" y="420" class="arrow-label">checkAndCreatePartitionAsync()</text>

  <!-- DynamicPartitionCreator → RpcClient: vertical down -->
  <path d="M 480 533 L 480 590" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-control)"/>
  <text x="490" y="565" class="arrow-label">admin.createPartition()</text>

  <!-- ===== LEGEND ===== -->
  <rect x="770" y="460" width="170" height="100" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="785" y="482" font-size="12" font-weight="600" fill="#111827">图例</text>
  <line x1="785" y1="500" x2="820" y2="500" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-data)"/>
  <text x="828" y="504" class="legend-text">数据流</text>
  <line x1="785" y1="522" x2="820" y2="522" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-control)"/>
  <text x="828" y="526" class="legend-text">控制流 / 元数据</text>
  <line x1="785" y1="544" x2="820" y2="544" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-async)"/>
  <text x="828" y="548" class="legend-text">异步回调</text>
</svg>