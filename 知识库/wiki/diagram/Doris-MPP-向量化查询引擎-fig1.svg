    <marker id="arrow-orange" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 3 8, 6 0" fill="#f97316"/>
