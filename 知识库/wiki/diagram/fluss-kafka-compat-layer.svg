<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
<style>
  text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
</style>
<defs>
  <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0f0f1a"/><stop offset="100%" stop-color="#1a1a2e"/>
  </linearGradient>
  <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/></marker>
  <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f97316"/></marker>
  <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#64748b"/></marker>
</defs>
<rect width="960" height="480" fill="url(#bg-grad)"/>

<!-- Title -->
<text x="480" y="30" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Fluss Kafka 兼容层 · 协议链路</text>
<text x="480" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">双协议引擎: Fluss (1000+) + Kafka (0-999) · 外挂翻译层 — 当前骨架阶段</text>

<!-- Left Panel: Netty Pipeline -->
<rect x="20" y="68" width="450" height="395" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="245" y="92" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Netty Pipeline 协议检测链路</text>

<rect x="60" y="110" width="370" height="32" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
<text x="245" y="131" font-size="11" fill="#e2e8f0" text-anchor="middle">① 网络字节流 (Kafka Client / Fluss Client)</text>
<line x1="245" y1="142" x2="245" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>

<rect x="40" y="166" width="410" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
<text x="245" y="187" font-size="11" fill="#3b82f6" text-anchor="middle">② Magic Bytes 检测 → 分叉: Fluss / Kafka</text>

<!-- Fluss Branch -->
<line x1="170" y1="198" x2="170" y2="218" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
<rect x="60" y="224" width="200" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
<text x="160" y="243" font-size="11" fill="#3b82f6" text-anchor="middle">③ Fluss Protocol (PB)</text>
<line x1="160" y1="252" x2="160" y2="268" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arr-blue)"/>
<rect x="60" y="274" width="200" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
<text x="160" y="293" font-size="11" fill="#3b82f6" text-anchor="middle">④ FlussChannelInitializer</text>
<line x1="160" y1="302" x2="160" y2="320" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arr-blue)"/>
<rect x="60" y="326" width="200" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
<text x="160" y="345" font-size="11" fill="#3b82f6" text-anchor="middle">⑤ 61 API (完整实现)</text>

<!-- Kafka Branch -->
<line x1="340" y1="198" x2="340" y2="218" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
<rect x="260" y="224" width="200" height="28" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="0.8"/>
<text x="360" y="243" font-size="11" fill="#f97316" text-anchor="middle">③ KafkaProtocolPlugin（外挂）</text>
<line x1="360" y1="252" x2="360" y2="268" stroke="#f97316" stroke-width="1.2" marker-end="url(#arr-orange)"/>
<rect x="260" y="274" width="200" height="28" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="0.8"/>
<text x="360" y="293" font-size="11" fill="#f97316" text-anchor="middle">④ KafkaCommandDecoder</text>
<line x1="360" y1="302" x2="360" y2="320" stroke="#f97316" stroke-width="1.2" marker-end="url(#arr-orange)"/>
<rect x="260" y="326" width="200" height="28" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="0.8"/>
<text x="360" y="345" font-size="11" fill="#f97316" text-anchor="middle">⑤ KafkaRequestHandler</text>
<text x="360" y="386" font-size="10" fill="#ef4444" text-anchor="middle">⚠ 除 API_VERSIONS 外全空方法 {}</text>

<!-- Right Panel: Status -->
<rect x="490" y="68" width="450" height="395" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
<text x="715" y="92" font-size="13" font-weight="bold" fill="#ef4444" text-anchor="middle">当前状态: 骨架</text>

<text x="510" y="120" font-size="12" font-weight="bold" fill="#e2e8f0">✅ 已实现</text>
<text x="510" y="142" font-size="10" fill="#10b981">├ 客户端连接 (TCP + Kafka 握手)</text>
<text x="510" y="160" font-size="10" fill="#10b981">├ API_VERSIONS 完整实现 (协议协商)</text>
<text x="510" y="178" font-size="10" fill="#10b981">├ 二进制协议解码 (Kafka Wire Protocol)</text>
<text x="510" y="196" font-size="10" fill="#10b981">├ NetworkProtocolPlugin SPI 注册机制</text>

<text x="510" y="230" font-size="12" font-weight="bold" fill="#e2e8f0">❌ 未实现</text>
<text x="510" y="252" font-size="10" fill="#ef4444">├ Produce (写入消息)</text>
<text x="510" y="270" font-size="10" fill="#ef4444">├ Fetch (读取消息)</text>
<text x="510" y="288" font-size="10" fill="#ef4444">├ Metadata (Topic 发现)</text>
<text x="510" y="306" font-size="10" fill="#ef4444">├ OffsetCommit / JoinGroup (消费组)</text>
<text x="510" y="324" font-size="10" fill="#ef4444">├ ListOffsets / FindCoordinator / LeaderAndIsr</text>
<text x="510" y="342" font-size="10" fill="#ef4444">└ 其余 50+ Kafka API</text>

<rect x="510" y="368" width="410" height="28" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="0.8"/>
<text x="715" y="387" font-size="10" fill="#a855f7" text-anchor="middle">💡 战略意图: "零代码迁移" · 语义映射挑战 > 工程实现</text></svg>
