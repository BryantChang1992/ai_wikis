<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 45" width="530" height="45">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
  </defs>
  <rect width="530" height="45" fill="url(#bg-grad)"/>
  <text x="10" y="16" font-size="12" font-weight="bold" fill="#f97316">Aggregate 模型</text>
  <rect x="120" y="6" width="70" height="20" rx="4" fill="#1c1917" stroke="#ea580c" stroke-width="1"/>
  <text x="155" y="18" font-size="10" fill="#e2e8f0" text-anchor="middle">写入</text>
  <line x1="190" y1="16" x2="220" y2="16" stroke="#f97316" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <text x="225" y="16" font-size="10" fill="#e2e8f0">同 Key 行按聚合函数合并 (SUM/MAX/MIN/REPLACE)</text>
  <text x="120" y="36" font-size="10" fill="#94a3b8">查询 → 读取聚合结果</text>
</svg>