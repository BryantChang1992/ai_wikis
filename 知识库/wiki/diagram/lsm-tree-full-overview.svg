<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520">
  <defs>
    <filter id="shadow-lsm" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="520" fill="#ffffff"/>

  <text x="480" y="32" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#111827" text-anchor="middle">LSM-Tree 核心架构</text>
  <text x="480" y="54" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">写入路径 · 合并策略 · 核心优化 · RUM 猜想定位</text>

  <!-- ====== Write Path ====== -->
  <rect x="30" y="75" width="900" height="130" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow-lsm)"/>
  <text x="480" y="100" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#374151" text-anchor="middle">写入路径</text>

  <rect x="60" y="115" width="100" height="34" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="110" y="137" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#111827" text-anchor="middle">Write</text>

  <line x1="160" y1="132" x2="190" y2="132" stroke="#3b82f6" stroke-width="1.2"/>

  <rect x="195" y="115" width="100" height="34" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="245" y="137" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">WAL (顺序写)</text>

  <line x1="295" y1="132" x2="325" y2="132" stroke="#3b82f6" stroke-width="1.2"/>

  <rect x="330" y="115" width="130" height="34" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="395" y="137" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#166534" text-anchor="middle">MemTable (全内存)</text>

  <line x1="460" y1="132" x2="490" y2="132" stroke="#16a34a" stroke-width="1.2"/>

  <rect x="495" y="115" width="130" height="34" rx="6" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="560" y="137" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#6b21a8" text-anchor="middle">Immutable MemTable</text>

  <line x1="625" y1="132" x2="655" y2="132" stroke="#9333ea" stroke-width="1.2"/>

  <rect x="660" y="115" width="110" height="34" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="715" y="137" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#9a3412" text-anchor="middle">SST Files (磁盘)</text>

  <text x="480" y="182" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">WAL → MemTable → flush → SST Table → compaction → 下一层 SST</text>

  <!-- ====== Compaction ====== -->
  <rect x="30" y="218" width="440" height="120" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" filter="url(#shadow-lsm)"/>
  <text x="250" y="242" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">Leveling Strategy</text>

  <rect x="50" y="258" width="180" height="30" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="140" y="278" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#15803d" text-anchor="middle">L0: 无序 (SST 可重叠)</text>

  <line x1="140" y1="288" x2="140" y2="298" stroke="#16a34a" stroke-width="1"/>

  <rect x="50" y="300" width="180" height="30" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="140" y="320" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#15803d" text-anchor="middle">L1: 10 MB 有序</text>

  <rect x="270" y="258" width="180" height="72" rx="5" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="360" y="280" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">L0 → L1: 合并 L0 全部</text>
  <text x="360" y="298" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">L1 → L2: 挑一个 SST</text>
  <text x="360" y="316" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">写放大: 大 · 读: 快</text>

  <line x1="140" y1="330" x2="140" y2="337" stroke="#16a34a" stroke-width="1"/>

  <text x="140" y="348" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">每层容量 ×10 (L1=10MB, L2=100MB...)</text>

  <!-- Tiering -->
  <rect x="490" y="218" width="440" height="120" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" filter="url(#shadow-lsm)"/>
  <text x="710" y="242" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#1e40af" text-anchor="middle">Tiering Strategy</text>

  <rect x="510" y="258" width="180" height="30" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="600" y="278" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">L0-T: 多层 SST</text>

  <rect x="730" y="258" width="180" height="72" rx="5" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="820" y="280" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">每层可多个 SST</text>
  <text x="820" y="298" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">合并: 挑 ≥2 SST 跨层合并</text>
  <text x="820" y="316" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">写放大: 小 · 读: 慢</text>

  <text x="600" y="348" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">RocksDB 混合: L0 Leveling + L1+ Tiering</text>

  <!-- ====== Bottom: RUM + Optimizations ====== -->
  <rect x="30" y="352" width="900" height="150" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>

  <text x="480" y="376" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#374151" text-anchor="middle">RUM 猜想 + 2026 最新优化</text>

  <rect x="50" y="392" width="270" height="46" rx="6" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="185" y="410" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#374151" text-anchor="middle">RUM 猜想</text>
  <text x="185" y="428" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Read-Write-Space 三选二理论框架</text>

  <rect x="340" y="392" width="270" height="46" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="475" y="410" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Monkey (2026)</text>
  <text x="475" y="428" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">BF 分配优化 · 读延迟 → 0</text>

  <rect x="630" y="392" width="280" height="46" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="770" y="410" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">Dostoevsky (2026)</text>
  <text x="770" y="428" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#16a34a" text-anchor="middle">Lazy Leveling 自适应混合</text>

  <rect x="50" y="448" width="270" height="46" rx="6" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="185" y="466" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#6b21a8" text-anchor="middle">Silo (2026)</text>
  <text x="185" y="484" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#9333ea" text-anchor="middle">分布式 Compaction 全局调度</text>

  <rect x="340" y="448" width="280" height="46" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="480" y="466" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#9a3412" text-anchor="middle">硬件适配</text>
  <text x="480" y="484" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#ea580c" text-anchor="middle">大内存 · NVMe · NVM · 多核优化</text>

  <rect x="640" y="448" width="270" height="46" rx="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="775" y="466" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" fill="#3730a3" text-anchor="middle">二级索引</text>
  <text x="775" y="484" font-family="Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#6366f1" text-anchor="middle">Diff-Index · 主键索引方案</text>
</svg>
