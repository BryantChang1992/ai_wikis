<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 250" width="720" height="250">
  <style>
    text { font-family: 'SF Mono','Fira Code','Cascadia Code','Courier New','Microsoft YaHei','SimHei',monospace; fill: #e2e8f0; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="720" height="250" fill="url(#bg-grad)"/>
  <text x="360" y="22" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">DeMon 执行流程</text>
  <rect x="10" y="35" width="290" height="30" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>
  <text x="155" y="55" font-size="11" fill="#e2e8f0" text-anchor="middle">Client A: new_bid("item1", 100)</text>
  <line x1="300" y1="50" x2="460" y2="50" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="380" y="44" font-size="9" fill="#22d3ee" text-anchor="middle">causal broadcast</text>
  <rect x="465" y="35" width="230" height="30" rx="4" fill="none" stroke="#334155" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="580" y="55" font-size="10" fill="#94a3b8" text-anchor="middle">副本本地执行（微秒级）</text>
  <rect x="10" y="78" width="290" height="30" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>
  <text x="155" y="98" font-size="11" fill="#e2e8f0" text-anchor="middle">Client B: new_bid("item1", 150)</text>
  <line x1="300" y1="93" x2="460" y2="93" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="380" y="87" font-size="9" fill="#22d3ee" text-anchor="middle">causal broadcast</text>
  <rect x="465" y="78" width="230" height="30" rx="4" fill="none" stroke="#334155" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="580" y="98" font-size="10" fill="#94a3b8" text-anchor="middle">副本本地执行（微秒级）</text>
  <rect x="10" y="122" width="300" height="30" rx="4" fill="#1c1917" stroke="#ea580c" stroke-width="1.2"/>
  <text x="160" y="142" font-size="11" fill="#e2e8f0" text-anchor="middle">Client A: close_auction("item1")</text>
  <line x1="30" y1="155" x2="30" y2="170" stroke="#94a3b8" stroke-width="1"/>
  <text x="50" y="172" font-size="10" fill="#94a3b8">├── 发送给 Primary</text>
  <text x="50" y="188" font-size="10" fill="#94a3b8">├── Primary 从 bag 中收集所有相关 new_bid</text>
  <text x="50" y="204" font-size="10" fill="#94a3b8">├── 本地重排序确定最终 bid 序列</text>
  <text x="50" y="220" font-size="10" fill="#94a3b8">├── 广播结果</text>
  <text x="50" y="236" font-size="10" fill="#10b981">└── 所有副本执行 close → 确定赢家 = Client B</text>
</svg>